const WEEKS={
  week1:{title:"Week 1–2 — OLS Review & Basic Statistics",subtitle:"Foundations · OLS Assumptions · Gauss-Markov · PDF/CDF · PRL/SRF",sections:[
    {head:"OLS Method",num:"1",cards:[
      {title:"The OLS Estimator",content:'<p>OLS minimizes the <span class="wk-key">sum of squared residuals</span> Σûᵢ² to find the best-fitting line through the data.</p><div class="wk-formula">min Σ(Yᵢ − β₀ − β₁X₁ᵢ − ... − βₘXₘᵢ)²\nβ̂ = (X\'X)⁻¹X\'Y\nσ̂² = Σûᵢ² / (n − k)</div><p>The stochastic/error term captures everything not in the model: <span class="wk-key">Yᵢ = β₀ + β₁Xᵢ + uᵢ</span>. The model yg baik itu "workhorse" dari ekonometri — simple tapi kalau assumption-nya hold, hasilnya sangat powerful.</p><div class="wk-highlight">💡 OLS baru one way: based on theory/common sense, maka masukan X → Y. OLS based on logical reasoning.</div>'},
      {title:"Population vs Sample Regression",content:'<p><span class="wk-key">PRL</span> (Population Regression Line): E(Y|X) = β₀ + β₁X — ini yg mau kita tahu tapi gak bisa observe langsung.</p><p><span class="wk-key">SRF</span> (Sample Regression Function): Ŷᵢ = β̂₀ + β̂₁Xᵢ — estimasi dari data.</p><div class="wk-formula">PRL: Yᵢ = β₀ + β₁Xᵢ + uᵢ  (uᵢ = stochastic error, unobservable)\nSRF: Ŷᵢ = β̂₀ + β̂₁Xᵢ      (ûᵢ = Yᵢ − Ŷᵢ = residual, observable)</div><div class="wk-exam">📝 Key distinction: uᵢ is the population error (never observed), ûᵢ is the sample residual (computed from data). Never confuse these in exam!</div>'},
    ]},
    {head:"OLS Assumptions (A1–A9)",num:"2",cards:[
      {title:"The Nine Classical Assumptions",content:'<p>These 9 assumptions guarantee OLS is <span class="wk-key">BLUE</span> (Best Linear Unbiased Estimator):</p><table class="wk-table"><tr><th>#</th><th>Assumption</th><th>Violation Consequence</th></tr><tr><td>A1</td><td>Linear in parameters</td><td>Wrong functional form</td></tr><tr><td>A2</td><td>Fixed X values (not multiplied/divided by other variable)</td><td>Endogeneity</td></tr><tr><td>A3</td><td>Zero mean of disturbance: E(uᵢ|Xᵢ) = 0</td><td>Biased β̂</td></tr><tr><td>A4</td><td>Homoscedasticity: Var(uᵢ) = σ²</td><td>Inefficient, wrong SEs</td></tr><tr><td>A5</td><td>No autocorrelation: Cov(uᵢ,uⱼ) = 0</td><td>Inefficient, wrong SEs</td></tr><tr><td>A6</td><td>Cov(uᵢ,Xᵢ) = 0</td><td>Biased β̂</td></tr><tr><td>A7</td><td>n > k (enough observations)</td><td>Cannot estimate</td></tr><tr><td>A8</td><td>No exact multicollinearity</td><td>Cannot invert X\'X</td></tr><tr><td>A9</td><td>No specification bias</td><td>Biased & inconsistent</td></tr></table><div class="wk-highlight">💡 A perfect multicollinearity → exact statistics (test statistik kalau variable-nya perfectly correlated, bisa dapet parameter yg unik → tidak ada kemungkinan bias).</div>'},
    ]},
    {head:"Basic Statistics Review",num:"3",cards:[
      {title:"PDF, CDF & Expected Value",content:'<p><span class="wk-key">PDF</span> (Probability Density Function): f(x) ≥ 0, ∫f(x)dx = 1. Bisa discrete (PMF) atau continuous.</p><p><span class="wk-key">CDF</span> (Cumulative Distribution Function): F(x) = P(X ≤ x). Untuk continuous: F(x) = ∫₋∞ˣ f(t)dt.</p><div class="wk-formula">E(X) = ∫x·f(x)dx = expected value (populasi mean)\nVar(X) = E(X²) − [E(X)]²\nFor discrete: E(X) = Σ xᵢ·P(xᵢ)</div><div class="wk-highlight">💡 Discrete → PDF gives probabilities (bars). Continuous → PDF gives density (area under curve = probability). CDF always goes from 0 to 1, monotonically increasing.</div>'},
      {title:"Normal Distribution",content:'<p>The <span class="wk-key">Normal distribution</span> N(μ, σ²) is critical for inference. Its PDF is the bell curve, CDF is the S-curve (Φ).</p><div class="wk-formula">f(x) = (1/σ√2π) · exp{−½((x−μ)/σ)²}\nF(x) = Φ((x−μ)/σ)\nStandard normal: Z ~ N(0,1)</div><p>Properties: symmetric around μ, 68-95-99.7 rule, sum of normals is normal.</p>'},
    ]},
    {head:"Gauss-Markov Theorem",num:"4",cards:[
      {title:"BLUE Property",content:'<p>If OLS assumptions A1–A9 hold, then OLS is <span class="wk-key">BLUE</span>:</p><ul><li><b>B</b>est = minimum variance</li><li><b>L</b>inear = linear function of Y</li><li><b>U</b>nbiased = E(β̂) = β</li><li><b>E</b>stimator = rule mapping data → estimate</li></ul><div class="wk-formula">E(β̂) = β           (unbiased)\nVar(β̂) ≤ Var(β̃)   (for any other linear unbiased β̃)</div><div class="wk-exam">📝 Even given Monte Carlo simulation, min variance, linear, repeated sampling → OLS estimators are BLUE. State ALL 4 components when asked!</div>'},
    ]},
  ]},
  week2:{title:"Week 3 — MLE Method",subtitle:"PPT: Review on Maximum Likelihood Estimation · PRF/SRF Review · Likelihood · Log-Likelihood · IID · MLE = OLS · Hessian · Inference · LR Tests",sections:[
    {head:"PRF & SRF Review (from PPT)",num:"1",cards:[
      {title:"Population Regression Function (PRF)",content:'<p>The <span class="wk-key">PRF</span> tells us the average value of $Y$ for a given $X$:</p><div class="wk-formula">$$E(Y|X_i) = f(X_i)$$</div><p>In the linear case: $E(Y|X_i) = \\beta_1 + \\beta_2 X_i$. This is the <b>true relationship</b> we want to recover but can never directly observe.</p><p>From the PPT income-consumption example: at $X=140$, the conditional mean $E(Y|X=140) = 101$, while the unconditional mean across all 60 families is 121.20 — these are different questions.</p><div class="wk-highlight">💡 <b>Conditional mean</b> asks: "What is average Y for families with THIS specific income?" <b>Unconditional mean</b> asks: "What is average Y for ALL families?" Regression is about conditional means — this distinction is crucial.</div>'},
      {title:"Stochastic Error Term",content:'<p>Individual observations deviate from the conditional mean:</p><div class="wk-formula">$$Y_i = E(Y|X_i) + u_i = \\beta_1 + \\beta_2 X_i + u_i$$</div><p>where $Y_i$ = actual outcome, $\\beta_1 + \\beta_2 X_i$ = systematic part (what the model explains), and $u_i$ = stochastic disturbance (what it does not explain).</p><p><b>Why does $u_i$ exist?</b> (1) Incomplete theory, (2) unavailable data, (3) intrinsic randomness in human behavior, (4) measurement error, (5) parsimony, (6) wrong functional form.</p><div class="wk-formula">$$E(u_i | X_i) = 0$$</div><p>This is the <b>most important assumption</b>: for a given $X$, the average error is zero. If violated → systematic bias → endogeneity.</p>'},
      {title:"Sample Regression Function (SRF) & Residuals",content:'<p>We estimate the PRF using the <span class="wk-key">SRF</span>:</p><div class="wk-formula">$$\\hat{Y}_i = \\hat{\\beta}_1 + \\hat{\\beta}_2 X_i \\qquad \\hat{u}_i = Y_i - \\hat{Y}_i$$</div><p><b>Critical distinction:</b></p><table class="wk-table"><tr><th>Symbol</th><th>Name</th><th>Observable?</th><th>Lives in</th></tr><tr><td>$u_i$</td><td>Stochastic error</td><td>No — never</td><td>Population</td></tr><tr><td>$\\hat{u}_i$</td><td>Residual</td><td>Yes — computed</td><td>Sample</td></tr></table><p>The PPT shows: different random samples from the same population give <b>different</b> SRFs. This is WHY statistics exists — estimators are random variables.</p><div class="wk-exam">📝 Never confuse $u_i$ (population error, unobservable) with $\\hat{u}_i$ (sample residual, observable). Assumptions are about $u_i$; diagnostics use $\\hat{u}_i$.</div>'},
      {title:"Linearity — Variables vs Parameters",content:'<p>A common exam trap from the PPT:</p><table class="wk-table"><tr><th>Type</th><th>Meaning</th><th>Example</th></tr><tr><td>Linear in variables</td><td>$X$ appears only to the first power, not multiplied by other variables</td><td>$Y = \\beta_1 + \\beta_2 X$ ✓</td></tr><tr><td>Linear in parameters</td><td>$\\beta$ appears only to the first power, not multiplied by each other</td><td>$Y = \\beta_1 + \\beta_2 X^2$ ✓ (linear in params!)</td></tr></table><p>$Y = \\beta_1 + \\beta_2^2 X$ is NOT linear in parameters (because $\\beta_2$ is squared).</p><div class="wk-highlight">💡 Econometrics cares about <b>linearity in parameters</b>. So $Y = \\beta_1 + \\beta_2 X^2$ IS a linear regression model. OLS and Gauss-Markov still apply!</div>'},
    ]},
    {head:"The MLE Framework",num:"2",cards:[
      {title:"Core Intuition: Which θ Makes Data Most Probable?",content:'<p><span class="wk-key">MLE</span> asks: <i>"Given the data I observed, which parameter value would make that observation most plausible?"</i></p><p>For a random sample $Y_1, \\ldots, Y_n$ from pdf $f(y; \\theta)$, under <span class="wk-key">IID</span> (identical and independently distributed):</p><div class="wk-formula">$$L(\\theta | y_1, \\ldots, y_n) = \\prod_{i=1}^{n} f(y_i; \\theta)$$</div><p><b>What each part means:</b></p><ul><li>$L(\\theta)$ = the <b>likelihood function</b> — same formula as the joint density, but now we treat data as fixed and $\\theta$ as the unknown</li><li>$\\prod$ = product over all observations — because IID lets us multiply individual densities</li><li>$f(y_i; \\theta)$ = probability of observing $y_i$ under parameter $\\theta$</li></ul><div class="wk-highlight">💡 The likelihood is NOT a probability of $\\theta$. It is the probability of the DATA, viewed as a function of $\\theta$. We find the $\\theta$ that maximizes it.</div>'},
      {title:"Log-Likelihood: Why We Take Logs",content:'<p>We maximize $\\ln L$ instead of $L$:</p><div class="wk-formula">$$\\ln L(\\theta) = \\sum_{i=1}^{n} \\ln f(y_i; \\theta)$$</div><p><b>Four reasons to use log:</b></p><ol><li><b>Products → Sums:</b> $\\ln(a \\cdot b) = \\ln a + \\ln b$ — sums are MUCH easier to differentiate</li><li><b>Same maximizer:</b> $\\ln$ is monotonically increasing, so $\\arg\\max L = \\arg\\max \\ln L$</li><li><b>Numerical stability:</b> products of small numbers → underflow; sums of logs stay finite</li><li><b>In econometrics:</b> we use $\\ln$ (natural log), and $\\exp(\\cdot)$ is the inverse: $e^{\\ln x} = x$</li></ol>'},
      {title:"Conditional MLE with Regressors (Wooldridge Version)",content:'<p>When we have explanatory variables, the PPT gives the general conditional form:</p><div class="wk-formula">$$\\max_b \\sum_{i=1}^{n} \\log f(y_i | x_i, b)$$</div><p>This is the form used for logit, probit, Tobit, and all nonlinear econometric models. We choose parameter vector $b$ to maximize the <b>conditional</b> log-likelihood of $Y$ given $X$.</p><div class="wk-exam">📝 This is the "master formula" of the course. Everything from logit to probit to count models starts here — only the specific $f(y|x,b)$ changes.</div>'},
    ]},
    {head:"MLE for Linear Regression: MLE = OLS",num:"3",cards:[
      {title:"Setting Up the Normal Likelihood",content:'<p>Given: $Y_i = X_i\'\\beta + \\varepsilon_i$ with $\\varepsilon_i \\sim N(0, \\sigma^2)$ independently. Then $Y_i | X_i \\sim N(X_i\'\\beta, \\sigma^2)$.</p><div class="wk-formula">$$f(Y_i | X_i\'\\beta, \\sigma) = \\frac{1}{\\sigma\\sqrt{2\\pi}} \\exp\\left[-\\frac{1}{2}\\left(\\frac{Y_i - X_i\'\\beta}{\\sigma}\\right)^2\\right]$$</div><p><b>Each part:</b> $(Y_i - X_i\'\\beta)$ = deviation from mean, divided by $\\sigma$ = standardization, squared and in exponent = bell-curve shape, front factor = normalization so total area = 1.</p>'},
      {title:"The Key Result: MLE β̂ = OLS β̂",content:'<p>The likelihood for the full sample:</p><div class="wk-formula">$$L(\\beta, \\sigma^2) = \\frac{1}{\\sigma^n (2\\pi)^{n/2}} \\exp\\left[-\\frac{1}{2\\sigma^2} \\sum_{i=1}^{n}(Y_i - X_i\'\\beta)^2\\right]$$</div><p>Taking log and differentiating w.r.t. $\\beta$:</p><div class="wk-formula">$$\\ln L = -\\frac{n}{2}\\ln(2\\pi) - \\frac{n}{2}\\ln(\\sigma^2) - \\frac{1}{2\\sigma^2}\\sum(Y_i - X_i\'\\beta)^2$$</div><p>The only term involving $\\beta$ is $-\\frac{1}{2\\sigma^2}\\sum(Y_i - X_i\'\\beta)^2$. Maximizing $\\ln L$ w.r.t. $\\beta$ is equivalent to <b>minimizing $\\sum(Y_i - X_i\'\\beta)^2$</b> — which is exactly OLS!</p><div class="wk-highlight">💡 <b>Under normal errors, MLE for $\\beta$ is identical to OLS.</b> This is one of the most important links in econometrics. It means OLS is not just "convenient" — it is the maximum likelihood estimator when errors are normal.</div>'},
      {title:"MLE Variance Estimator: Biased!",content:'<p>For $\\sigma^2$, MLE gives:</p><div class="wk-formula">$$\\hat{\\sigma}^2_{ML} = \\frac{1}{n}\\sum_{i=1}^n \\hat{u}_i^2$$</div><p>But the unbiased OLS estimator is:</p><div class="wk-formula">$$\\hat{\\sigma}^2_{\\text{unbiased}} = \\frac{1}{n-k}\\sum_{i=1}^n \\hat{u}_i^2$$</div><p><b>Why the difference?</b> The MLE divides by $n$, but $E(\\sum \\hat{u}_i^2) = (n-k)\\sigma^2$, so:</p><div class="wk-formula">$$E(\\hat{\\sigma}^2_{ML}) = \\frac{n-k}{n}\\sigma^2 = \\sigma^2 - \\frac{k}{n}\\sigma^2 < \\sigma^2$$</div><p>MLE <b>underestimates</b> the true variance in small samples. But as $n \\to \\infty$, the bias $k/n \\to 0$, so it is <b>asymptotically unbiased and consistent</b>.</p><div class="wk-exam">📝 This is a classic exam question. Know that MLE of $\\sigma^2$ divides by $n$ (biased), while unbiased OLS divides by $n-k$ (corrects for estimated parameters).</div>'},
    ]},
    {head:"MLE Properties & Inference",num:"4",cards:[
      {title:"Large Sample Properties: BAN",content:'<p>Under regularity conditions, MLE is <span class="wk-key">BAN</span> (Best Asymptotically Normal):</p><table class="wk-table"><tr><th>Property</th><th>Meaning</th><th>Why It Matters</th></tr><tr><td><b>Consistency</b></td><td>$\\hat{\\beta} \\xrightarrow{p} \\beta$ as $n \\to \\infty$</td><td>Converges to truth with enough data</td></tr><tr><td><b>Asymptotic Normality</b></td><td>$\\sqrt{n}(\\hat{\\beta}-\\beta) \\xrightarrow{d} N(0, I^{-1})$</td><td>Justifies z-tests and confidence intervals</td></tr><tr><td><b>Efficiency</b></td><td>Achieves Cramér-Rao lower bound</td><td>Smallest possible variance asymptotically</td></tr></table><div class="wk-highlight">💡 These are WHY MLE dominates nonlinear econometrics. Even if small-sample behavior is imperfect, in large samples MLE becomes the most powerful, flexible, and efficient estimator available.</div>'},
      {title:"Hessian & Information Matrix — The Deep Meaning of Standard Errors",content:'<p>The <span class="wk-key">Hessian</span> $H$ is the matrix of second derivatives of $\\ln L$:</p><div class="wk-formula">$$H = \\frac{\\partial^2 \\ln L}{\\partial \\beta \\partial \\beta\'} \\qquad \\text{Var}(\\hat{\\beta}) \\approx [-E(H)]^{-1} = I(\\beta)^{-1}$$</div><p><b>Intuition from the PPT:</b></p><ul><li>First derivative = slope (where is the peak?)</li><li>Second derivative = <b>curvature</b> (how sharp is the peak?)</li><li><b>Sharp peak</b> → large $|H|$ → small $I^{-1}$ → small SE → <b>precise estimate</b></li><li><b>Flat peak</b> → small $|H|$ → large $I^{-1}$ → large SE → <b>imprecise estimate</b></li></ul><div class="wk-highlight">💡 Standard errors in MLE come from the curvature of the log-likelihood at the maximum. If the data strongly "point to" one parameter value (sharp peak), the SE is small. If many values are roughly equally likely (flat peak), the SE is large.</div>'},
      {title:"z-Test & Confidence Interval",content:'<p>For testing $H_0: \\beta_k = \\beta_k^0$:</p><div class="wk-formula">$$z = \\frac{\\hat{\\beta}_k - \\beta_k^0}{SE(\\hat{\\beta}_k)} \\qquad \\text{Reject at } \\alpha \\text{ if } |z| > z_{1-\\alpha/2}$$</div><p>At 5% level: $z_{0.975} = 1.96$. So reject if $|z| > 1.96$.</p><div class="wk-formula">$$\\text{95\\% CI: } \\hat{\\beta}_k \\pm 1.96 \\cdot SE(\\hat{\\beta}_k)$$</div><p><b>Interpretation:</b> Narrow CI = high precision. If CI excludes 0 → significant at 5%. Note: MLE uses $z$ (normal distribution), not $t$ (Student\'s), because inference is asymptotic.</p>'},
      {title:"LR Test — Comparing Nested Models",content:'<p>The <span class="wk-key">Likelihood Ratio test</span> compares restricted vs unrestricted models:</p><div class="wk-formula">$$LR = -2\\ln\\left(\\frac{L(M_R)}{L(M_U)}\\right) = 2[\\ln L(M_U) - \\ln L(M_R)] \\sim \\chi^2(q)$$</div><p><b>Where:</b> $M_R$ = restricted model, $M_U$ = unrestricted model, $q$ = number of restrictions.</p><p><b>Why it works:</b> If restrictions are true, restricted model should fit almost as well → small LR. If unrestricted fits much better → large LR → restrictions hurt → reject $H_0$.</p><p><b>4 applications from PPT:</b></p><ol><li><b>Overall test:</b> $H_0: \\beta_1 = \\beta_2 = \\ldots = \\beta_m = 0$ (model vs intercept-only)</li><li><b>Single coefficient:</b> $H_0: \\beta_k = 0$ ($q=1$, compare to $\\chi^2(1)$)</li><li><b>Subset:</b> $H_0: \\beta_j = \\beta_k = 0$ (block of variables)</li><li><b>Equality:</b> $H_0: \\beta_j = \\beta_k$ (are two effects the same?)</li></ol><div class="wk-exam">📝 LR test is the MLE analog of the F-test in OLS. Especially important for nonlinear models where individual z-tests may miss jointly significant variable groups.</div>'},
    ]},
    {head:"MLE Example: Binomial Proportion",num:"5",cards:[
      {title:"Full Worked Example from PPT",content:'<p>$\\pi$ = proportion of men in population. Sample of $N$ people, $K$ are men.</p><div class="wk-formula">$$Pr(K|\\pi, N) = \\binom{N}{K} \\pi^K (1-\\pi)^{N-K}$$\n$$\\ln L = K \\ln \\pi + (N-K) \\ln(1-\\pi) + \\text{const}$$\n$$\\frac{\\partial \\ln L}{\\partial \\pi} = \\frac{K}{\\pi} - \\frac{N-K}{1-\\pi} = 0$$\n$$K(1-\\pi) = (N-K)\\pi \\quad \\Rightarrow \\quad K = N\\pi \\quad \\Rightarrow \\quad \\hat{\\pi} = \\frac{K}{N}$$</div><p><b>Example:</b> If $K=2, N=6$: $\\hat{\\pi} = 2/6 = 1/3$.</p><div class="wk-highlight">💡 MLE gives the "obvious" answer — the sample proportion. But now you understand WHY it is the sample proportion: it is the value that maximizes the likelihood of the observed data. Always verify with 2nd derivative: $\\partial^2 \\ln L/\\partial \\pi^2 < 0$ ✓ (maximum, not minimum).</div>'},
    ]},
    {head:"Benefits & Drawbacks of MLE",num:"6",cards:[
      {title:"When to Use MLE vs OLS",content:'<table class="wk-table"><tr><th>Benefits of MLE</th><th>Drawbacks of MLE</th></tr><tr><td>Very flexible — handles many model types (logit, probit, Tobit, count)</td><td>May be biased in small samples</td></tr><tr><td>Strong large-sample properties (BAN)</td><td>Requires correct distributional assumption</td></tr><tr><td>Natural framework for nonlinear econometrics</td><td>Often no closed-form solution → numerical optimization</td></tr><tr><td>Connects directly to probability models</td><td>Algorithms may fail to converge</td></tr><tr><td>Provides likelihood for LR tests, AIC, BIC</td><td>Special pathologies (e.g., perfect classification in logit)</td></tr></table><div class="wk-exam">📝 <b>Big message from PPT:</b> MLE is extremely powerful but NOT magic. It is only as good as the model and distributional assumptions behind it. Under normality + linear model → MLE = OLS. For binary/count data → MLE is the main tool.</div>'},
    ]},
  ]},
  week3:{title:"Week 4 — Linear Probability Model",subtitle:"Binary Y · LPM Advantages & Problems · WLS Correction · Heteroscedasticity",sections:[
    {head:"The Binary Choice Problem",num:"1",cards:[
      {title:"Bernoulli & Binary Dependent Variable",content:'<p>When Y ∈ {0,1} (dichotomous/binary), we model <span class="wk-key">P(Y=1|X)</span> — the probability of "success" given covariates.</p><div class="wk-formula">Y ~ Bernoulli(πᵢ)\nP(Yᵢ=1) = πᵢ, P(Yᵢ=0) = 1−πᵢ\nE(Yᵢ) = πᵢ = P(Yᵢ=1|Xᵢ)\nVar(Yᵢ) = πᵢ(1−πᵢ)  ← depends on X!</div><p>The expected value of a Bernoulli IS the probability: E(Y) = 1·P(Y=1) + 0·P(Y=0) = P(Y=1).</p><div class="wk-highlight">💡 Since Var(Y) = π(1−π) depends on X, any model for binary Y will have heteroscedastic errors by construction.</div>'},
    ]},
    {head:"LPM: Applying OLS to Binary Y",num:"2",cards:[
      {title:"The Model & Its Interpretation",content:'<p>The <span class="wk-key">Linear Probability Model</span> simply runs OLS on binary Y:</p><div class="wk-formula">P(Yᵢ=1|Xᵢ) = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ + εᵢ\nβₖ = ∂P(Y=1)/∂Xₖ (constant marginal effect)\nŶᵢ = estimated probability</div><p><b>Advantages:</b> (1) Easy to interpret — βₖ is the pp change in probability per unit Xₖ, (2) Simple to estimate with OLS, (3) Good first approximation, (4) Applicable when logit fails.</p>'},
      {title:"LPM Problems (Critical for Exam!)",content:'<p>Four serious problems with LPM:</p><table class="wk-table"><tr><th>Problem</th><th>Detail</th><th>Consequence</th></tr><tr><td>1. P outside [0,1]</td><td>Linear model can predict Ŷ < 0 or Ŷ > 1</td><td>Nonsensical probabilities — contradicts probability axioms</td></tr><tr><td>2. Heteroscedasticity</td><td>Var(εᵢ) = Pᵢ(1−Pᵢ) depends on X</td><td>OLS is inefficient; SEs are wrong</td></tr><tr><td>3. Non-normality</td><td>ε only takes 2 values (not normal)</td><td>Normal-based inference invalid in small samples</td></tr><tr><td>4. R² questionable</td><td>R² usefulness for binary model is dubious</td><td>Cannot use R² for model comparison</td></tr></table><div class="wk-exam">📝 Exam: always list ALL 4 problems. Then explain: "These motivate Logit/Probit models which constrain P ∈ [0,1] and use MLE instead of OLS."</div>'},
      {title:"But Wait — Is LPM Unbiased? (Yes!)",content:'<p>From PPT 2: despite its problems, LPM estimates ARE <b>unbiased</b> if correctly specified. Here is why:</p><div class="wk-formula">Let Zᵢ = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ, so Yᵢ = Zᵢ + εᵢ\n\nSince Y ∈ {0,1}:\n  If Y=0: ε = −Z    (happens with prob 1−Z)\n  If Y=1: ε = 1−Z   (happens with prob Z)\n\nE(ε) = (1−Z)(−Z) + Z(1−Z) = −Z + Z² + Z − Z² = 0 ✓</div><p>So $E(\\varepsilon_i) = 0$ by construction → OLS is unbiased. The real problems are <b>not bias</b>, but rather: functional form (P outside [0,1]), heteroscedasticity, and non-normality.</p><div class="wk-highlight">💡 Many students think LPM is "wrong in every way." That is not true! Unbiasedness holds. The deeper issue is that a straight line is the wrong SHAPE for a probability curve. We need an S-curve → logit/probit.</div>'},
      {title:"Why We Need an S-Shaped Curve (PPT 2)",content:'<p>A good binary probability model should:</p><ul><li>Keep $P \\in [0,1]$ for ALL possible $X$ values</li><li>Allow the effect of $X$ to <b>diminish</b> as $P$ approaches 0 or 1</li><li>Have a natural S-shape: steep in the middle, flat at extremes</li></ul><p><b>Intuition:</b> A 1-unit increase in $X$ should matter MORE when someone is "on the margin" (P ≈ 0.5) than when the outcome is nearly certain (P ≈ 0 or P ≈ 1). A straight line cannot capture this — but an S-curve can.</p><p>Two natural S-shaped CDFs: <span class="wk-key">Logistic CDF</span> → Logit model, <span class="wk-key">Normal CDF</span> → Probit model.</p>'},
    ]},
    {head:"WLS Correction",num:"3",cards:[
      {title:"Weighted Least Squares for LPM",content:'<p><span class="wk-key">WLS</span> corrects heteroscedasticity by weighting each observation inversely to its variance:</p><div class="wk-formula">Step 1: Run OLS → get Ŷᵢ\nStep 2: Compute wᵢ = √[Ŷᵢ(1−Ŷᵢ)]\nStep 3: Divide everything by wᵢ:\n  Yᵢ/wᵢ = (β₀/wᵢ) + β₁(X₁ᵢ/wᵢ) + ... + εᵢ*\nStep 4: Run OLS on transformed model</div><div class="wk-highlight">💡 WLS only works if Ŷᵢ ∈ (0,1). If any Ŷᵢ ≤ 0 or ≥ 1, you cannot compute wᵢ. Drop those observations or fix the model.</div>'},
    ]},
    {head:"Heteroscedasticity in LPM",num:"4",cards:[
      {title:"Why LPM Is Always Heteroscedastic",content:'<p>For binary Y with E(Y|X) = P:</p><div class="wk-formula">εᵢ = Yᵢ − E(Yᵢ|Xᵢ)\nIf Yᵢ = 1: εᵢ = 1 − Pᵢ    (prob = Pᵢ)\nIf Yᵢ = 0: εᵢ = 0 − Pᵢ = −Pᵢ  (prob = 1−Pᵢ)\n\nVar(εᵢ) = E(εᵢ²) − [E(εᵢ)]²\n= (1−Pᵢ)²·Pᵢ + Pᵢ²·(1−Pᵢ) − 0²\n= Pᵢ(1−Pᵢ)[(1−Pᵢ) + Pᵢ]\n= Pᵢ(1−Pᵢ)  ← heteroscedastic!</div><p>Since Pᵢ = β₀ + β₁Xᵢ depends on X, the variance is NOT constant → <span class="wk-key">heteroscedasticity is inherent</span>, not a modeling error.</p>'},
    ]},
  ]},
  week4:{title:"Week 5 — Logit Model",subtitle:"Logistic Regression · Odds Ratio · Marginal Effects · MLE Estimation · Interpretation",sections:[
    {head:"The Logit Model",num:"1",cards:[
      {title:"From LPM to Logit: Fixing P ∈ [0,1]",content:'<p>Use the <span class="wk-key">logistic CDF</span> to constrain probabilities. Nonlinear effect on P(Y=1), but linear in the <b>log-odds</b>:</p><div class="wk-formula">P(Yᵢ=1|Xᵢ) = eˣᵝ/(1+eˣᵝ) = 1/(1+e⁻ˣᵝ)\n\nwhere Xβ = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ\n\nProperties:\n• As Xβ → +∞: P → 1\n• As Xβ → −∞: P → 0\n• At Xβ = 0: P = 0.5\n• Always P ∈ (0,1) ✓</div><div class="wk-highlight">💡 The logit function is the INVERSE of the logistic CDF: logit(P) = ln(P/(1−P)) = Xβ. So the model is linear in log-odds, nonlinear in probability.</div>'},
      {title:"The Log-Odds (Logit) Form",content:'<p>Transform P into the <span class="wk-key">log-odds</span> (logit):</p><div class="wk-formula">Odds = P/(1−P)\nLog-odds = ln(P/(1−P)) = β₀ + β₁X₁ + ... + βₘXₘ\n\nDeriving the odds from the model:\nP = eˣᵝ/(1+eˣᵝ), 1−P = 1/(1+eˣᵝ)\nOdds = P/(1−P) = eˣᵝ\nln(Odds) = Xβ  ✓ linear!</div><p>Z = ln(P/(1−P)) → odds ratio. P = 1/(1+e⁻ᶻ). When P = 1 → Z = +∞, P = 0 → Z = −∞, P = 0.5 → Z = 0.</p>'},
    ]},
    {head:"Interpretation",num:"2",cards:[
      {title:"Three Levels of Interpretation",content:'<p>Logit coefficients can be interpreted at <b>three levels</b>:</p><table class="wk-table"><tr><th>Level</th><th>What βₖ means</th><th>Formula</th></tr><tr><td>1. Direction only</td><td>Sign of βₖ → direction of effect on P</td><td>βₖ > 0 → P increases</td></tr><tr><td>2. Log-odds</td><td>βₖ = change in log-odds per unit Xₖ</td><td>Δ ln(odds) = βₖ</td></tr><tr><td>3. Odds Ratio</td><td>e^βₖ = multiplicative change in odds</td><td>OR = e^βₖ</td></tr></table><div class="wk-exam">📝 "A 1-unit increase in Xₖ is associated with a (e^βₖ − 1)×100% change in the odds of Y=1, holding all else constant." This is the standard exam phrasing.</div>'},
      {title:"Marginal Effects — The Real Interpretation",content:'<p>Since the relationship is nonlinear, the <span class="wk-key">marginal effect</span> (change in probability) depends on where you evaluate:</p><div class="wk-formula">∂P/∂Xₖ = βₖ · P(1−P)\n\nAt the mean: evaluate at X = X̄\n  ME(X̄) = βₖ · P(X̄) · (1−P(X̄))\n\nAverage Marginal Effect (AME):\n  AME = (1/N) Σᵢ βₖ · P̂ᵢ(1−P̂ᵢ)\n\nMaximum ME: at P = 0.5 → ME = βₖ/4\nRelative magnitude: βⱼ/βₖ (ratio of coefficients = ratio of ME at any point)</div><div class="wk-highlight">💡 Marginal effect is BIGGEST at P = 0.5 (middle of S-curve) and shrinks toward 0 as P approaches 0 or 1. The "βₖ/4 rule" gives a quick upper bound on the marginal effect.</div>'},
      {title:"Elasticity & Semi-Elasticity",content:'<p>Advanced interpretation tools:</p><div class="wk-formula">Semi-elasticity: ∂P/∂Xₖ = βₖ · P(1−P)\n  → how much does P change (in levels) per unit Xₖ\n\nElasticity: ε = (∂P/∂Xₖ)·(Xₖ/P) = βₖ · Xₖ · (1−P)\n  → % change in P per 1% change in Xₖ</div>'},
    ]},
    {head:"MLE for Logit",num:"3",cards:[
      {title:"Log-Likelihood & Estimation",content:'<p>Logit is estimated via <span class="wk-key">MLE</span>. The log-likelihood for binary logit:</p><div class="wk-formula">L(β) = Πᵢ Pᵢʸⁱ · (1−Pᵢ)¹⁻ʸⁱ\n\nln L = Σᵢ [Yᵢ ln Pᵢ + (1−Yᵢ) ln(1−Pᵢ)]\n     = Σᵢ [Yᵢ · Xᵢβ − ln(1 + eˣⁱᵝ)]\n\nGlobally concave → unique maximum ✓\nSolved via Newton-Raphson iteration\nNo closed-form solution (unlike OLS)</div><div class="wk-exam">📝 The fact that logit log-likelihood is globally concave is important: it guarantees a unique solution exists and Newton-Raphson will find it.</div>'},
    ]},
    {head:"Dummy & Nonlinear Effects in Logit",num:"4",cards:[
      {title:"Categorical Predictors",content:'<p>For categorical X with K categories: create <span class="wk-key">K−1 dummy variables</span>, with one category as reference group.</p><div class="wk-formula">Binary predictor: logit(P) = β₀ + β₁D\n  D=0: logit(P) = β₀ → P₀ = e^β₀/(1+e^β₀)\n  D=1: logit(P) = β₀+β₁ → P₁ = e^(β₀+β₁)/(1+e^(β₀+β₁))\n  OR for D: e^β₁ = odds(D=1)/odds(D=0)</div>'},
      {title:"Nonlinear & Interaction Effects",content:'<p><span class="wk-key">Non-additivity</span>: if X₁ and X₂ change simultaneously, the total effect is NOT simply the sum of separate effects (unlike LPM).</p><div class="wk-formula">With interaction: logit(P) = β₀ + β₁X₁ + β₂X₂ + β₃X₁X₂\n\nEffect of X₁ on log odds = β₁ + β₃X₂\n  → depends on the value of X₂!\n\nNonlinear effect on P:\n  Polynomial: logit(P) = β₀ + β₁X + β₂X²\n  The effect on the log of odds may be nonlinear</div><div class="wk-highlight">💡 Nonlinear effects in logit: (1) effect on log-odds via polynomials, (2) effect on probability is ALWAYS nonlinear due to the logistic function. Two layers of nonlinearity!</div>'},
    ]},
    {head:"Discrete Changes & Predicted Probabilities (PPT 2)",num:"5",cards:[
      {title:"Discrete Change Effects — Better for Binary Regressors",content:'<p>For a binary regressor (e.g., college degree: 0/1), the derivative-based marginal effect is less meaningful. Instead compute the <b>discrete change</b>:</p><div class="wk-formula">Discrete change = Pr(Y=1 | Xₖ=1) − Pr(Y=1 | Xₖ=0)\n\nFor continuous X, one-unit change:\n  Pr(Y=1 | Xₖ+1) − Pr(Y=1 | Xₖ)\n\nOther variants:\n  • Standard deviation change: Pr(Y=1 | Xₖ+sₖ) − Pr(Y=1 | Xₖ)\n  • Min-to-max: Pr(Y=1 | Xₖ=max) − Pr(Y=1 | Xₖ=min)</div><div class="wk-exam">📝 For dummies: ALWAYS report discrete change (0→1), not the derivative. The derivative at 0.5 does not correspond to an observable change for a binary variable.</div>'},
      {title:"Relative Risk — For Rare Events",content:'<p>When probabilities are very small, absolute differences are tiny but <b>relative risk</b> can be dramatic:</p><div class="wk-formula">Relative Risk = P_A / P_B\n\nExample: P_A = 0.02, P_B = 0.01\n  Absolute difference = 0.01 (just 1 pp)\n  Relative risk = 2.0 (DOUBLE the risk!)</div><p>For rare outcomes (disease, default, accident), relative risk is often more informative than probability-point differences.</p>'},
    ]},
    {head:"Separation & Collinearity (PPT 2)",num:"6",cards:[
      {title:"Complete Separation — When Logit Breaks",content:'<p><span class="wk-key">Complete separation</span> occurs when a predictor <b>perfectly classifies</b> Y=0 vs Y=1. Then MLE tries to push |β| → ∞ and never converges.</p><p><b>Warning signs:</b> many iterations, huge coefficients, huge or missing SEs, convergence warnings.</p><p><b>Causes:</b> small sample, too many dummies, data construction artifacts (e.g., including an outcome variable as a predictor by accident).</p><p><b>Fixes:</b> (1) combine sparse categories, (2) exact logistic regression, (3) penalized MLE (Firth), (4) drop the problematic variable.</p><div class="wk-exam">📝 Separation looks impressive ("perfect predictor!") but is usually a data problem. Always check whether the "perfect" predictor is actually meaningful or a coding error.</div>'},
      {title:"Collinearity — When Variables Are Too Similar",content:'<p><b>Perfect collinearity:</b> one X is an exact linear combination of others → cannot estimate (e.g., including all K dummies for K categories). <b>Near collinearity:</b> predictors highly correlated → estimates unstable, SEs huge.</p><div class="wk-highlight">💡 Collinearity does NOT cause bias — estimates are still unbiased. But it destroys PRECISION: you cannot tell which variable is driving the effect. Drop one of the correlated variables or combine them.</div>'},
    ]},
  ]},
  week5:{title:"Week 6 — Probit Model",subtitle:"Normal CDF · Latent Variable Foundation · Probit vs Logit · Coefficient Conversion · PPT 2 Material",sections:[
    {head:"The Latent Variable Foundation (PPT 2)",num:"1",cards:[
      {title:"Unifying Framework: Both Logit & Probit from Latent Y*",content:'<p>From PPT 2: both logit and probit can be understood from ONE underlying model. An unobserved <span class="wk-key">latent variable</span> (utility, propensity, net benefit):</p><div class="wk-formula">$$y_i^* = x_i\'\\beta + \\varepsilon_i \\qquad \\text{(unobserved)}$$\n$$y_i = \\begin{cases} 1 & \\text{if } y_i^* > 0 \\\\ 0 & \\text{if } y_i^* \\leq 0 \\end{cases}$$</div><p>Then: $P(y_i=1|x_i) = P(\\varepsilon_i > -x_i\'\\beta) = F(x_i\'\\beta)$ where $F$ is the CDF of $\\varepsilon$.</p><table class="wk-table"><tr><th>If ε follows...</th><th>F is...</th><th>You get...</th></tr><tr><td>Standard Normal N(0,1)</td><td>Φ (normal CDF)</td><td><b>Probit</b></td></tr><tr><td>Standard Logistic</td><td>Λ (logistic CDF)</td><td><b>Logit</b></td></tr></table><div class="wk-highlight">💡 The latent variable $y^*$ is NEVER observed — only the binary outcome $y$ is. The scale of $y^*$ is arbitrary (utility units are meaningless), so we normalize $\\text{Var}(\\varepsilon) = 1$ (probit) or $\\text{Var}(\\varepsilon) = \\pi^2/3$ (logit). This explains the 1.81 conversion factor!</div><div class="wk-exam">📝 This framework is critical for understanding ordered response models (ordered logit/probit) later — same latent variable, but with multiple thresholds instead of just 0.</div>'},
    ]},
    {head:"The Probit Model",num:"2",cards:[
      {title:"Model from Utility/Latent Variable Theory",content:'<p>The <span class="wk-key">Probit model</span> emerges from a latent variable framework based on <b>utility theory / rational choice</b>:</p><div class="wk-formula">Y*ᵢ = β₁ + β₂Xᵢ + εᵢ   (latent/unobservable utility index)\nεᵢ ~ N(0,1)\n\nDecision rule:\n  Yᵢ = 1 if Y*ᵢ > 0 (= threshold)\n  Yᵢ = 0 if Y*ᵢ ≤ 0\n\nP(Yᵢ=1|Xᵢ) = P(Y*ᵢ > 0) = P(εᵢ > −Xᵢβ)\n= 1 − Φ(−Xᵢβ) = Φ(Xᵢβ)  (by symmetry of normal)</div><div class="wk-highlight">💡 Probit uses the NORMAL CDF (Φ). Logit uses the LOGISTIC CDF (Λ). Both are S-shaped, both constrain P ∈ (0,1). The main difference is tail behavior: logistic has heavier tails.</div>'},
      {title:"Probit Interpretation",content:'<p>Probit coefficients are NOT directly interpretable as marginal effects (just like logit):</p><div class="wk-formula">Marginal effect: ∂P/∂Xₖ = φ(Xβ) · βₖ\n\nwhere φ(z) = (1/√2π) · e^(−z²/2) is the standard normal PDF\n\nRate of change of probability:\n  dPᵢ/dXₖ = f(β₁ + β₂Xᵢ) · β₂\n  = φ(Xᵢβ) · β₂  (normal PDF × coefficient)\n\nt-statistic: t = β̂₁ + β̂₂Xᵢ</div><p>The marginal effect depends on all X values through φ(Xβ). Maximum at Xβ = 0 (where P = 0.5).</p>'},
    ]},
    {head:"Logit vs Probit Comparison",num:"3",cards:[
      {title:"Side-by-Side Comparison",content:'<table class="wk-table"><tr><th>Feature</th><th>Logit</th><th>Probit</th></tr><tr><td>Link function</td><td>Logistic CDF: Λ(z)</td><td>Normal CDF: Φ(z)</td></tr><tr><td>Latent error dist.</td><td>Logistic(0, π²/3)</td><td>Normal(0, 1)</td></tr><tr><td>Tail behavior</td><td>Heavier tails</td><td>Lighter tails (faster approach to 0/1)</td></tr><tr><td>Odds ratio?</td><td>Yes: e^βₖ</td><td>No natural odds ratio</td></tr><tr><td>Marginal effect</td><td>βₖ·P(1−P)</td><td>φ(Xβ)·βₖ</td></tr><tr><td>Coefficient scale</td><td>Larger (σ=π/√3≈1.81)</td><td>Smaller (σ=1)</td></tr></table><div class="wk-formula">Conversion rules:\nβ_logit ≈ 1.81 · β_probit\nβ_LPM ≈ 0.25 · β_logit (at P = 0.5)\nβ_LPM ≈ 0.25 · 1.81 · β_probit ≈ 0.45 · β_probit</div><div class="wk-exam">📝 Coefficients of probit and logit are NOT directly comparable because of different variance assumptions. But: var(logit) = π²/3, var(probit) = 1 → ratio ≈ 1.81. Both models have the same basis: mean value 0.</div>'},
    ]},
    {head:"Probit Estimation",num:"4",cards:[
      {title:"MLE for Probit",content:'<p>Like logit, probit is estimated via MLE:</p><div class="wk-formula">ln L = Σ [Yᵢ ln Φ(Xᵢβ) + (1−Yᵢ) ln(1−Φ(Xᵢβ))]\n\n∂ln L/∂β = Σ [(Yᵢ−Φᵢ)/(Φᵢ(1−Φᵢ))] · φ(Xᵢβ) · Xᵢ = 0\n\nAlso solved via Newton-Raphson\nAll MLE properties apply (consistent, efficient, asymptotically normal)</div>'},
    ]},
    {head:"When to Use Which?",num:"5",cards:[
      {title:"Practical Guidance",content:'<p>In practice, logit and probit give very similar results for most datasets. Key considerations:</p><ul><li><b>Logit preferred when:</b> odds ratio interpretation is useful (e.g., medical/epidemiological studies), larger sample sizes</li><li><b>Probit preferred when:</b> normal distribution is theoretically justified (latent variable/utility theory), or when you want to do sample selection corrections (Heckman)</li><li><b>Both:</b> report both as robustness check</li></ul><div class="wk-highlight">💡 "In logit & probit models, all regressors are involved in probability" — unlike LPM where only the relevant Xₖ matters for its marginal effect, in logit/probit ALL X values matter through the nonlinear link function.</div>'},
    ]},
  ]},
  week6:{title:"Week 7 — Diagnostics & Goodness of Fit",subtitle:"LR Test · Pseudo R² · Deviance · Pearson χ² · Residuals · Specification Tests · AIC/BIC",sections:[
    {head:"LR Test",num:"1",cards:[
      {title:"Likelihood Ratio Test",content:'<p>The <span class="wk-key">Likelihood Ratio test</span> compares nested models:</p><div class="wk-formula">LR = −2[ln L(Mᵣ) − ln L(Mᵤ)] ~ χ²(q)\n\nq = number of restrictions (variables dropped)\nM_R = restricted model, M_U = unrestricted model\n\n4 types of LR tests:\n1. Overall model: H₀: β₁=β₂=...=βₘ=0\n2. Single coefficient: H₀: βₖ=0\n3. Subset: H₀: βⱼ=βₖ=...=0\n4. Equality: H₀: βⱼ=βₖ\n\nReject H₀ if LR > χ²_{α,q}</div><div class="wk-exam">📝 LR test is analogous to F-test in OLS. It uses log-likelihoods instead of R². Always specify which models you are comparing and the degrees of freedom.</div>'},
    ]},
    {head:"Significance Testing",num:"2",cards:[
      {title:"Wald Test & Confidence Intervals",content:'<p>For individual coefficients:</p><div class="wk-formula">Wald test:\nH₀: βₖ = β₀ₖ\nz = (β̂ₖ − β₀ₖ)/SE(β̂ₖ)\nReject H₀ if |z| > z_{α/2}\n\nConfidence interval:\nβ̂ₖ ± z_{α/2} · SE(β̂ₖ)\n\nAt 95%: z_{0.025} = 1.96\nReject if |z| > 1.96 ≈ "if |z| > 2"</div>'},
    ]},
    {head:"Pseudo R² Measures",num:"3",cards:[
      {title:"Multiple Pseudo R² Options",content:'<p>No single "R²" for binary models. Multiple options exist, each measuring something slightly different:</p><table class="wk-table"><tr><th>Measure</th><th>Formula</th><th>Range</th><th>Interpretation</th></tr><tr><td>McFadden R²</td><td>1 − ln L/ln L₀</td><td>[0,1)</td><td>0.2-0.4 = good; analogous to R²</td></tr><tr><td>Efron R²</td><td>1 − Σ(Yᵢ−P̂ᵢ)²/Σ(Yᵢ−Ȳ)²</td><td>[0,1]</td><td>Based on predicted probs</td></tr><tr><td>Count R²</td><td># correct / N</td><td>[0,1]</td><td>Classification accuracy</td></tr><tr><td>ML Pseudo R²</td><td>1 − e^(−2(lnL−lnL₀)/N)</td><td>[0,max<1]</td><td>Cox & Snell</td></tr><tr><td>McFadden Adj</td><td>1 − (lnL−K)/lnL₀</td><td>[0,1)</td><td>Penalizes extra vars</td></tr></table><div class="wk-formula">AIC = −2 ln L(β̂) + 2p     (smaller is better)\nBIC = −2 ln L(β̂) + p·ln(N)  (more penalty for complexity)\n\nAIC/BIC: the smaller, the better\n6-10: strong evidence, >10: very strong</div><div class="wk-highlight">💡 Don\'t compare McFadden R² to linear R². A McFadden R² of 0.3 is roughly equivalent to a linear R² of 0.6.</div>'},
      {title:"Classification Table",content:'<p>The <span class="wk-key">classification table</span> ("confusion matrix") compares predicted vs observed:</p><div class="wk-formula">Maximum probability rule: Ŷᵢ = 1 if P̂ᵢ > 0.5, else 0\n\n              Predicted\n              0       1\nObserved  0 | TN    | FP |\n          1 | FN    | TP |\n\nCount R² = (TN + TP) / N\nSensitivity = TP / (TP + FN)  (true positive rate)\nSpecificity = TN / (TN + FP)  (true negative rate)</div>'},
    ]},
    {head:"Deviance, Pearson & Residuals",num:"4",cards:[
      {title:"Deviance & Pearson GOF Tests",content:'<p>Both test overall model adequacy. H₀: model fits. Reject if statistic > χ²(J−m−1).</p><div class="wk-formula">Deviance: D = −2 ln(L̂/Lₛ)\n= −2 Σⱼ [nⱼȳⱼ ln(ȳⱼ/π̂ⱼ) + nⱼ(1−ȳⱼ)ln((1−ȳⱼ)/(1−π̂ⱼ))]\n\nPearson: χ² = Σⱼ nⱼ(ȳⱼ−π̂ⱼ)²/[π̂ⱼ(1−π̂ⱼ)]\n\nBoth ~ χ²(J−m−1) under H₀\nJ = distinct covariate patterns</div><div class="wk-exam">📝 Deviance and Pearson GOF require grouped data (distinct covariate patterns). With continuous X, every observation is its own pattern → tests don\'t work! Use Hosmer-Lemeshow instead.</div>'},
      {title:"Residuals & Influence",content:'<p>Binary model residuals for diagnostics:</p><div class="wk-formula">Pearson residual: rᵢ = (Yᵢ−π̂ᵢ)/√[π̂ᵢ(1−π̂ᵢ)]\nDeviance residual: dᵢ = sign(Yᵢ−π̂ᵢ)·√|contribution to D|\n\nStandardized Pearson: rₛ = rᵢ/√(1−hᵢᵢ)\nCook\'s distance: ΔB̂ᵢ = rₛ²·hᵢᵢ/(1−hᵢᵢ)\nLeverage: hᵢᵢ = diagonal of hat matrix\n\nOutlier action:\n1. Close look at data\n2. Correct/exclude errors\n3. Compare with & without\n4. Main result shouldn\'t change</div>'},
      {title:"Specification & Information Criteria",content:'<p>Model specification checks:</p><div class="wk-formula">Link test: logit(P) = γ₁Ŷ + γ₂Ŷ²\n  H₀: γ₂ = 0 (correct spec)\n  If reject → add nonlinear terms\n\nRamsey RESET: add Ŷ², Ŷ³, test joint significance\n\nGeneral spec checks:\n  • Omitted variable → add variables\n  • Non-linearity → add X², X³\n  • Non-additivity → add interactions X₁X₂\n  • R² ≈ 0% → consider completely different model</div>'},
      {title:"Hosmer-Lemeshow Test (PPT 2)",content:'<p>When continuous regressors make every observation a unique covariate pattern, Pearson/Deviance GOF tests fail. <span class="wk-key">Hosmer-Lemeshow</span> fixes this:</p><div class="wk-formula">Step 1: Sort observations by predicted P̂\nStep 2: Divide into g groups (usually g = 10 deciles)\nStep 3: Within each group, compare observed vs expected frequencies\nStep 4: Compute Pearson-type χ² statistic\nStep 5: Compare to χ²(g − 2) distribution\n\nH₀: model fits well\nReject if HL > χ²_α(g−2)\nHigh p-value → model fits adequately</div><div class="wk-exam">📝 In Stata: <code>estat gof, group(10)</code> after logit/probit. This is the standard GOF test for applied logistic regression when you have continuous predictors.</div>'},
      {title:"Influence Diagnostics Summary (PPT 2)",content:'<p>Three questions about each observation:</p><table class="wk-table"><tr><th>Question</th><th>Measure</th><th>What it tells you</th></tr><tr><td>Does it fit badly?</td><td>Pearson residual $r_i$, Deviance residual $d_i$</td><td>Large |r| = model mispredicts this observation</td></tr><tr><td>Is its X unusual?</td><td>Leverage $h_{ii}$</td><td>High leverage = observation is in a sparse/extreme region of X-space</td></tr><tr><td>Does it distort estimates?</td><td>Cook\'s distance $\\Delta\\hat{\\beta}_i$</td><td>Large Cook\'s D = removing this obs would substantially change $\\hat{\\beta}$</td></tr></table><div class="wk-formula">Influence on Pearson χ²: Δχ²ᵢ ≈ rᵢ²/(1−hᵢᵢ) = (rᵢˢ)²\nInfluence on Deviance: ΔDᵢ ≈ dᵢ²/(1−hᵢᵢ)</div><div class="wk-highlight">💡 A model can look "significant" overall while being driven by just a few unusual points. Always run diagnostics. If main results change when you drop high-influence observations, your conclusions are fragile.</div>'},
    ]},
  ]},
  week7:{title:"Week 8 — Ordered Response Models",subtitle:"PPT 3 · Ordered Logit/Probit · Latent Variable + Cutpoints · Parallel Regression · Normalization · Category Probabilities",sections:[
    {head:"Why Ordered Models?",num:"1",cards:[
      {title:"The Problem: Ordered Categorical Y",content:'<p>When the dependent variable has <b>more than 2 categories with a natural ranking</b>, we need ordered models:</p><ul><li>1 = strongly disagree, 2 = disagree, 3 = agree, 4 = strongly agree</li><li>1 = not working, 2 = part-time, 3 = full-time</li><li>1 = low WTP, 2 = medium, 3 = high</li></ul><p><b>Why not OLS on 1,2,3,4?</b> Because OLS treats distances between categories as equal and meaningful ($3-2 = 2-1$). Ordered models only use the <b>ranking</b>, not the numeric distances. That is the correct information structure.</p><p><b>Why not multinomial logit?</b> Multinomial logit ignores the ordering — it treats "strongly agree" as no more related to "agree" than to "strongly disagree." Ordered models exploit the ranking for parsimony.</p><div class="wk-highlight">💡 <b>Decision rule:</b> Use ordered models when categories represent "more" or "less" of something. Use unordered (multinomial) when categories are just different labels with no ranking.</div>'},
    ]},
    {head:"The Ordered Response Model",num:"2",cards:[
      {title:"Latent Variable + Cutpoints = Ordered Categories",content:'<p>The model has the same latent structure as binary choice, but with <b>multiple thresholds</b>:</p><div class="wk-formula">$$y_i^* = x_i\'\\beta + \\varepsilon_i \\qquad \\text{(latent, unobserved)}$$\n$$y_i = j \\quad \\text{if} \\quad \\gamma_{j-1} < y_i^* \\leq \\gamma_j$$\n$$\\gamma_0 = -\\infty, \\quad \\gamma_1 = 0 \\text{ (normalized)}, \\quad \\gamma_M = +\\infty$$</div><p><b>What this means:</b> The latent variable $y^*$ is continuous. We never observe it. We only observe which "interval" it falls into. Each interval = one ordered category.</p><p><b>Example:</b> If $y^*$ = "willingness to work," then very low $y^*$ → category 1 (not working), middle → category 2 (part-time), high → category 3 (full-time). The categories are just regions on the same underlying scale.</p>'},
      {title:"Three-Category Example (Core Exam Model)",content:'<p>For M=3 categories (e.g., not working / part-time / full-time):</p><div class="wk-formula">$$y_i = 1 \\quad \\text{if} \\quad y_i^* \\leq 0$$\n$$y_i = 2 \\quad \\text{if} \\quad 0 < y_i^* \\leq \\gamma$$\n$$y_i = 3 \\quad \\text{if} \\quad y_i^* > \\gamma$$</div><p>Here $\\gamma$ is an <b>unknown cutpoint</b> estimated from the data. The boundary at 0 is fixed (normalization). Regressors do NOT move categories directly — they move $y^*$ through $x\'\\beta$, and $y^*$ crossing a cutpoint changes the observed category.</p><div class="wk-exam">📝 For M categories → M−1 estimated cutpoints (plus the two at ±∞). For M=2, this collapses back to the familiar binary choice model (logit/probit).</div>'},
    ]},
    {head:"Category Probabilities",num:"3",cards:[
      {title:"Ordered Probit Probabilities (3 Categories)",content:'<p>If $\\varepsilon_i \\sim N(0,1)$ (ordered probit):</p><div class="wk-formula">$$P(y_i = 1 | x_i) = \\Phi(-x_i\'\\beta)$$\n$$P(y_i = 2 | x_i) = \\Phi(\\gamma - x_i\'\\beta) - \\Phi(-x_i\'\\beta)$$\n$$P(y_i = 3 | x_i) = 1 - \\Phi(\\gamma - x_i\'\\beta)$$</div><p><b>Why the middle is a difference:</b> Category 2 is the region between the two thresholds. So its probability = (probability of being below upper threshold) minus (probability of being below lower threshold).</p><p><b>General formula for any category j:</b></p><div class="wk-formula">$$P(y = j | x) = F(\\gamma_j - x\'\\beta) - F(\\gamma_{j-1} - x\'\\beta)$$</div><p>where $F = \\Phi$ for ordered probit, $F = \\Lambda$ for ordered logit.</p>'},
      {title:"Numerical Example",content:'<p>Suppose $x_i\'\\beta = 0.5$ and $\\gamma = 1$:</p><div class="wk-formula">P(y=1) = Φ(−0.5) = 0.3085\nP(y=3) = 1 − Φ(1−0.5) = 1 − Φ(0.5) = 0.3085\nP(y=2) = Φ(0.5) − Φ(−0.5) = 0.6915 − 0.3085 = 0.3830\n\nCheck: 0.3085 + 0.3830 + 0.3085 = 1.0 ✓</div><p>Middle category is most likely here. Now increase $x\'\\beta$ to 1.0:</p><div class="wk-formula">P(y=1) = Φ(−1.0) = 0.1587  (↓ from 0.3085)\nP(y=3) = 1 − Φ(0) = 0.5000   (↑ from 0.3085)\nP(y=2) = Φ(0) − Φ(−1.0) = 0.5 − 0.1587 = 0.3413  (↓ slightly!)</div><div class="wk-highlight">💡 <b>Key insight:</b> When $x\'\\beta$ increased, P(y=1) fell and P(y=3) rose — as expected for a positive $\\beta$. But P(y=2) also fell slightly! This is the <b>middle-category ambiguity</b>: some people enter category 2 from category 1, but others leave it for category 3.</div>'},
    ]},
    {head:"Interpretation Rules",num:"4",cards:[
      {title:"What Does β Mean in Ordered Models?",content:'<p>If $\\beta_k > 0$:</p><table class="wk-table"><tr><th>Category</th><th>Effect on Probability</th><th>Guaranteed?</th></tr><tr><td>Lowest category (y=1)</td><td style="color:red"><b>↓ Decreases</b></td><td>Yes, always</td></tr><tr><td>Highest category (y=M)</td><td style="color:green"><b>↑ Increases</b></td><td>Yes, always</td></tr><tr><td>Middle categories</td><td>Could go either way</td><td><b>No — ambiguous!</b></td></tr></table><p><b>Why middle is ambiguous:</b> When $y^*$ shifts right, some people move INTO the middle category (from below) while others move OUT of it (to above). The net effect depends on the density at the cutpoints.</p><div class="wk-exam">📝 A positive coefficient does NOT mean "all higher categories become more likely." It guarantees ONLY: bottom ↓, top ↑, middle = ambiguous. This is the #1 interpretation rule for ordered models.</div>'},
      {title:"Best Interpretation Strategy: Predicted Probabilities",content:'<p>Raw coefficients tell you direction but not magnitude on probability scale. The clearest communication strategy is to compute <b>predicted probabilities</b> for representative profiles:</p><div class="wk-formula">For a specific x-profile:\n  P̂(y=1|x) = Φ(−x\'β̂)\n  P̂(y=2|x) = Φ(γ̂−x\'β̂) − Φ(−x\'β̂)\n  P̂(y=3|x) = 1 − Φ(γ̂−x\'β̂)\n\nThen show how these change when one x varies.\nIn Stata: margins, at(education=(8 12 16)) predict(outcome(1))</div>'},
    ]},
    {head:"Normalization & Identification",num:"5",cards:[
      {title:"Why Normalization Is Necessary (Not Optional!)",content:'<p>The unnormalized model has too many free parameters:</p><div class="wk-formula">$$y_i^* = \\beta_1 + x_i\'\\beta + \\varepsilon_i, \\quad \\varepsilon_i \\sim N(0, \\sigma^2)$$\n$$P(y=1|x) = \\Phi\\left(\\frac{\\gamma_1 - \\beta_1}{\\sigma} - \\frac{x\'\\beta}{\\sigma}\\right)$$</div><p>The data only identify the <b>ratios</b> $(\\gamma_1-\\beta_1)/\\sigma$ and $\\beta/\\sigma$, not $\\gamma_1$, $\\beta_1$, $\\beta$, and $\\sigma$ separately. Different parameter values give identical probabilities.</p><p><b>Two normalizations needed:</b></p><table class="wk-table"><tr><th>Problem</th><th>Fix</th><th>Convention</th></tr><tr><td><b>Location:</b> shifting everything left/right does not change P</td><td>Fix one cutpoint</td><td>$\\gamma_1 = 0$ (or $\\beta_1 = 0$)</td></tr><tr><td><b>Scale:</b> multiplying everything by constant does not change P</td><td>Fix error variance</td><td>Probit: $\\sigma^2 = 1$. Logit: by convention</td></tr></table><div class="wk-highlight">💡 This is why ordered-model coefficients are NOT "absolute structural effects." They are effects on a <b>normalized</b> latent scale. Only predicted probabilities have direct economic meaning.</div>'},

function mkEl(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function gLine(svg,x1,y1,x2,y2,color,width,dash){const l=mkEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':width||1.5});if(dash)l.setAttribute('stroke-dasharray',dash);svg.appendChild(l)}
function gPath(svg,d,color,width,fill,dash){const el=mkEl('path',{d,stroke:color,'stroke-width':width||2,fill:fill||'none','fill-opacity':(fill&&fill!=='none')?1:0,'stroke-linecap':'round','stroke-linejoin':'round'});if(dash)el.setAttribute('stroke-dasharray',dash);svg.appendChild(el)}
function gText(svg,x,y,text,size,color,anchor,weight){const t=mkEl('text',{x,y,fill:color||'#555','font-size':size||11,'font-family':'Inter,sans-serif','font-weight':weight||500,'text-anchor':anchor||'middle','dominant-baseline':'middle'});t.textContent=text;svg.appendChild(t)}
function gCircle(svg,x,y,r,fill,stroke){svg.appendChild(mkEl('circle',{cx:x,cy:y,r,fill,stroke:stroke||'none','stroke-width':stroke&&stroke!=='none'?2:0}))}
function makeAxes(svg,W,H,M,xLabel,yLabel){
  gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);
  gText(svg,W/2+M.l/2,H-6,xLabel,11,'#555');gText(svg,14,(H-M.b-M.t)/2+M.t,yLabel,11,'#555','middle');
  const yt=svg.lastChild;yt.setAttribute('transform',`rotate(-90,14,${(H-M.b-M.t)/2+M.t})`);
}
function makeSVG(parent,W,H,id){
  const s=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',preserveAspectRatio:'xMidYMid meet',id});
  s.style.background='#FEFEFE';s.style.borderRadius='8px';s.style.border='1px solid #ECEAE6';
  parent.appendChild(s);return s;
}

function curvePath(pts,M,pW,pH,xMin,xMax,yMin,yMax){
  let d='';pts.forEach((p,i)=>{const px=M.l+((p[0]-xMin)/(xMax-xMin))*pW;const py=M.t+(1-(p[1]-yMin)/(yMax-yMin))*pH;d+=(i===0?'M':'L')+px.toFixed(1)+','+py.toFixed(1)});return d;
}
function toXY(M,pW,pH,xMin,xMax,yMin,yMax,x,y){return[M.l+((x-xMin)/(xMax-xMin))*pW,M.t+(1-(y-yMin)/(yMax-yMin))*pH]}

    {title:"Likelihood Function",formula:"$$L(\\theta; y_1, \\ldots, y_n) = \\prod_{i=1}^{n} f(y_i; \\theta)$$",explain:"<b>What it means:</b> The probability of observing ALL the data we got, treated as a function of the unknown parameter $\\theta$. <b>Variables:</b> $L$ = likelihood, $\\theta$ = unknown parameter(s), $f(y_i; \\theta)$ = density/probability of observation $i$ under $\\theta$, $\\prod$ = product (because IID: independent observations). <b>Why it works:</b> Under independence, joint probability = product of individual probabilities. We find the $\\theta$ that maximizes this product. <b>When to use:</b> First step of ANY MLE problem.",example:"Bernoulli: $L(\\pi) = \\prod_i \\pi^{Y_i}(1-\\pi)^{1-Y_i}$. If data = {1,0,1,1,0}: $L = \\pi^3(1-\\pi)^2$"},
    {title:"Log-Likelihood",formula:"$$\\ln L(\\theta) = \\sum_{i=1}^{n} \\ln f(y_i; \\theta)$$",explain:"<b>What it means:</b> Natural log of the likelihood. Converts product → sum. <b>Why it works:</b> $\\ln$ is monotonically increasing, so $\\arg\\max L = \\arg\\max \\ln L$. Sums are MUCH easier to differentiate than products. Also prevents numerical underflow (product of many small numbers). <b>When to use:</b> Always. You never maximize $L$ directly — always take log first, then differentiate.",example:"Bernoulli: $\\ln L = K \\ln \\pi + (N-K)\\ln(1-\\pi)$ where $K = \\sum Y_i$"},
    {title:"MLE First-Order Condition (Score)",formula:"$$\\frac{\\partial \\ln L}{\\partial \\theta} = 0 \\quad \\Rightarrow \\quad \\hat{\\theta}_{MLE}$$",explain:"<b>What it means:</b> The score function $S(\\theta)$ = gradient of log-likelihood. Setting it to zero finds the peak. <b>Why it works:</b> At a maximum, the slope is zero. Verify with 2nd derivative: $\\partial^2 \\ln L / \\partial \\theta^2 < 0$ confirms maximum (not minimum). <b>When to use:</b> After writing $\\ln L$. Solve the resulting equation(s) for $\\hat{\\theta}$. If no closed form → use Newton-Raphson iteration.",example:"Binomial: $K/\\pi - (N-K)/(1-\\pi) = 0 \\Rightarrow \\hat{\\pi} = K/N$"},
    {title:"Information Matrix & Standard Errors",formula:"$$I(\\beta) = -E\\left[\\frac{\\partial^2 \\ln L}{\\partial \\beta \\partial \\beta'}\\right] \\qquad \\text{Var}(\\hat{\\beta}) \\approx I^{-1}(\\hat{\\beta})$$",explain:"<b>What it means:</b> $I(\\beta)$ = \"information\" the data carries about $\\beta$. It is the negative expected Hessian (matrix of 2nd derivatives). <b>Variables:</b> $H = \\partial^2 \\ln L / \\partial \\beta \\partial \\beta'$ = Hessian, $I^{-1}$ = variance-covariance matrix. <b>Intuition:</b> Sharp peak in $\\ln L$ → large curvature → large $|H|$ → small $I^{-1}$ → small SE → <b>precise</b>. Flat peak → large SE → <b>imprecise</b>. <b>When to use:</b> After MLE, to compute $SE(\\hat{\\beta}_k) = \\sqrt{[I^{-1}]_{kk}}$ for z-tests and CIs.",example:"$SE(\\hat{\\beta}_1) = \\sqrt{\\text{first diagonal element of } I^{-1}(\\hat{\\beta})}$"},
    {title:"MLE = OLS (under normality)",formula:"$$\\hat{\\beta}_{MLE} = \\hat{\\beta}_{OLS} = (X'X)^{-1}X'Y$$",explain:"<b>What it means:</b> When $\\varepsilon_i \\sim N(0, \\sigma^2)$, maximizing the normal likelihood reduces to minimizing $\\sum(Y_i - X_i'\\beta)^2$. <b>Why it works:</b> The only term in $\\ln L$ involving $\\beta$ is $-\\frac{1}{2\\sigma^2}\\sum(Y_i - X_i'\\beta)^2$. Maximizing this = minimizing the sum of squares = OLS. <b>When to use:</b> Justifying OLS as \"the best\" under normality. Also: MLE of $\\sigma^2$ divides by $n$ (biased), while OLS divides by $n-k$ (unbiased).",example:"Under normality: $\\hat{\\beta}_{MLE} = \\hat{\\beta}_{OLS}$, but $\\hat{\\sigma}^2_{MLE} = \\sum\\hat{u}_i^2/n < \\hat{\\sigma}^2_{OLS} = \\sum\\hat{u}_i^2/(n-k)$"},
    {title:"LR Test",formula:"$$LR = -2[\\ln L_R - \\ln L_U] \\sim \\chi^2(q)$$",explain:"<b>What it means:</b> Compares restricted model (fewer vars) vs unrestricted (more vars). <b>Variables:</b> $L_R$ = restricted log-likelihood, $L_U$ = unrestricted log-likelihood, $q$ = number of restrictions. <b>Why it works:</b> If restrictions are TRUE, restricted model fits almost as well → small LR. If restrictions HURT → large LR → reject $H_0$. <b>When to use:</b> Testing overall model significance, subsets of variables, or coefficient equality. Requires nested models.",example:"$\\ln L_U = -120$, $\\ln L_R = -128$, $q=2$: $LR = -2(-120-(-128)) = 16 > \\chi^2_{0.05}(2) = 5.99$ → reject"},
    {title:"z-Test & Confidence Interval",formula:"$$z = \\frac{\\hat{\\beta}_k}{SE(\\hat{\\beta}_k)} \\qquad CI: \\hat{\\beta}_k \\pm 1.96 \\cdot SE(\\hat{\\beta}_k)$$",explain:"<b>What it means:</b> $z$ = standardized distance of estimate from null (usually 0). <b>Why $z$ not $t$?</b> MLE inference is asymptotic (large-sample), based on normal distribution, not Student's $t$. <b>When to use:</b> Testing individual coefficient significance. Reject $H_0: \\beta_k = 0$ if $|z| > 1.96$ (5%). CI that excludes 0 = significant.",example:"$\\hat{\\beta} = 0.80$, $SE = 0.20$: $z = 4.0 > 1.96$ → significant. CI = $[0.408, 1.192]$"},
  ],
  week3:[
    {title:"LPM",formula:"P(Y=1|X) = β₀ + β₁X₁ + ... + βₘXₘ",explain:"OLS applied to binary Y. βₖ = constant marginal effect on probability.",example:"β₁ = 0.05 → 1 unit increase in X₁ raises P(Y=1) by 5 percentage points"},
    {title:"LPM Heteroscedasticity",formula:"Var(εᵢ) = Pᵢ(1 − Pᵢ)",explain:"Inherent in LPM because P depends on X through the linear model.",example:"If P = 0.3: Var(ε) = 0.3(0.7) = 0.21. If P = 0.5: Var(ε) = 0.25 (maximum)"},
    {title:"WLS Weight",formula:"wᵢ = 1 / √[Ŷᵢ(1 − Ŷᵢ)]",explain:"Used in 2-step WLS to correct LPM heteroscedasticity. Requires Ŷᵢ ∈ (0,1).",example:"If Ŷ = 0.4: w = 1/√(0.4×0.6) = 1/√0.24 ≈ 2.04"},
  ],
  week4:[
    {title:"Logit Probability",formula:"P(Y=1|X) = eˣᵝ/(1+eˣᵝ) = 1/(1+e⁻ˣᵝ)",explain:"Logistic CDF applied to linear index Xβ. Constrains P ∈ (0,1).",example:"If Xβ = 1.5: P = e^1.5/(1+e^1.5) = 4.48/5.48 ≈ 0.818"},
    {title:"Log-Odds",formula:"ln[P/(1−P)] = β₀ + β₁X₁ + ... + βₘXₘ",explain:"The logit transformation linearizes the model. βₖ = change in log-odds per unit Xₖ.",example:"β₁ = 0.7: one unit increase in X₁ raises log-odds by 0.7"},
    {title:"Odds Ratio",formula:"OR = e^(βₖ)  |  % change = (e^βₖ − 1) × 100",explain:"Multiplicative factor on odds for 1-unit increase in Xₖ.",example:"β = 0.7: OR = e^0.7 = 2.014 → odds are 101.4% higher (roughly doubled)"},
    {title:"Logit Marginal Effect",formula:"∂P/∂Xₖ = βₖ · P(1−P)",explain:"Non-constant: depends on current P (which depends on all X values).",example:"β = 0.7, P = 0.4: ME = 0.7 × 0.4 × 0.6 = 0.168 (16.8 pp)"},
    {title:"Maximum Marginal Effect",formula:"ME_max = βₖ / 4  (at P = 0.5)",explain:"P(1−P) is maximized at P = 0.5 where P(1−P) = 0.25.",example:"β = 0.7: ME_max = 0.7/4 = 0.175 (17.5 pp maximum)"},
    {title:"Logit Log-Likelihood",formula:"ln L = Σ[Yᵢ·Xᵢβ − ln(1+e^(Xᵢβ))]",explain:"Globally concave → unique maximum. Solved via Newton-Raphson.",example:"No closed form — iterative numerical methods required"},
  ],
  week5:[
    {title:"Probit Probability",formula:"P(Y=1|X) = Φ(β₁ + β₂Xᵢ)",explain:"Φ = standard normal CDF. Latent variable: Y* = Xβ + ε, ε~N(0,1), Y=1 if Y*>0.",example:"If Xβ = 0.8: P = Φ(0.8) ≈ 0.788"},
    {title:"Probit Marginal Effect",formula:"∂P/∂Xₖ = φ(Xβ) · βₖ",explain:"φ = standard normal PDF = (1/√2π)e^(−z²/2). Evaluated at Xβ.",example:"If Xβ = 0.5, β₂ = 0.3: ME = φ(0.5)×0.3 = 0.3521×0.3 = 0.106"},
    {title:"Logit-Probit Conversion",formula:"β_logit ≈ 1.81 × β_probit",explain:"Logistic variance = π²/3 ≈ 3.29 vs Normal variance = 1. Scale factor = √(π²/3) ≈ 1.81.",example:"If β_probit = 0.4: β_logit ≈ 0.724. Also: β_LPM ≈ 0.25 × β_logit"},
  ],
  week6:[
    {title:"Likelihood Ratio Test",formula:"LR = −2[ln L(Mᵣ) − ln L(Mᵤ)] ~ χ²(q)",explain:"q = number of restrictions. Reject H₀ if LR > χ²_{α,q}.",example:"ln L_R = −120, ln L_U = −110, q = 3: LR = −2(−120−(−110)) = 20. Compare to χ²_{0.05,3} = 7.81 → reject"},
    {title:"McFadden Pseudo R²",formula:"R²_MF = 1 − ln L / ln L₀",explain:"ln L₀ = log-likelihood of null model (intercept only). Range [0,1). 0.2-0.4 = good.",example:"ln L = −80, ln L₀ = −120: R²_MF = 1−(−80)/(−120) = 1−0.667 = 0.333 (good)"},
    {title:"AIC / BIC",formula:"AIC = −2 ln L + 2p  |  BIC = −2 ln L + p·ln(N)",explain:"p = number of parameters. Smaller is better. BIC penalizes complexity more.",example:"ln L = −80, p = 5, N = 200: AIC = 160+10 = 170, BIC = 160+5×5.3 = 186.5"},
    {title:"Pearson Residual",formula:"rᵢ = (Yᵢ − π̂ᵢ) / √[π̂ᵢ(1 − π̂ᵢ)]",explain:"Standardized residual for binary models. Large |r| → model mispredicts that observation.",example:"Y=1, π̂=0.2: r = (1−0.2)/√(0.2×0.8) = 0.8/0.4 = 2.0 (potential outlier)"},
  ],
  week7:[
    {title:"Ordered Response Mapping",formula:"$$y_i = j \\quad \\text{if} \\quad \\gamma_{j-1} < y_i^* \\leq \\gamma_j$$",explain:"<b>What:</b> Maps continuous latent $y^*$ into observed ordered category $j$. <b>Variables:</b> $y^*$ = unobserved latent propensity, $\\gamma_j$ = cutpoints/thresholds (estimated), $j = 1,\\ldots,M$ = ordered categories. <b>When:</b> Any ordered outcome — satisfaction scales, work intensity, WTP intervals.",example:"3 categories: y=1 if y*≤0, y=2 if 0<y*≤γ, y=3 if y*>γ"},
    {title:"Ordered Probit Category Probabilities",formula:"$$P(y=1|x) = \\Phi(-x'\\beta) \\qquad P(y=M|x) = 1-\\Phi(\\gamma_{M-1}-x'\\beta)$$",explain:"<b>What:</b> Probability of lowest and highest categories. <b>Variables:</b> $\\Phi$ = normal CDF, $x'\\beta$ = latent index, $\\gamma$ = cutpoint. <b>Middle categories:</b> $P(y=j|x) = \\Phi(\\gamma_j - x'\\beta) - \\Phi(\\gamma_{j-1} - x'\\beta)$. <b>When:</b> Computing predicted probabilities after ordered probit estimation.",example:"x'β=0.5, γ=1: P(y=1)=Φ(−0.5)=0.309, P(y=2)=Φ(0.5)−Φ(−0.5)=0.383, P(y=3)=1−Φ(0.5)=0.309"},
    {title:"Cumulative Form (Parallel Regression)",formula:"$$Pr(y \\leq m | x) = F(\\tau_m - x\\beta), \\quad m=1,\\ldots,J-1$$",explain:"<b>What:</b> Each cumulative probability uses the SAME β but different threshold $\\tau_m$. This is the parallel regression assumption. <b>Why it matters:</b> Makes the model parsimonious (one β vector instead of J−1). <b>Test:</b> Brant test. If rejected → generalized ordered logit.",example:"J=4 categories → 3 cumulative equations, all sharing same β, different τ₁, τ₂, τ₃"},
    {title:"Normalization Requirements",formula:"$$\\gamma_1 = 0 \\text{ (location)} \\qquad \\sigma^2 = 1 \\text{ (scale, probit)}$$",explain:"<b>What:</b> The latent scale is arbitrary — data only identify ratios like $(\\gamma-\\beta_1)/\\sigma$ and $\\beta/\\sigma$, not individual parameters. <b>Location:</b> Fix one cutpoint = 0 (or drop intercept). <b>Scale:</b> Fix error variance = 1 (probit) or use logistic convention (logit). Without these, infinitely many parameter sets give the same probabilities.",example:"Without normalization: β=2, σ=2 gives same P as β=1, σ=1. Must fix σ=1 to identify β."},
    {title:"Middle-Category Effect Rule",formula:"$$\\beta_k > 0 \\Rightarrow P(y=1) \\downarrow, \\; P(y=M) \\uparrow, \\; P(y=\\text{middle}) = \\text{ambiguous}$$",explain:"<b>What:</b> A positive coefficient guarantees lowest ↓ and highest ↑, but middle categories can go either way. <b>Why:</b> When y* shifts right, some enter middle from below (↑) while others leave middle for above (↓). Net effect depends on density at cutpoints. <b>When:</b> Any interpretation of ordered model coefficients.",example:"If β_educ > 0: P(not working)↓, P(full-time)↑, but P(part-time) could go ↑ or ↓"},
  ],
};
