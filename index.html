    ["Deviance","$D = -2\\ln(\\hat{L}/L_s)$ — distance from saturated model. GOF test: $D \\sim \\chi^2(J-m-1)$."],
    ["Pearson χ²","$\\chi^2 = \\sum n_j(\\bar{y}_j - \\hat{\\pi}_j)^2/[\\hat{\\pi}_j(1-\\hat{\\pi}_j)]$ — observed vs predicted proportions."],
    ["Pearson Residual","$r_i = (Y_i - \\hat{\\pi}_i)/\\sqrt{\\hat{\\pi}_i(1-\\hat{\\pi}_i)}$ — standardized residual for binary models."],
    ["Cook's Distance","$\\Delta\\hat{B}_i = r_s^2 \\cdot h_{ii}/(1-h_{ii})$ — measures influence of observation $i$ on all estimates."],
    ["Leverage","$h_{ii}$ — diagonal of hat matrix. Measures how 'unusual' the $X$ values are."],
    ["Link Test","Regress $Y$ on $\\hat{Y}$ and $\\hat{Y}^2$. If $\\hat{Y}^2$ significant → model misspecified."],
    ["Ramsey RESET","Add $\\hat{Y}^2, \\hat{Y}^3$ to test omitted nonlinearity."],
    ["Classification Table","Confusion matrix: compare predicted ($\\hat{Y}=1$ if $\\hat{P}>0.5$) vs observed $Y$."],
    ["Sensitivity","True Positive Rate: $TP/(TP+FN)$. How well the model catches actual positives."],
    ["Specificity","True Negative Rate: $TN/(TN+FP)$. How well the model identifies actual negatives."],
  ]},
  {market:"Model Specification & Effects",color:"#FFFBEB",border:"#D97706",text:"#92400E",terms:[
    ["Dummy Variable","$D \\in \\{0,1\\}$. For $K$ categories → $K-1$ dummies with one reference group."],
    ["Interaction Term","$X_1 \\cdot X_2$ — effect of $X_1$ depends on level of $X_2$. Non-additivity."],
    ["Polynomial","$Y = \\beta_0 + \\beta_1 X + \\beta_2 X^2$ — captures U-shaped or inverted-U relationships."],
    ["Non-Additivity","In logit, if $X_1$ and $X_2$ change simultaneously, total effect ≠ sum of separate effects."],
    ["Cross-Section Data","Multiple units observed at one time point: $i = 1, \\ldots, N$."],
    ["Panel Data","Multiple units over multiple time periods: $(i, t)$ for $i=1,\\ldots,N$ and $t=1,\\ldots,T$."],
  ]},
  {market:"Ordered Response Models",color:"#ECFDF5",border:"#059669",text:"#065F46",terms:[
    ["Ordered Response Model","Model for outcomes with $M > 2$ ranked categories. Latent $y^* = x'\\beta + \\varepsilon$, observed $y = j$ if $\\gamma_{j-1} < y^* \\leq \\gamma_j$."],
    ["Ordered Logit (ologit)","Ordered response with logistic disturbances. In Stata: <code>ologit y x1 x2</code>."],
    ["Ordered Probit (oprobit)","Ordered response with normal disturbances ($\\varepsilon \\sim N(0,1)$). In Stata: <code>oprobit y x1 x2</code>."],
    ["Cutpoint / Threshold ($\\gamma_j$)","Boundary on the latent scale separating adjacent categories. For $M$ categories → $M-1$ estimated cutpoints. Reported as _cut1, _cut2, etc. in Stata."],
    ["Parallel Regression Assumption","Slope $\\beta$ is the same for all cumulative splits $Pr(y \\leq m | x) = F(\\tau_m - x\\beta)$. Test with Brant test. If violated → generalized ordered logit."],
    ["Middle-Category Ambiguity","When $\\beta_k > 0$: P(lowest) ↓ and P(highest) ↑ are guaranteed, but effect on middle categories is ambiguous (could go either way)."],
    ["Location Normalization","Fixing one cutpoint (usually $\\gamma_1 = 0$) to anchor the latent scale. Without it, the model is not identified."],
    ["Scale Normalization","Fixing $\\text{Var}(\\varepsilon) = 1$ (probit) or using logistic convention. Without it, $\\beta$ and $\\gamma$ are only identified up to a scale factor."],
    ["Generalized Ordered Logit","Extension where $\\beta$ is allowed to differ across cumulative splits. Used when parallel regression fails. Stata: <code>gologit2</code>."],
  ]},
];

// CHEATSHEET RENDERER — with clickable formula explanations
function renderCheatsheet(){
const el=document.getElementById('cheatsheet-view');
const S=[
{title:'OLS & Gauss-Markov',items:[
{f:'$$\\hat{\\beta} = (X\'X)^{-1}X\'Y$$',d:'<div class="cd-what">OLS Estimator (Matrix Form)</div><div class="cd-vars"><b>$\\hat{\\beta}$</b> = vector of estimated coefficients · <b>$X$</b> = $n \\times k$ data matrix (each row = 1 observation, each column = 1 regressor) · <b>$Y$</b> = $n \\times 1$ vector of outcomes · <b>$(X\'X)^{-1}$</b> = inverse of the cross-product matrix</div><div class="cd-use"><b>When to use:</b> Whenever you need to estimate a linear regression. This is the closed-form solution to $\\min_\\beta \\sum(Y_i - X_i\'\\beta)^2$. Works when $X\'X$ is invertible (no perfect multicollinearity).</div>'},
{f:'<b>A1–A9:</b> Linear params · Fixed X · $E(u|X)=0$ · $\\text{Var}(u)=\\sigma^2$ · $\\text{Cov}(u_i,u_j)=0$ · $\\text{Cov}(u,X)=0$ · $n>k$ · No exact collinearity · No spec bias',d:'<div class="cd-what">OLS Assumptions</div><div class="cd-vars">These 9 conditions guarantee OLS is BLUE. A3 ($E(u|X)=0$) is the most critical — it means the error averages to zero at every X value, so the regression line passes through conditional means. A4 (homoscedasticity) means constant error variance.</div><div class="cd-use"><b>When to use:</b> State these before claiming OLS results are valid. Each violation has a specific remedy: A4 violation → WLS/robust SE; A5 violation → GLS/HAC; A8 violation → drop variable.</div>'},
{f:'<b>BLUE:</b> $E(\\hat{\\beta}) = \\beta$ (unbiased) + $\\text{Var}(\\hat{\\beta}) \\leq \\text{Var}(\\tilde{\\beta})$ (min variance)',d:'<div class="cd-what">Gauss-Markov Theorem</div><div class="cd-vars"><b>B</b>est = minimum variance among class · <b>L</b>inear = estimator is linear function of $Y$ · <b>U</b>nbiased = $E(\\hat{\\beta}) = \\beta$ · <b>E</b>stimator = rule mapping data → numbers</div><div class="cd-use"><b>When to use:</b> To justify why OLS is the default. "Under A1–A9, no other linear unbiased estimator can have smaller variance than OLS."</div>'},
{f:'$$\\hat{\\sigma}^2 = \\frac{\\sum \\hat{u}_i^2}{n-k}$$',d:'<div class="cd-what">Unbiased Error Variance Estimator</div><div class="cd-vars"><b>$\\hat{u}_i = Y_i - \\hat{Y}_i$</b> = residuals · <b>$n$</b> = number of observations · <b>$k$</b> = number of estimated parameters (including intercept) · <b>$n-k$</b> = degrees of freedom</div><div class="cd-use"><b>When to use:</b> To estimate $\\sigma^2$ from OLS residuals. We divide by $n-k$ (not $n$) to correct for the downward bias from estimating $k$ parameters. MLE divides by $n$ → biased in small samples.</div>'},
]},
{title:'Probability & Distributions',items:[
{f:'<b>PDF:</b> $f(x) \\geq 0$, $\\int f(x)dx = 1$ · <b>CDF:</b> $F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t)dt$',d:'<div class="cd-what">Density & Cumulative Functions</div><div class="cd-vars"><b>PDF $f(x)$</b> = how "dense" probability is around $x$ (continuous) or $P(X=x)$ (discrete). <b>CDF $F(x)$</b> = total probability up to $x$. CDF is the integral/sum of PDF.</div><div class="cd-use"><b>When to use:</b> PDF to compute likelihoods. CDF for Logit ($\\Lambda$) and Probit ($\\Phi$) — both are CDFs that map $X\\beta$ → probability.</div>'},
{f:'$$E(X) = \\int x \\cdot f(x)\\,dx \\qquad \\text{Var}(X) = E(X^2) - [E(X)]^2$$',d:'<div class="cd-what">Expected Value & Variance</div><div class="cd-vars"><b>$E(X)$</b> = probability-weighted average = "center of mass" of the distribution. <b>$\\text{Var}(X)$</b> = expected squared deviation from mean = spread/dispersion.</div><div class="cd-use"><b>When to use:</b> E(X) for Bernoulli gives $\\pi = P(Y=1)$. Var for Bernoulli gives $\\pi(1-\\pi)$, which explains why LPM is heteroscedastic.</div>'},
{f:'$$f(x) = \\frac{1}{\\sigma\\sqrt{2\\pi}} \\exp\\left(-\\frac{(x-\\mu)^2}{2\\sigma^2}\\right)$$',d:'<div class="cd-what">Normal Density</div><div class="cd-vars"><b>$\\mu$</b> = mean (center) · <b>$\\sigma$</b> = standard deviation (spread) · <b>$\\sigma^2$</b> = variance. Bell-shaped, symmetric around $\\mu$.</div><div class="cd-use"><b>When to use:</b> When assuming $\\varepsilon \\sim N(0,\\sigma^2)$ in regression → makes MLE = OLS for $\\beta$. Also: Probit uses standard normal CDF $\\Phi(z)$ which integrates this density.</div>'},
{f:'<b>Bernoulli:</b> $E(Y) = \\pi$, $\\text{Var}(Y) = \\pi(1-\\pi)$, $f(y) = \\pi^y(1-\\pi)^{1-y}$',d:'<div class="cd-what">Bernoulli Distribution</div><div class="cd-vars"><b>$Y \\in \\{0,1\\}$</b> = binary outcome · <b>$\\pi$</b> = $P(Y=1)$ = success probability. Variance is maximized at $\\pi = 0.5$.</div><div class="cd-use"><b>When to use:</b> Foundation of ALL binary choice models. The $f(y) = \\pi^y(1-\\pi)^{1-y}$ form is the building block of the logit/probit likelihood.</div>'},
]},
{title:'MLE — Maximum Likelihood',items:[
{f:'$$L(\\theta) = \\prod_{i=1}^{n} f(y_i; \\theta) \\qquad \\ln L = \\sum_{i=1}^{n} \\ln f(y_i; \\theta)$$',d:'<div class="cd-what">Likelihood & Log-Likelihood</div><div class="cd-vars"><b>$L(\\theta)$</b> = probability of seeing ALL data, viewed as function of $\\theta$ · <b>$\\ln L$</b> = log-likelihood, turns product → sum. Same maximizer because $\\ln$ is monotonic.</div><div class="cd-use"><b>When to use:</b> Step 1 of any MLE: write the likelihood under IID, take log, differentiate, set = 0, solve. This is the universal recipe for MLE.</div>'},
{f:'$$\\frac{\\partial \\ln L}{\\partial \\theta} = 0 \\quad \\Rightarrow \\quad \\hat{\\theta}_{MLE}$$',d:'<div class="cd-what">MLE First-Order Condition (Score = 0)</div><div class="cd-vars"><b>Score function</b> $S(\\theta) = \\partial \\ln L / \\partial \\theta$ = gradient of log-likelihood. Setting it to zero finds the peak.</div><div class="cd-use"><b>When to use:</b> After writing $\\ln L$. For binomial: gives $\\hat{\\pi} = k/N$. For normal regression: gives OLS $\\hat{\\beta}$. For logit/probit: no closed form → Newton-Raphson.</div>'},
{f:'$$I(\\beta) = -E\\left[\\frac{\\partial^2 \\ln L}{\\partial \\beta \\partial \\beta\'}\\right] \\qquad SE(\\hat{\\beta}_k) = \\sqrt{[I^{-1}(\\hat{\\beta})]_{kk}}$$',d:'<div class="cd-what">Information Matrix & Standard Errors</div><div class="cd-vars"><b>$I(\\beta)$</b> = negative expected Hessian = "information" in the data about $\\beta$. <b>$I^{-1}$</b> = variance-covariance matrix of MLE. Steep curvature → small SE → precise estimate.</div><div class="cd-use"><b>When to use:</b> After obtaining MLE, to compute standard errors for z-tests and confidence intervals. Intuition: if the log-likelihood is sharply peaked, we are very "sure" about the estimate.</div>'},
{f:'<b>Properties:</b> Consistent ($\\hat{\\beta} \\to \\beta$), Asymptotically Normal ($\\sim N$), Efficient (min var) → <b>BAN</b>',d:'<div class="cd-what">Large Sample Properties of MLE</div><div class="cd-vars"><b>Consistent</b> = converges to truth as $n \\to \\infty$ · <b>Asymp. Normal</b> = approximately bell-shaped → justifies z-tests · <b>Efficient</b> = smallest possible asymptotic variance (Cramér-Rao bound) · <b>BAN</b> = Best Asymptotic Normal</div><div class="cd-use"><b>When to use:</b> To justify MLE inference. Caveat: these are LARGE sample properties. MLE may be biased in small samples (e.g., $\\hat{\\sigma}^2_{ML}$ divides by $n$ not $n-k$). Rule of thumb: $N \\geq 100$.</div>'},
{f:'<b>Binary:</b> $\\ln L = \\sum[Y_i \\ln P_i + (1-Y_i)\\ln(1-P_i)]$',d:'<div class="cd-what">Binary Choice Log-Likelihood</div><div class="cd-vars"><b>$Y_i \\in \\{0,1\\}$</b> · <b>$P_i = P(Y_i=1|X_i)$</b> = predicted probability from logit or probit. When $Y_i=1$: contributes $\\ln P_i$. When $Y_i=0$: contributes $\\ln(1-P_i)$.</div><div class="cd-use"><b>When to use:</b> The CORE likelihood for logit and probit. Plug in $P_i = \\Lambda(X_i\\beta)$ for logit, $P_i = \\Phi(X_i\\beta)$ for probit. This is globally concave for logit → unique solution.</div>'},
]},
{title:'LPM',items:[
{f:'$$P(Y=1|X) = \\beta_0 + \\beta_1 X_1 + \\ldots + \\beta_m X_m$$',d:'<div class="cd-what">Linear Probability Model</div><div class="cd-vars"><b>$\\beta_k$</b> = constant marginal effect = $\\partial P(Y=1)/\\partial X_k$ in percentage points.</div><div class="cd-use"><b>When to use:</b> Quick first look at binary data. Easy to interpret. But has 4 problems: P outside [0,1], inherent heteroscedasticity, non-normal errors, poor R². Use logit/probit for final results.</div>'},
{f:'$$\\text{Var}(\\varepsilon_i) = P_i(1-P_i) \\qquad \\text{WLS weight: } w_i = \\frac{1}{\\sqrt{\\hat{Y}_i(1-\\hat{Y}_i)}}$$',d:'<div class="cd-what">LPM Heteroscedasticity & WLS Fix</div><div class="cd-vars">Since $P_i = X_i\\beta$ depends on $X$, variance is NOT constant → A4 violated. WLS corrects by weighting each obs inversely to its variance.</div><div class="cd-use"><b>When to use:</b> 2-step procedure: (1) run OLS → get $\\hat{Y}$, (2) compute weights, (3) re-run OLS on transformed data. Requires $\\hat{Y} \\in (0,1)$.</div>'},
]},
{title:'Logit Model',items:[
{f:'$$P(Y=1|X) = \\frac{e^{X\\beta}}{1+e^{X\\beta}} = \\frac{1}{1+e^{-X\\beta}}$$',d:'<div class="cd-what">Logistic Probability Function</div><div class="cd-vars"><b>$X\\beta$</b> = linear index = $\\beta_0 + \\beta_1 X_1 + \\ldots$ · As $X\\beta \\to +\\infty$: $P \\to 1$ · As $X\\beta \\to -\\infty$: $P \\to 0$ · At $X\\beta = 0$: $P = 0.5$.</div><div class="cd-use"><b>When to use:</b> THE model for binary outcomes. Constrains $P \\in (0,1)$. Coefficients are in log-odds scale — must convert to OR or ME for interpretation.</div>'},
{f:'$$\\ln\\left(\\frac{P}{1-P}\\right) = \\beta_0 + \\beta_1 X_1 + \\ldots + \\beta_m X_m$$',d:'<div class="cd-what">Log-Odds (Logit) Link Function</div><div class="cd-vars"><b>$P/(1-P)$</b> = odds · <b>$\\ln(P/(1-P))$</b> = log-odds = logit. This transformation makes the model LINEAR in $X$.</div><div class="cd-use"><b>When to use:</b> $\\beta_k$ = change in log-odds per unit $X_k$. This is the "natural" scale of logit coefficients, but not intuitive — convert to OR or ME.</div>'},
{f:'$$OR = e^{\\beta_k} \\qquad \\% \\Delta\\text{odds} = (e^{\\beta_k} - 1) \\times 100$$',d:'<div class="cd-what">Odds Ratio Interpretation</div><div class="cd-vars"><b>$OR = e^{\\beta_k}$</b> = multiplicative factor on odds for 1-unit increase in $X_k$. If $OR = 2.5$ → odds are 150% higher. If $OR = 0.7$ → odds are 30% lower.</div><div class="cd-use"><b>When to use:</b> Standard exam phrasing: "A 1-unit increase in $X_k$ is associated with a $(e^{\\beta_k}-1)\\times 100\\%$ change in the odds of $Y=1$, ceteris paribus."</div>'},
{f:'$$\\frac{\\partial P}{\\partial X_k} = \\beta_k \\cdot P(1-P) \\qquad ME_{\\max} = \\frac{\\beta_k}{4}$$',d:'<div class="cd-what">Marginal Effect (Logit)</div><div class="cd-vars"><b>$\\partial P/\\partial X_k$</b> = actual change in probability (in pp) for 1-unit $\\Delta X_k$. Depends on $P$ → biggest at $P=0.5$, zero near $P=0$ or $P=1$. <b>$\\beta_k/4$</b> is the quick upper bound.</div><div class="cd-use"><b>When to use:</b> For substantive interpretation. AME = $(1/N)\\sum \\beta_k \\hat{P}_i(1-\\hat{P}_i)$ averages over all observations. The $\\beta/4$ rule gives a quick maximum.</div>'},
{f:'<b>AME:</b> $(1/N) \\sum \\beta_k \\hat{P}_i(1-\\hat{P}_i)$ · <b>Elasticity:</b> $\\varepsilon = \\beta_k X_k (1-P)$',d:'<div class="cd-what">Average Marginal Effect & Elasticity</div><div class="cd-vars"><b>AME</b> = average of individual MEs across all obs. More robust than ME "at the mean." <b>Elasticity</b> = % change in P per 1% change in $X_k$.</div><div class="cd-use"><b>When to use:</b> AME is the go-to for policy interpretation. In Stata: <code>margins, dydx(*)</code>. Elasticity useful when comparing variables with different scales.</div>'},
]},
{title:'Probit Model',items:[
{f:'$$P(Y=1|X) = \\Phi(X\\beta) \\qquad \\frac{\\partial P}{\\partial X_k} = \\phi(X\\beta) \\cdot \\beta_k$$',d:'<div class="cd-what">Probit Probability & Marginal Effect</div><div class="cd-vars"><b>$\\Phi$</b> = standard normal CDF · <b>$\\phi$</b> = standard normal PDF = $(1/\\sqrt{2\\pi})e^{-z^2/2}$. Latent: $Y^* = X\\beta + \\varepsilon$, $Y=1$ if $Y^* > 0$.</div><div class="cd-use"><b>When to use:</b> Alternative to logit, especially when normal errors are theoretically justified (utility theory). No natural odds ratio — must use marginal effects.</div>'},
{f:'$$\\beta_{\\text{logit}} \\approx 1.81 \\times \\beta_{\\text{probit}} \\qquad \\beta_{\\text{LPM}} \\approx 0.25 \\times \\beta_{\\text{logit}}$$',d:'<div class="cd-what">Cross-Model Coefficient Conversion</div><div class="cd-vars">Logistic variance = $\\pi^2/3 \\approx 3.29$, normal variance = 1. So $\\sqrt{\\pi^2/3} \\approx 1.81$. The 0.25 factor comes from the max ME point ($P=0.5$).</div><div class="cd-use"><b>When to use:</b> To compare logit vs probit estimates or check your results. If $\\beta_{logit}/\\beta_{probit} \\approx 1.81$, both models agree.</div>'},
]},
{title:'LR Test & Inference',items:[
{f:'$$LR = -2[\\ln L_R - \\ln L_U] \\sim \\chi^2(q)$$',d:'<div class="cd-what">Likelihood Ratio Test</div><div class="cd-vars"><b>$L_R$</b> = restricted model log-likelihood · <b>$L_U$</b> = unrestricted model log-likelihood · <b>$q$</b> = number of restrictions. Reject $H_0$ if $LR > \\chi^2_{\\alpha,q}$.</div><div class="cd-use"><b>When to use:</b> To test if adding variables improves fit. 4 types: (1) overall model test, (2) single $\\beta_k = 0$, (3) subset test, (4) equality $\\beta_j = \\beta_k$. Requires NESTED models.</div>'},
{f:'$$z = \\frac{\\hat{\\beta}_k - \\beta_k^0}{SE(\\hat{\\beta}_k)} \\qquad CI: \\hat{\\beta}_k \\pm z_{\\alpha/2} \\cdot SE(\\hat{\\beta}_k)$$',d:'<div class="cd-what">z-Test & Confidence Interval</div><div class="cd-vars"><b>$z$</b> = standardized distance from null. Reject at 5% if $|z| > 1.96$. <b>CI</b> = range of plausible $\\beta_k$ values. If CI excludes 0 → significant.</div><div class="cd-use"><b>When to use:</b> For individual coefficient significance in MLE models. Note: MLE uses $z$ (normal), not $t$ (Student), because inference is asymptotic.</div>'},
]},
{title:'Goodness of Fit',items:[
{f:'<b>McFadden:</b> $R^2 = 1 - \\ln L / \\ln L_0$ · <b>Count:</b> correct/N · <b>Efron:</b> $1 - \\sum(Y-\\hat{P})^2/\\sum(Y-\\bar{Y})^2$',d:'<div class="cd-what">Pseudo R² Measures</div><div class="cd-vars"><b>McFadden</b>: 0.2–0.4 = good (≈ linear $R^2$ of 0.5–0.7). <b>Count $R^2$</b>: % correctly predicted with 0.5 threshold. <b>Efron</b>: most intuitive, based on predicted probabilities.</div><div class="cd-use"><b>When to use:</b> Report multiple measures. Never compare McFadden to linear $R^2$. Combine with classification table + AIC/BIC for full picture.</div>'},
{f:'<b>AIC:</b> $-2\\ln L + 2p$ · <b>BIC:</b> $-2\\ln L + p\\ln N$ · <b>Smaller = better</b>',d:'<div class="cd-what">Information Criteria</div><div class="cd-vars"><b>$p$</b> = number of parameters · <b>$N$</b> = sample size. AIC penalizes complexity lightly; BIC penalizes more (especially for large $N$). $\\Delta$AIC > 10 = strong evidence.</div><div class="cd-use"><b>When to use:</b> Comparing non-nested models (where LR test cannot be used). Pick the model with LOWEST AIC/BIC.</div>'},
{f:'<b>Deviance:</b> $D \\sim \\chi^2(J-m-1)$ · <b>Pearson:</b> $\\chi^2 = \\sum n_j(\\bar{y}_j - \\hat{\\pi}_j)^2/[\\hat{\\pi}_j(1-\\hat{\\pi}_j)]$',d:'<div class="cd-what">Overall GOF Tests</div><div class="cd-vars">Both test $H_0$: model fits. $J$ = distinct covariate patterns, $m$ = regressors. Reject if stat $> \\chi^2_{\\alpha}(J-m-1)$ → poor fit.</div><div class="cd-use"><b>When to use:</b> After fitting logit/probit. Warning: requires grouped data (discrete X patterns). With continuous X, use Hosmer-Lemeshow instead.</div>'},
]},
{title:'Ordered Models',items:[
{f:'$$y_i^* = x_i\'\\beta + \\varepsilon_i, \\qquad y_i = j \\text{ if } \\gamma_{j-1} < y_i^* \\leq \\gamma_j$$',d:'<div class="cd-what">Ordered Response Model</div><div class="cd-vars"><b>$y^*$</b> = unobserved latent variable (propensity/utility) · <b>$\\gamma_j$</b> = cutpoints/thresholds dividing latent scale into $M$ categories · <b>$\\gamma_0 = -\\infty$, $\\gamma_M = +\\infty$</b> · One cutpoint normalized to 0 (location) · $\\sigma^2$ fixed to 1 (scale, probit)</div><div class="cd-use"><b>When to use:</b> Y has 3+ ordered categories (satisfaction scales, work intensity, WTP intervals). NOT for unordered categories (use multinomial logit instead).</div>'},
{f:'$$P(y=1|x) = \\Phi(-x\'\\beta) \\quad P(y=j|x) = \\Phi(\\gamma_j - x\'\\beta) - \\Phi(\\gamma_{j-1} - x\'\\beta) \\quad P(y=M|x) = 1 - \\Phi(\\gamma_{M-1} - x\'\\beta)$$',d:'<div class="cd-what">Category Probabilities (Ordered Probit)</div><div class="cd-vars">Replace $\\Phi$ with $\\Lambda$ for ordered logit. Middle categories = difference of two CDFs. Must compute these for interpretation — raw $\\beta$ only tells direction.</div><div class="cd-use"><b>When to use:</b> Computing predicted probabilities after estimation. Best way to communicate ordered model results. In Stata: <code>margins, predict(outcome(#))</code>.</div>'},
{f:'$$Pr(y \\leq m | x) = F(\\tau_m - x\\beta) \\quad \\text{same } \\beta \\text{ for all } m$$',d:'<div class="cd-what">Parallel Regression / Proportional Odds</div><div class="cd-vars">One $\\beta$ vector across all $J-1$ cumulative splits. Only the threshold $\\tau_m$ changes. This is what makes ordered models parsimonious.</div><div class="cd-use"><b>When to use:</b> This is an ASSUMPTION, not a choice. Test with Brant test. If violated → gologit2 or multinomial logit. Frequently violated in practice!</div>'},
{f:'$\\beta_k > 0 \\Rightarrow$ <b>P(lowest) ↓, P(highest) ↑, P(middle) = ambiguous</b>',d:'<div class="cd-what">Coefficient Interpretation Rule</div><div class="cd-vars">A positive $\\beta$ shifts latent $y^*$ rightward → mass moves from lowest to highest category. But middle categories can gain OR lose mass — two opposing flows (entering from below, leaving to above).</div><div class="cd-use"><b>When to use:</b> Any ordered model interpretation. NEVER say "a positive coefficient makes all higher categories more likely." Only the extremes are guaranteed. Report predicted probabilities for substantive interpretation.</div>'},
]},
];
let h='<div class="cs-title">📋 Cheatsheet Map</div>';
h+='<div class="cs-sub">Optimized for 2-page exam cheatsheet. Click any formula to see full explanation, variable definitions, and when to use it. '+S.reduce((a,s)=>a+s.items.length,0)+' formulas across '+S.length+' sections.</div>';
S.forEach((s,si)=>{
h+='<div class="cs-section"><div class="cs-section-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'\':\'\'">';
h+='<span>'+s.title+'</span><span style="font-size:10px;color:#888">'+s.items.length+'</span></div>';
h+='<div class="cs-section-body">';
s.items.forEach((it,fi)=>{
h+='<div class="cs-formula" onclick="var d=this.nextElementSibling;d.classList.toggle(\'open\');renderMathInEl(d)">'+it.f+'</div>';
h+='<div class="cs-detail">'+it.d+'</div>';
});
h+='</div></div>';

el.innerHTML=h;
renderMathInEl(el);
}

// GLOSSARY RENDERER — DON'T TOUCH
function renderGlossary(){
const el=document.getElementById('glossary-view');
let totalTerms=GLOSSARY.reduce((a,g)=>a+g.terms.length,0);
let h=`<div class="glo-title">📖 Exam Glossary</div>
<div class="glo-sub">${totalTerms} terms across ${GLOSSARY.length} categories.</div>
<input type="text" class="glo-search" id="glo-q" placeholder="Search any term..." oninput="filterGlossary()">`;
GLOSSARY.forEach((g,gi)=>{
h+=`<div class="glo-market" id="glo-m-${gi}">
<div class="glo-market-head" style="background:${g.color};color:${g.text};border-bottom:1px solid ${g.border}30" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
<span>${g.market}</span><span class="glo-count">${g.terms.length} terms</span></div>
<div class="glo-market-body">`;
g.terms.forEach(([name,def])=>{
h+=`<div class="glo-term"><span class="glo-term-name">${name}</span><span class="glo-term-def">${def}</span></div>`;
});
h+=`</div></div>`;
});
el.innerHTML=h;
}
function filterGlossary(){
const q=document.getElementById('glo-q').value.toLowerCase().trim();
document.querySelectorAll('.glo-term').forEach(t=>{
const name=t.querySelector('.glo-term-name').textContent.toLowerCase();
const def=t.querySelector('.glo-term-def').textContent.toLowerCase();
t.style.display=(name.includes(q)||def.includes(q))?'':'none';
});
if(q){document.querySelectorAll('.glo-market-body').forEach(b=>b.style.display='')}
}

ons.</span></span></td></tr></table>'},

    {ctx:'After fitting the logit LFP model, we run classification and GOF diagnostics to assess model quality.',title:"Example 1: Classification Table",desc:"Confusion matrix showing predicted vs actual outcomes. Threshold = 0.5.",table:'<table class="stata-table"><tr><th colspan="3" style="text-align:center;color:#ffd700">. estat classification</th></tr><tr><th></th><th>Pred +</th><th>Pred −</th></tr><tr><td style="color:#ffd700">Actual +</td><td><span class="stata-clickable">TP=326<span class="stata-tooltip"><b>True Positives = 326</b><br>Model correctly predicted LFP=1. Sensitivity = 326/428 = 76.2% — the model catches 76% of actual participants.</span></span></td><td><span class="stata-clickable">FN=102<span class="stata-tooltip"><b>False Negatives = 102</b><br>Model predicted LFP=0 but woman actually participates. These are "missed" participants.</span></span></td></tr><tr><td style="color:#ffd700">Actual −</td><td><span class="stata-clickable">FP=93<span class="stata-tooltip"><b>False Positives = 93</b><br>Model predicted LFP=1 but woman does NOT participate. "False alarms."</span></span></td><td><span class="stata-clickable">TN=232<span class="stata-tooltip"><b>True Negatives = 232</b><br>Model correctly predicted LFP=0. Specificity = 232/325 = 71.4%.</span></span></td></tr><tr><td colspan="3" style="color:#a8d8ea;font-size:10px"><span class="stata-clickable">Correctly classified: 74.1%<span class="stata-tooltip"><b>Count R² = (326+232)/753 = 74.1%</b><br>The model correctly predicts 74.1% of outcomes. Decent but not spectacular. Note: a naive model predicting the majority class (LFP=1) would get 56.8% — so the model adds 17.3 pp over naive.</span></span> | Sensitivity: 76.2% | Specificity: 71.4%</td></tr></table>'},

IRE distribution leftward.</b><br>All lower categories gain, all upper categories lose. In this case, even the middle categories have clear directions — but that is NOT guaranteed in general. With different cutpoint spacing, category 2 could go either way.</span></span></td></tr></table>'}

function renderWeekStata(wk){
  var items=WEEK_STATA[wk]||[];
  var el=document.getElementById('wk-stata-panel');
  if(!items.length){el.innerHTML='<div class="wk-coming">No Stata examples for this week yet.</div>';return}
  var h='<div class="qz-intro">💻 <b>How to Read Data Output</b><br>Interactive Stata-style tables. <b>Click any highlighted cell</b> to see what it means and how to interpret it.</div>';
  items.forEach(function(item){
    h+='<div class="wk-card" style="border-left:4px solid #2563EB">';
    if(item.ctx) h+='<div class="wk-highlight" style="margin-top:0;margin-bottom:10px">📋 <b>Context:</b> '+item.ctx+'</div>';
    h+='<h4 style="color:#1E40AF">'+item.title+'</h4>';
    h+='<p style="font-size:12.5px;color:#666;margin-bottom:10px">'+item.desc+'</p>';
    h+='<div class="stata-wrap">'+item.table+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
  renderMathInEl(el);
}

// =====================================================================
// KaTeX AUTO-RENDER HELPER
// =====================================================================
function renderMathInEl(el){
  if(typeof renderMathInElement==='function'){
    renderMathInElement(el,{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false}
      ],
      throwOnError:false
    });
  }
}
// TOOLTIP POSITIONING FIX — clone tooltip to body so table overflow can't clip it
var _activeTip=null;
document.addEventListener('click',function(e){
  var cl=e.target.closest('.stata-clickable');
  // If clicking outside or on the active tooltip itself, close
  if(!cl||e.target.closest('#stata-float-tip')){
    if(_activeTip){_activeTip.remove();_activeTip=null}
    document.querySelectorAll('.stata-clickable.show-tip').forEach(function(el){el.classList.remove('show-tip')});
    return;
  }
  // Close any existing
  if(_activeTip){_activeTip.remove();_activeTip=null}
  document.querySelectorAll('.stata-clickable.show-tip').forEach(function(el){el.classList.remove('show-tip')});
  // Get source tooltip HTML
  var src=cl.querySelector('.stata-tooltip');
  if(!src)return;
  cl.classList.add('show-tip');
  // Create floating tooltip on body
  var tip=document.createElement('div');
  tip.id='stata-float-tip';
  tip.innerHTML=src.innerHTML;
  tip.style.cssText='position:fixed;background:#fff;color:#333;padding:12px 16px;border-radius:8px;font-family:Inter,sans-serif;font-size:12px;line-height:1.6;width:320px;max-width:90vw;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:99999;border:1px solid #ddd;pointer-events:auto';
  document.body.appendChild(tip);
  _activeTip=tip;
  // Position it
  var r=cl.getBoundingClientRect();
  var tH=tip.offsetHeight;
  var left=Math.min(r.left,window.innerWidth-340);
  var top=r.top-tH-10;
  if(top<8) top=r.bottom+10;
  tip.style.left=Math.max(8,left)+'px';
  tip.style.top=top+'px';
  renderMathInEl(tip);
});
