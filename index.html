 ARCHITECTURE OVERVIEW
═══════════════════════════════════════════════════════════════════════════════

The tool has 3 VIEWS accessible via the top-bar dropdown:
  1. CONCEPT MAP — Interactive SVG flowchart (pan/zoom/click nodes)
  2. EXAM GLOSSARY — Searchable term dictionary
  3. WEEKLY MATERIALS — Per-week study content with 4 sub-tabs:
     a. 📝 Notes (lecture content, tables, formulas, highlight boxes)
     b. 📊 Graphs (interactive SVG graphs with scenario buttons)
     c. 📏 Formulas (key equations with worked examples)
     d. 🎯 Quiz (exam-style questions with reveal-able model answers)

═══════════════════════════════════════════════════════════════════════════════
 GRAPH QUALITY STANDARDS (CRITICAL — READ THIS)
═══════════════════════════════════════════════════════════════════════════════

Graphs use CUSTOM SVG (not Chart.js). This gives clean, labeled, exam-quality
diagrams. The standards are:

 1. EVERY curve must be labeled DIRECTLY ON the curve (not in a legend box).
    Use gText() placed near the end of the curve. Include the equation/identity:
    ✓ "Ld (= VMPL = P×MPL)"    ✗ "Demand"
    ✓ "Ls (W=4L)"              ✗ "Supply"  
    ✓ "MCL (=8L)"              ✗ "MCL"
    ✓ "IC (U₀*)"               ✗ "curve 1"

 2. EVERY equilibrium point must be marked with gCircle() and have dashed
    projection lines to both axes (gLine with '3 3' dash) showing the
    exact W* and L* values.

 3. EVERY graph must have a VARIABLE LEGEND BOX (class="g-vars") listing
    what each symbol means in plain language:
    <div class="g-vars">
      <span class="gv"><b>Ld</b> = labor demand curve</span>
      <span class="gv"><b>VMPL</b> = value of marginal product (revenue from 1 extra worker)</span>
      ...
    </div>

 4. SCENARIO BUTTONS must update an insight box (class="g-insight") with
    step-by-step explanations. Use <br> for line breaks, <b> for bold.
    Each step should be numbered: "Step 1: ...<br>Step 2: ..."

 5. When showing shifted curves, the OLD curve should be:
    - Dashed: gPath(svg, path, color, 1.5, null, '4 3')  ← note: null for fill, '4 3' for dash
    - Lighter color (e.g., '#93C5FD' instead of '#2563EB')
    - Labeled with subscript: "Ld₀" or "BC₀"
    The NEW curve should be solid, full color, labeled "Ld₁" or "BC₁".

 6. Use GRIDLINES for readability: light '#F0F0EC' horizontal lines at
    regular intervals.

 7. MATHEMATICAL ACCURACY: curves must pass through labeled points.
    If you label an equilibrium at (6, 18), the Ld and Ls curves MUST
    both pass through that point. For indifference curves tangent to
    budget constraints, use the icCurve() utility function (U = Y·L^a form)
    to guarantee tangency at the specified point with the correct slope.

 8. Graph function pattern:
    function drawMyGraph(){
      const c = document.getElementById('gc-my_graph');
      const sc = [{id:'scenario1', label:'Label'}, {id:'reset', label:'⟲ Reset'}];
      c.innerHTML = `<div class="g-card">
        <h4>Title</h4>
        <p class="g-desc">Description with <b>key equations</b>.</p>
        <div class="g-vars">...variable legend...</div>
        <div class="g-canvas-wrap"><div id="mygraph-svg"></div></div>
        ${scBar(sc,'mygraph')}
        <div class="g-insight" id="mygraph-insight">Default explanation.</div>
      </div>`;
      drawMyGraphSVG('base');
    }
    window.applyScenario_mygraph = function(id, btn){...};
    function drawMyGraphSVG(mode){
      const W=520, H=320, M={l:50,r:30,t:20,b:40};
      const pW=W-M.l-M.r, pH=H-M.t-M.b;
      const xR=[xMin, xMax], yR=[yMin, yMax];
      const pw=document.getElementById('mygraph-svg'); pw.innerHTML='';
      const svg=makeSVG(pw,W,H,'mygraph-s');
      makeAxes(svg,W,H,M,'X Label','Y Label');
      // gridlines, curves, labels, equilibria...
    }

═══════════════════════════════════════════════════════════════════════════════
 WEEKLY NOTES QUALITY STANDARDS
═══════════════════════════════════════════════════════════════════════════════

 - Use <span class="wk-key">term</span> for key terminology (renders blue highlight)

═══════════════════════════════════════════════════════════════════════════════
 SVG UTILITY FUNCTIONS AVAILABLE (DON'T REWRITE THESE)
═══════════════════════════════════════════════════════════════════════════════

 mkEl(tag, attrs)                    → Create SVG element
 gLine(svg, x1,y1, x2,y2, color, width, dash)  → Draw line
 gPath(svg, d, color, width, fill, dash)        → Draw path (ALWAYS use null for fill on curves, '4 3' for dash)
 gText(svg, x,y, text, size, color, anchor, weight) → Draw text label
 gCircle(svg, x,y, r, fill, stroke)  → Draw circle (equilibrium dots)
 makeAxes(svg, W,H, M, xLabel, yLabel) → Draw axes with labels
 makeSVG(parent, W,H, id)            → Create SVG canvas
 scBar(scenarios, graphId)           → Create scenario buttons HTML
 curvePath(pts, M,pW,pH, xMin,xMax, yMin,yMax) → Convert data points to SVG path
 toXY(M,pW,pH, xMin,xMax, yMin,yMax, x,y) → Convert data coords to pixel coords

═══════════════════════════════════════════════════════════════════════════════
 COMMON BUGS TO AVOID
═══════════════════════════════════════════════════════════════════════════════

 ✗ gPath(svg, path, '#93C5FD', 1.5, '4 3')   ← '4 3' goes into fill = BLACK FILL BUG
 ✓ gPath(svg, path, '#93C5FD', 1.5, null, '4 3')  ← null for fill, '4 3' for dash

 ✗ Indifference curve that doesn't touch the budget constraint
 ✓ Use icCurve(L0, Y0, slope) to generate IC passing through tangent point

 ✗ Equilibrium point not on both curves
 ✓ Verify your curve data points actually intersect at the labeled equilibrium

 ✗ Scenario function name mismatch
 ✓ scBar(sc, 'myid') must match window.applyScenario_myid = function(...)

═══════════════════════════════════════════════════════════════════════════════
 FILE SIZE MANAGEMENT
═══════════════════════════════════════════════════════════════════════════════

 This is a single HTML file. Target: 100-180KB populated.
 - CSS + infrastructure JS ≈ 25KB (don't touch)
 - Content (NODES, DATA, WEEKS, GRAPHS, etc.) ≈ 75-150KB

<script>

const NODES={

  ASSUMP:{x:30,y:120,w:100,h:44,lb:"OLS Assumptions",sub:"A1–A9",m:"found"},

  ODDS:{x:680,y:140,w:100,h:44,lb:"Odds Ratio",sub:"Factor Change",m:"interp"},
  MARGEFF:{x:680,y:240,w:110,h:44,lb:"Marginal Effect",sub:"∂P/∂Xk",m:"interp"},

  DEVIANCE:{x:520,y:440,w:100,h:44,lb:"Deviance",sub:"−2 ln(L)",m:"diag"},
  PEARSON:{x:680,y:440,w:100,h:44,lb:"Pearson χ²",sub:"GOF Statistic",m:"diag"},

  SPEC:{x:340,y:340,w:100,h:44,lb:"Specification",sub:"Link/Ramsey/RESET",m:"diag"},
  NONLIN:{x:180,y:210,w:100,h:44,lb:"Nonlinear Eff.",sub:"Polynomials/Interact",m:"found"},
  BERNOULLI:{x:680,y:40,w:100,h:44,lb:"Bernoulli",sub:"Y ∈ {0,1}",m:"exo"},
  DATA_X:{x:30,y:390,w:100,h:44,lb:"Data Types",sub:"Cross-Section etc",m:"exo"},
  OLOGIT:{x:180,y:390,w:100,h:44,lb:"Ordered Logit",sub:"ologit",m:"bin"},
  OPROBIT:{x:180,y:470,w:110,h:44,lb:"Ordered Probit",sub:"oprobit",m:"bin"},
  CUTPOINT:{x:340,y:530,w:100,h:44,lb:"Cutpoints",sub:"γ₁, γ₂, ...",m:"interp"},
  PARALLEL:{x:520,y:530,w:110,h:44,lb:"Parallel Reg.",sub:"Common β assumption",m:"diag"},
};

// =====================================================================
// POPULATE #3: EDGES — CONNECTIONS BETWEEN NODES
// [fromKey, toKey, edgeLabel, categoryKey]
// =====================================================================
const EDGES=[
  ["OLS","ASSUMP","requires","found"],
  ["ASSUMP","GM","satisfies → BLUE","found"],
  ["OLS","PRL","estimates","found"],
  ["PDF_CDF","PRL","underlies","found"],
  ["PRL","MLE","generalizes to","est"],
  ["MLE","LOG_LF","maximizes","est"],
  ["IID","LOG_LF","Π → Σ log","est"],
  ["OLS","LPM","applied to binary Y","bin"],
  ["BERNOULLI","LPM","Y ∈ {0,1}","exo"],
  ["BERNOULLI","LOGIT","Y ∈ {0,1}","exo"],
  ["BERNOULLI","PROBIT","Y ∈ {0,1}","exo"],
  ["LPM","HETERO","inherently hetero","diag"],
  ["HETERO","WLS","corrected by","est"],
  ["LPM","LOGIT","solves LPM problems","bin"],
  ["LPM","PROBIT","solves LPM problems","bin"],
  ["LOGIT","ODDS","exp(βk)","interp"],
  ["LOGIT","MARGEFF","∂P/∂Xk","interp"],
  ["PROBIT","MARGEFF","φ(Xβ)·βk","interp"],
  ["MLE","LOGIT","estimated via","est"],
  ["MLE","PROBIT","estimated via","est"],
  ["LOG_LF","LR_TEST","−2[ln L_R − ln L_U]","diag"],
  ["LR_TEST","DEVIANCE","special case","diag"],
  ["DEVIANCE","PEARSON","alternative GOF","diag"],
  ["LOGIT","PSEUDO_R2","McFadden/Efron","diag"],
  ["PROBIT","PSEUDO_R2","McFadden/Efron","diag"],
  ["LOGIT","RESID","Pearson/Deviance resid","diag"],
  ["PROBIT","RESID","Pearson/Deviance resid","diag"],
  ["LOGIT","SPEC","Link/Ramsey test","diag"],
  ["PROBIT","SPEC","Link/Ramsey test","diag"],
  ["OLS","NONLIN","polynomials/dummies","found"],
  ["NONLIN","LOGIT","log odds = Xβ","bin"],
  ["ASSUMP","HETERO","violation of A4","diag"],
  ["LOGIT","OLOGIT","extends to M>2","bin"],
  ["PROBIT","OPROBIT","extends to M>2","bin"],
  ["OLOGIT","CUTPOINT","γ thresholds","interp"],
  ["OPROBIT","CUTPOINT","γ thresholds","interp"],
  ["OLOGIT","PARALLEL","requires","diag"],
  ["OPROBIT","PARALLEL","requires","diag"],
  ["MLE","OLOGIT","estimated via","est"],
  ["MLE","OPROBIT","estimated via","est"],
];

// =====================================================================
// POPULATE #4: DATA — SIDEBAR CONTENT PER NODE
// Keys must match NODES keys.
// =====================================================================
const DATA={
  OLS:{name:"OLS — Ordinary Least Squares",desc:"The <b>workhorse</b> of econometrics. Minimizes the sum of squared residuals (Σûᵢ²) to estimate the population regression function. Gives <b>BLUE</b> estimators under Gauss-Markov assumptions. Sample regression: Ŷᵢ = β̂₀ + β̂₁X₁ᵢ + ... + β̂ₘXₘᵢ",eqs:["min Σ(Yᵢ − β₀ − β₁X₁ᵢ − ... − βₘXₘᵢ)²","β̂ = (X'X)⁻¹X'Y","σ̂² = Σûᵢ² / (n−k)"],det:["Data (Xᵢ, Yᵢ)","Model specification","Sample size n"],eff:["Coefficient estimates β̂","Residuals ûᵢ","R² goodness of fit","t-tests, F-tests"],chains:["Data → OLS assumptions hold → BLUE estimates → Inference valid"],intuition:"OLS draws the 'best fitting line' through the data by minimizing vertical distances squared. When assumptions hold, no other linear unbiased estimator has smaller variance.",tip:"Always state the assumptions before interpreting OLS results. Check for violations."},
  ASSUMP:{name:"OLS Assumptions (A1–A9)",desc:"The <b>9 classical assumptions</b> that guarantee OLS is BLUE. Violations lead to biased, inefficient, or inconsistent estimators.",eqs:["A1: Linear in parameters","A2: Fixed X values (not random)","A3: E(uᵢ|Xᵢ) = 0 (zero mean disturbance)","A4: Var(uᵢ) = σ² (homoscedasticity)","A5: Cov(uᵢ,uⱼ) = 0 (no autocorrelation)","A6: Cov(uᵢ,Xᵢ) = 0","A7: n > k (variation in X)","A8: No exact multicollinearity","A9: No specification bias"],det:["Research design","Data structure","Model specification"],eff:["BLUE property (if satisfied)","Inference validity","Standard error correctness"],chains:["A1-A9 satisfied → Gauss-Markov → OLS is BLUE"],intuition:"Each assumption removes a potential source of estimation error. Violating even one can invalidate your conclusions.",tip:"In exams, list the specific assumption number AND its implication when diagnosing issues."},
  GM:{name:"Gauss-Markov Theorem",desc:"<b>Given</b> OLS assumptions hold, the OLS estimator is <b>Best Linear Unbiased Estimator (BLUE)</b>: among all <i>linear unbiased</i> estimators, it has the <b>minimum variance</b>. Verified via Monte Carlo simulation and repeated sampling.",eqs:["E(β̂) = β (unbiased)","Var(β̂) ≤ Var(β̃) for any other linear unbiased β̃","BLUE = Best + Linear + Unbiased + Estimator"],det:["All 9 OLS assumptions must hold"],eff:["Justifies OLS as default estimator","Basis for standard inference"],intuition:"Gauss-Markov says: 'If you play by the rules (assumptions), OLS gives the most precise estimates possible.' No linear unbiased trick can beat it.",tip:"State: 'Under GM assumptions, OLS is BLUE' — then explain what each letter means."},
  PDF_CDF:{name:"PDF & CDF — Probability Foundations",desc:"<b>PDF</b> gives probability density (continuous) or mass (discrete). <b>CDF</b> gives cumulative probability P(X ≤ x). For continuous: CDF is the integral of PDF; PDF is the derivative of CDF.",eqs:["Continuous: f(x) ≥ 0, ∫f(x)dx = 1","CDF: F(x) = P(X ≤ x) = ∫₋∞ˣ f(t)dt","F(−∞) = 0, F(∞) = 1","E(X) = ∫x·f(x)dx (expected value)","Var(X) = E(X²) − [E(X)]²"],det:["Distribution family","Parameters (μ, σ², etc.)"],eff:["Foundation for MLE","Normal distribution → inference","Logistic/Normal CDF → Logit/Probit"],intuition:"PDF tells you 'how likely' each outcome is. CDF tells you 'what fraction falls below this value.' Together they fully characterize randomness.",tip:"Know the shapes: Normal PDF is bell curve, CDF is S-curve. Logistic CDF is also S-curve but with heavier tails."},
  PRL:{name:"PRL / SRF — Population vs Sample",desc:"<b>Population Regression Line (PRL)</b>: E(Y|X) = β₀ + β₁X — the true relationship we want to know. <b>Sample Regression Function (SRF)</b>: Ŷ = β̂₀ + β̂₁X — our estimate from data. The gap: stochastic error uᵢ (population) vs residual ûᵢ = Yᵢ − Ŷᵢ (sample).",eqs:["PRL: Yᵢ = β₀ + β₁Xᵢ + uᵢ","SRF: Ŷᵢ = β̂₀ + β̂₁Xᵢ","ûᵢ = Yᵢ − Ŷᵢ (residual)","E(Y|X) replaces each Yᵢ with the conditional mean"],det:["True parameters β (unknown)","Sample data → β̂ (estimated)"],eff:["OLS estimates SRF","Residuals used for diagnostics"],intuition:"PRL is the truth we can never observe directly. SRF is our best approximation from the data we have. OLS finds the SRF that minimizes Σûᵢ².",tip:"Clearly distinguish between uᵢ (unobservable error) and ûᵢ (observable residual) in exam answers."},
  MLE:{name:"MLE — Maximum Likelihood Estimation",desc:"The <b>key idea</b>: choose parameters that make the observed data <b>most probable</b>. Given data X → joint pdf g(x₁,x₂,...,xₙ; θ) → find θ that maximizes this. Works for <i>any</i> distributional form, not just linear models. Under regularity conditions, MLE is <b>consistent, asymptotically normal, and efficient</b>.",eqs:["L(θ;y,X) = Π pᵢ (likelihood)","ln L = Σ ln pᵢ (log-likelihood)","∂ ln L / ∂β = 0 → β̂_MLE","IID: joint pdf = product of marginals"],det:["Distributional assumption","Sample data","Regularity conditions"],eff:["Logit/Probit coefficients","LR tests","Information matrix → SE(β̂)"],chains:["Data → Assume distribution → Write likelihood → Log-transform → FOC → Solve for β̂_MLE"],intuition:"Imagine flipping a coin 7 heads out of 10. MLE says: 'The most likely true probability is 0.7 because that makes the observed data most probable.'",tip:"Always show: (1) write the likelihood, (2) take log, (3) differentiate, (4) set = 0, (5) solve. MLE for linear regression with normality gives SAME result as OLS."},
  LOG_LF:{name:"Log-Likelihood Function",desc:"Taking the <b>natural log</b> of the likelihood converts products into sums (monotonic transformation, preserves maximum). In econometrics we use natural log. Much easier to differentiate and maximize.",eqs:["ln L(β) = Σᵢ [Yᵢ ln Pᵢ + (1−Yᵢ) ln(1−Pᵢ)]","(for binary choice models)","∂ln L/∂βₖ = 0 → normal equations","exp(·) is the inverse: exp(ln x) = x"],det:["Likelihood function L","IID assumption"],eff:["First-order conditions","Newton-Raphson iteration","Hessian → Information matrix → SEs"],intuition:"Log-likelihood turns multiplication into addition. Since ln is monotonically increasing, maximizing ln L gives the same answer as maximizing L, but is computationally much simpler.",tip:"For logit: ln L = Σ[Yᵢ ln(Pᵢ) + (1−Yᵢ)ln(1−Pᵢ)]. Know how to write this from scratch."},
  IID:{name:"IID — Identical & Independently Distributed",desc:"Key assumption for MLE: observations are drawn independently from the same distribution. This allows the <b>joint pdf</b> to be written as a <b>product of individual pdfs</b>, which then becomes a <b>sum under log</b>.",eqs:["IID: f(y₁,y₂,...,yₙ|β) = Π f(yᵢ|β)","ln L = Σ ln f(yᵢ|β)","No autocorrelation + identical distribution"],det:["Random sampling","No serial correlation","Same data-generating process"],eff:["Validates product → sum conversion","Enables MLE properties (consistency, efficiency)"],intuition:"IID means every observation is like an independent coin flip from the same coin. No observation 'depends on' or 'informs' the others.",tip:"Always state IID when setting up MLE. Without it, you cannot write L as a product of individual likelihoods."},
  LPM:{name:"LPM — Linear Probability Model",desc:"Apply OLS directly to a <b>binary dependent variable</b> Y ∈ {0,1}. E(Yᵢ|Xᵢ) = Pr(Yᵢ=1|Xᵢ) = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ. Coefficients = marginal effects directly. Simple but has serious <b>problems</b>.",eqs:["Ŷᵢ = Pr(Yᵢ=1|Xᵢ) = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ","βₖ = ∂Pr(Y=1)/∂Xₖ (marginal effect, constant)","E(εᵢ) = 0 → unbiased if OLS assumptions hold"],det:["Binary Y data","X regressors","Sample size"],eff:["Predicted probabilities (can be <0 or >1!)","Heteroscedastic errors (inherent)","R² is questionable"],chains:["LPM: P outside [0,1] + hetero → Need Logit/Probit"],intuition:"LPM treats probability like a straight line — easy to interpret, but probability should be bounded between 0 and 1, and a straight line violates that.",tip:"List all 4 problems of LPM: (1) non-normality, (2) hetero, (3) P outside [0,1], (4) R² questionable. Then explain why Logit/Probit fix these."},
  LOGIT:{name:"Logit Model — Logistic Regression",desc:"Uses the <b>logistic CDF</b> to constrain probabilities to [0,1]. The log-odds (logit) is linear: ln[P/(1−P)] = Xβ. Estimated via MLE. Coefficients affect the <b>log of the odds</b>, not probability directly. Globally concave log-likelihood → unique solution via Newton-Raphson.",eqs:["Pr(Y=1|X) = 1/(1+e^(−Xβ)) = e^(Xβ)/(1+e^(Xβ))","ln[P/(1−P)] = β₀ + β₁X₁ + ... + βₘXₘ","Odds = P/(1−P)","Odds Ratio = e^(βₖ) for 1-unit ΔXₖ","Marginal Effect = βₖ · P(1−P)"],det:["Binary Y","Regressors X","Logistic distribution assumption"],eff:["Odds ratios","Marginal effects (non-constant)","Pseudo R²","LR tests"],chains:["Xβ → logistic CDF → P ∈ [0,1] → log-odds = Xβ"],intuition:"Logit squeezes a linear function through an S-curve so probability stays between 0 and 1. The effect of X on probability depends on where you are on the curve — steepest at P=0.5.",tip:"Key interpretation rule: (e^βₖ − 1)×100 = % change in odds. For marginal effect, must evaluate at specific X values (usually mean)."},
  PROBIT:{name:"Probit Model — Normal CDF",desc:"Uses the <b>standard normal CDF (Φ)</b> to model P(Y=1|X). Based on <b>utility/latent variable theory</b>: Y*ᵢ = Xᵢβ + εᵢ, Y=1 if Y* > threshold. If ε ~ N(0,1), this gives the Probit model. Coefficients not directly interpretable — must compute marginal effects.",eqs:["Pr(Y=1|X) = Φ(β₁ + β₂Xᵢ)","Φ(z) = ∫₋∞ᶻ (1/√2π) e^(−t²/2) dt","Y*ᵢ = Xᵢβ + εᵢ (latent variable)","Marginal effect = φ(Xβ)·βₖ","φ(z) = (1/√2π) e^(−z²/2) (normal PDF)"],det:["Binary Y","Latent variable Y*","Normal distribution assumption for ε"],eff:["Marginal effects","Predicted probabilities","Comparable to Logit results"],chains:["Latent Y* → threshold → observed Y → normal CDF → Probit"],intuition:"Probit emerges from utility theory: you observe a binary choice but there's an underlying continuous 'utility' or 'propensity' that drives it. The normal CDF transforms the linear index into a probability.",tip:"βₖ(probit) ≈ βₖ(logit)/1.81 (or βₖ(LPM) ≈ 0.25·βₖ(logit)). Know the conversion factors!"},
  WLS:{name:"WLS — Weighted Least Squares",desc:"Corrects for <b>heteroscedasticity</b> by transforming the model. Divide each observation by √Var(εᵢ). In LPM with binary Y: Var(εᵢ) = Ŷᵢ(1−Ŷᵢ), so weight = 1/√[Ŷᵢ(1−Ŷᵢ)].",eqs:["Yᵢ/√(Ŷᵢ(1−Ŷᵢ)) = β₀/√(Ŷᵢ(1−Ŷᵢ)) + β₁Xᵢ/√(Ŷᵢ(1−Ŷᵢ)) + εᵢ*","wᵢ = 1/√[Ŷᵢ(1−Ŷᵢ)]","2 steps: (1) Run OLS → get Ŷᵢ, (2) Transform and re-estimate"],det:["Known form of heteroscedasticity","First-stage OLS estimates"],eff:["Efficient estimates","Valid standard errors","Corrects LPM heteroscedasticity"],intuition:"WLS gives less weight to noisy observations and more weight to precise ones. It's like adjusting the volume: turn down the static, turn up the clear signal.",tip:"WLS for LPM requires 2 steps. Step 1: Run OLS, get Ŷ. Step 2: Use Ŷ(1−Ŷ) as weights. Note: Ŷ must be in (0,1) — exclude observations outside this range."},
  HETERO:{name:"Heteroscedasticity",desc:"Violation of OLS Assumption A4: Var(εᵢ) ≠ σ² (not constant across observations). In LPM, this is <b>inherent</b>: Var(εᵢ) = Pᵢ(1−Pᵢ) which depends on X. OLS remains unbiased but is <b>inefficient</b> — standard errors are wrong.",eqs:["Var(εᵢ) = Pᵢ(1−Pᵢ) (for LPM)","= [β₀+β₁Xᵢ](1−β₀−β₁Xᵢ)","OLS is still unbiased but NOT efficient","SEs are biased → t-tests invalid"],det:["Non-constant variance in errors","LPM always has it","Cross-section data often has it"],eff:["Incorrect standard errors","Invalid hypothesis tests","Need WLS or robust SEs"],intuition:"Heteroscedasticity means some observations are more 'noisy' than others. It's like having a precise scale for small weights but an imprecise one for large weights.",tip:"For LPM: state 'heteroscedasticity is inherent because Var(εᵢ) = P(1−P) depends on X.' Then recommend WLS or robust SEs."},
  ODDS:{name:"Odds Ratio — Factor Change Interpretation",desc:"In logit, e^(βₖ) gives the <b>multiplicative change in odds</b> for a 1-unit increase in Xₖ. If βₖ > 0 → odds increase. If |βₖ| < 0.1, approximately a βₖ×100% change in odds.",eqs:["Odds = P/(1−P)","Odds Ratio (OR) = e^(βₖ)","% change in odds = (e^(βₖ)−1)×100","For 1-unit ΔXₖ: new odds = old odds × e^(βₖ)"],det:["Logit coefficient βₖ","Direction and magnitude"],eff:["Interpretation of logit results","Comparison across variables (semi-elasticity)"],intuition:"Odds ratio is the 'multiplier' on odds. An OR of 2.5 means the odds are 2.5× higher. An OR of 0.7 means the odds are 30% lower.",tip:"Always convert: (e^β − 1)×100 = % change in odds. State: 'A 1-unit increase in Xₖ is associated with a (OR−1)×100% change in the odds of Y=1.'"},
  MARGEFF:{name:"Marginal Effect — ∂P/∂Xₖ",desc:"The <b>actual change in probability</b> for a 1-unit change in Xₖ. Unlike OLS/LPM where this is constant (= βₖ), in Logit/Probit it <b>depends on the values of all Xᵢ</b>. Two approaches: (1) <b>At the mean</b> — evaluate at X̄, (2) <b>Average marginal effect (AME)</b> — average over all observations.",eqs:["Logit: ∂P/∂Xₖ = βₖ · P(1−P)","Probit: ∂P/∂Xₖ = φ(Xβ) · βₖ","At mean: evaluate at X = X̄","AME = (1/N) Σ ∂P/∂Xₖ|ₓᵢ","Max marginal effect (logit): at P = 0.5 → ME = βₖ/4"],det:["Model coefficients βₖ","Evaluation point (mean vs individual)","P value at evaluation point"],eff:["Substantive interpretation","Policy-relevant effect sizes","Comparison across models"],chains:["βₖ (raw) → P at evaluation point → ME = βₖ·P(1−P) [logit] or φ(Xβ)·βₖ [probit]"],intuition:"Marginal effect answers: 'By how many percentage points does P change if Xₖ goes up by 1?' The answer depends on where you are on the S-curve — biggest at P=0.5, smallest near P=0 or P=1.",tip:"AME is often preferred over 'at mean' because 'the mean person' may not exist. Report both if asked. Note: ME problems — often only crude approximation of true effects."},
  PSEUDO_R2:{name:"Pseudo R² — Goodness of Fit",desc:"Since regular R² doesn't work well for binary models, several pseudo R² measures exist. None is a perfect analog to linear R².",eqs:["McFadden: R²_MF = 1 − ln L / ln L₀","Efron: R²_E = 1 − Σ(Yᵢ−P̂ᵢ)²/Σ(Yᵢ−Ȳ)² ∈ [0,1]","Count R² = # correct / N","Max Likelihood Pseudo R² = 1 − e^(−2(ln L − ln L₀)/N)","McFadden's R² Snell interpretation: 0.2-0.4 = good fit"],det:["Log-likelihood of fitted model","Log-likelihood of null model","Predicted probabilities"],eff:["Model comparison","Fit assessment","AIC/BIC alternatives"],intuition:"Pseudo R² measures 'how much better is our model than just predicting the overall mean.' McFadden's R² of 0.2-0.4 is considered a strong result — don't compare it to linear R².",tip:"Classification table + Pseudo R² together give a fuller picture. Report McFadden AND Count R². Pseudo R² = 0.3 in logit is roughly equivalent to R² = 0.6 in linear regression."},
  LR_TEST:{name:"LR Test — Likelihood Ratio Test",desc:"Tests whether adding variables improves the model. Compares <b>restricted</b> (fewer variables) vs <b>unrestricted</b> (more variables) models. The test statistic follows χ² distribution. Can test single coefficients, subsets, or overall model significance.",eqs:["LR = −2[ln L(Mᵣ) − ln L(Mᵤ)] ~ χ²(q)","q = number of restrictions","Overall: H₀: β₁ = β₂ = ... = βₘ = 0","Single: H₀: βₖ = 0","Subset: H₀: βⱼ = βₖ = ... = 0","Equality: H₀: βⱼ = βₖ"],det:["Nested models (restricted ⊂ unrestricted)","Log-likelihoods of both models","Degrees of freedom q"],eff:["Variable selection","Model comparison","Overall significance"],chains:["Nested models → compute log-likelihoods → LR stat → compare to χ²(q) → reject/fail to reject"],intuition:"LR test asks: 'Does adding these variables significantly improve how well the data fits?' A large LR statistic means yes — the restricted model is missing something important.",tip:"LR test requires nested models. Always specify: (1) M₁ (restricted), (2) M₂ (unrestricted), (3) q = restrictions count, (4) LR stat, (5) compare to χ²_α(q)."},
  DEVIANCE:{name:"Deviance — Model Fit Statistic",desc:"Deviance = −2 ln(L̂/Lₛ) = −2[ln L̂ − ln Lₛ] where Lₛ is the saturated model. Measures distance from the 'perfect' model. For overall GOF: D > χ²_α(J−m−1) → reject model fit.",eqs:["D = −2 Σ [Yᵢ ln(Ŷᵢ/Yᵢ) + (1−Yᵢ)ln((1−Ŷᵢ)/(1−Yᵢ))]","= −2 ln(L(β̂)/L(saturated))","df = J − m − 1","Overall GOF: D > χ²_α(df) → poor fit"],det:["Estimated model log-likelihood","Saturated model log-likelihood","Covariate patterns J"],eff:["Overall model fit test","Compared to Pearson χ²","AIC/BIC calculations"],intuition:"Deviance measures how far your model is from 'perfect prediction.' A small deviance means your model closely reproduces the observed data.",tip:"Deviance GOF test: H₀ = model fits. Reject if D > χ²_critical. Note: requires grouped data (covariate patterns), not individual observations."},
  PEARSON:{name:"Pearson χ² — GOF Statistic",desc:"Alternative to Deviance for testing overall model fit. Based on <b>observed vs predicted proportions</b> across covariate patterns. Both should give similar results asymptotically.",eqs:["χ² = Σⱼ nⱼ(ȳⱼ − π̂ⱼ)²/[π̂ⱼ(1−π̂ⱼ)]","rⱼ = Pearson residual = (ȳⱼ−π̂ⱼ)/√[π̂ⱼ(1−π̂ⱼ)/nⱼ]","χ² = Σ rⱼ² ~ χ²(J−m−1)","J = # covariate patterns","nⱼ = # obs in pattern j"],det:["Observed proportions ȳⱼ","Predicted probabilities π̂ⱼ","Covariate patterns"],eff:["Model adequacy assessment","Alternative to Deviance","Distinct covariate patterns important"],intuition:"Pearson χ² compares what the model predicts vs what actually happened, pattern by pattern. Large discrepancies suggest the model is missing something.",tip:"Both Pearson χ² and Deviance test the same hypothesis but use different metrics. Report both. Need distinct covariate patterns for valid test."},
  RESID:{name:"Residuals & Influence Diagnostics",desc:"For binary models: <b>Pearson residual</b> = (Yᵢ−π̂ᵢ)/√[π̂ᵢ(1−π̂ᵢ)]. <b>Deviance residual</b> based on contribution to deviance. <b>Influence</b> measures: Cook's distance (Δβ̂ᵢ), leverage (hᵢᵢ), DFBETA. Outliers can distort MLE estimates.",eqs:["Pearson: rᵢ = (Yᵢ−π̂ᵢ)/√[π̂ᵢ(1−π̂ᵢ)]","Standardized: rₛ = rᵢ/√(1−hᵢᵢ)","Cook's: ΔB̂ᵢ = rₛ² · hᵢᵢ/(1−hᵢᵢ)","Leverage: hᵢᵢ → 'atypical' X values","V(rᵢ) = π̂ᵢ(1−π̂ᵢ) → heteroscedastic"],det:["Predicted probabilities π̂ᵢ","Hat matrix diagonal hᵢᵢ"],eff:["Identify influential observations","Model robustness check","Outlier detection"],intuition:"Residuals tell you which observations your model gets wrong. Influence tells you which observations are pulling the model toward them disproportionately.",tip:"What to do about outliers: (1) look closer at the data, (2) check for errors, (3) compare models with/without outliers, (4) main result shouldn't change."},
  SPEC:{name:"Model Specification Tests",desc:"<b>Link test</b>: regress Y on Ŷ and Ŷ² — if Ŷ² is significant, model is misspecified. <b>Ramsey RESET</b>: add powers of Ŷ to test omitted nonlinearity. <b>Also</b>: omitted variable, non-additivity (interaction terms), nonlinear effects.",eqs:["Link test: logit(P) = γ₁Ŷ + γ₂Ŷ²","H₀: γ₂ = 0 (correct specification)","RESET: add Ŷ², Ŷ³ to model","Test spec: R² ≈ 0% → add variables/nonlinear"],det:["Predicted values Ŷ","Functional form assumptions","Variable completeness"],eff:["Variable addition","Transformation (log, polynomial)","Interaction terms"],intuition:"Specification tests ask: 'Is my model the right shape?' If adding Ŷ² matters, it means the true relationship has curvature your linear model misses.",tip:"Always run link test after fitting logit/probit. If Ŷ² significant → add nonlinear terms, interaction terms, or try different functional form."},
  NONLIN:{name:"Nonlinear Effects & Interactions",desc:"<b>Polynomials</b>: Xₖ² captures U-shaped or inverted-U relationships. <b>Interactions</b>: X₁·X₂ means the effect of X₁ depends on X₂. <b>Dummy variables</b>: categorical predictors as 0/1 indicators (K categories → K−1 dummies, reference group).",eqs:["Polynomial: Y = β₀ + β₁X + β₂X² + u","Interaction: Y = β₀ + β₁X₁ + β₂X₂ + β₃X₁X₂ + u","Dummy: Xⱼ = 1 if category j, 0 otherwise","Non-additivity: effect of X₁ on log odds depends on X₂"],det:["Theory suggests nonlinearity","Interaction hypotheses","Categorical variables"],eff:["Better model specification","Captures complex relationships","Different marginal effects by group"],intuition:"Real relationships are rarely purely linear. Adding X² lets the effect bend. Interactions let one variable modify another's effect — like how education's effect on income might differ by gender.",tip:"In logit: nonlinear effects on log odds → even more complex effects on probability. Always interpret marginal effects, not raw coefficients."},
  BERNOULLI:{name:"Bernoulli Distribution",desc:"Y follows a Bernoulli distribution: Y = 1 (event) with probability π, Y = 0 (no event) with probability 1−π. This is the <b>foundation</b> of all binary choice models.",eqs:["Y ~ Bernoulli(π)","P(Y=1) = π, P(Y=0) = 1−π","E(Y) = π","Var(Y) = π(1−π)","f(y) = πʸ(1−π)¹⁻ʸ"],det:["Binary outcome","Success probability π"],eff:["Motivates LPM, Logit, Probit","Variance depends on π → heteroscedasticity"],intuition:"Bernoulli is the simplest random experiment: flip a coin. Heads (Y=1) with probability π, tails (Y=0) with probability 1−π.",tip:"State this first when setting up any binary choice model. It explains why LPM has inherent heteroscedasticity: Var(Y) = π(1−π) depends on X through π."},
  DATA_X:{name:"Data Types in Econometrics",desc:"<b>Cross-section</b>: multiple units at one time point. <b>Time series</b>: one unit over many time points. <b>Panel data</b>: multiple units over multiple time points. CSPD course focuses on cross-section binary choice models.",eqs:["Cross-section: i = 1,...,N (one period)","Time series: t = 1,...,T (one unit)","Panel: (i,t) for i=1,...,N and t=1,...,T"],det:["Research question","Data availability","Unit of analysis"],eff:["Determines estimation method","Affects assumption violations (autocorrelation etc.)","Panel → FE/RE models"],intuition:"Think of cross-section as a photograph (snapshot of many people at one time), time series as a movie of one person, and panel data as a movie of many people.",tip:"For this course: mostly cross-section with binary Y. Panel data methods come later."},
  OLOGIT:{name:"Ordered Logit (ologit)",desc:"Extends binary logit to <b>ordered categorical</b> outcomes with M>2 categories. Uses logistic CDF and the same latent variable structure: y*=Xβ+ε, observed y=j if γ_{j-1}<y*≤γ_j. One common β vector across all cumulative splits (<b>parallel regression assumption</b>).",eqs:["y* = x'β + ε, ε ~ Logistic","y = j if γ_{j-1} < y* ≤ γ_j","Pr(y≤m|x) = Λ(τ_m − xβ)","Pr(y=m|x) = Λ(τ_m−xβ) − Λ(τ_{m-1}−xβ)"],det:["Ordered dependent variable","Logistic disturbance assumption","Parallel regression assumption holds"],eff:["Category probabilities","Cumulative odds ratios","Cutpoint estimates"],chains:["Xβ → latent y* → crosses cutpoints → observed ordered category"],intuition:"Imagine a continuous 'propensity' scale cut into intervals by thresholds. Each person falls into the interval matching their propensity level.",tip:"In Stata: ologit y x1 x2. Cutpoints are reported as _cut1, _cut2, etc. A positive coefficient means higher latent y* → more likely to be in highest category."},
  OPROBIT:{name:"Ordered Probit (oprobit)",desc:"Same as ordered logit but uses <b>normal CDF</b> instead of logistic. Latent variable y*=Xβ+ε with ε~N(0,1). Category probabilities use Φ (standard normal CDF) instead of Λ.",eqs:["y* = x'β + ε, ε ~ N(0,1)","P(y=1|x) = Φ(−x'β)","P(y=2|x) = Φ(γ−x'β) − Φ(−x'β)","P(y=3|x) = 1 − Φ(γ−x'β)"],det:["Ordered dependent variable","Normal disturbance assumption"],eff:["Category probabilities via Φ","Latent variable interpretation"],intuition:"Same threshold logic as ordered logit. The only difference is the bell shape (normal) vs slightly heavier tails (logistic) of the error distribution.",tip:"In Stata: oprobit y x1 x2. Coefficients will be smaller than ologit by factor ~1.81 (same as binary case). Predicted probabilities should be very similar."},
  CUTPOINT:{name:"Cutpoints / Thresholds (γ)",desc:"The <b>boundaries</b> on the latent scale that map the continuous y* into observed ordered categories. For M categories, there are M−1 estimated cutpoints (with γ₀=−∞ and γ_M=+∞). One cutpoint is normalized (usually γ₁=0) to fix the <b>location</b> of the latent scale.",eqs:["γ₀ = −∞, γ₁ = 0 (normalized), γ₂, ..., γ_{M-1}, γ_M = +∞","y = j if γ_{j-1} < y* ≤ γ_j","Estimated jointly with β via MLE"],det:["Number of categories M","Normalization choice","Data distribution"],eff:["Map latent scale → observed categories","Determine category probabilities","Must be ordered: γ₁ < γ₂ < ... < γ_{M-1}"],intuition:"Cutpoints are like grade boundaries: 0-59=F, 60-69=D, 70-79=C, 80-89=B, 90-100=A. The latent variable is the 'score', cutpoints are the grade boundaries.",tip:"In Stata output, cutpoints appear as _cut1, _cut2, etc. They are NOT coefficients — they are threshold parameters. Do not interpret them like slopes."},
  PARALLEL:{name:"Parallel Regression Assumption",desc:"The <b>key structural restriction</b> of ordered logit/probit: the slope vector β is the <b>same</b> across all cumulative binary splits. Equivalent to saying the probability curves for different cumulative cuts are parallel (shifted only by thresholds, not by different slopes).",eqs:["Pr(y≤m|x) = F(τ_m − xβ) for all m","Same β for every m — only τ_m changes","Equivalent to J−1 binary models with common slopes"],det:["Model structure","Whether regressors affect all category boundaries equally"],eff:["If holds: parsimonious model, valid inference","If violated: consider generalized ordered logit, multinomial logit, or stereotype model"],intuition:"The model assumes that education affects the boundary between 'disagree' and 'neutral' in the SAME way as it affects the boundary between 'neutral' and 'agree.' If this is not true, the model is misspecified.",tip:"Always test this! In Stata: brant test (for ologit). If rejected, consider gologit2 (generalized ordered logit) as an alternative."},
};
