 ARCHITECTURE OVERVIEW
═══════════════════════════════════════════════════════════════════════════════

The tool has 3 VIEWS accessible via the top-bar dropdown:
  1. CONCEPT MAP — Interactive SVG flowchart (pan/zoom/click nodes)
  2. EXAM GLOSSARY — Searchable term dictionary
  3. WEEKLY MATERIALS — Per-week study content with 4 sub-tabs:
     a. 📝 Notes (lecture content, tables, formulas, highlight boxes)
     b. 📊 Graphs (interactive SVG graphs with scenario buttons)
     c. 📏 Formulas (key equations with worked examples)
     d. 🎯 Quiz (exam-style questions with reveal-able model answers)

═══════════════════════════════════════════════════════════════════════════════
 GRAPH QUALITY STANDARDS (CRITICAL — READ THIS)
═══════════════════════════════════════════════════════════════════════════════

Graphs use CUSTOM SVG (not Chart.js). This gives clean, labeled, exam-quality
diagrams. The standards are:

 1. EVERY curve must be labeled DIRECTLY ON the curve (not in a legend box).
    Use gText() placed near the end of the curve. Include the equation/identity:
    ✓ "Ld (= VMPL = P×MPL)"    ✗ "Demand"
    ✓ "Ls (W=4L)"              ✗ "Supply"  
    ✓ "MCL (=8L)"              ✗ "MCL"
    ✓ "IC (U₀*)"               ✗ "curve 1"

 2. EVERY equilibrium point must be marked with gCircle() and have dashed
    projection lines to both axes (gLine with '3 3' dash) showing the
    exact W* and L* values.

 3. EVERY graph must have a VARIABLE LEGEND BOX (class="g-vars") listing
    what each symbol means in plain language:
    <div class="g-vars">
      <span class="gv"><b>Ld</b> = labor demand curve</span>
      <span class="gv"><b>VMPL</b> = value of marginal product (revenue from 1 extra worker)</span>
      ...
    </div>

 4. SCENARIO BUTTONS must update an insight box (class="g-insight") with
    step-by-step explanations. Use <br> for line breaks, <b> for bold.
    Each step should be numbered: "Step 1: ...<br>Step 2: ..."

 5. When showing shifted curves, the OLD curve should be:
    - Dashed: gPath(svg, path, color, 1.5, null, '4 3')  ← note: null for fill, '4 3' for dash
    - Lighter color (e.g., '#93C5FD' instead of '#2563EB')
    - Labeled with subscript: "Ld₀" or "BC₀"
    The NEW curve should be solid, full color, labeled "Ld₁" or "BC₁".

 6. Use GRIDLINES for readability: light '#F0F0EC' horizontal lines at
    regular intervals.

 7. MATHEMATICAL ACCURACY: curves must pass through labeled points.
    If you label an equilibrium at (6, 18), the Ld and Ls curves MUST
    both pass through that point. For indifference curves tangent to
    budget constraints, use the icCurve() utility function (U = Y·L^a form)
    to guarantee tangency at the specified point with the correct slope.

 8. Graph function pattern:
    function drawMyGraph(){
      const c = document.getElementById('gc-my_graph');
      const sc = [{id:'scenario1', label:'Label'}, {id:'reset', label:'⟲ Reset'}];
      c.innerHTML = `<div class="g-card">
        <h4>Title</h4>
        <p class="g-desc">Description with <b>key equations</b>.</p>
        <div class="g-vars">...variable legend...</div>
        <div class="g-canvas-wrap"><div id="mygraph-svg"></div></div>
        ${scBar(sc,'mygraph')}
        <div class="g-insight" id="mygraph-insight">Default explanation.</div>
      </div>`;
      drawMyGraphSVG('base');
    }
    window.applyScenario_mygraph = function(id, btn){...};
    function drawMyGraphSVG(mode){
      const W=520, H=320, M={l:50,r:30,t:20,b:40};
      const pW=W-M.l-M.r, pH=H-M.t-M.b;
      const xR=[xMin, xMax], yR=[yMin, yMax];
      const pw=document.getElementById('mygraph-svg'); pw.innerHTML='';
      const svg=makeSVG(pw,W,H,'mygraph-s');
      makeAxes(svg,W,H,M,'X Label','Y Label');
      // gridlines, curves, labels, equilibria...
    }

═══════════════════════════════════════════════════════════════════════════════
 WEEKLY NOTES QUALITY STANDARDS
═══════════════════════════════════════════════════════════════════════════════

 - Use <span class="wk-key">term</span> for key terminology (renders blue highlight)

═══════════════════════════════════════════════════════════════════════════════
 SVG UTILITY FUNCTIONS AVAILABLE (DON'T REWRITE THESE)
═══════════════════════════════════════════════════════════════════════════════

 mkEl(tag, attrs)                    → Create SVG element
 gLine(svg, x1,y1, x2,y2, color, width, dash)  → Draw line
 gPath(svg, d, color, width, fill, dash)        → Draw path (ALWAYS use null for fill on curves, '4 3' for dash)
 gText(svg, x,y, text, size, color, anchor, weight) → Draw text label
 gCircle(svg, x,y, r, fill, stroke)  → Draw circle (equilibrium dots)
 makeAxes(svg, W,H, M, xLabel, yLabel) → Draw axes with labels
 makeSVG(parent, W,H, id)            → Create SVG canvas
 scBar(scenarios, graphId)           → Create scenario buttons HTML
 curvePath(pts, M,pW,pH, xMin,xMax, yMin,yMax) → Convert data points to SVG path
 toXY(M,pW,pH, xMin,xMax, yMin,yMax, x,y) → Convert data coords to pixel coords

═══════════════════════════════════════════════════════════════════════════════
 COMMON BUGS TO AVOID
═══════════════════════════════════════════════════════════════════════════════

 ✗ gPath(svg, path, '#93C5FD', 1.5, '4 3')   ← '4 3' goes into fill = BLACK FILL BUG
 ✓ gPath(svg, path, '#93C5FD', 1.5, null, '4 3')  ← null for fill, '4 3' for dash

 ✗ Indifference curve that doesn't touch the budget constraint
 ✓ Use icCurve(L0, Y0, slope) to generate IC passing through tangent point

 ✗ Equilibrium point not on both curves
 ✓ Verify your curve data points actually intersect at the labeled equilibrium

 ✗ Scenario function name mismatch
 ✓ scBar(sc, 'myid') must match window.applyScenario_myid = function(...)

═══════════════════════════════════════════════════════════════════════════════
 FILE SIZE MANAGEMENT
═══════════════════════════════════════════════════════════════════════════════

 This is a single HTML file. Target: 100-180KB populated.
 - CSS + infrastructure JS ≈ 25KB (don't touch)
 - Content (NODES, DATA, WEEKS, GRAPHS, etc.) ≈ 75-150KB

  ASSUMP:{name:"OLS Assumptions (A1–A9)",desc:"The <b>9 classical assumptions</b> that guarantee OLS is BLUE. Violations lead to biased, inefficient, or inconsistent estimators.",eqs:["A1: Linear in parameters","A2: Fixed X values (not random)","A3: E(uᵢ|Xᵢ) = 0 (zero mean disturbance)","A4: Var(uᵢ) = σ² (homoscedasticity)","A5: Cov(uᵢ,uⱼ) = 0 (no autocorrelation)","A6: Cov(uᵢ,Xᵢ) = 0","A7: n > k (variation in X)","A8: No exact multicollinearity","A9: No specification bias"],det:["Research design","Data structure","Model specification"],eff:["BLUE property (if satisfied)","Inference validity","Standard error correctness"],chains:["A1-A9 satisfied → Gauss-Markov → OLS is BLUE"],intuition:"Each assumption removes a potential source of estimation error. Violating even one can invalidate your conclusions.",tip:"In exams, list the specific assumption number AND its implication when diagnosing issues."},
  GM:{name:"Gauss-Markov Theorem",desc:"<b>Given</b> OLS assumptions hold, the OLS estimator is <b>Best Linear Unbiased Estimator (BLUE)</b>: among all <i>linear unbiased</i> estimators, it has the <b>minimum variance</b>. Verified via Monte Carlo simulation and repeated sampling.",eqs:["E(β̂) = β (unbiased)","Var(β̂) ≤ Var(β̃) for any other linear unbiased β̃","BLUE = Best + Linear + Unbiased + Estimator"],det:["All 9 OLS assumptions must hold"],eff:["Justifies OLS as default estimator","Basis for standard inference"],intuition:"Gauss-Markov says: 'If you play by the rules (assumptions), OLS gives the most precise estimates possible.' No linear unbiased trick can beat it.",tip:"State: 'Under GM assumptions, OLS is BLUE' — then explain what each letter means."},
  PDF_CDF:{name:"PDF & CDF — Probability Foundations",desc:"<b>PDF</b> gives probability density (continuous) or mass (discrete). <b>CDF</b> gives cumulative probability P(X ≤ x). For continuous: CDF is the integral of PDF; PDF is the derivative of CDF.",eqs:["Continuous: f(x) ≥ 0, ∫f(x)dx = 1","CDF: F(x) = P(X ≤ x) = ∫₋∞ˣ f(t)dt","F(−∞) = 0, F(∞) = 1","E(X) = ∫x·f(x)dx (expected value)","Var(X) = E(X²) − [E(X)]²"],det:["Distribution family","Parameters (μ, σ², etc.)"],eff:["Foundation for MLE","Normal distribution → inference","Logistic/Normal CDF → Logit/Probit"],intuition:"PDF tells you 'how likely' each outcome is. CDF tells you 'what fraction falls below this value.' Together they fully characterize randomness.",tip:"Know the shapes: Normal PDF is bell curve, CDF is S-curve. Logistic CDF is also S-curve but with heavier tails."},
  PRL:{name:"PRL / SRF — Population vs Sample",desc:"<b>Population Regression Line (PRL)</b>: E(Y|X) = β₀ + β₁X — the true relationship we want to know. <b>Sample Regression Function (SRF)</b>: Ŷ = β̂₀ + β̂₁X — our estimate from data. The gap: stochastic error uᵢ (population) vs residual ûᵢ = Yᵢ − Ŷᵢ (sample).",eqs:["PRL: Yᵢ = β₀ + β₁Xᵢ + uᵢ","SRF: Ŷᵢ = β̂₀ + β̂₁Xᵢ","ûᵢ = Yᵢ − Ŷᵢ (residual)","E(Y|X) replaces each Yᵢ with the conditional mean"],det:["True parameters β (unknown)","Sample data → β̂ (estimated)"],eff:["OLS estimates SRF","Residuals used for diagnostics"],intuition:"PRL is the truth we can never observe directly. SRF is our best approximation from the data we have. OLS finds the SRF that minimizes Σûᵢ².",tip:"Clearly distinguish between uᵢ (unobservable error) and ûᵢ (observable residual) in exam answers."},
  MLE:{name:"MLE — Maximum Likelihood Estimation",desc:"The <b>key idea</b>: choose parameters that make the observed data <b>most probable</b>. Given data X → joint pdf g(x₁,x₂,...,xₙ; θ) → find θ that maximizes this. Works for <i>any</i> distributional form, not just linear models. Under regularity conditions, MLE is <b>consistent, asymptotically normal, and efficient</b>.",eqs:["L(θ;y,X) = Π pᵢ (likelihood)","ln L = Σ ln pᵢ (log-likelihood)","∂ ln L / ∂β = 0 → β̂_MLE","IID: joint pdf = product of marginals"],det:["Distributional assumption","Sample data","Regularity conditions"],eff:["Logit/Probit coefficients","LR tests","Information matrix → SE(β̂)"],chains:["Data → Assume distribution → Write likelihood → Log-transform → FOC → Solve for β̂_MLE"],intuition:"Imagine flipping a coin 7 heads out of 10. MLE says: 'The most likely true probability is 0.7 because that makes the observed data most probable.'",tip:"Always show: (1) write the likelihood, (2) take log, (3) differentiate, (4) set = 0, (5) solve. MLE for linear regression with normality gives SAME result as OLS."},
  LOG_LF:{name:"Log-Likelihood Function",desc:"Taking the <b>natural log</b> of the likelihood converts products into sums (monotonic transformation, preserves maximum). In econometrics we use natural log. Much easier to differentiate and maximize.",eqs:["ln L(β) = Σᵢ [Yᵢ ln Pᵢ + (1−Yᵢ) ln(1−Pᵢ)]","(for binary choice models)","∂ln L/∂βₖ = 0 → normal equations","exp(·) is the inverse: exp(ln x) = x"],det:["Likelihood function L","IID assumption"],eff:["First-order conditions","Newton-Raphson iteration","Hessian → Information matrix → SEs"],intuition:"Log-likelihood turns multiplication into addition. Since ln is monotonically increasing, maximizing ln L gives the same answer as maximizing L, but is computationally much simpler.",tip:"For logit: ln L = Σ[Yᵢ ln(Pᵢ) + (1−Yᵢ)ln(1−Pᵢ)]. Know how to write this from scratch."},
  IID:{name:"IID — Identical & Independently Distributed",desc:"Key assumption for MLE: observations are drawn independently from the same distribution. This allows the <b>joint pdf</b> to be written as a <b>product of individual pdfs</b>, which then becomes a <b>sum under log</b>.",eqs:["IID: f(y₁,y₂,...,yₙ|β) = Π f(yᵢ|β)","ln L = Σ ln f(yᵢ|β)","No autocorrelation + identical distribution"],det:["Random sampling","No serial correlation","Same data-generating process"],eff:["Validates product → sum conversion","Enables MLE properties (consistency, efficiency)"],intuition:"IID means every observation is like an independent coin flip from the same coin. No observation 'depends on' or 'informs' the others.",tip:"Always state IID when setting up MLE. Without it, you cannot write L as a product of individual likelihoods."},
  LPM:{name:"LPM — Linear Probability Model",desc:"Apply OLS directly to a <b>binary dependent variable</b> Y ∈ {0,1}. E(Yᵢ|Xᵢ) = Pr(Yᵢ=1|Xᵢ) = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ. Coefficients = marginal effects directly. Simple but has serious <b>problems</b>.",eqs:["Ŷᵢ = Pr(Yᵢ=1|Xᵢ) = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ","βₖ = ∂Pr(Y=1)/∂Xₖ (marginal effect, constant)","E(εᵢ) = 0 → unbiased if OLS assumptions hold"],det:["Binary Y data","X regressors","Sample size"],eff:["Predicted probabilities (can be <0 or >1!)","Heteroscedastic errors (inherent)","R² is questionable"],chains:["LPM: P outside [0,1] + hetero → Need Logit/Probit"],intuition:"LPM treats probability like a straight line — easy to interpret, but probability should be bounded between 0 and 1, and a straight line violates that.",tip:"List all 4 problems of LPM: (1) non-normality, (2) hetero, (3) P outside [0,1], (4) R² questionable. Then explain why Logit/Probit fix these."},
  LOGIT:{name:"Logit Model — Logistic Regression",desc:"Uses the <b>logistic CDF</b> to constrain probabilities to [0,1]. The log-odds (logit) is linear: ln[P/(1−P)] = Xβ. Estimated via MLE. Coefficients affect the <b>log of the odds</b>, not probability directly. Globally concave log-likelihood → unique solution via Newton-Raphson.",eqs:["Pr(Y=1|X) = 1/(1+e^(−Xβ)) = e^(Xβ)/(1+e^(Xβ))","ln[P/(1−P)] = β₀ + β₁X₁ + ... + βₘXₘ","Odds = P/(1−P)","Odds Ratio = e^(βₖ) for 1-unit ΔXₖ","Marginal Effect = βₖ · P(1−P)"],det:["Binary Y","Regressors X","Logistic distribution assumption"],eff:["Odds ratios","Marginal effects (non-constant)","Pseudo R²","LR tests"],chains:["Xβ → logistic CDF → P ∈ [0,1] → log-odds = Xβ"],intuition:"Logit squeezes a linear function through an S-curve so probability stays between 0 and 1. The effect of X on probability depends on where you are on the curve — steepest at P=0.5.",tip:"Key interpretation rule: (e^βₖ − 1)×100 = % change in odds. For marginal effect, must evaluate at specific X values (usually mean)."},
  PROBIT:{name:"Probit Model — Normal CDF",desc:"Uses the <b>standard normal CDF (Φ)</b> to model P(Y=1|X). Based on <b>utility/latent variable theory</b>: Y*ᵢ = Xᵢβ + εᵢ, Y=1 if Y* > threshold. If ε ~ N(0,1), this gives the Probit model. Coefficients not directly interpretable — must compute marginal effects.",eqs:["Pr(Y=1|X) = Φ(β₁ + β₂Xᵢ)","Φ(z) = ∫₋∞ᶻ (1/√2π) e^(−t²/2) dt","Y*ᵢ = Xᵢβ + εᵢ (latent variable)","Marginal effect = φ(Xβ)·βₖ","φ(z) = (1/√2π) e^(−z²/2) (normal PDF)"],det:["Binary Y","Latent variable Y*","Normal distribution assumption for ε"],eff:["Marginal effects","Predicted probabilities","Comparable to Logit results"],chains:["Latent Y* → threshold → observed Y → normal CDF → Probit"],intuition:"Probit emerges from utility theory: you observe a binary choice but there's an underlying continuous 'utility' or 'propensity' that drives it. The normal CDF transforms the linear index into a probability.",tip:"βₖ(probit) ≈ βₖ(logit)/1.81 (or βₖ(LPM) ≈ 0.25·βₖ(logit)). Know the conversion factors!"},
  WLS:{name:"WLS — Weighted Least Squares",desc:"Corrects for <b>heteroscedasticity</b> by transforming the model. Divide each observation by √Var(εᵢ). In LPM with binary Y: Var(εᵢ) = Ŷᵢ(1−Ŷᵢ), so weight = 1/√[Ŷᵢ(1−Ŷᵢ)].",eqs:["Yᵢ/√(Ŷᵢ(1−Ŷᵢ)) = β₀/√(Ŷᵢ(1−Ŷᵢ)) + β₁Xᵢ/√(Ŷᵢ(1−Ŷᵢ)) + εᵢ*","wᵢ = 1/√[Ŷᵢ(1−Ŷᵢ)]","2 steps: (1) Run OLS → get Ŷᵢ, (2) Transform and re-estimate"],det:["Known form of heteroscedasticity","First-stage OLS estimates"],eff:["Efficient estimates","Valid standard errors","Corrects LPM heteroscedasticity"],intuition:"WLS gives less weight to noisy observations and more weight to precise ones. It's like adjusting the volume: turn down the static, turn up the clear signal.",tip:"WLS for LPM requires 2 steps. Step 1: Run OLS, get Ŷ. Step 2: Use Ŷ(1−Ŷ) as weights. Note: Ŷ must be in (0,1) — exclude observations outside this range."},
  HETERO:{name:"Heteroscedasticity",desc:"Violation of OLS Assumption A4: Var(εᵢ) ≠ σ² (not constant across observations). In LPM, this is <b>inherent</b>: Var(εᵢ) = Pᵢ(1−Pᵢ) which depends on X. OLS remains unbiased but is <b>inefficient</b> — standard errors are wrong.",eqs:["Var(εᵢ) = Pᵢ(1−Pᵢ) (for LPM)","= [β₀+β₁Xᵢ](1−β₀−β₁Xᵢ)","OLS is still unbiased but NOT efficient","SEs are biased → t-tests invalid"],det:["Non-constant variance in errors","LPM always has it","Cross-section data often has it"],eff:["Incorrect standard errors","Invalid hypothesis tests","Need WLS or robust SEs"],intuition:"Heteroscedasticity means some observations are more 'noisy' than others. It's like having a precise scale for small weights but an imprecise one for large weights.",tip:"For LPM: state 'heteroscedasticity is inherent because Var(εᵢ) = P(1−P) depends on X.' Then recommend WLS or robust SEs."},
  ODDS:{name:"Odds Ratio — Factor Change Interpretation",desc:"In logit, e^(βₖ) gives the <b>multiplicative change in odds</b> for a 1-unit increase in Xₖ. If βₖ > 0 → odds increase. If |βₖ| < 0.1, approximately a βₖ×100% change in odds.",eqs:["Odds = P/(1−P)","Odds Ratio (OR) = e^(βₖ)","% change in odds = (e^(βₖ)−1)×100","For 1-unit ΔXₖ: new odds = old odds × e^(βₖ)"],det:["Logit coefficient βₖ","Direction and magnitude"],eff:["Interpretation of logit results","Comparison across variables (semi-elasticity)"],intuition:"Odds ratio is the 'multiplier' on odds. An OR of 2.5 means the odds are 2.5× higher. An OR of 0.7 means the odds are 30% lower.",tip:"Always convert: (e^β − 1)×100 = % change in odds. State: 'A 1-unit increase in Xₖ is associated with a (OR−1)×100% change in the odds of Y=1.'"},
  MARGEFF:{name:"Marginal Effect — ∂P/∂Xₖ",desc:"The <b>actual change in probability</b> for a 1-unit change in Xₖ. Unlike OLS/LPM where this is constant (= βₖ), in Logit/Probit it <b>depends on the values of all Xᵢ</b>. Two approaches: (1) <b>At the mean</b> — evaluate at X̄, (2) <b>Average marginal effect (AME)</b> — average over all observations.",eqs:["Logit: ∂P/∂Xₖ = βₖ · P(1−P)","Probit: ∂P/∂Xₖ = φ(Xβ) · βₖ","At mean: evaluate at X = X̄","AME = (1/N) Σ ∂P/∂Xₖ|ₓᵢ","Max marginal effect (logit): at P = 0.5 → ME = βₖ/4"],det:["Model coefficients βₖ","Evaluation point (mean vs individual)","P value at evaluation point"],eff:["Substantive interpretation","Policy-relevant effect sizes","Comparison across models"],chains:["βₖ (raw) → P at evaluation point → ME = βₖ·P(1−P) [logit] or φ(Xβ)·βₖ [probit]"],intuition:"Marginal effect answers: 'By how many percentage points does P change if Xₖ goes up by 1?' The answer depends on where you are on the S-curve — biggest at P=0.5, smallest near P=0 or P=1.",tip:"AME is often preferred over 'at mean' because 'the mean person' may not exist. Report both if asked. Note: ME problems — often only crude approximation of true effects."},
  PSEUDO_R2:{name:"Pseudo R² — Goodness of Fit",desc:"Since regular R² doesn't work well for binary models, several pseudo R² measures exist. None is a perfect analog to linear R².",eqs:["McFadden: R²_MF = 1 − ln L / ln L₀","Efron: R²_E = 1 − Σ(Yᵢ−P̂ᵢ)²/Σ(Yᵢ−Ȳ)² ∈ [0,1]","Count R² = # correct / N","Max Likelihood Pseudo R² = 1 − e^(−2(ln L − ln L₀)/N)","McFadden's R² Snell interpretation: 0.2-0.4 = good fit"],det:["Log-likelihood of fitted model","Log-likelihood of null model","Predicted probabilities"],eff:["Model comparison","Fit assessment","AIC/BIC alternatives"],intuition:"Pseudo R² measures 'how much better is our model than just predicting the overall mean.' McFadden's R² of 0.2-0.4 is considered a strong result — don't compare it to linear R².",tip:"Classification table + Pseudo R² together give a fuller picture. Report McFadden AND Count R². Pseudo R² = 0.3 in logit is roughly equivalent to R² = 0.6 in linear regression."},
  LR_TEST:{name:"LR Test — Likelihood Ratio Test",desc:"Tests whether adding variables improves the model. Compares <b>restricted</b> (fewer variables) vs <b>unrestricted</b> (more variables) models. The test statistic follows χ² distribution. Can test single coefficients, subsets, or overall model significance.",eqs:["LR = −2[ln L(Mᵣ) − ln L(Mᵤ)] ~ χ²(q)","q = number of restrictions","Overall: H₀: β₁ = β₂ = ... = βₘ = 0","Single: H₀: βₖ = 0","Subset: H₀: βⱼ = βₖ = ... = 0","Equality: H₀: βⱼ = βₖ"],det:["Nested models (restricted ⊂ unrestricted)","Log-likelihoods of both models","Degrees of freedom q"],eff:["Variable selection","Model comparison","Overall significance"],chains:["Nested models → compute log-likelihoods → LR stat → compare to χ²(q) → reject/fail to reject"],intuition:"LR test asks: 'Does adding these variables significantly improve how well the data fits?' A large LR statistic means yes — the restricted model is missing something important.",tip:"LR test requires nested models. Always specify: (1) M₁ (restricted), (2) M₂ (unrestricted), (3) q = restrictions count, (4) LR stat, (5) compare to χ²_α(q)."},
  DEVIANCE:{name:"Deviance — Model Fit Statistic",desc:"Deviance = −2 ln(L̂/Lₛ) = −2[ln L̂ − ln Lₛ] where Lₛ is the saturated model. Measures distance from the 'perfect' model. For overall GOF: D > χ²_α(J−m−1) → reject model fit.",eqs:["D = −2 Σ [Yᵢ ln(Ŷᵢ/Yᵢ) + (1−Yᵢ)ln((1−Ŷᵢ)/(1−Yᵢ))]","= −2 ln(L(β̂)/L(saturated))","df = J − m − 1","Overall GOF: D > χ²_α(df) → poor fit"],det:["Estimated model log-likelihood","Saturated model log-likelihood","Covariate patterns J"],eff:["Overall model fit test","Compared to Pearson χ²","AIC/BIC calculations"],intuition:"Deviance measures how far your model is from 'perfect prediction.' A small deviance means your model closely reproduces the observed data.",tip:"Deviance GOF test: H₀ = model fits. Reject if D > χ²_critical. Note: requires grouped data (covariate patterns), not individual observations."},
  PEARSON:{name:"Pearson χ² — GOF Statistic",desc:"Alternative to Deviance for testing overall model fit. Based on <b>observed vs predicted proportions</b> across covariate patterns. Both should give similar results asymptotically.",eqs:["χ² = Σⱼ nⱼ(ȳⱼ − π̂ⱼ)²/[π̂ⱼ(1−π̂ⱼ)]","rⱼ = Pearson residual = (ȳⱼ−π̂ⱼ)/√[π̂ⱼ(1−π̂ⱼ)/nⱼ]","χ² = Σ rⱼ² ~ χ²(J−m−1)","J = # covariate patterns","nⱼ = # obs in pattern j"],det:["Observed proportions ȳⱼ","Predicted probabilities π̂ⱼ","Covariate patterns"],eff:["Model adequacy assessment","Alternative to Deviance","Distinct covariate patterns important"],intuition:"Pearson χ² compares what the model predicts vs what actually happened, pattern by pattern. Large discrepancies suggest the model is missing something.",tip:"Both Pearson χ² and Deviance test the same hypothesis but use different metrics. Report both. Need distinct covariate patterns for valid test."},
  RESID:{name:"Residuals & Influence Diagnostics",desc:"For binary models: <b>Pearson residual</b> = (Yᵢ−π̂ᵢ)/√[π̂ᵢ(1−π̂ᵢ)]. <b>Deviance residual</b> based on contribution to deviance. <b>Influence</b> measures: Cook's distance (Δβ̂ᵢ), leverage (hᵢᵢ), DFBETA. Outliers can distort MLE estimates.",eqs:["Pearson: rᵢ = (Yᵢ−π̂ᵢ)/√[π̂ᵢ(1−π̂ᵢ)]","Standardized: rₛ = rᵢ/√(1−hᵢᵢ)","Cook's: ΔB̂ᵢ = rₛ² · hᵢᵢ/(1−hᵢᵢ)","Leverage: hᵢᵢ → 'atypical' X values","V(rᵢ) = π̂ᵢ(1−π̂ᵢ) → heteroscedastic"],det:["Predicted probabilities π̂ᵢ","Hat matrix diagonal hᵢᵢ"],eff:["Identify influential observations","Model robustness check","Outlier detection"],intuition:"Residuals tell you which observations your model gets wrong. Influence tells you which observations are pulling the model toward them disproportionately.",tip:"What to do about outliers: (1) look closer at the data, (2) check for errors, (3) compare models with/without outliers, (4) main result shouldn't change."},
  SPEC:{name:"Model Specification Tests",desc:"<b>Link test</b>: regress Y on Ŷ and Ŷ² — if Ŷ² is significant, model is misspecified. <b>Ramsey RESET</b>: add powers of Ŷ to test omitted nonlinearity. <b>Also</b>: omitted variable, non-additivity (interaction terms), nonlinear effects.",eqs:["Link test: logit(P) = γ₁Ŷ + γ₂Ŷ²","H₀: γ₂ = 0 (correct specification)","RESET: add Ŷ², Ŷ³ to model","Test spec: R² ≈ 0% → add variables/nonlinear"],det:["Predicted values Ŷ","Functional form assumptions","Variable completeness"],eff:["Variable addition","Transformation (log, polynomial)","Interaction terms"],intuition:"Specification tests ask: 'Is my model the right shape?' If adding Ŷ² matters, it means the true relationship has curvature your linear model misses.",tip:"Always run link test after fitting logit/probit. If Ŷ² significant → add nonlinear terms, interaction terms, or try different functional form."},
  NONLIN:{name:"Nonlinear Effects & Interactions",desc:"<b>Polynomials</b>: Xₖ² captures U-shaped or inverted-U relationships. <b>Interactions</b>: X₁·X₂ means the effect of X₁ depends on X₂. <b>Dummy variables</b>: categorical predictors as 0/1 indicators (K categories → K−1 dummies, reference group).",eqs:["Polynomial: Y = β₀ + β₁X + β₂X² + u","Interaction: Y = β₀ + β₁X₁ + β₂X₂ + β₃X₁X₂ + u","Dummy: Xⱼ = 1 if category j, 0 otherwise","Non-additivity: effect of X₁ on log odds depends on X₂"],det:["Theory suggests nonlinearity","Interaction hypotheses","Categorical variables"],eff:["Better model specification","Captures complex relationships","Different marginal effects by group"],intuition:"Real relationships are rarely purely linear. Adding X² lets the effect bend. Interactions let one variable modify another's effect — like how education's effect on income might differ by gender.",tip:"In logit: nonlinear effects on log odds → even more complex effects on probability. Always interpret marginal effects, not raw coefficients."},
  BERNOULLI:{name:"Bernoulli Distribution",desc:"Y follows a Bernoulli distribution: Y = 1 (event) with probability π, Y = 0 (no event) with probability 1−π. This is the <b>foundation</b> of all binary choice models.",eqs:["Y ~ Bernoulli(π)","P(Y=1) = π, P(Y=0) = 1−π","E(Y) = π","Var(Y) = π(1−π)","f(y) = πʸ(1−π)¹⁻ʸ"],det:["Binary outcome","Success probability π"],eff:["Motivates LPM, Logit, Probit","Variance depends on π → heteroscedasticity"],intuition:"Bernoulli is the simplest random experiment: flip a coin. Heads (Y=1) with probability π, tails (Y=0) with probability 1−π.",tip:"State this first when setting up any binary choice model. It explains why LPM has inherent heteroscedasticity: Var(Y) = π(1−π) depends on X through π."},
  DATA_X:{name:"Data Types in Econometrics",desc:"<b>Cross-section</b>: multiple units at one time point. <b>Time series</b>: one unit over many time points. <b>Panel data</b>: multiple units over multiple time points. CSPD course focuses on cross-section binary choice models.",eqs:["Cross-section: i = 1,...,N (one period)","Time series: t = 1,...,T (one unit)","Panel: (i,t) for i=1,...,N and t=1,...,T"],det:["Research question","Data availability","Unit of analysis"],eff:["Determines estimation method","Affects assumption violations (autocorrelation etc.)","Panel → FE/RE models"],intuition:"Think of cross-section as a photograph (snapshot of many people at one time), time series as a movie of one person, and panel data as a movie of many people.",tip:"For this course: mostly cross-section with binary Y. Panel data methods come later."},
  OLOGIT:{name:"Ordered Logit (ologit)",desc:"Extends binary logit to <b>ordered categorical</b> outcomes with M>2 categories. Uses logistic CDF and the same latent variable structure: y*=Xβ+ε, observed y=j if γ_{j-1}<y*≤γ_j. One common β vector across all cumulative splits (<b>parallel regression assumption</b>).",eqs:["y* = x'β + ε, ε ~ Logistic","y = j if γ_{j-1} < y* ≤ γ_j","Pr(y≤m|x) = Λ(τ_m − xβ)","Pr(y=m|x) = Λ(τ_m−xβ) − Λ(τ_{m-1}−xβ)"],det:["Ordered dependent variable","Logistic disturbance assumption","Parallel regression assumption holds"],eff:["Category probabilities","Cumulative odds ratios","Cutpoint estimates"],chains:["Xβ → latent y* → crosses cutpoints → observed ordered category"],intuition:"Imagine a continuous 'propensity' scale cut into intervals by thresholds. Each person falls into the interval matching their propensity level.",tip:"In Stata: ologit y x1 x2. Cutpoints are reported as _cut1, _cut2, etc. A positive coefficient means higher latent y* → more likely to be in highest category."},
  OPROBIT:{name:"Ordered Probit (oprobit)",desc:"Same as ordered logit but uses <b>normal CDF</b> instead of logistic. Latent variable y*=Xβ+ε with ε~N(0,1). Category probabilities use Φ (standard normal CDF) instead of Λ.",eqs:["y* = x'β + ε, ε ~ N(0,1)","P(y=1|x) = Φ(−x'β)","P(y=2|x) = Φ(γ−x'β) − Φ(−x'β)","P(y=3|x) = 1 − Φ(γ−x'β)"],det:["Ordered dependent variable","Normal disturbance assumption"],eff:["Category probabilities via Φ","Latent variable interpretation"],intuition:"Same threshold logic as ordered logit. The only difference is the bell shape (normal) vs slightly heavier tails (logistic) of the error distribution.",tip:"In Stata: oprobit y x1 x2. Coefficients will be smaller than ologit by factor ~1.81 (same as binary case). Predicted probabilities should be very similar."},
  CUTPOINT:{name:"Cutpoints / Thresholds (γ)",desc:"The <b>boundaries</b> on the latent scale that map the continuous y* into observed ordered categories. For M categories, there are M−1 estimated cutpoints (with γ₀=−∞ and γ_M=+∞). One cutpoint is normalized (usually γ₁=0) to fix the <b>location</b> of the latent scale.",eqs:["γ₀ = −∞, γ₁ = 0 (normalized), γ₂, ..., γ_{M-1}, γ_M = +∞","y = j if γ_{j-1} < y* ≤ γ_j","Estimated jointly with β via MLE"],det:["Number of categories M","Normalization choice","Data distribution"],eff:["Map latent scale → observed categories","Determine category probabilities","Must be ordered: γ₁ < γ₂ < ... < γ_{M-1}"],intuition:"Cutpoints are like grade boundaries: 0-59=F, 60-69=D, 70-79=C, 80-89=B, 90-100=A. The latent variable is the 'score', cutpoints are the grade boundaries.",tip:"In Stata output, cutpoints appear as _cut1, _cut2, etc. They are NOT coefficients — they are threshold parameters. Do not interpret them like slopes."},
  PARALLEL:{name:"Parallel Regression Assumption",desc:"The <b>key structural restriction</b> of ordered logit/probit: the slope vector β is the <b>same</b> across all cumulative binary splits. Equivalent to saying the probability curves for different cumulative cuts are parallel (shifted only by thresholds, not by different slopes).",eqs:["Pr(y≤m|x) = F(τ_m − xβ) for all m","Same β for every m — only τ_m changes","Equivalent to J−1 binary models with common slopes"],det:["Model structure","Whether regressors affect all category boundaries equally"],eff:["If holds: parsimonious model, valid inference","If violated: consider generalized ordered logit, multinomial logit, or stereotype model"],intuition:"The model assumes that education affects the boundary between 'disagree' and 'neutral' in the SAME way as it affects the boundary between 'neutral' and 'agree.' If this is not true, the model is misspecified.",tip:"Always test this! In Stata: brant test (for ologit). If rejected, consider gologit2 (generalized ordered logit) as an alternative."},
  RUTIL:{name:"Random Utility Model",desc:"Foundation of all unordered choice models. Each alternative j gives utility U_ij = μ_ij + ε_ij to person i. Person chooses the alternative with <b>highest utility</b>. We never observe utility directly — only the chosen alternative.",eqs:["U_ij = μ_ij + ε_ij","y_i = j if U_ij = max{U_i1,...,U_iM}","P(y=j) = P(U_ij > U_ik ∀k≠j)","Under Type I Extreme Value ε: P_j = exp(μ_j)/Σ exp(μ_h)"],det:["Multiple unordered alternatives","Utility decomposition","Distributional assumption on ε"],eff:["Conditional logit","Multinomial logit","Nested logit","Multinomial probit"],chains:["Alternatives → utility per alternative → max utility → observed choice → probability via distributional assumption"],intuition:"People choose what seems best to them. Some of what drives their choice is observable (price, time), some is not (taste, mood). The random utility model formalizes this common-sense idea.",tip:"Always start your exam answer with the random utility framework: U = μ + ε, choose max U. Then specialize to CLM or MNL depending on what x measures."},
  CLM:{name:"Conditional Logit Model (CLM)",desc:"Multinomial logit model where regressors are <b>alternative-specific</b> (vary by alternative j). Coefficient vector β is <b>common</b> across alternatives. Used when choice depends on features of the options (price, time, quality).",eqs:["μ_ij = x_ij'β (x has j subscript, β common)","P(y=j) = exp(x_ij'β) / Σ exp(x_ih'β)","Own ME: P_j(1−P_j)·β_k","Cross ME: −P_j·P_h·β_k (h≠j)","Value of time: β_time/β_cost"],det:["Alternative-specific regressors","Common coefficient vector","Independence of errors → IIA"],eff:["Choice probabilities per alternative","Own and cross marginal effects","Willingness-to-pay (ratio of coefficients)"],chains:["Alternative attributes → x_ij → common β → utility → softmax → probabilities"],intuition:"CLM answers: 'How do the features of each option affect which one gets chosen?' If bus becomes slower, its probability drops and other modes gain — that is the own vs cross effect logic.",tip:"In Stata: clogit choice x1 x2, group(id). The key output: common β across alternatives. Ratio β_time/β_cost = WTP for time savings."},
  MNL:{name:"Multinomial Logit Model (MNL)",desc:"Multinomial logit where regressors are <b>individual-specific</b> (person characteristics like age, income). Coefficient vector β_j <b>varies by alternative</b>. One alternative normalized as base (β₁=0).",eqs:["μ_ij = x_i'β_j (no j on x, β varies by j)","P(y=j) = exp(x_i'β_j) / [1 + Σ exp(x_i'β_h)]","β₁ = 0 (base normalization)","Log-odds: ln[P(j)/P(0)] = x_i'β_j","OR relative to base: exp(x_i'β_j)"],det:["Individual-specific regressors","Alternative-specific coefficients","Base category normalization"],eff:["Log-odds relative to base","Odds ratios per alternative","Predicted choice probabilities"],chains:["Person characteristics → alternative-specific β_j → utility per alt → softmax → probabilities"],intuition:"MNL answers: 'How do personal characteristics affect which option someone chooses?' Higher income may raise odds of private insurance over public — the coefficient β_j tells you by how much for each alternative.",tip:"In Stata: mlogit y x1 x2, base(1). Interpret via odds ratios: 'A 1-unit increase in x_k multiplies the odds of alt j vs base by exp(β_jk).'"},
  IIA:{name:"IIA — Independence of Irrelevant Alternatives",desc:"The most important assumption restriction of logit-based multinomial models. Says the <b>relative odds</b> of any two alternatives are unaffected by the presence, absence, or characteristics of other alternatives. Consequence of independent extreme-value errors.",eqs:["P(j)/P(k) = exp(μ_j)/exp(μ_k) — no dependence on other alternatives","Implies proportional substitution across all alternatives","If IIA violated → MNL/CLM estimates are biased and inconsistent","Hausman-McFadden test: compare full vs restricted choice sets"],det:["Independence of disturbances ε_ij","No close substitutes among alternatives"],eff:["If holds: elegant closed-form probabilities, easy estimation","If violated: biased estimates, need MNP or nested logit"],chains:["Independent ε → IIA → proportional substitution → unrealistic for close substitutes → need alternatives"],intuition:"IIA says: 'If you prefer coffee to tea 2:1, you still prefer coffee to tea 2:1 even if juice is added.' But if juice is similar to coffee, it should mainly steal from coffee — IIA does not allow this.",tip:"The red bus / blue bus example is the classic IIA violation. Adding a close substitute should NOT cause proportional substitution from ALL alternatives. If IIA fails, move to MNP or nested logit."},
  MNP:{name:"Multinomial Probit (MNP)",desc:"Replaces independent extreme-value errors with <b>jointly normal errors</b>: ε_i ~ N(0, Σ). The flexible covariance Σ allows <b>correlated alternatives</b>, breaking IIA. Much more general but computationally hard — requires simulation (GHK simulator).",eqs:["U_ij = x_ij'β + ε_ij, ε_i ~ N(0, Σ)","P(choice=q) = P(U_iq > U_ij ∀j≠q)","Requires (J−1)-variate normal integration","If Σ = I → results ≈ MNL (IIA holds)","Flexible Σ → correlated alternatives → IIA broken"],det:["Joint normal assumption","Full covariance matrix Σ","Simulation-based estimation"],eff:["Flexible substitution patterns","No IIA restriction","Can capture correlated preferences"],chains:["Correlated ε → Σ ≠ I → alternatives share unobservables → IIA broken → more realistic but harder"],intuition:"If someone who likes red bus also likes blue bus (correlated tastes), MNP captures that through Σ. Standard MNL cannot — it forces preferences to be independent across options.",tip:"MNP is the 'gold standard' for flexibility but rarely used in practice because of computational cost. Know it exists and WHY it relaxes IIA (correlated ε via Σ)."},
  NLOGIT:{name:"Nested Logit",desc:"Groups alternatives into <b>branches (nests)</b>. IIA holds <b>within each nest</b> but is relaxed <b>across nests</b>. A practical middle ground between MNL (too restrictive) and MNP (too complex). Requires defining a tree structure.",eqs:["Tree: e.g., Private(car) vs Public(train, bus)","P_ijb = exp(x'β + z'γ) / ΣΣ exp(...)","Two-step estimation: (1) within-branch logit, (2) branch-level with inclusive values","Or: FIML joint estimation"],det:["Natural grouping of alternatives","Within vs between branch substitution","Nesting parameter τ"],eff:["Partial IIA relaxation","Stronger substitution within nests","More realistic for grouped choices"],chains:["Define nests → within-branch logit (IIA ok) → inclusive values → branch choice → unconditional probabilities"],intuition:"Train and bus are both public transport — they are more similar to each other than to car. Nested logit lets them be 'closer substitutes' within the public transport nest, while car is in a separate private nest.",tip:"Main weakness: YOU must choose the tree structure, and there is no good test for comparing different trees. Results may depend on how branches are defined. State this limitation in exams."},
  POISSON:{name:"Poisson Regression",desc:"Count-data model where $P(y|x) = e^{-\\lambda}\\lambda^y/y!$ with $\\lambda = \\exp(x'\\beta)$. Elegant: one parameter determines entire distribution. But imposes <b>equidispersion</b> (Var = Mean), which rarely holds. Can still be useful as QMLE for the mean with robust SEs.",eqs:["E(y|x) = λ = exp(x'β)","P(y) = e^(-λ)λ^y / y!","Var(y|x) = λ (equidispersion)","ln L = Σ[-exp(x'β) + y(x'β) − ln(y!)]","Factor change = exp(β_k), % change = 100[exp(β_k)−1]"],det:["Count outcome y ≥ 0","Exponential mean specification","Equidispersion assumption"],eff:["Coefficient estimates via MLE","Factor/percent change interpretation","Marginal effect = E(y|x)·β_k"],chains:["Count Y → exp(x'β) mean → Poisson MLE → check overdispersion → if rejected → NegBin"],intuition:"Poisson is the 'normal distribution of count data.' It is the natural starting point, but its equidispersion restriction (variance = mean) is almost always too restrictive in real data.",tip:"Always test for overdispersion after fitting Poisson. Even if Poisson is rejected as a distribution, it can still work as QMLE for the mean — just use robust SEs."},
  NEGBIN:{name:"Negative Binomial Model",desc:"Relaxes Poisson equidispersion while keeping the same mean: $E(y|x) = \\exp(x'\\beta)$. Two versions: <b>NegBin I</b> (constant proportional overdispersion) and <b>NegBin II</b> (overdispersion grows with mean, preferred). Coefficient interpretation is identical to Poisson (factor/percent change).",eqs:["E(y|x) = exp(x'β) (same mean as Poisson)","NB I: Var = (1+δ²)λ","NB II: Var = (1+α²λ)λ","Test: LR of α=0 → reject if G² > 2.71 (boundary)","Coefficients interpreted same way as Poisson"],det:["Evidence of overdispersion","Count data with Var > Mean","Choice between NB I and NB II"],eff:["Handles overdispersion","More reliable standard errors","Preferred over Poisson when Var > Mean"],chains:["Overdispersion detected → NegBin → test α=0 → if rejected → NegBin preferred → NB II usually best"],intuition:"NegBin is 'Poisson with extra flexibility.' The mean model is the same — what changes is the variance. This gives more honest standard errors when data is more dispersed than Poisson allows.",tip:"NegBin II is preferred: (1) more flexible variance, (2) robust to variance misspecification, (3) usually higher log-likelihood. The boundary test uses 2.71 not 3.84 — exam-worthy!"},
};

Object.entries(NODES).forEach(([k,n])=>{const c=MC[n.m]||MC.catA;const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('class','node');g.dataset.key=k;g.style.cursor='pointer';

}else if(tab==='connections'){
  const iN=ADJ[k].inn,oN=ADJ[k].out;

  if(d.chains?.length){h+=`<div class="sec"><div class="sec-title">Full transmission mechanisms</div><ul class="slist chain">`;d.chains.forEach(c=>h+=`<li>${c}</li>`);h+=`</ul></div>`}

const WEEKS={
  week1:{title:"Week 1–2 — OLS Review & Basic Statistics",subtitle:"Foundations · OLS Assumptions · Gauss-Markov · PDF/CDF · PRL/SRF",sections:[
    {head:"OLS Method",num:"1",cards:[
      {title:"The OLS Estimator",content:'<p>OLS minimizes the <span class="wk-key">sum of squared residuals</span> Σûᵢ² to find the best-fitting line through the data.</p><div class="wk-formula">min Σ(Yᵢ − β₀ − β₁X₁ᵢ − ... − βₘXₘᵢ)²\nβ̂ = (X\'X)⁻¹X\'Y\nσ̂² = Σûᵢ² / (n − k)</div><p>The stochastic/error term captures everything not in the model: <span class="wk-key">Yᵢ = β₀ + β₁Xᵢ + uᵢ</span>. The model yg baik itu "workhorse" dari ekonometri — simple tapi kalau assumption-nya hold, hasilnya sangat powerful.</p><div class="wk-highlight">💡 OLS baru one way: based on theory/common sense, maka masukan X → Y. OLS based on logical reasoning.</div>'},
      {title:"Population vs Sample Regression",content:'<p><span class="wk-key">PRL</span> (Population Regression Line): E(Y|X) = β₀ + β₁X — ini yg mau kita tahu tapi gak bisa observe langsung.</p><p><span class="wk-key">SRF</span> (Sample Regression Function): Ŷᵢ = β̂₀ + β̂₁Xᵢ — estimasi dari data.</p><div class="wk-formula">PRL: Yᵢ = β₀ + β₁Xᵢ + uᵢ  (uᵢ = stochastic error, unobservable)\nSRF: Ŷᵢ = β̂₀ + β̂₁Xᵢ      (ûᵢ = Yᵢ − Ŷᵢ = residual, observable)</div><div class="wk-exam">📝 Key distinction: uᵢ is the population error (never observed), ûᵢ is the sample residual (computed from data). Never confuse these in exam!</div>'},
    ]},
    {head:"OLS Assumptions (A1–A9)",num:"2",cards:[
      {title:"The Nine Classical Assumptions",content:'<p>These 9 assumptions guarantee OLS is <span class="wk-key">BLUE</span> (Best Linear Unbiased Estimator):</p><table class="wk-table"><tr><th>#</th><th>Assumption</th><th>Violation Consequence</th></tr><tr><td>A1</td><td>Linear in parameters</td><td>Wrong functional form</td></tr><tr><td>A2</td><td>Fixed X values (not multiplied/divided by other variable)</td><td>Endogeneity</td></tr><tr><td>A3</td><td>Zero mean of disturbance: E(uᵢ|Xᵢ) = 0</td><td>Biased β̂</td></tr><tr><td>A4</td><td>Homoscedasticity: Var(uᵢ) = σ²</td><td>Inefficient, wrong SEs</td></tr><tr><td>A5</td><td>No autocorrelation: Cov(uᵢ,uⱼ) = 0</td><td>Inefficient, wrong SEs</td></tr><tr><td>A6</td><td>Cov(uᵢ,Xᵢ) = 0</td><td>Biased β̂</td></tr><tr><td>A7</td><td>n > k (enough observations)</td><td>Cannot estimate</td></tr><tr><td>A8</td><td>No exact multicollinearity</td><td>Cannot invert X\'X</td></tr><tr><td>A9</td><td>No specification bias</td><td>Biased & inconsistent</td></tr></table><div class="wk-highlight">💡 A perfect multicollinearity → exact statistics (test statistik kalau variable-nya perfectly correlated, bisa dapet parameter yg unik → tidak ada kemungkinan bias).</div>'},
    ]},
    {head:"Basic Statistics Review",num:"3",cards:[
      {title:"PDF, CDF & Expected Value",content:'<p><span class="wk-key">PDF</span> (Probability Density Function): f(x) ≥ 0, ∫f(x)dx = 1. Bisa discrete (PMF) atau continuous.</p><p><span class="wk-key">CDF</span> (Cumulative Distribution Function): F(x) = P(X ≤ x). Untuk continuous: F(x) = ∫₋∞ˣ f(t)dt.</p><div class="wk-formula">E(X) = ∫x·f(x)dx = expected value (populasi mean)\nVar(X) = E(X²) − [E(X)]²\nFor discrete: E(X) = Σ xᵢ·P(xᵢ)</div><div class="wk-highlight">💡 Discrete → PDF gives probabilities (bars). Continuous → PDF gives density (area under curve = probability). CDF always goes from 0 to 1, monotonically increasing.</div>'},
      {title:"Normal Distribution",content:'<p>The <span class="wk-key">Normal distribution</span> N(μ, σ²) is critical for inference. Its PDF is the bell curve, CDF is the S-curve (Φ).</p><div class="wk-formula">f(x) = (1/σ√2π) · exp{−½((x−μ)/σ)²}\nF(x) = Φ((x−μ)/σ)\nStandard normal: Z ~ N(0,1)</div><p>Properties: symmetric around μ, 68-95-99.7 rule, sum of normals is normal.</p>'},
    ]},
    {head:"Gauss-Markov Theorem",num:"4",cards:[
      {title:"BLUE Property",content:'<p>If OLS assumptions A1–A9 hold, then OLS is <span class="wk-key">BLUE</span>:</p><ul><li><b>B</b>est = minimum variance</li><li><b>L</b>inear = linear function of Y</li><li><b>U</b>nbiased = E(β̂) = β</li><li><b>E</b>stimator = rule mapping data → estimate</li></ul><div class="wk-formula">E(β̂) = β           (unbiased)\nVar(β̂) ≤ Var(β̃)   (for any other linear unbiased β̃)</div><div class="wk-exam">📝 Even given Monte Carlo simulation, min variance, linear, repeated sampling → OLS estimators are BLUE. State ALL 4 components when asked!</div>'},
    ]},
  ]},
  week2:{title:"Week 3 — MLE Method",subtitle:"PPT: Review on Maximum Likelihood Estimation · PRF/SRF Review · Likelihood · Log-Likelihood · IID · MLE = OLS · Hessian · Inference · LR Tests",sections:[
    {head:"PRF & SRF Review (from PPT)",num:"1",cards:[
      {title:"Population Regression Function (PRF)",content:'<p>The <span class="wk-key">PRF</span> tells us the average value of $Y$ for a given $X$:</p><div class="wk-formula">$$E(Y|X_i) = f(X_i)$$</div><p>In the linear case: $E(Y|X_i) = \\beta_1 + \\beta_2 X_i$. This is the <b>true relationship</b> we want to recover but can never directly observe.</p><p>From the PPT income-consumption example: at $X=140$, the conditional mean $E(Y|X=140) = 101$, while the unconditional mean across all 60 families is 121.20 — these are different questions.</p><div class="wk-highlight">💡 <b>Conditional mean</b> asks: "What is average Y for families with THIS specific income?" <b>Unconditional mean</b> asks: "What is average Y for ALL families?" Regression is about conditional means — this distinction is crucial.</div>'},
      {title:"Stochastic Error Term",content:'<p>Individual observations deviate from the conditional mean:</p><div class="wk-formula">$$Y_i = E(Y|X_i) + u_i = \\beta_1 + \\beta_2 X_i + u_i$$</div><p>where $Y_i$ = actual outcome, $\\beta_1 + \\beta_2 X_i$ = systematic part (what the model explains), and $u_i$ = stochastic disturbance (what it does not explain).</p><p><b>Why does $u_i$ exist?</b> (1) Incomplete theory, (2) unavailable data, (3) intrinsic randomness in human behavior, (4) measurement error, (5) parsimony, (6) wrong functional form.</p><div class="wk-formula">$$E(u_i | X_i) = 0$$</div><p>This is the <b>most important assumption</b>: for a given $X$, the average error is zero. If violated → systematic bias → endogeneity.</p>'},
      {title:"Sample Regression Function (SRF) & Residuals",content:'<p>We estimate the PRF using the <span class="wk-key">SRF</span>:</p><div class="wk-formula">$$\\hat{Y}_i = \\hat{\\beta}_1 + \\hat{\\beta}_2 X_i \\qquad \\hat{u}_i = Y_i - \\hat{Y}_i$$</div><p><b>Critical distinction:</b></p><table class="wk-table"><tr><th>Symbol</th><th>Name</th><th>Observable?</th><th>Lives in</th></tr><tr><td>$u_i$</td><td>Stochastic error</td><td>No — never</td><td>Population</td></tr><tr><td>$\\hat{u}_i$</td><td>Residual</td><td>Yes — computed</td><td>Sample</td></tr></table><p>The PPT shows: different random samples from the same population give <b>different</b> SRFs. This is WHY statistics exists — estimators are random variables.</p><div class="wk-exam">📝 Never confuse $u_i$ (population error, unobservable) with $\\hat{u}_i$ (sample residual, observable). Assumptions are about $u_i$; diagnostics use $\\hat{u}_i$.</div>'},
      {title:"Linearity — Variables vs Parameters",content:'<p>A common exam trap from the PPT:</p><table class="wk-table"><tr><th>Type</th><th>Meaning</th><th>Example</th></tr><tr><td>Linear in variables</td><td>$X$ appears only to the first power, not multiplied by other variables</td><td>$Y = \\beta_1 + \\beta_2 X$ ✓</td></tr><tr><td>Linear in parameters</td><td>$\\beta$ appears only to the first power, not multiplied by each other</td><td>$Y = \\beta_1 + \\beta_2 X^2$ ✓ (linear in params!)</td></tr></table><p>$Y = \\beta_1 + \\beta_2^2 X$ is NOT linear in parameters (because $\\beta_2$ is squared).</p><div class="wk-highlight">💡 Econometrics cares about <b>linearity in parameters</b>. So $Y = \\beta_1 + \\beta_2 X^2$ IS a linear regression model. OLS and Gauss-Markov still apply!</div>'},
    ]},
    {head:"The MLE Framework",num:"2",cards:[
      {title:"Core Intuition: Which θ Makes Data Most Probable?",content:'<p><span class="wk-key">MLE</span> asks: <i>"Given the data I observed, which parameter value would make that observation most plausible?"</i></p><p>For a random sample $Y_1, \\ldots, Y_n$ from pdf $f(y; \\theta)$, under <span class="wk-key">IID</span> (identical and independently distributed):</p><div class="wk-formula">$$L(\\theta | y_1, \\ldots, y_n) = \\prod_{i=1}^{n} f(y_i; \\theta)$$</div><p><b>What each part means:</b></p><ul><li>$L(\\theta)$ = the <b>likelihood function</b> — same formula as the joint density, but now we treat data as fixed and $\\theta$ as the unknown</li><li>$\\prod$ = product over all observations — because IID lets us multiply individual densities</li><li>$f(y_i; \\theta)$ = probability of observing $y_i$ under parameter $\\theta$</li></ul><div class="wk-highlight">💡 The likelihood is NOT a probability of $\\theta$. It is the probability of the DATA, viewed as a function of $\\theta$. We find the $\\theta$ that maximizes it.</div>'},
      {title:"Log-Likelihood: Why We Take Logs",content:'<p>We maximize $\\ln L$ instead of $L$:</p><div class="wk-formula">$$\\ln L(\\theta) = \\sum_{i=1}^{n} \\ln f(y_i; \\theta)$$</div><p><b>Four reasons to use log:</b></p><ol><li><b>Products → Sums:</b> $\\ln(a \\cdot b) = \\ln a + \\ln b$ — sums are MUCH easier to differentiate</li><li><b>Same maximizer:</b> $\\ln$ is monotonically increasing, so $\\arg\\max L = \\arg\\max \\ln L$</li><li><b>Numerical stability:</b> products of small numbers → underflow; sums of logs stay finite</li><li><b>In econometrics:</b> we use $\\ln$ (natural log), and $\\exp(\\cdot)$ is the inverse: $e^{\\ln x} = x$</li></ol>'},
      {title:"Conditional MLE with Regressors (Wooldridge Version)",content:'<p>When we have explanatory variables, the PPT gives the general conditional form:</p><div class="wk-formula">$$\\max_b \\sum_{i=1}^{n} \\log f(y_i | x_i, b)$$</div><p>This is the form used for logit, probit, Tobit, and all nonlinear econometric models. We choose parameter vector $b$ to maximize the <b>conditional</b> log-likelihood of $Y$ given $X$.</p><div class="wk-exam">📝 This is the "master formula" of the course. Everything from logit to probit to count models starts here — only the specific $f(y|x,b)$ changes.</div>'},
    ]},
    {head:"MLE for Linear Regression: MLE = OLS",num:"3",cards:[
      {title:"Setting Up the Normal Likelihood",content:'<p>Given: $Y_i = X_i\'\\beta + \\varepsilon_i$ with $\\varepsilon_i \\sim N(0, \\sigma^2)$ independently. Then $Y_i | X_i \\sim N(X_i\'\\beta, \\sigma^2)$.</p><div class="wk-formula">$$f(Y_i | X_i\'\\beta, \\sigma) = \\frac{1}{\\sigma\\sqrt{2\\pi}} \\exp\\left[-\\frac{1}{2}\\left(\\frac{Y_i - X_i\'\\beta}{\\sigma}\\right)^2\\right]$$</div><p><b>Each part:</b> $(Y_i - X_i\'\\beta)$ = deviation from mean, divided by $\\sigma$ = standardization, squared and in exponent = bell-curve shape, front factor = normalization so total area = 1.</p>'},
      {title:"The Key Result: MLE β̂ = OLS β̂",content:'<p>The likelihood for the full sample:</p><div class="wk-formula">$$L(\\beta, \\sigma^2) = \\frac{1}{\\sigma^n (2\\pi)^{n/2}} \\exp\\left[-\\frac{1}{2\\sigma^2} \\sum_{i=1}^{n}(Y_i - X_i\'\\beta)^2\\right]$$</div><p>Taking log and differentiating w.r.t. $\\beta$:</p><div class="wk-formula">$$\\ln L = -\\frac{n}{2}\\ln(2\\pi) - \\frac{n}{2}\\ln(\\sigma^2) - \\frac{1}{2\\sigma^2}\\sum(Y_i - X_i\'\\beta)^2$$</div><p>The only term involving $\\beta$ is $-\\frac{1}{2\\sigma^2}\\sum(Y_i - X_i\'\\beta)^2$. Maximizing $\\ln L$ w.r.t. $\\beta$ is equivalent to <b>minimizing $\\sum(Y_i - X_i\'\\beta)^2$</b> — which is exactly OLS!</p><div class="wk-highlight">💡 <b>Under normal errors, MLE for $\\beta$ is identical to OLS.</b> This is one of the most important links in econometrics. It means OLS is not just "convenient" — it is the maximum likelihood estimator when errors are normal.</div>'},
      {title:"MLE Variance Estimator: Biased!",content:'<p>For $\\sigma^2$, MLE gives:</p><div class="wk-formula">$$\\hat{\\sigma}^2_{ML} = \\frac{1}{n}\\sum_{i=1}^n \\hat{u}_i^2$$</div><p>But the unbiased OLS estimator is:</p><div class="wk-formula">$$\\hat{\\sigma}^2_{\\text{unbiased}} = \\frac{1}{n-k}\\sum_{i=1}^n \\hat{u}_i^2$$</div><p><b>Why the difference?</b> The MLE divides by $n$, but $E(\\sum \\hat{u}_i^2) = (n-k)\\sigma^2$, so:</p><div class="wk-formula">$$E(\\hat{\\sigma}^2_{ML}) = \\frac{n-k}{n}\\sigma^2 = \\sigma^2 - \\frac{k}{n}\\sigma^2 < \\sigma^2$$</div><p>MLE <b>underestimates</b> the true variance in small samples. But as $n \\to \\infty$, the bias $k/n \\to 0$, so it is <b>asymptotically unbiased and consistent</b>.</p><div class="wk-exam">📝 This is a classic exam question. Know that MLE of $\\sigma^2$ divides by $n$ (biased), while unbiased OLS divides by $n-k$ (corrects for estimated parameters).</div>'},
    ]},
    {head:"MLE Properties & Inference",num:"4",cards:[
      {title:"Large Sample Properties: BAN",content:'<p>Under regularity conditions, MLE is <span class="wk-key">BAN</span> (Best Asymptotically Normal):</p><table class="wk-table"><tr><th>Property</th><th>Meaning</th><th>Why It Matters</th></tr><tr><td><b>Consistency</b></td><td>$\\hat{\\beta} \\xrightarrow{p} \\beta$ as $n \\to \\infty$</td><td>Converges to truth with enough data</td></tr><tr><td><b>Asymptotic Normality</b></td><td>$\\sqrt{n}(\\hat{\\beta}-\\beta) \\xrightarrow{d} N(0, I^{-1})$</td><td>Justifies z-tests and confidence intervals</td></tr><tr><td><b>Efficiency</b></td><td>Achieves Cramér-Rao lower bound</td><td>Smallest possible variance asymptotically</td></tr></table><div class="wk-highlight">💡 These are WHY MLE dominates nonlinear econometrics. Even if small-sample behavior is imperfect, in large samples MLE becomes the most powerful, flexible, and efficient estimator available.</div>'},
      {title:"Hessian & Information Matrix — The Deep Meaning of Standard Errors",content:'<p>The <span class="wk-key">Hessian</span> $H$ is the matrix of second derivatives of $\\ln L$:</p><div class="wk-formula">$$H = \\frac{\\partial^2 \\ln L}{\\partial \\beta \\partial \\beta\'} \\qquad \\text{Var}(\\hat{\\beta}) \\approx [-E(H)]^{-1} = I(\\beta)^{-1}$$</div><p><b>Intuition from the PPT:</b></p><ul><li>First derivative = slope (where is the peak?)</li><li>Second derivative = <b>curvature</b> (how sharp is the peak?)</li><li><b>Sharp peak</b> → large $|H|$ → small $I^{-1}$ → small SE → <b>precise estimate</b></li><li><b>Flat peak</b> → small $|H|$ → large $I^{-1}$ → large SE → <b>imprecise estimate</b></li></ul><div class="wk-highlight">💡 Standard errors in MLE come from the curvature of the log-likelihood at the maximum. If the data strongly "point to" one parameter value (sharp peak), the SE is small. If many values are roughly equally likely (flat peak), the SE is large.</div>'},
      {title:"z-Test & Confidence Interval",content:'<p>For testing $H_0: \\beta_k = \\beta_k^0$:</p><div class="wk-formula">$$z = \\frac{\\hat{\\beta}_k - \\beta_k^0}{SE(\\hat{\\beta}_k)} \\qquad \\text{Reject at } \\alpha \\text{ if } |z| > z_{1-\\alpha/2}$$</div><p>At 5% level: $z_{0.975} = 1.96$. So reject if $|z| > 1.96$.</p><div class="wk-formula">$$\\text{95\\% CI: } \\hat{\\beta}_k \\pm 1.96 \\cdot SE(\\hat{\\beta}_k)$$</div><p><b>Interpretation:</b> Narrow CI = high precision. If CI excludes 0 → significant at 5%. Note: MLE uses $z$ (normal distribution), not $t$ (Student\'s), because inference is asymptotic.</p>'},
      {title:"LR Test — Comparing Nested Models",content:'<p>The <span class="wk-key">Likelihood Ratio test</span> compares restricted vs unrestricted models:</p><div class="wk-formula">$$LR = -2\\ln\\left(\\frac{L(M_R)}{L(M_U)}\\right) = 2[\\ln L(M_U) - \\ln L(M_R)] \\sim \\chi^2(q)$$</div><p><b>Where:</b> $M_R$ = restricted model, $M_U$ = unrestricted model, $q$ = number of restrictions.</p><p><b>Why it works:</b> If restrictions are true, restricted model should fit almost as well → small LR. If unrestricted fits much better → large LR → restrictions hurt → reject $H_0$.</p><p><b>4 applications from PPT:</b></p><ol><li><b>Overall test:</b> $H_0: \\beta_1 = \\beta_2 = \\ldots = \\beta_m = 0$ (model vs intercept-only)</li><li><b>Single coefficient:</b> $H_0: \\beta_k = 0$ ($q=1$, compare to $\\chi^2(1)$)</li><li><b>Subset:</b> $H_0: \\beta_j = \\beta_k = 0$ (block of variables)</li><li><b>Equality:</b> $H_0: \\beta_j = \\beta_k$ (are two effects the same?)</li></ol><div class="wk-exam">📝 LR test is the MLE analog of the F-test in OLS. Especially important for nonlinear models where individual z-tests may miss jointly significant variable groups.</div>'},
    ]},
    {head:"MLE Example: Binomial Proportion",num:"5",cards:[
      {title:"Full Worked Example from PPT",content:'<p>$\\pi$ = proportion of men in population. Sample of $N$ people, $K$ are men.</p><div class="wk-formula">$$Pr(K|\\pi, N) = \\binom{N}{K} \\pi^K (1-\\pi)^{N-K}$$\n$$\\ln L = K \\ln \\pi + (N-K) \\ln(1-\\pi) + \\text{const}$$\n$$\\frac{\\partial \\ln L}{\\partial \\pi} = \\frac{K}{\\pi} - \\frac{N-K}{1-\\pi} = 0$$\n$$K(1-\\pi) = (N-K)\\pi \\quad \\Rightarrow \\quad K = N\\pi \\quad \\Rightarrow \\quad \\hat{\\pi} = \\frac{K}{N}$$</div><p><b>Example:</b> If $K=2, N=6$: $\\hat{\\pi} = 2/6 = 1/3$.</p><div class="wk-highlight">💡 MLE gives the "obvious" answer — the sample proportion. But now you understand WHY it is the sample proportion: it is the value that maximizes the likelihood of the observed data. Always verify with 2nd derivative: $\\partial^2 \\ln L/\\partial \\pi^2 < 0$ ✓ (maximum, not minimum).</div>'},
    ]},
    {head:"Benefits & Drawbacks of MLE",num:"6",cards:[
      {title:"When to Use MLE vs OLS",content:'<table class="wk-table"><tr><th>Benefits of MLE</th><th>Drawbacks of MLE</th></tr><tr><td>Very flexible — handles many model types (logit, probit, Tobit, count)</td><td>May be biased in small samples</td></tr><tr><td>Strong large-sample properties (BAN)</td><td>Requires correct distributional assumption</td></tr><tr><td>Natural framework for nonlinear econometrics</td><td>Often no closed-form solution → numerical optimization</td></tr><tr><td>Connects directly to probability models</td><td>Algorithms may fail to converge</td></tr><tr><td>Provides likelihood for LR tests, AIC, BIC</td><td>Special pathologies (e.g., perfect classification in logit)</td></tr></table><div class="wk-exam">📝 <b>Big message from PPT:</b> MLE is extremely powerful but NOT magic. It is only as good as the model and distributional assumptions behind it. Under normality + linear model → MLE = OLS. For binary/count data → MLE is the main tool.</div>'},
    ]},
  ]},
  week3:{title:"Week 4 — Linear Probability Model",subtitle:"Binary Y · LPM Advantages & Problems · WLS Correction · Heteroscedasticity",sections:[
    {head:"The Binary Choice Problem",num:"1",cards:[
      {title:"Bernoulli & Binary Dependent Variable",content:'<p>When Y ∈ {0,1} (dichotomous/binary), we model <span class="wk-key">P(Y=1|X)</span> — the probability of "success" given covariates.</p><div class="wk-formula">Y ~ Bernoulli(πᵢ)\nP(Yᵢ=1) = πᵢ, P(Yᵢ=0) = 1−πᵢ\nE(Yᵢ) = πᵢ = P(Yᵢ=1|Xᵢ)\nVar(Yᵢ) = πᵢ(1−πᵢ)  ← depends on X!</div><p>The expected value of a Bernoulli IS the probability: E(Y) = 1·P(Y=1) + 0·P(Y=0) = P(Y=1).</p><div class="wk-highlight">💡 Since Var(Y) = π(1−π) depends on X, any model for binary Y will have heteroscedastic errors by construction.</div>'},
    ]},
    {head:"LPM: Applying OLS to Binary Y",num:"2",cards:[
      {title:"The Model & Its Interpretation",content:'<p>The <span class="wk-key">Linear Probability Model</span> simply runs OLS on binary Y:</p><div class="wk-formula">P(Yᵢ=1|Xᵢ) = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ + εᵢ\nβₖ = ∂P(Y=1)/∂Xₖ (constant marginal effect)\nŶᵢ = estimated probability</div><p><b>Advantages:</b> (1) Easy to interpret — βₖ is the pp change in probability per unit Xₖ, (2) Simple to estimate with OLS, (3) Good first approximation, (4) Applicable when logit fails.</p>'},
      {title:"LPM Problems (Critical for Exam!)",content:'<p>Four serious problems with LPM:</p><table class="wk-table"><tr><th>Problem</th><th>Detail</th><th>Consequence</th></tr><tr><td>1. P outside [0,1]</td><td>Linear model can predict Ŷ < 0 or Ŷ > 1</td><td>Nonsensical probabilities — contradicts probability axioms</td></tr><tr><td>2. Heteroscedasticity</td><td>Var(εᵢ) = Pᵢ(1−Pᵢ) depends on X</td><td>OLS is inefficient; SEs are wrong</td></tr><tr><td>3. Non-normality</td><td>ε only takes 2 values (not normal)</td><td>Normal-based inference invalid in small samples</td></tr><tr><td>4. R² questionable</td><td>R² usefulness for binary model is dubious</td><td>Cannot use R² for model comparison</td></tr></table><div class="wk-exam">📝 Exam: always list ALL 4 problems. Then explain: "These motivate Logit/Probit models which constrain P ∈ [0,1] and use MLE instead of OLS."</div>'},
      {title:"But Wait — Is LPM Unbiased? (Yes!)",content:'<p>From PPT 2: despite its problems, LPM estimates ARE <b>unbiased</b> if correctly specified. Here is why:</p><div class="wk-formula">Let Zᵢ = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ, so Yᵢ = Zᵢ + εᵢ\n\nSince Y ∈ {0,1}:\n  If Y=0: ε = −Z    (happens with prob 1−Z)\n  If Y=1: ε = 1−Z   (happens with prob Z)\n\nE(ε) = (1−Z)(−Z) + Z(1−Z) = −Z + Z² + Z − Z² = 0 ✓</div><p>So $E(\\varepsilon_i) = 0$ by construction → OLS is unbiased. The real problems are <b>not bias</b>, but rather: functional form (P outside [0,1]), heteroscedasticity, and non-normality.</p><div class="wk-highlight">💡 Many students think LPM is "wrong in every way." That is not true! Unbiasedness holds. The deeper issue is that a straight line is the wrong SHAPE for a probability curve. We need an S-curve → logit/probit.</div>'},
      {title:"Why We Need an S-Shaped Curve (PPT 2)",content:'<p>A good binary probability model should:</p><ul><li>Keep $P \\in [0,1]$ for ALL possible $X$ values</li><li>Allow the effect of $X$ to <b>diminish</b> as $P$ approaches 0 or 1</li><li>Have a natural S-shape: steep in the middle, flat at extremes</li></ul><p><b>Intuition:</b> A 1-unit increase in $X$ should matter MORE when someone is "on the margin" (P ≈ 0.5) than when the outcome is nearly certain (P ≈ 0 or P ≈ 1). A straight line cannot capture this — but an S-curve can.</p><p>Two natural S-shaped CDFs: <span class="wk-key">Logistic CDF</span> → Logit model, <span class="wk-key">Normal CDF</span> → Probit model.</p>'},
    ]},
    {head:"WLS Correction",num:"3",cards:[
      {title:"Weighted Least Squares for LPM",content:'<p><span class="wk-key">WLS</span> corrects heteroscedasticity by weighting each observation inversely to its variance:</p><div class="wk-formula">Step 1: Run OLS → get Ŷᵢ\nStep 2: Compute wᵢ = √[Ŷᵢ(1−Ŷᵢ)]\nStep 3: Divide everything by wᵢ:\n  Yᵢ/wᵢ = (β₀/wᵢ) + β₁(X₁ᵢ/wᵢ) + ... + εᵢ*\nStep 4: Run OLS on transformed model</div><div class="wk-highlight">💡 WLS only works if Ŷᵢ ∈ (0,1). If any Ŷᵢ ≤ 0 or ≥ 1, you cannot compute wᵢ. Drop those observations or fix the model.</div>'},
    ]},
    {head:"Heteroscedasticity in LPM",num:"4",cards:[
      {title:"Why LPM Is Always Heteroscedastic",content:'<p>For binary Y with E(Y|X) = P:</p><div class="wk-formula">εᵢ = Yᵢ − E(Yᵢ|Xᵢ)\nIf Yᵢ = 1: εᵢ = 1 − Pᵢ    (prob = Pᵢ)\nIf Yᵢ = 0: εᵢ = 0 − Pᵢ = −Pᵢ  (prob = 1−Pᵢ)\n\nVar(εᵢ) = E(εᵢ²) − [E(εᵢ)]²\n= (1−Pᵢ)²·Pᵢ + Pᵢ²·(1−Pᵢ) − 0²\n= Pᵢ(1−Pᵢ)[(1−Pᵢ) + Pᵢ]\n= Pᵢ(1−Pᵢ)  ← heteroscedastic!</div><p>Since Pᵢ = β₀ + β₁Xᵢ depends on X, the variance is NOT constant → <span class="wk-key">heteroscedasticity is inherent</span>, not a modeling error.</p>'},
    ]},
  ]},
  week4:{title:"Week 5 — Logit Model",subtitle:"Logistic Regression · Odds Ratio · Marginal Effects · MLE Estimation · Interpretation",sections:[
    {head:"The Logit Model",num:"1",cards:[
      {title:"From LPM to Logit: Fixing P ∈ [0,1]",content:'<p>Use the <span class="wk-key">logistic CDF</span> to constrain probabilities. Nonlinear effect on P(Y=1), but linear in the <b>log-odds</b>:</p><div class="wk-formula">P(Yᵢ=1|Xᵢ) = eˣᵝ/(1+eˣᵝ) = 1/(1+e⁻ˣᵝ)\n\nwhere Xβ = β₀ + β₁X₁ᵢ + ... + βₘXₘᵢ\n\nProperties:\n• As Xβ → +∞: P → 1\n• As Xβ → −∞: P → 0\n• At Xβ = 0: P = 0.5\n• Always P ∈ (0,1) ✓</div><div class="wk-highlight">💡 The logit function is the INVERSE of the logistic CDF: logit(P) = ln(P/(1−P)) = Xβ. So the model is linear in log-odds, nonlinear in probability.</div>'},
      {title:"The Log-Odds (Logit) Form",content:'<p>Transform P into the <span class="wk-key">log-odds</span> (logit):</p><div class="wk-formula">Odds = P/(1−P)\nLog-odds = ln(P/(1−P)) = β₀ + β₁X₁ + ... + βₘXₘ\n\nDeriving the odds from the model:\nP = eˣᵝ/(1+eˣᵝ), 1−P = 1/(1+eˣᵝ)\nOdds = P/(1−P) = eˣᵝ\nln(Odds) = Xβ  ✓ linear!</div><p>Z = ln(P/(1−P)) → odds ratio. P = 1/(1+e⁻ᶻ). When P = 1 → Z = +∞, P = 0 → Z = −∞, P = 0.5 → Z = 0.</p>'},
    ]},
    {head:"Interpretation",num:"2",cards:[
      {title:"Three Levels of Interpretation",content:'<p>Logit coefficients can be interpreted at <b>three levels</b>:</p><table class="wk-table"><tr><th>Level</th><th>What βₖ means</th><th>Formula</th></tr><tr><td>1. Direction only</td><td>Sign of βₖ → direction of effect on P</td><td>βₖ > 0 → P increases</td></tr><tr><td>2. Log-odds</td><td>βₖ = change in log-odds per unit Xₖ</td><td>Δ ln(odds) = βₖ</td></tr><tr><td>3. Odds Ratio</td><td>e^βₖ = multiplicative change in odds</td><td>OR = e^βₖ</td></tr></table><div class="wk-exam">📝 "A 1-unit increase in Xₖ is associated with a (e^βₖ − 1)×100% change in the odds of Y=1, holding all else constant." This is the standard exam phrasing.</div>'},
      {title:"Marginal Effects — The Real Interpretation",content:'<p>Since the relationship is nonlinear, the <span class="wk-key">marginal effect</span> (change in probability) depends on where you evaluate:</p><div class="wk-formula">∂P/∂Xₖ = βₖ · P(1−P)\n\nAt the mean: evaluate at X = X̄\n  ME(X̄) = βₖ · P(X̄) · (1−P(X̄))\n\nAverage Marginal Effect (AME):\n  AME = (1/N) Σᵢ βₖ · P̂ᵢ(1−P̂ᵢ)\n\nMaximum ME: at P = 0.5 → ME = βₖ/4\nRelative magnitude: βⱼ/βₖ (ratio of coefficients = ratio of ME at any point)</div><div class="wk-highlight">💡 Marginal effect is BIGGEST at P = 0.5 (middle of S-curve) and shrinks toward 0 as P approaches 0 or 1. The "βₖ/4 rule" gives a quick upper bound on the marginal effect.</div>'},
      {title:"Elasticity & Semi-Elasticity",content:'<p>Advanced interpretation tools:</p><div class="wk-formula">Semi-elasticity: ∂P/∂Xₖ = βₖ · P(1−P)\n  → how much does P change (in levels) per unit Xₖ\n\nElasticity: ε = (∂P/∂Xₖ)·(Xₖ/P) = βₖ · Xₖ · (1−P)\n  → % change in P per 1% change in Xₖ</div>'},
    ]},
    {head:"MLE for Logit",num:"3",cards:[
      {title:"Log-Likelihood & Estimation",content:'<p>Logit is estimated via <span class="wk-key">MLE</span>. The log-likelihood for binary logit:</p><div class="wk-formula">L(β) = Πᵢ Pᵢʸⁱ · (1−Pᵢ)¹⁻ʸⁱ\n\nln L = Σᵢ [Yᵢ ln Pᵢ + (1−Yᵢ) ln(1−Pᵢ)]\n     = Σᵢ [Yᵢ · Xᵢβ − ln(1 + eˣⁱᵝ)]\n\nGlobally concave → unique maximum ✓\nSolved via Newton-Raphson iteration\nNo closed-form solution (unlike OLS)</div><div class="wk-exam">📝 The fact that logit log-likelihood is globally concave is important: it guarantees a unique solution exists and Newton-Raphson will find it.</div>'},
    ]},
    {head:"Dummy & Nonlinear Effects in Logit",num:"4",cards:[
      {title:"Categorical Predictors",content:'<p>For categorical X with K categories: create <span class="wk-key">K−1 dummy variables</span>, with one category as reference group.</p><div class="wk-formula">Binary predictor: logit(P) = β₀ + β₁D\n  D=0: logit(P) = β₀ → P₀ = e^β₀/(1+e^β₀)\n  D=1: logit(P) = β₀+β₁ → P₁ = e^(β₀+β₁)/(1+e^(β₀+β₁))\n  OR for D: e^β₁ = odds(D=1)/odds(D=0)</div>'},
      {title:"Nonlinear & Interaction Effects",content:'<p><span class="wk-key">Non-additivity</span>: if X₁ and X₂ change simultaneously, the total effect is NOT simply the sum of separate effects (unlike LPM).</p><div class="wk-formula">With interaction: logit(P) = β₀ + β₁X₁ + β₂X₂ + β₃X₁X₂\n\nEffect of X₁ on log odds = β₁ + β₃X₂\n  → depends on the value of X₂!\n\nNonlinear effect on P:\n  Polynomial: logit(P) = β₀ + β₁X + β₂X²\n  The effect on the log of odds may be nonlinear</div><div class="wk-highlight">💡 Nonlinear effects in logit: (1) effect on log-odds via polynomials, (2) effect on probability is ALWAYS nonlinear due to the logistic function. Two layers of nonlinearity!</div>'},
    ]},
    {head:"Discrete Changes & Predicted Probabilities (PPT 2)",num:"5",cards:[
      {title:"Discrete Change Effects — Better for Binary Regressors",content:'<p>For a binary regressor (e.g., college degree: 0/1), the derivative-based marginal effect is less meaningful. Instead compute the <b>discrete change</b>:</p><div class="wk-formula">Discrete change = Pr(Y=1 | Xₖ=1) − Pr(Y=1 | Xₖ=0)\n\nFor continuous X, one-unit change:\n  Pr(Y=1 | Xₖ+1) − Pr(Y=1 | Xₖ)\n\nOther variants:\n  • Standard deviation change: Pr(Y=1 | Xₖ+sₖ) − Pr(Y=1 | Xₖ)\n  • Min-to-max: Pr(Y=1 | Xₖ=max) − Pr(Y=1 | Xₖ=min)</div><div class="wk-exam">📝 For dummies: ALWAYS report discrete change (0→1), not the derivative. The derivative at 0.5 does not correspond to an observable change for a binary variable.</div>'},
      {title:"Relative Risk — For Rare Events",content:'<p>When probabilities are very small, absolute differences are tiny but <b>relative risk</b> can be dramatic:</p><div class="wk-formula">Relative Risk = P_A / P_B\n\nExample: P_A = 0.02, P_B = 0.01\n  Absolute difference = 0.01 (just 1 pp)\n  Relative risk = 2.0 (DOUBLE the risk!)</div><p>For rare outcomes (disease, default, accident), relative risk is often more informative than probability-point differences.</p>'},
    ]},
    {head:"Separation & Collinearity (PPT 2)",num:"6",cards:[
      {title:"Complete Separation — When Logit Breaks",content:'<p><span class="wk-key">Complete separation</span> occurs when a predictor <b>perfectly classifies</b> Y=0 vs Y=1. Then MLE tries to push |β| → ∞ and never converges.</p><p><b>Warning signs:</b> many iterations, huge coefficients, huge or missing SEs, convergence warnings.</p><p><b>Causes:</b> small sample, too many dummies, data construction artifacts (e.g., including an outcome variable as a predictor by accident).</p><p><b>Fixes:</b> (1) combine sparse categories, (2) exact logistic regression, (3) penalized MLE (Firth), (4) drop the problematic variable.</p><div class="wk-exam">📝 Separation looks impressive ("perfect predictor!") but is usually a data problem. Always check whether the "perfect" predictor is actually meaningful or a coding error.</div>'},
      {title:"Collinearity — When Variables Are Too Similar",content:'<p><b>Perfect collinearity:</b> one X is an exact linear combination of others → cannot estimate (e.g., including all K dummies for K categories). <b>Near collinearity:</b> predictors highly correlated → estimates unstable, SEs huge.</p><div class="wk-highlight">💡 Collinearity does NOT cause bias — estimates are still unbiased. But it destroys PRECISION: you cannot tell which variable is driving the effect. Drop one of the correlated variables or combine them.</div>'},
    ]},
  ]},
  week5:{title:"Week 6 — Probit Model",subtitle:"Normal CDF · Latent Variable Foundation · Probit vs Logit · Coefficient Conversion · PPT 2 Material",sections:[
    {head:"The Latent Variable Foundation (PPT 2)",num:"1",cards:[
      {title:"Unifying Framework: Both Logit & Probit from Latent Y*",content:'<p>From PPT 2: both logit and probit can be understood from ONE underlying model. An unobserved <span class="wk-key">latent variable</span> (utility, propensity, net benefit):</p><div class="wk-formula">$$y_i^* = x_i\'\\beta + \\varepsilon_i \\qquad \\text{(unobserved)}$$\n$$y_i = \\begin{cases} 1 & \\text{if } y_i^* > 0 \\\\ 0 & \\text{if } y_i^* \\leq 0 \\end{cases}$$</div><p>Then: $P(y_i=1|x_i) = P(\\varepsilon_i > -x_i\'\\beta) = F(x_i\'\\beta)$ where $F$ is the CDF of $\\varepsilon$.</p><table class="wk-table"><tr><th>If ε follows...</th><th>F is...</th><th>You get...</th></tr><tr><td>Standard Normal N(0,1)</td><td>Φ (normal CDF)</td><td><b>Probit</b></td></tr><tr><td>Standard Logistic</td><td>Λ (logistic CDF)</td><td><b>Logit</b></td></tr></table><div class="wk-highlight">💡 The latent variable $y^*$ is NEVER observed — only the binary outcome $y$ is. The scale of $y^*$ is arbitrary (utility units are meaningless), so we normalize $\\text{Var}(\\varepsilon) = 1$ (probit) or $\\text{Var}(\\varepsilon) = \\pi^2/3$ (logit). This explains the 1.81 conversion factor!</div><div class="wk-exam">📝 This framework is critical for understanding ordered response models (ordered logit/probit) later — same latent variable, but with multiple thresholds instead of just 0.</div>'},
    ]},
    {head:"The Probit Model",num:"2",cards:[
      {title:"Model from Utility/Latent Variable Theory",content:'<p>The <span class="wk-key">Probit model</span> emerges from a latent variable framework based on <b>utility theory / rational choice</b>:</p><div class="wk-formula">Y*ᵢ = β₁ + β₂Xᵢ + εᵢ   (latent/unobservable utility index)\nεᵢ ~ N(0,1)\n\nDecision rule:\n  Yᵢ = 1 if Y*ᵢ > 0 (= threshold)\n  Yᵢ = 0 if Y*ᵢ ≤ 0\n\nP(Yᵢ=1|Xᵢ) = P(Y*ᵢ > 0) = P(εᵢ > −Xᵢβ)\n= 1 − Φ(−Xᵢβ) = Φ(Xᵢβ)  (by symmetry of normal)</div><div class="wk-highlight">💡 Probit uses the NORMAL CDF (Φ). Logit uses the LOGISTIC CDF (Λ). Both are S-shaped, both constrain P ∈ (0,1). The main difference is tail behavior: logistic has heavier tails.</div>'},
      {title:"Probit Interpretation",content:'<p>Probit coefficients are NOT directly interpretable as marginal effects (just like logit):</p><div class="wk-formula">Marginal effect: ∂P/∂Xₖ = φ(Xβ) · βₖ\n\nwhere φ(z) = (1/√2π) · e^(−z²/2) is the standard normal PDF\n\nRate of change of probability:\n  dPᵢ/dXₖ = f(β₁ + β₂Xᵢ) · β₂\n  = φ(Xᵢβ) · β₂  (normal PDF × coefficient)\n\nt-statistic: t = β̂₁ + β̂₂Xᵢ</div><p>The marginal effect depends on all X values through φ(Xβ). Maximum at Xβ = 0 (where P = 0.5).</p>'},
    ]},
    {head:"Logit vs Probit Comparison",num:"3",cards:[
      {title:"Side-by-Side Comparison",content:'<table class="wk-table"><tr><th>Feature</th><th>Logit</th><th>Probit</th></tr><tr><td>Link function</td><td>Logistic CDF: Λ(z)</td><td>Normal CDF: Φ(z)</td></tr><tr><td>Latent error dist.</td><td>Logistic(0, π²/3)</td><td>Normal(0, 1)</td></tr><tr><td>Tail behavior</td><td>Heavier tails</td><td>Lighter tails (faster approach to 0/1)</td></tr><tr><td>Odds ratio?</td><td>Yes: e^βₖ</td><td>No natural odds ratio</td></tr><tr><td>Marginal effect</td><td>βₖ·P(1−P)</td><td>φ(Xβ)·βₖ</td></tr><tr><td>Coefficient scale</td><td>Larger (σ=π/√3≈1.81)</td><td>Smaller (σ=1)</td></tr></table><div class="wk-formula">Conversion rules:\nβ_logit ≈ 1.81 · β_probit\nβ_LPM ≈ 0.25 · β_logit (at P = 0.5)\nβ_LPM ≈ 0.25 · 1.81 · β_probit ≈ 0.45 · β_probit</div><div class="wk-exam">📝 Coefficients of probit and logit are NOT directly comparable because of different variance assumptions. But: var(logit) = π²/3, var(probit) = 1 → ratio ≈ 1.81. Both models have the same basis: mean value 0.</div>'},
    ]},
    {head:"Probit Estimation",num:"4",cards:[
      {title:"MLE for Probit",content:'<p>Like logit, probit is estimated via MLE:</p><div class="wk-formula">ln L = Σ [Yᵢ ln Φ(Xᵢβ) + (1−Yᵢ) ln(1−Φ(Xᵢβ))]\n\n∂ln L/∂β = Σ [(Yᵢ−Φᵢ)/(Φᵢ(1−Φᵢ))] · φ(Xᵢβ) · Xᵢ = 0\n\nAlso solved via Newton-Raphson\nAll MLE properties apply (consistent, efficient, asymptotically normal)</div>'},
    ]},
    {head:"When to Use Which?",num:"5",cards:[
      {title:"Practical Guidance",content:'<p>In practice, logit and probit give very similar results for most datasets. Key considerations:</p><ul><li><b>Logit preferred when:</b> odds ratio interpretation is useful (e.g., medical/epidemiological studies), larger sample sizes</li><li><b>Probit preferred when:</b> normal distribution is theoretically justified (latent variable/utility theory), or when you want to do sample selection corrections (Heckman)</li><li><b>Both:</b> report both as robustness check</li></ul><div class="wk-highlight">💡 "In logit & probit models, all regressors are involved in probability" — unlike LPM where only the relevant Xₖ matters for its marginal effect, in logit/probit ALL X values matter through the nonlinear link function.</div>'},
    ]},
  ]},
  week6:{title:"Week 7 — Diagnostics & Goodness of Fit",subtitle:"LR Test · Pseudo R² · Deviance · Pearson χ² · Residuals · Specification Tests · AIC/BIC",sections:[
    {head:"LR Test",num:"1",cards:[
      {title:"Likelihood Ratio Test",content:'<p>The <span class="wk-key">Likelihood Ratio test</span> compares nested models:</p><div class="wk-formula">LR = −2[ln L(Mᵣ) − ln L(Mᵤ)] ~ χ²(q)\n\nq = number of restrictions (variables dropped)\nM_R = restricted model, M_U = unrestricted model\n\n4 types of LR tests:\n1. Overall model: H₀: β₁=β₂=...=βₘ=0\n2. Single coefficient: H₀: βₖ=0\n3. Subset: H₀: βⱼ=βₖ=...=0\n4. Equality: H₀: βⱼ=βₖ\n\nReject H₀ if LR > χ²_{α,q}</div><div class="wk-exam">📝 LR test is analogous to F-test in OLS. It uses log-likelihoods instead of R². Always specify which models you are comparing and the degrees of freedom.</div>'},
    ]},
    {head:"Significance Testing",num:"2",cards:[
      {title:"Wald Test & Confidence Intervals",content:'<p>For individual coefficients:</p><div class="wk-formula">Wald test:\nH₀: βₖ = β₀ₖ\nz = (β̂ₖ − β₀ₖ)/SE(β̂ₖ)\nReject H₀ if |z| > z_{α/2}\n\nConfidence interval:\nβ̂ₖ ± z_{α/2} · SE(β̂ₖ)\n\nAt 95%: z_{0.025} = 1.96\nReject if |z| > 1.96 ≈ "if |z| > 2"</div>'},
    ]},
    {head:"Pseudo R² Measures",num:"3",cards:[
