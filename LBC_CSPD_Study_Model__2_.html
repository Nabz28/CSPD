      {title:"Multiple Pseudo R² Options",content:'<p>No single "R²" for binary models. Multiple options exist, each measuring something slightly different:</p><table class="wk-table"><tr><th>Measure</th><th>Formula</th><th>Range</th><th>Interpretation</th></tr><tr><td>McFadden R²</td><td>1 − ln L/ln L₀</td><td>[0,1)</td><td>0.2-0.4 = good; analogous to R²</td></tr><tr><td>Efron R²</td><td>1 − Σ(Yᵢ−P̂ᵢ)²/Σ(Yᵢ−Ȳ)²</td><td>[0,1]</td><td>Based on predicted probs</td></tr><tr><td>Count R²</td><td># correct / N</td><td>[0,1]</td><td>Classification accuracy</td></tr><tr><td>ML Pseudo R²</td><td>1 − e^(−2(lnL−lnL₀)/N)</td><td>[0,max<1]</td><td>Cox & Snell</td></tr><tr><td>McFadden Adj</td><td>1 − (lnL−K)/lnL₀</td><td>[0,1)</td><td>Penalizes extra vars</td></tr></table><div class="wk-formula">AIC = −2 ln L(β̂) + 2p     (smaller is better)\nBIC = −2 ln L(β̂) + p·ln(N)  (more penalty for complexity)\n\nAIC/BIC: the smaller, the better\n6-10: strong evidence, >10: very strong</div><div class="wk-highlight">💡 Don\'t compare McFadden R² to linear R². A McFadden R² of 0.3 is roughly equivalent to a linear R² of 0.6.</div>'},
      {title:"Classification Table",content:'<p>The <span class="wk-key">classification table</span> ("confusion matrix") compares predicted vs observed:</p><div class="wk-formula">Maximum probability rule: Ŷᵢ = 1 if P̂ᵢ > 0.5, else 0\n\n              Predicted\n              0       1\nObserved  0 | TN    | FP |\n          1 | FN    | TP |\n\nCount R² = (TN + TP) / N\nSensitivity = TP / (TP + FN)  (true positive rate)\nSpecificity = TN / (TN + FP)  (true negative rate)</div>'},
    ]},
    {head:"Deviance, Pearson & Residuals",num:"4",cards:[
      {title:"Deviance & Pearson GOF Tests",content:'<p>Both test overall model adequacy. H₀: model fits. Reject if statistic > χ²(J−m−1).</p><div class="wk-formula">Deviance: D = −2 ln(L̂/Lₛ)\n= −2 Σⱼ [nⱼȳⱼ ln(ȳⱼ/π̂ⱼ) + nⱼ(1−ȳⱼ)ln((1−ȳⱼ)/(1−π̂ⱼ))]\n\nPearson: χ² = Σⱼ nⱼ(ȳⱼ−π̂ⱼ)²/[π̂ⱼ(1−π̂ⱼ)]\n\nBoth ~ χ²(J−m−1) under H₀\nJ = distinct covariate patterns</div><div class="wk-exam">📝 Deviance and Pearson GOF require grouped data (distinct covariate patterns). With continuous X, every observation is its own pattern → tests don\'t work! Use Hosmer-Lemeshow instead.</div>'},
      {title:"Residuals & Influence",content:'<p>Binary model residuals for diagnostics:</p><div class="wk-formula">Pearson residual: rᵢ = (Yᵢ−π̂ᵢ)/√[π̂ᵢ(1−π̂ᵢ)]\nDeviance residual: dᵢ = sign(Yᵢ−π̂ᵢ)·√|contribution to D|\n\nStandardized Pearson: rₛ = rᵢ/√(1−hᵢᵢ)\nCook\'s distance: ΔB̂ᵢ = rₛ²·hᵢᵢ/(1−hᵢᵢ)\nLeverage: hᵢᵢ = diagonal of hat matrix\n\nOutlier action:\n1. Close look at data\n2. Correct/exclude errors\n3. Compare with & without\n4. Main result shouldn\'t change</div>'},
      {title:"Specification & Information Criteria",content:'<p>Model specification checks:</p><div class="wk-formula">Link test: logit(P) = γ₁Ŷ + γ₂Ŷ²\n  H₀: γ₂ = 0 (correct spec)\n  If reject → add nonlinear terms\n\nRamsey RESET: add Ŷ², Ŷ³, test joint significance\n\nGeneral spec checks:\n  • Omitted variable → add variables\n  • Non-linearity → add X², X³\n  • Non-additivity → add interactions X₁X₂\n  • R² ≈ 0% → consider completely different model</div>'},
      {title:"Hosmer-Lemeshow Test (PPT 2)",content:'<p>When continuous regressors make every observation a unique covariate pattern, Pearson/Deviance GOF tests fail. <span class="wk-key">Hosmer-Lemeshow</span> fixes this:</p><div class="wk-formula">Step 1: Sort observations by predicted P̂\nStep 2: Divide into g groups (usually g = 10 deciles)\nStep 3: Within each group, compare observed vs expected frequencies\nStep 4: Compute Pearson-type χ² statistic\nStep 5: Compare to χ²(g − 2) distribution\n\nH₀: model fits well\nReject if HL > χ²_α(g−2)\nHigh p-value → model fits adequately</div><div class="wk-exam">📝 In Stata: <code>estat gof, group(10)</code> after logit/probit. This is the standard GOF test for applied logistic regression when you have continuous predictors.</div>'},
      {title:"Influence Diagnostics Summary (PPT 2)",content:'<p>Three questions about each observation:</p><table class="wk-table"><tr><th>Question</th><th>Measure</th><th>What it tells you</th></tr><tr><td>Does it fit badly?</td><td>Pearson residual $r_i$, Deviance residual $d_i$</td><td>Large |r| = model mispredicts this observation</td></tr><tr><td>Is its X unusual?</td><td>Leverage $h_{ii}$</td><td>High leverage = observation is in a sparse/extreme region of X-space</td></tr><tr><td>Does it distort estimates?</td><td>Cook\'s distance $\\Delta\\hat{\\beta}_i$</td><td>Large Cook\'s D = removing this obs would substantially change $\\hat{\\beta}$</td></tr></table><div class="wk-formula">Influence on Pearson χ²: Δχ²ᵢ ≈ rᵢ²/(1−hᵢᵢ) = (rᵢˢ)²\nInfluence on Deviance: ΔDᵢ ≈ dᵢ²/(1−hᵢᵢ)</div><div class="wk-highlight">💡 A model can look "significant" overall while being driven by just a few unusual points. Always run diagnostics. If main results change when you drop high-influence observations, your conclusions are fragile.</div>'},
    ]},
  ]},
  week7:{title:"Week 8 — Ordered Response Models",subtitle:"PPT 3 · Ordered Logit/Probit · Latent Variable + Cutpoints · Parallel Regression · Normalization · Category Probabilities",sections:[
    {head:"Why Ordered Models?",num:"1",cards:[
      {title:"The Problem: Ordered Categorical Y",content:'<p>When the dependent variable has <b>more than 2 categories with a natural ranking</b>, we need ordered models:</p><ul><li>1 = strongly disagree, 2 = disagree, 3 = agree, 4 = strongly agree</li><li>1 = not working, 2 = part-time, 3 = full-time</li><li>1 = low WTP, 2 = medium, 3 = high</li></ul><p><b>Why not OLS on 1,2,3,4?</b> Because OLS treats distances between categories as equal and meaningful ($3-2 = 2-1$). Ordered models only use the <b>ranking</b>, not the numeric distances. That is the correct information structure.</p><p><b>Why not multinomial logit?</b> Multinomial logit ignores the ordering — it treats "strongly agree" as no more related to "agree" than to "strongly disagree." Ordered models exploit the ranking for parsimony.</p><div class="wk-highlight">💡 <b>Decision rule:</b> Use ordered models when categories represent "more" or "less" of something. Use unordered (multinomial) when categories are just different labels with no ranking.</div>'},
    ]},
    {head:"The Ordered Response Model",num:"2",cards:[
      {title:"Latent Variable + Cutpoints = Ordered Categories",content:'<p>The model has the same latent structure as binary choice, but with <b>multiple thresholds</b>:</p><div class="wk-formula">$$y_i^* = x_i\'\\beta + \\varepsilon_i \\qquad \\text{(latent, unobserved)}$$\n$$y_i = j \\quad \\text{if} \\quad \\gamma_{j-1} < y_i^* \\leq \\gamma_j$$\n$$\\gamma_0 = -\\infty, \\quad \\gamma_1 = 0 \\text{ (normalized)}, \\quad \\gamma_M = +\\infty$$</div><p><b>What this means:</b> The latent variable $y^*$ is continuous. We never observe it. We only observe which "interval" it falls into. Each interval = one ordered category.</p><p><b>Example:</b> If $y^*$ = "willingness to work," then very low $y^*$ → category 1 (not working), middle → category 2 (part-time), high → category 3 (full-time). The categories are just regions on the same underlying scale.</p>'},
      {title:"Three-Category Example (Core Exam Model)",content:'<p>For M=3 categories (e.g., not working / part-time / full-time):</p><div class="wk-formula">$$y_i = 1 \\quad \\text{if} \\quad y_i^* \\leq 0$$\n$$y_i = 2 \\quad \\text{if} \\quad 0 < y_i^* \\leq \\gamma$$\n$$y_i = 3 \\quad \\text{if} \\quad y_i^* > \\gamma$$</div><p>Here $\\gamma$ is an <b>unknown cutpoint</b> estimated from the data. The boundary at 0 is fixed (normalization). Regressors do NOT move categories directly — they move $y^*$ through $x\'\\beta$, and $y^*$ crossing a cutpoint changes the observed category.</p><div class="wk-exam">📝 For M categories → M−1 estimated cutpoints (plus the two at ±∞). For M=2, this collapses back to the familiar binary choice model (logit/probit).</div>'},
    ]},
    {head:"Category Probabilities",num:"3",cards:[
      {title:"Ordered Probit Probabilities (3 Categories)",content:'<p>If $\\varepsilon_i \\sim N(0,1)$ (ordered probit):</p><div class="wk-formula">$$P(y_i = 1 | x_i) = \\Phi(-x_i\'\\beta)$$\n$$P(y_i = 2 | x_i) = \\Phi(\\gamma - x_i\'\\beta) - \\Phi(-x_i\'\\beta)$$\n$$P(y_i = 3 | x_i) = 1 - \\Phi(\\gamma - x_i\'\\beta)$$</div><p><b>Why the middle is a difference:</b> Category 2 is the region between the two thresholds. So its probability = (probability of being below upper threshold) minus (probability of being below lower threshold).</p><p><b>General formula for any category j:</b></p><div class="wk-formula">$$P(y = j | x) = F(\\gamma_j - x\'\\beta) - F(\\gamma_{j-1} - x\'\\beta)$$</div><p>where $F = \\Phi$ for ordered probit, $F = \\Lambda$ for ordered logit.</p>'},
      {title:"Numerical Example",content:'<p>Suppose $x_i\'\\beta = 0.5$ and $\\gamma = 1$:</p><div class="wk-formula">P(y=1) = Φ(−0.5) = 0.3085\nP(y=3) = 1 − Φ(1−0.5) = 1 − Φ(0.5) = 0.3085\nP(y=2) = Φ(0.5) − Φ(−0.5) = 0.6915 − 0.3085 = 0.3830\n\nCheck: 0.3085 + 0.3830 + 0.3085 = 1.0 ✓</div><p>Middle category is most likely here. Now increase $x\'\\beta$ to 1.0:</p><div class="wk-formula">P(y=1) = Φ(−1.0) = 0.1587  (↓ from 0.3085)\nP(y=3) = 1 − Φ(0) = 0.5000   (↑ from 0.3085)\nP(y=2) = Φ(0) − Φ(−1.0) = 0.5 − 0.1587 = 0.3413  (↓ slightly!)</div><div class="wk-highlight">💡 <b>Key insight:</b> When $x\'\\beta$ increased, P(y=1) fell and P(y=3) rose — as expected for a positive $\\beta$. But P(y=2) also fell slightly! This is the <b>middle-category ambiguity</b>: some people enter category 2 from category 1, but others leave it for category 3.</div>'},
    ]},
    {head:"Interpretation Rules",num:"4",cards:[
      {title:"What Does β Mean in Ordered Models?",content:'<p>If $\\beta_k > 0$:</p><table class="wk-table"><tr><th>Category</th><th>Effect on Probability</th><th>Guaranteed?</th></tr><tr><td>Lowest category (y=1)</td><td style="color:red"><b>↓ Decreases</b></td><td>Yes, always</td></tr><tr><td>Highest category (y=M)</td><td style="color:green"><b>↑ Increases</b></td><td>Yes, always</td></tr><tr><td>Middle categories</td><td>Could go either way</td><td><b>No — ambiguous!</b></td></tr></table><p><b>Why middle is ambiguous:</b> When $y^*$ shifts right, some people move INTO the middle category (from below) while others move OUT of it (to above). The net effect depends on the density at the cutpoints.</p><div class="wk-exam">📝 A positive coefficient does NOT mean "all higher categories become more likely." It guarantees ONLY: bottom ↓, top ↑, middle = ambiguous. This is the #1 interpretation rule for ordered models.</div>'},
      {title:"Best Interpretation Strategy: Predicted Probabilities",content:'<p>Raw coefficients tell you direction but not magnitude on probability scale. The clearest communication strategy is to compute <b>predicted probabilities</b> for representative profiles:</p><div class="wk-formula">For a specific x-profile:\n  P̂(y=1|x) = Φ(−x\'β̂)\n  P̂(y=2|x) = Φ(γ̂−x\'β̂) − Φ(−x\'β̂)\n  P̂(y=3|x) = 1 − Φ(γ̂−x\'β̂)\n\nThen show how these change when one x varies.\nIn Stata: margins, at(education=(8 12 16)) predict(outcome(1))</div>'},
    ]},
    {head:"Normalization & Identification",num:"5",cards:[
      {title:"Why Normalization Is Necessary (Not Optional!)",content:'<p>The unnormalized model has too many free parameters:</p><div class="wk-formula">$$y_i^* = \\beta_1 + x_i\'\\beta + \\varepsilon_i, \\quad \\varepsilon_i \\sim N(0, \\sigma^2)$$\n$$P(y=1|x) = \\Phi\\left(\\frac{\\gamma_1 - \\beta_1}{\\sigma} - \\frac{x\'\\beta}{\\sigma}\\right)$$</div><p>The data only identify the <b>ratios</b> $(\\gamma_1-\\beta_1)/\\sigma$ and $\\beta/\\sigma$, not $\\gamma_1$, $\\beta_1$, $\\beta$, and $\\sigma$ separately. Different parameter values give identical probabilities.</p><p><b>Two normalizations needed:</b></p><table class="wk-table"><tr><th>Problem</th><th>Fix</th><th>Convention</th></tr><tr><td><b>Location:</b> shifting everything left/right does not change P</td><td>Fix one cutpoint</td><td>$\\gamma_1 = 0$ (or $\\beta_1 = 0$)</td></tr><tr><td><b>Scale:</b> multiplying everything by constant does not change P</td><td>Fix error variance</td><td>Probit: $\\sigma^2 = 1$. Logit: by convention</td></tr></table><div class="wk-highlight">💡 This is why ordered-model coefficients are NOT "absolute structural effects." They are effects on a <b>normalized</b> latent scale. Only predicted probabilities have direct economic meaning.</div>'},
    ]},
    {head:"Parallel Regression Assumption",num:"6",cards:[
      {title:"The Most Important Assumption to Test",content:'<p>The ordered model writes each cumulative probability as:</p><div class="wk-formula">$$Pr(y \\leq m | x) = F(\\tau_m - x\\beta), \\quad m = 1, \\ldots, J-1$$</div><p>This is equivalent to $J-1$ binary regressions (y≤1 vs y>1, y≤2 vs y>2, etc.) all sharing the <b>same slope vector $\\beta$</b>. Only the threshold $\\tau_m$ changes.</p><p><b>What this means:</b> The effect of education on crossing the "disagree/neutral" boundary must be identical to its effect on crossing the "neutral/agree" boundary. If this is NOT true, the model is misspecified.</p><div class="wk-exam">📝 <b>Testing:</b> Brant test (ologit), or compare ordered model to J−1 separate binary regressions. If coefficients are "close," the assumption holds. If rejected → consider: generalized ordered logit (gologit2), multinomial logit, or stereotype model.</div>'},
    ]},
  ]},
  week8:{title:"Week 9 — Unordered Response Models",subtitle:"Random Utility · Conditional Logit · Multinomial Logit · IIA · Multinomial Probit · Nested Logit",sections:[
    {head:"Why Unordered Models?",num:"1",cards:[
      {title:"The Problem: Multiple Choices with No Ranking",content:'<p>When the dependent variable has multiple categories but <b>no natural ordering</b>, ordered models are inappropriate. Examples:</p><ul><li>Transport mode: car, bus, train, air</li><li>Insurance: JKN vs private vs others (Indonesia)</li><li>Brand choice, voting choice, location choice</li></ul><p><b>Why not ordered logit?</b> Ordered models assume categories lie on a single latent scale — "car" is not "more" or "less" than "bus." The categories are just <b>different labels</b>.</p><div class="wk-highlight">💡 <b>Decision rule:</b> If categories have a ranking (disagree → agree) → ordered model. If categories are just different labels (car / bus / train) → unordered model.</div>'},
    ]},
    {head:"Random Utility Framework",num:"2",cards:[
      {title:"The Foundation: Choose the Highest Utility",content:'<p>Unordered choice models rest on a <span class="wk-key">random utility model</span>. Each alternative $j$ gives utility to person $i$:</p><div class="wk-formula">$$U_{ij} = \\mu_{ij} + \\varepsilon_{ij}$$\n$$\\mu_{ij} = \\text{systematic (observed) component}$$\n$$\\varepsilon_{ij} = \\text{random (unobserved) component}$$</div><p>Person $i$ chooses alternative $j$ if it gives the <b>highest utility</b>:</p><div class="wk-formula">$$y_i = j \\quad \\text{if} \\quad U_{ij} = \\max\\{U_{i1}, \\ldots, U_{iM}\\}$$</div><p>The choice probability is then:</p><div class="wk-formula">$$P(y_i = j) = P(U_{ij} > U_{ik} \\; \\forall \\; k \\neq j)$$</div><div class="wk-exam">📝 This "choose the max" framework is the most important structural idea in unordered choice. Every model variant — CLM, MNL, MNP, nested logit — builds on this.</div>'},
      {title:"From Utility to Probability: The Extreme Value Assumption",content:'<p>Computing $P(\\max)$ for several random variables is hard in general. The lecture shows that a convenient closed form arises if:</p><ul><li>Disturbances $\\varepsilon_{ij}$ are <b>mutually independent</b></li><li>Each follows a <span class="wk-key">Type I Extreme Value</span> (log Weibull) distribution: $F(t) = \\exp\\{-e^{-t}\\}$</li></ul><p>Under this assumption, the choice probability becomes the <b>softmax</b>:</p><div class="wk-formula">$$P(y_i = j) = \\frac{\\exp(\\mu_{ij})}{\\sum_{h=1}^{M} \\exp(\\mu_{ih})}$$</div><p>Properties: $0 \\leq P \\leq 1$ and $\\sum_j P = 1$ automatically. This is the foundation of all logit-based multinomial models.</p><div class="wk-highlight">💡 <b>Normalization:</b> The location of utility is arbitrary (shifting all utilities by a constant does not change choices). So we normalize one alternative as the <b>reference</b>: $\\mu_{i1} = 0$.</div>'},
    ]},
    {head:"Conditional Logit Model (CLM)",num:"3",cards:[
      {title:"When Regressors Describe the Alternatives",content:'<p>The <span class="wk-key">Conditional Logit Model</span> specifies:</p><div class="wk-formula">$$\\mu_{ij} = x_{ij}\'\\beta$$</div><p>where $x_{ij}$ varies by <b>both individual $i$ and alternative $j$</b> — these are <b>alternative-specific</b> attributes like travel time, travel cost, price, product features. The coefficient vector $\\beta$ is <b>common</b> across all alternatives.</p><div class="wk-formula">$$P(y_i = j) = \\frac{\\exp(x_{ij}\'\\beta)}{\\sum_{h=1}^{M} \\exp(x_{ih}\'\\beta)}$$</div><div class="wk-exam">📝 <b>Key:</b> CLM = regressors on the alternatives (with subscript $j$), common coefficients. A negative $\\beta$ on travel time means longer travel time lowers utility → lowers choice probability.</div>'},
      {title:"CLM Marginal Effects",content:'<p>The own and cross marginal effects have an elegant structure:</p><div class="wk-formula">$$\\text{Own effect: } \\frac{\\partial P(y=j)}{\\partial x_{jk}} = P_j(1 - P_j) \\cdot \\beta_k$$\n$$\\text{Cross effect: } \\frac{\\partial P(y=j)}{\\partial x_{hk}} = -P_j \\cdot P_h \\cdot \\beta_k \\quad (h \\neq j)$$</div><p><b>Intuition:</b> Improving alternative $j$ raises its own probability (own effect). Improving a <b>different</b> alternative $h$ steals probability from $j$ (cross effect — always negative for the other alternatives).</p>'},
    ]},
    {head:"Multinomial Logit Model (MNL)",num:"4",cards:[
      {title:"When Regressors Describe the Individual",content:'<p>The <span class="wk-key">Multinomial Logit Model</span> specifies:</p><div class="wk-formula">$$\\mu_{ij} = x_i\'\\beta_j$$</div><p>Here $x_i$ has <b>no $j$ subscript</b> — these are individual-level characteristics (age, gender, income). Instead, the coefficient vector $\\beta_j$ <b>varies by alternative</b>. One alternative is normalized as base ($\\beta_1 = 0$):</p><div class="wk-formula">$$P(y_i = j) = \\frac{\\exp(x_i\'\\beta_j)}{1 + \\sum_{h=2}^{M} \\exp(x_i\'\\beta_h)}$$</div><p>If $M = 2$, this collapses back to binary logit.</p><div class="wk-highlight">💡 <b>CLM vs MNL — the central distinction:</b><br>CLM: $x_{ij}\'\\beta$ → regressors on alternatives, common $\\beta$.<br>MNL: $x_i\'\\beta_j$ → regressors on individual, alternative-specific $\\beta_j$.</div>'},
      {title:"MNL Interpretation: Odds Ratios",content:'<p>Direct marginal effects are complex. A cleaner interpretation uses <b>odds ratios</b> relative to the base category:</p><div class="wk-formula">$$\\frac{P(y_i = j | x_i)}{P(y_i = 0 | x_i)} = \\exp(x_i\'\\beta_j)$$\n$$\\ln\\left(\\frac{P(y_i = j)}{P(y_i = 0)}\\right) = x_i\'\\beta_j$$</div><p>So $\\beta_{jk}$ = change in log-odds of choosing alternative $j$ over base when $x_k$ increases by one unit. Much simpler than the full partial effect formula.</p><div class="wk-exam">📝 <b>Exam strategy:</b> For MNL, always interpret via log-odds relative to base category. The direct probability formula is messy — odds ratios are what the model is "designed" for.</div>'},
    ]},
    {head:"IIA — The Critical Weakness",num:"5",cards:[
      {title:"Independence of Irrelevant Alternatives",content:'<p><span class="wk-key">IIA</span> says the relative odds of choosing one alternative over another <b>do not depend</b> on what other alternatives exist:</p><div class="wk-formula">$$\\frac{P(y=j)}{P(y=k)} = \\frac{\\exp(\\mu_{ij})}{\\exp(\\mu_{ik})} \\quad \\text{independent of other alternatives}$$</div><p>This comes from the independence of the $\\varepsilon_{ij}$ disturbances. It is both a strength (clean math) and a serious weakness (unrealistic for close substitutes).</p><p><b>Red bus / blue bus:</b> If someone likes red bus, they likely also like blue bus. Adding red bus should mainly steal from blue bus, not proportionally from all modes. IIA forces proportional substitution — clearly wrong here.</p><div class="wk-exam">📝 If IIA is violated, MNL coefficient estimates become <b>biased and inconsistent</b>. Testing: <span class="wk-key">Hausman-McFadden (1984) test</span> — estimate with all alternatives, then with a subset. If estimates differ significantly → IIA fails.</div>'},
    ]},
    {head:"Relaxing IIA: MNP and Nested Logit",num:"6",cards:[
      {title:"Multinomial Probit (MNP)",content:'<p><span class="wk-key">Multinomial Probit</span> replaces extreme-value errors with a <b>joint normal distribution</b>:</p><div class="wk-formula">$$U_{ij} = x_{ij}\'\\beta + \\varepsilon_{ij}, \\quad \\varepsilon_i \\sim N(0, \\Sigma)$$</div><p>The covariance matrix $\\Sigma$ allows <b>correlation across alternatives</b> — exactly what MNL cannot do. This breaks IIA: if red bus and blue bus share correlated unobservables, adding one changes the odds between the other and car.</p><p><b>Price:</b> Choice probabilities require $(J-1)$-variate normal integration — no closed form. Estimation uses <b>simulation methods</b> (GHK simulator), which is computationally expensive.</p><div class="wk-highlight">💡 If you set $\\Sigma = I$ (identity), MNP gives results very similar to MNL. The real power of MNP comes from <b>flexible correlation</b> across alternatives.</div>'},
      {title:"Nested Logit",content:'<p><span class="wk-key">Nested Logit</span> groups alternatives into <b>branches</b> (nests). IIA holds <b>within each nest</b> but <b>not across nests</b>:</p><div class="wk-formula">Example tree:\n  Private transport → car\n  Public transport  → train, bus\n\nIIA holds: train vs bus (within "public")\nIIA relaxed: car vs public transport</div><p>The unconditional probability combines within-branch and between-branch choices:</p><div class="wk-formula">$$P_{ijb} = \\frac{\\exp(x_{ij|b}\'\\beta + z_{ib}\'\\gamma)}{\\sum_{b=1}^{B} \\sum_{j=1}^{J_b} \\exp(x_{ij|b}\'\\beta + z_{ib}\'\\gamma)}$$</div><p><b>Estimation:</b> Two approaches: (1) two-step limited information (within-branch logit → inclusive values → branch-level logit), or (2) FIML jointly.</p><div class="wk-exam">📝 <b>Main weakness:</b> You must choose the tree structure, and results may depend on how branches are defined. There is no well-defined test for comparing tree structures — this is a genuine limitation.</div>'},
    ]},
    {head:"Model Selection Summary",num:"7",cards:[
      {title:"Which Model When?",content:'<table class="wk-table"><tr><th>Model</th><th>Regressors</th><th>IIA?</th><th>When to Use</th></tr><tr><td><b>Conditional Logit</b></td><td>Alternative-specific $x_{ij}$, common $\\beta$</td><td>Yes (holds)</td><td>Regressors are features of alternatives (price, time, quality)</td></tr><tr><td><b>Multinomial Logit</b></td><td>Individual-specific $x_i$, alternative-specific $\\beta_j$</td><td>Yes (holds)</td><td>Regressors are person characteristics (age, income, gender)</td></tr><tr><td><b>Multinomial Probit</b></td><td>$x_{ij}$, flexible $\\Sigma$</td><td><b>No</b></td><td>Need flexible substitution patterns, correlated alternatives</td></tr><tr><td><b>Nested Logit</b></td><td>Within + between branch vars</td><td>Within nests only</td><td>Alternatives group naturally into branches</td></tr></table><div class="wk-highlight">💡 <b>The tradeoff:</b> CLM/MNL are easy to estimate but impose IIA. MNP is flexible but computationally hard. Nested logit is a practical middle ground if you can define sensible nests.</div>'},
    ]},
    {head:"Three Data Structures (PPT 5)",num:"8",cards:[
      {title:"Chooser-Specific vs Choice-Specific vs Mixed",content:'<p>The PPT distinguishes <b>three data structures</b> for multinomial models:</p><table class="wk-table"><tr><th>Case</th><th>What Varies</th><th>Example Regressors</th><th>Model</th></tr><tr><td><b>1. Chooser-specific</b></td><td>Across people, NOT alternatives</td><td>Age, income, gender, religion</td><td>Multinomial Logit (MNL)</td></tr><tr><td><b>2. Choice-specific</b></td><td>Across alternatives AND people</td><td>Price, travel time, product features</td><td>Conditional Logit (CLM)</td></tr><tr><td><b>3. Mixed</b></td><td>Both person and alternative characteristics</td><td>Income + price + time</td><td>Combined / Mixed logit</td></tr></table><div class="wk-exam">📝 <b>CLM data format:</b> Requires <b>long format</b> — one row per person-alternative combination. If 152 people × 3 modes = 456 rows. In Stata: <code>clogit choice x1 x2, group(id)</code>.</div>'},
      {title:"MNL Interpretation: Base Category & Predicted Probabilities",content:'<p><b>Key property:</b> Changing the base category does NOT change fitted probabilities — only how coefficients are written.</p><p><b>Predicted probabilities</b> are the best interpretation tool. In the family-vacation example (Bus/Car/Train), car probability rises sharply with family size (0.27 → 0.87 as size 1→5).</p><div class="wk-highlight">💡 <b>Practical lesson:</b> Raw MNL coefficients are relative to a base and hard to compare across alternatives. <b>Marginal effects</b> and <b>predicted probabilities</b> are always more informative than raw coefficients.</div><div class="wk-exam">📝 <b>IIA tests in practice:</b> The PPT explicitly warns that Hausman-McFadden and Small-Hsiao tests are often inconsistent and provide little guidance. Economic reasoning about whether alternatives are truly distinct matters more than formal tests.</div>'},
    ]},
  ]},
  week9:{title:"Week 10 — Count Data Models",subtitle:"Poisson Regression · Equidispersion · Overdispersion · Negative Binomial I & II · QMLE · Factor & Percent Change",sections:[
    {head:"Why Count Data Models?",num:"1",cards:[
      {title:"Count Outcomes Need Special Treatment",content:'<p>A <span class="wk-key">count variable</span> records how many times something happens: $y_i = 0, 1, 2, 3, \\ldots$</p><p>Examples: patents per firm, articles per PhD, supermarket visits, doctor visits, crimes per area.</p><p><b>Why not OLS?</b> OLS can predict negative counts — nonsensical. <b>Why not ordered logit?</b> Counts have <b>cardinal meaning</b> (4 is really twice 2) and no natural upper bound, unlike ordered categories.</p><p><b>Solution:</b> Use the <b>exponential conditional mean</b>:</p><div class="wk-formula">$$E(y_i | x_i) = \\exp(x_i\'\\beta) = \\lambda_i$$</div><p>The exponential guarantees $E(y) > 0$ always. This is the foundation of all count models.</p>'},
    ]},
    {head:"Poisson Regression",num:"2",cards:[
      {title:"The Poisson Model",content:'<p>Assume $y_i | x_i \\sim \\text{Poisson}(\\lambda_i)$ with $\\lambda_i = \\exp(x_i\'\\beta)$:</p><div class="wk-formula">$$P(y_i = y | x_i) = \\frac{e^{-\\lambda_i} \\lambda_i^y}{y!}, \\quad y = 0, 1, 2, \\ldots$$</div><p><b>Elegance:</b> One parameter $\\lambda_i$ determines the entire distribution. Once you know the mean, you know all probabilities.</p><p><b>Example:</b> If $\\lambda = 2$: P(0)=0.135, P(1)=0.271, P(2)=0.271, P(3)=0.180. If $\\lambda = 3$: distribution shifts right — P(0) drops to 0.050, P(4+) rises to 0.353.</p>'},
      {title:"The Equidispersion Problem",content:'<p>Poisson imposes the <span class="wk-key">equidispersion</span> restriction:</p><div class="wk-formula">$$\\text{Var}(y_i | x_i) = E(y_i | x_i) = \\lambda_i$$</div><p>In real data, the variance is almost always <b>larger</b> than the mean. This is called <span class="wk-key">overdispersion</span>.</p><p><b>Example:</b> Patents data — mean = 73.6, sd = 151. Variance ≫ mean → strong overdispersion.</p><div class="wk-exam">📝 <b>Consequence:</b> If overdispersion exists, Poisson standard errors are <b>too small</b> → false significance. Coefficients may still be OK for the mean, but inference is wrong without correction.</div>'},
    ]},
    {head:"Poisson Estimation & QMLE",num:"3",cards:[
      {title:"MLE and the Robustness Result",content:'<p>Poisson log-likelihood:</p><div class="wk-formula">$$\\ln L(\\beta) = \\sum_i \\left[ -\\exp(x_i\'\\beta) + y_i(x_i\'\\beta) - \\ln(y_i!) \\right]$$</div><p><b>Deep insight:</b> Even if the true distribution is NOT Poisson, the Poisson estimator can still <b>consistently estimate $\\beta$</b> as long as $E(y|x) = \\exp(x\'\\beta)$ is correct. This is <span class="wk-key">Quasi-MLE (QMLE)</span>.</p><p>But you MUST use <b>robust (sandwich) standard errors</b>:</p><div class="wk-formula">$$V_{QMLE} = [I(\\beta)]^{-1} J(\\beta) [I(\\beta)]^{-1}$$</div><div class="wk-highlight">💡 <b>Practical rule:</b> A large difference between ordinary and robust SEs is a strong sign of Poisson misspecification (overdispersion), even if the mean model is fine.</div>'},
    ]},
    {head:"Interpretation of Count Model Coefficients",num:"4",cards:[
      {title:"Three Ways to Interpret β",content:'<table class="wk-table"><tr><th>Interpretation</th><th>Formula</th><th>What It Means</th></tr><tr><td><b>Semi-elasticity</b></td><td>$\\beta_k$</td><td>1-unit ↑ in $x_k$ → expected count changes by ~$100 \\times \\beta_k$%</td></tr><tr><td><b>Factor change</b></td><td>$\\exp(\\beta_k)$</td><td>Expected count is <b>multiplied</b> by $\\exp(\\beta_k)$</td></tr><tr><td><b>Percent change</b></td><td>$100[\\exp(\\beta_k) - 1]$</td><td>Exact % change in expected count</td></tr></table><p>For <b>dummy variables</b>: $E(y|D=1)/E(y|D=0) = \\exp(\\beta_k)$. So switching 0→1 multiplies expected count by $\\exp(\\beta_k)$.</p><p>For <b>log regressors</b> ($x_k = \\ln X_k$): $\\beta_k$ is an <b>elasticity</b> — 1% ↑ in $X_k$ → ~$\\beta_k$% ↑ in expected count.</p><div class="wk-exam">📝 Example: $\\beta_{\\text{fem}} = -0.223$. Factor = $e^{-0.223} = 0.80$. Being female lowers expected articles to 80% of male baseline (≈20% reduction).</div>'},
      {title:"Marginal Effects (Absolute)",content:'<p>The marginal effect for continuous $x_k$ is:</p><div class="wk-formula">$$\\frac{\\partial E(y|x)}{\\partial x_k} = E(y|x) \\cdot \\beta_k = \\exp(x\'\\beta) \\cdot \\beta_k$$</div><p><b>Key point:</b> The marginal effect is NOT constant — it scales with the current expected count. Higher $\\lambda$ → bigger absolute effect.</p>'},
    ]},
    {head:"Negative Binomial Models",num:"5",cards:[
      {title:"NegBin I vs NegBin II",content:'<p>Both keep the same mean $E(y|x) = \\exp(x\'\\beta)$ but relax the variance:</p><table class="wk-table"><tr><th>Model</th><th>Variance</th><th>Overdispersion Pattern</th></tr><tr><td><b>Poisson</b></td><td>$\\lambda$</td><td>None (equidispersion)</td></tr><tr><td><b>NegBin I</b></td><td>$(1+\\delta^2)\\lambda$</td><td>Constant proportional overdispersion</td></tr><tr><td><b>NegBin II</b></td><td>$(1+\\alpha^2\\lambda)\\lambda$</td><td>Overdispersion grows with mean</td></tr></table><div class="wk-highlight">💡 <b>NegBin II is usually preferred</b> because: (1) more flexible variance, (2) robust to misspecification of conditional variance (like Poisson QMLE), (3) higher log-likelihood in practice.</div>'},
      {title:"Testing Poisson vs Negative Binomial",content:'<p>Test $H_0$: overdispersion parameter = 0 (Poisson is adequate).</p><div class="wk-formula">$$G^2 = -2[\\ln L_{Poisson} - \\ln L_{NegBin}]$$</div><p><b>Important subtlety:</b> Because the overdispersion parameter cannot be negative, the null is on the <b>boundary</b> of the parameter space. At 95% confidence, use the <b>90th percentile</b> of $\\chi^2(1)$: reject if $G^2 > 2.71$ (not the usual 3.84).</p><div class="wk-exam">📝 In Stata: the LR test is reported automatically after <code>nbreg</code>. The line reads: <code>Likelihood-ratio test of alpha=0: chibar2(01) = xxx</code>. If significant → overdispersion exists → prefer NegBin.</div>'},
    ]},
    {head:"Stata Commands Summary",num:"6",cards:[
      {title:"Poisson & Negative Binomial in Stata",content:'<div class="wk-formula">Poisson:\n  poisson y x1 x2 x3, nolog robust\n  poisson y x1 x2 x3, nolog irr    (reports exp(β) directly)\n\nNegative Binomial:\n  nbreg y x1 x2 x3, nolog\n  nbreg y x1 x2 x3, nolog irr\n\nPost-estimation:\n  listcoef                (factor & % change)\n  margins, dydx(*)        (marginal effects)\n  predict mu              (predicted counts)</div><p><b>Key options:</b> <code>irr</code> = incidence-rate ratio ($\\exp(\\beta)$), <code>robust</code> = sandwich SEs, <code>exposure(var)</code> = offset for different exposure times, <code>cluster(var)</code> = clustered SEs.</p>'},
    ]},
  ]},
  exam1:{title:"📝 UTS Kholis — Genap 2022/2023",subtitle:"Soal 1: MLE Poisson · Soal 2: Logit Credit Approval · Soal 3: Probit Dana Desa · Soal 4: MNL UTBK Strategy",sections:[
    {head:"Soal 1 — MLE (25 Poin)",num:"1",cards:[
      {title:"(a) Perbedaan OLS vs MLE (5 Poin)",content:'<div class="wk-highlight">💡 <b>Model Answer:</b></div><table class="wk-table"><tr><th>Aspek</th><th>OLS</th><th>MLE</th></tr><tr><td>Prinsip</td><td>Minimisasi $\\sum \\hat{u}_i^2$</td><td>Maksimisasi $L(\\theta;y)$</td></tr><tr><td>Asumsi distribusi</td><td>Tidak memerlukan (kecuali normalitas untuk inferensi)</td><td>Memerlukan spesifikasi distribusi (Poisson, Normal, Logistic, dll)</td></tr><tr><td>Properti</td><td>BLUE (under Gauss-Markov)</td><td>BAN: Consistent, Asymptotically Normal, Efficient</td></tr><tr><td>Solusi</td><td>Closed-form: $\\hat{\\beta}=(X\'X)^{-1}X\'Y$</td><td>Iteratif (Newton-Raphson), umumnya tidak closed-form</td></tr><tr><td>Aplikasi</td><td>Y kontinu, linear</td><td>Semua jenis Y: binary, count, ordered, dsb</td></tr></table>'},
      {title:"(b) Langkah-langkah MLE (5 Poin)",content:'<div class="wk-formula">Langkah MLE:\n1. Tulis fungsi likelihood: L(θ) = Π f(yᵢ; θ)\n2. Ambil log: ln L = Σ ln f(yᵢ; θ)\n3. Turunkan terhadap θ: ∂ln L/∂θ = 0 (FOC / Score)\n4. Selesaikan untuk θ̂_MLE\n5. Verifikasi: ∂²ln L/∂θ² < 0 (konfirmasi maximum)</div>'},
      {title:"(c) MLE untuk Distribusi Poisson (15 Poin)",content:'<p>Given: $f(x|\\theta) = \\theta^x e^{-\\theta} / x!$</p><div class="wk-formula">$$(i) \\text{ Likelihood: } L(\\theta) = \\prod_{i=1}^{n} \\frac{\\theta^{x_i} e^{-\\theta}}{x_i!} = \\frac{\\theta^{\\sum x_i} e^{-n\\theta}}{\\prod x_i!}$$\n$$\\text{Log-likelihood: } \\ln L = \\sum x_i \\ln\\theta - n\\theta - \\sum \\ln(x_i!)$$\n\n$$(ii) \\text{ FOC: } \\frac{\\partial \\ln L}{\\partial \\theta} = \\frac{\\sum x_i}{\\theta} - n = 0$$\n\n$$(iii) \\text{ Solusi: } \\hat{\\theta}_{MLE} = \\frac{\\sum x_i}{n} = \\bar{X}$$</div><div class="wk-exam">📝 MLE Poisson: estimator θ̂ = rata-rata sampel. Verifikasi SOC: ∂²ln L/∂θ² = −Σxᵢ/θ² < 0 ✓ (maximum).</div>'},
    ]},
    {head:"Soal 2 — Logit Credit Approval (25 Poin)",num:"2",cards:[
      {title:"(a-b) Logit vs LPM (10 Poin)",content:'<p><b>(a) Perbedaan mendasar:</b> LPM: $P(Y=1|X) = X\\beta$ (linear, unbounded). Logit: $P(Y=1|X) = \\Lambda(X\\beta) = e^{X\\beta}/(1+e^{X\\beta})$ (S-curve, bounded 0-1). LPM coefficients = marginal effects langsung. Logit coefficients = perubahan log-odds.</p><p><b>(b) Mengapa Logit lebih baik:</b> (1) LPM bisa prediksi P<0 atau P>1. (2) LPM inherently heteroscedastic: Var(ε)=P(1−P). (3) LPM asumsikan ME konstan — tidak realistis. (4) Error LPM non-normal untuk binary Y.</p>'},
      {title:"(c) Odds Ratio — married & lginc (5 Poin)",content:'<div class="wk-formula">$$OR_{married} = e^{0.3561} = 1.428$$\n$$OR_{lginc} = e^{0.1341} = 1.143$$</div><p><b>Interpretasi married:</b> Orang yang menikah memiliki odds persetujuan kredit 1.428 kali (42.8% lebih tinggi) dibanding yang belum menikah, ceteris paribus. Signifikan pada 5% (p=0.018).</p><p><b>Interpretasi lginc:</b> Kenaikan 1 unit ln(income) meningkatkan odds persetujuan kredit sebesar 14.3%. Namun TIDAK signifikan (p=0.296).</p>'},
      {title:"(d-e) Signifikansi (10 Poin)",content:'<p><b>(d) lginc:</b> z=1.05, p=0.296 > 0.05 dan > 0.10. Tidak signifikan pada level konvensional manapun. Gagal tolak H₀: β_lginc=0. Pendapatan tidak berpengaruh signifikan.</p><p><b>(e) Model keseluruhan:</b> LR chi2(4)=10.93, p=0.0274 < 0.05. Model signifikan secara keseluruhan pada 5%. Namun Pseudo R²=0.0074 sangat rendah — variabel yang digunakan hanya menjelaskan sebagian kecil variasi.</p><div class="wk-exam">📝 Penting: Model bisa signifikan overall (LR test) tapi punya explanatory power rendah (Pseudo R²). Ini berarti variabel membantu, tapi masih banyak faktor lain yang belum masuk model.</div>'},
    ]},
    {head:"Soal 3 — Probit Dana Desa (25 Poin)",num:"3",cards:[
      {title:"(a) Persamaan & Perbedaan Logit vs Probit (5 Poin)",content:'<table class="wk-table"><tr><th>Persamaan</th><th>Perbedaan</th></tr><tr><td>Keduanya untuk binary Y</td><td>Logit: CDF logistik Λ(z), Probit: CDF normal Φ(z)</td></tr><tr><td>Keduanya S-shaped, P ∈ (0,1)</td><td>Logit: ekor lebih tebal (heavier tails)</td></tr><tr><td>Estimasi via MLE</td><td>Logit punya odds ratio natural; Probit tidak</td></tr><tr><td>Hasil prediksi hampir identik</td><td>Konversi: β_logit ≈ 1.81 × β_probit</td></tr><tr><td>ME tergantung semua X</td><td>ME logit: β·P(1−P); ME probit: φ(Xβ)·β</td></tr></table>'},
      {title:"(b) Signifikansi Model & Variabel (5 Poin)",content:'<p><b>Overall:</b> LR chi2(5)=22378.14, p=0.0000. Model sangat signifikan. Pseudo R²=0.2157 (cukup baik untuk probit).</p><p><b>Per variabel (α=5%):</b></p><table class="wk-table"><tr><th>Variabel</th><th>z</th><th>p</th><th>Signifikan?</th></tr><tr><td>deltajpm</td><td>114.29</td><td>0.000</td><td style="color:green"><b>Ya ✓</b></td></tr><tr><td>jp</td><td>−16.23</td><td>0.000</td><td style="color:green"><b>Ya ✓</b></td></tr><tr><td>idm</td><td>17.41</td><td>0.000</td><td style="color:green"><b>Ya ✓</b></td></tr><tr><td>lw</td><td>−3.83</td><td>0.000</td><td style="color:green"><b>Ya ✓</b></td></tr><tr><td>djawa</td><td>0.31</td><td>0.758</td><td style="color:red"><b>Tidak ✗</b></td></tr></table>'},
      {title:"(c) Interpretasi Koefisien Probit (5 Poin)",content:'<p>Koefisien probit mempengaruhi <b>latent variable y*</b>, bukan probabilitas langsung:</p><div class="wk-formula">deltajpm β=0.0031: Kenaikan 1 orang penduduk miskin → y* naik 0.0031 → probabilitas DD naik ↑\njp β=−0.0000393: Populasi lebih besar → y* turun → probabilitas DD naik ↓\nidm β=0.9195: Skor IDM lebih tinggi (desa lebih maju) → y* naik kuat → DD naik ↑↑\nlw β=−0.000301: Luas wilayah lebih besar → y* turun → DD turun ↓\ndjawa: TIDAK signifikan — lokasi Jawa/luar Jawa tidak berpengaruh</div><div class="wk-highlight">💡 Koefisien probit BUKAN marginal effect! Harus hitung ME terpisah untuk interpretasi probabilitas.</div>'},
      {title:"(d) Marginal Effects (5 Poin)",content:'<p>ME dievaluasi pada mean (P̄=0.521):</p><div class="wk-formula">deltajpm ME=0.00125: +1 penduduk miskin → P(DD naik) ↑ 0.125 pp\njp ME=−0.0000157: +1 penduduk → P(DD naik) ↓ 0.00157 pp\nidm ME=0.3663: +1 unit skor IDM → P(DD naik) ↑ 36.63 pp (EFEK TERBESAR)\nlw ME=−0.00012: +1 hektar → P(DD naik) ↓ 0.012 pp\ndjawa ME=0.0017: Tidak signifikan (p=0.758)</div>'},
      {title:"(e) Pendapat & Saran Kebijakan (5 Poin)",content:'<p><b>Temuan:</b> Protes Pemerintah Desa SEBAGIAN BENAR:</p><p>1. deltajpm positif signifikan → desa yang penduduk miskinnya BERTAMBAH justru mendapat kenaikan DD. Jadi klaim "mengurangi kemiskinan = disinsentif" TERBUKTI — desa yang berhasil kurangi kemiskinan justru dirugikan.</p><p>2. IDM positif signifikan (efek terbesar!) → desa dengan skor IDM tinggi (lebih maju) lebih mungkin dapat kenaikan DD. Ini MENGKONFIRMASI protes bahwa alokasi menguntungkan desa maju.</p><p><b>Saran kebijakan:</b> (1) Reformulasi alokasi DD agar memberi bobot lebih pada desa tertinggal (IDM rendah). (2) Berikan insentif bagi desa yang berhasil mengurangi kemiskinan, bukan sebaliknya. (3) Pertimbangkan faktor kebutuhan (luas wilayah, populasi) lebih proporsional.</p>'},
    ]},
    {head:"Soal 4 — MNL UTBK Strategy (25 Poin)",num:"4",cards:[
      {title:"(a) Metode yang tepat (2 Poin)",content:'<p><b>Multinomial Logit (MNL)</b> karena: (1) Y memiliki 3 kategori (bimbel offline, online, mandiri) yang TIDAK berurutan (unordered). (2) Regressors (skor, jenis kelamin, sekolah) adalah karakteristik INDIVIDU. (3) MNL cocok untuk chooser-specific data dengan unordered outcomes.</p>'},
      {title:"(b) Interpretasi Koefisien Signifikan — Output A (5 Poin)",content:'<p>Base = bimbel_offline. Variabel signifikan (p<0.05):</p><div class="wk-formula"><b>Bimbel Online vs Offline:</b>\nmath β=−0.099 (p=0.003): ↑1 skor math → log-odds online vs offline ↓ 0.099\nscience β=0.096 (p=0.002): ↑1 skor science → log-odds online vs offline ↑ 0.096\n\n<b>Belajar Mandiri vs Offline:</b>\nmath β=−0.115 (p=0.002): ↑1 skor math → log-odds mandiri vs offline ↓ 0.115\nscience β=0.065 (p=0.038): ↑1 skor science → log-odds mandiri vs offline ↑ 0.065\nsocial β=−0.067 (p=0.015): ↑1 skor social → log-odds mandiri vs offline ↓ 0.067\nschool_type β=−1.728 (p=0.033): sekolah swasta (=2) vs negeri (=1) → log-odds mandiri vs offline ↓ 1.728</div>'},
      {title:"(c) Output A vs Output B — RRR (5 Poin)",content:'<p><b>Output A:</b> Menampilkan raw coefficients (β) = perubahan LOG-ODDS. Sulit diinterpretasi secara intuitif.</p><p><b>Output B:</b> Menampilkan Relative Risk Ratio (RRR) = exp(β). Ini adalah faktor pengali pada odds.</p><p><b>Contoh:</b> math (online vs offline): β=−0.099 → RRR=exp(−0.099)=0.906. Artinya: kenaikan 1 poin math MENGALIKAN odds memilih online vs offline dengan 0.906 — menurunkan odds ~9.4%.</p><p>Keduanya adalah MODEL YANG SAMA — hanya cara pelaporan berbeda. z, p-value, log-likelihood, Pseudo R² semuanya identik.</p>'},
      {title:"(d) Ganti Base Outcome — Output C (5 Poin)",content:'<p><b>Jawaban: TIDAK, hasil substantif TIDAK berbeda.</b></p><p>Output C menggunakan bimbel_online sebagai base (bukan offline). Perhatikan:</p><ul><li>Log-likelihood = −161.472 → SAMA persis</li><li>Pseudo R² = 0.2088 → SAMA</li><li>LR chi2 = 85.25 → SAMA</li></ul><p>Yang berubah: koefisien berubah tanda (math offline vs online = +0.099, kebalikan dari −0.099). Ini karena ln(P₂/P₁) = −ln(P₁/P₂). Predicted probabilities TIDAK berubah.</p><div class="wk-exam">📝 Mengganti base category hanya mengubah "sudut pandang" interpretasi, bukan model atau prediksi.</div>'},
      {title:"(e) Marginal Effect school_type — Output D (4 Poin)",content:'<div class="wk-formula">P(bimbel_online): ME=0.011, p=0.905 → TIDAK signifikan\nP(bimbel_offline): ME=0.190, p=0.023 → SIGNIFIKAN ✓\nP(belajar_mandiri): ME=−0.201, p=0.065 → Signifikan pada 10%</div><p><b>Interpretasi:</b> Siswa sekolah negeri (dibanding swasta) memiliki probabilitas 19.0 pp lebih tinggi memilih bimbel offline, dan 20.1 pp lebih rendah memilih belajar mandiri. Efek pada bimbel online tidak signifikan.</p>'},
      {title:"(f) Goodness of Fit — Output E (4 Poin)",content:'<div class="wk-formula">McFadden R² = 0.209 (cukup baik untuk MNL, ≈ linear R² 0.5-0.6)\nMcFadden Adj R² = 0.091 (setelah penalti kompleksitas)\nCount R² = 0.570 (57% observasi terprediksi benar)\nAdj Count R² = 0.095 (improvement atas naive prediction)\nLR(14) = 85.25, p=0.000 → Model signifikan\nBIC\' = −11.072 (negatif = model lebih baik dari intercept-only)</div><p>Model secara keseluruhan signifikan dan memiliki explanatory power yang moderat.</p>'},
    ]},
  ]},
  exam2:{title:"📝 UTS Ganjil 2024/2025",subtitle:"Q1: Logit & Probit (Extramarital Affairs) · Q2: Ordered Logit (Health Status) · Q3: MNL Fuel Brands · Q4: Poisson Firm Entry",sections:[
    {head:"Question 1 — Logit & Probit: Affairs (25 pts)",num:"1",cards:[
      {title:"1.1 Can we use OLS? (5 pts)",content:'<p><b>No.</b> The dependent variable (affair) is binary (0/1). OLS problems: (1) Can predict P<0 or P>1. (2) Inherent heteroscedasticity: Var(ε)=P(1−P). (3) Non-normal errors. (4) Constant marginal effects unrealistic — the effect of age on affair probability should differ at P=5% vs P=50%. Use Logit or Probit instead.</p>'},
      {title:"1.2a Interpret age & dummy_rating across Results 1.1, 1.2, 1.3 (7 pts)",content:'<p><b>Result 1.1 (logit, raw coefficients):</b></p><div class="wk-formula">age β=−0.057 (p=0.000): ↑1 year age → log-odds of affair ↓ 0.057\ndummy_rating β=−1.449 (p=0.000): being very happy → log-odds of affair ↓ 1.449</div><p><b>Result 1.2 (logit, odds ratios):</b></p><div class="wk-formula">age OR=0.945: each year of age multiplies odds by 0.945 → 5.5% lower odds per year\ndummy_rating OR=0.235: very happy people have odds only 23.5% of others → 76.5% lower odds</div><p><b>Result 1.3 (logit, marginal effects AME):</b></p><div class="wk-formula">age ME=−0.0111: +1 year age → P(affair) ↓ 1.11 pp on average\ndummy_rating ME=−0.283: being very happy → P(affair) ↓ 28.3 pp (discrete change for dummy)</div><div class="wk-highlight">💡 Three levels of the SAME model: (1) β = log-odds change, (2) OR = exp(β) = odds multiplier, (3) ME = actual probability change. Result 1.3 is most interpretable.</div>'},
      {title:"1.2b General Conclusion (3 pts)",content:'<p>Being in a very happy marriage is the strongest deterrent against affairs (OR=0.235, ME=−28.3pp). Age and religiosity also reduce affair probability. More years married increases it. Education has a small negative effect. The model is significant (LR chi2=681.25, p=0.000) but Pseudo R²=0.085 is modest.</p>'},
      {title:"1.3a Compare Logit (1.1) vs Probit (1.4) (5 pts)",content:'<p><b>Cannot interpret the same way</b> because they are on different scales:</p><div class="wk-formula">Logit β_age = −0.0570, Probit β_age = −0.0339\nRatio: 0.0570/0.0339 ≈ 1.68 (close to theoretical 1.81)</div><p>Logit coefficients are larger because logistic variance = π²/3 ≈ 3.29 vs normal variance = 1. The scale factor is √(π²/3) ≈ 1.81. But <b>marginal effects are nearly identical</b>: Logit ME_age=−0.0111, Probit ME_age=−0.0110. This confirms both models give the same substantive conclusions — only the coefficient scale differs.</p>'},
      {title:"1.3b Probit Marginal Effects for age & dummy_rating (5 pts)",content:'<div class="wk-formula">age ME=−0.0110 (p=0.000): Each additional year of age reduces the probability of having an affair by 1.10 percentage points, ceteris paribus.\n\ndummy_rating ME=−0.2878 (p=0.000): Being in a very happy marriage (dummy_rating=1) reduces the probability of an affair by 28.78 percentage points compared to those who are not very happy, ceteris paribus.</div><p>These are virtually identical to the logit marginal effects (−0.0111 and −0.283), confirming logit and probit give the same practical conclusions.</p>'},
    ]},
    {head:"Question 2 — Ordered Logit: Health Status (25 pts)",num:"2",cards:[
      {title:"Section 1: True/False (9 pts)",content:'<p><b>(1) FALSE.</b> Ordered logit coefficients affect the LATENT variable y*, NOT probabilities directly. Effect on middle categories is ambiguous. Must compute marginal effects for probability changes.</p><p><b>(2) FALSE — REVERSED.</b> Ordered LOGIT uses logistic CDF (Λ). Ordered PROBIT uses normal CDF (Φ). The statement swaps them.</p><p><b>(3) FALSE.</b> OR=1.5 means cumulative ODDS of higher category are 1.5× larger. This is NOT a 50% increase in probability of "very satisfied." Probability changes depend on baseline and distribution shape. Must compute ME.</p>'},
      {title:"Section 2: Stata Interpretation (16 pts)",content:'<p><b>(4) Coefficients (6 pts):</b></p><div class="wk-formula">age β=−0.029 (p=0.000): Each additional year of age DECREASES latent health by 0.029 → shifts probability toward lower health categories. Older people tend to report worse health.\n\nincome β=0.284 (p=0.000): Higher income INCREASES latent health by 0.284 → shifts probability toward excellent. Wealthier individuals report better health.\n\nnumberdiseases β=−0.055 (p=0.000): Each additional chronic disease DECREASES latent health by 0.055 → shifts probability toward fair. More diseases = worse reported health.</div><p><b>(5) /cut1 = −1.396 (3 pts):</b> The threshold on the latent scale separating "fair" (category 1) from "good" (category 2). If latent y* ≤ −1.396 → person is classified as "fair." /cut2 = 0.951 separates "good" from "excellent." These are NOT coefficients — they are estimated boundary parameters.</p><p><b>(6) ME of income = 0.063 (4 pts):</b> A one-unit increase in annual family income raises the probability of being in "excellent" health (category 3) by 6.3 percentage points, on average.</p><p><b>(7) Income ↑ by $100 (3 pts):</b> If income is in dollars: 100 × 0.063 = 6.3 pp increase in P(excellent). If income is in thousands: $100 = 0.1 units → 0.1 × 0.063 = 0.63 pp. Check units!</p>'},
    ]},
    {head:"Question 3 — MNL: Fuel Brand Choice (25 pts)",num:"3",cards:[
      {title:"(a) Significant Variables — Result 3.1 (5 pts)",content:'<p>Base = Brand 1. At α=5%:</p><table class="wk-table"><tr><th>Variable</th><th>Brand 2 vs 1</th><th>Brand 3 vs 1</th></tr><tr><td>age_vehicle</td><td>p=0.476 ✗</td><td>p=0.159 ✗</td></tr><tr><td><b>distance</b></td><td><b>p=0.000 ✓</b></td><td><b>p=0.000 ✓</b></td></tr><tr><td>dvehicle</td><td>p=0.079 (10%)</td><td>p=0.563 ✗</td></tr></table><p><b>Distance</b> is the only variable significant at 5% for both alternatives. dvehicle is marginally significant for Brand 2 at 10%.</p>'},
      {title:"(b) Coefficient Interpretation — Result 3.1 (5 pts)",content:'<div class="wk-formula"><b>Brand 2 vs Brand 1:</b>\ndistance β=0.0114 (p=0.000): Each additional km of commute distance increases the log-odds of choosing Brand 2 over Brand 1 by 0.0114, ceteris paribus.\n\n<b>Brand 3 vs Brand 1:</b>\ndistance β=0.0078 (p=0.000): Each additional km increases the log-odds of choosing Brand 3 over Brand 1 by 0.0078.</div><p>Longer commutes shift fuel preference away from Brand 1 toward both Brand 2 and Brand 3, with a stronger effect on Brand 2.</p>'},
      {title:"(c) RRR Interpretation — Result 3.2 (5 pts)",content:'<div class="wk-formula"><b>Brand 2 vs Brand 1:</b>\ndistance RRR=1.0115: Each additional km multiplies the relative risk of choosing Brand 2 over Brand 1 by 1.0115 → 1.15% higher odds per km.\n\n<b>Brand 3 vs Brand 1:</b>\ndistance RRR=1.0078: 0.78% higher odds per km.\n\n<b>Brand 2:</b> dvehicle RRR=1.2074 (p=0.079): Car users have 20.7% higher odds of choosing Brand 2 vs Brand 1 (marginally significant at 10%).</div>'},
      {title:"(d) Marginal Effects — Result 3.3 (5 pts)",content:'<div class="wk-formula"><b>P(Brand 1):</b>\ndistance ME=−0.0024 (p=0.000): +1 km → P(Brand 1) ↓ 0.24 pp\n\n<b>P(Brand 2):</b>\ndistance ME=+0.0018 (p=0.000): +1 km → P(Brand 2) ↑ 0.18 pp\n\n<b>P(Brand 3):</b>\ndistance ME=+0.0006 (p=0.020): +1 km → P(Brand 3) ↑ 0.06 pp</div><p>Note: MEs across all outcomes sum to zero (−0.0024 + 0.0018 + 0.0006 = 0). This is a property of multinomial models — probability mass must be redistributed.</p>'},
      {title:"(e) Conclusions (5 pts)",content:'<p>1. <b>Model validity:</b> LR chi2(6)=68.28 (p=0.000) — model is significant. Pseudo R²=0.013 is very low — limited explanatory power.</p><p>2. <b>Key driver:</b> Commute distance is the dominant factor. Longer commutes shift preference from Brand 1 toward Brand 2 (primarily) and Brand 3.</p><p>3. <b>Vehicle type:</b> Car users have marginally higher preference for Brand 2 (higher-quality fuel for longer distance?).</p><p>4. <b>Vehicle age:</b> Not significant — fuel choice does not depend on vehicle age.</p><p>5. <b>Policy implication:</b> Fuel brand marketing should target consumers based on commute patterns, not vehicle characteristics.</p>'},
    ]},
    {head:"Question 4 — Poisson: Firm Entry (25 pts)",num:"4",cards:[
      {title:"(a) Coefficient Signs & Why Not Direct (5 pts)",content:'<p>All signs align with theory: unemprate (−) discourages entry, avgwage (+) attracts firms, taxrate (−) burdens firms, creditaccess (+) enables startups, popsize (+) larger markets.</p><p><b>Why magnitudes cannot be interpreted directly:</b> Because E(y|x) = exp(x\'β) is NONLINEAR. A 1-unit change in x does NOT change y by β units. It changes y multiplicatively by exp(β). Must use percent change = 100[exp(β)−1] or marginal effects = λ·β.</p>'},
      {title:"(b) Percent Change Interpretation (5 pts)",content:'<div class="wk-formula">unemprate: 100×[exp(−0.016)−1] = −1.6%\n  → +1 pp unemployment → expected new firms ↓ 1.6%\n\navgwage: 100×[exp(0.223)−1] = +25.0%\n  → +$1000 avg wage → expected new firms ↑ 25.0%\n\ntaxrate: 100×[exp(−0.026)−1] = −2.6%\n  → +1 pp tax rate → expected new firms ↓ 2.6%</div>'},
      {title:"(c) Equidispersion Assumption (5 pts)",content:'<p><b>Equidispersion:</b> Poisson assumes Var(y|x) = E(y|x) = λ. The conditional variance EQUALS the conditional mean.</p><p><b>Why important:</b> If violated (overdispersion: Var > Mean), Poisson standard errors are TOO SMALL → z-statistics inflated → false significance. Coefficients may still be consistent (QMLE property), but inference is invalid without correction. This is why testing equidispersion is CRITICAL before trusting Poisson results.</p>'},
      {title:"(d) Deviance GOF Test (5 pts)",content:'<div class="wk-formula">H₀: Poisson model fits (equidispersion holds)\nDeviance = 24,071.07\ndf = 141\np = 0.000 ≪ 0.05\n\nDecision: REJECT H₀</div><p>The model does NOT satisfy equidispersion. There is severe overdispersion — the deviance (24,071) massively exceeds degrees of freedom (141). The Poisson distributional assumption is violated.</p>'},
      {title:"(e) Implications & Alternative Models (5 pts)",content:'<p><b>Implications:</b> (1) Poisson SEs are unreliable — significance is likely overstated. (2) The Poisson distribution is misspecified. (3) Coefficient estimates may still be consistent for the conditional mean (QMLE property) but inference requires robust SEs.</p><p><b>Recommended alternatives:</b></p><p>1. <b>Negative Binomial II (nbreg):</b> Allows Var = (1+α²λ)λ > λ. Preferred — flexible variance, robust to misspecification.</p><p>2. <b>Poisson with robust SEs:</b> poisson ..., robust. Keeps Poisson mean model but uses sandwich estimator for valid inference.</p><p>3. <b>Zero-inflated models:</b> If excess zeros are suspected (ZIP/ZINB).</p><p>4. <b>Quasi-Poisson GLM:</b> Allows scale parameter to differ from 1.</p>'},
    ]},
  ]},

    {head:"Soal 4 — Logit Bank Health: Komputasi (25 Poin)",num:"4",cards:[
      {title:"(a) Analisis Estimasi (McFadden R², LR stat, dsb)",content:'<p><b>Coefficients:</b> KURS (+), INF (+), PDB (+), HSP (+) meningkatkan probabilitas bank sehat. SBUS (−), IHSP (−) menurunkannya.</p><p><b>McFadden R² = 0.751:</b> Sangat tinggi (>0.4 = excellent). Model memiliki explanatory power yang kuat.</p><p><b>Mean dep var = 0.500:</b> Sampel seimbang — 50% bank sehat, 50% tidak sehat.</p><p><b>LR statistic = 5.037, p = 0.539:</b> Model secara keseluruhan TIDAK signifikan pada 5%. Ini kontradiksi dengan R² tinggi — kemungkinan karena sampel kecil (N=24) dan terlalu banyak variabel (6 variabel vs 24 observasi). Overfitting.</p>'},
      {title:"(b) Probabilitas Tahun 2016",content:'<p>Data 2016: KURS=9395, INF=7.97, PDB=33650, HSP=1075.04, SBUS=5.88, IHSP=1</p><div class="wk-formula">$$Xβ = -43.178 + 0.000581(9395) + 0.198(7.97) + 0.001299(33650) + 0.00127(1075.04) - 1.341(5.88) - 0.231(1)$$\n$$= -43.178 + 5.458 + 1.579 + 43.711 + 1.365 - 7.885 - 0.231$$\n$$= 0.819$$\n$$P = \\frac{e^{0.819}}{1+e^{0.819}} = \\frac{2.268}{3.268} = 0.694$$</div><p>Probabilitas bank sehat pada 2016 ≈ <b>69.4%</b>.</p>'},

      {title:"(d) Marginal Effect PDB pada 2015",content:'<p>Data 2015: Harus hitung P₂₀₁₅ terlebih dahulu menggunakan data 2015:</p><div class="wk-formula">$$ME_{PDB} = \\beta_{PDB} \\times P(1-P)$$\n$$= 0.001299 \\times P_{2015} \\times (1 - P_{2015})$$</div><p>Substitusikan data 2015 (KURS=8780, INF=6.79, PDB=33793, HSP=1032.70, SBUS=5.84, IHSP=0) ke Xβ, hitung P₂₀₁₅, lalu ME.</p><div class="wk-exam">📝 Kunci: ME logit = β·P(1−P). Harus hitung P pada titik evaluasi terlebih dahulu. ME TIDAK konstan — tergantung P yang tergantung semua X.</div>'},
      {title:"(e) Odds Ratio pada 2016",content:'<div class="wk-formula">$$\\text{Odds}_{2016} = \\frac{P_{2016}}{1 - P_{2016}} = \\frac{0.694}{0.306} = 2.268$$</div><p><b>Interpretasi:</b> Pada tahun 2016, odds bank sehat adalah 2.268 — artinya bank 2.27 kali lebih mungkin sehat dibanding tidak sehat, given nilai variabel makroekonomi 2016.</p><p>Catatan: ini juga sama dengan exp(Xβ) = exp(0.819) = 2.268 ✓</p>'},

// SVG UTILITIES — DON'T TOUCH
function mkEl(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function gLine(svg,x1,y1,x2,y2,color,width,dash){const l=mkEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':width||1.5});if(dash)l.setAttribute('stroke-dasharray',dash);svg.appendChild(l)}
function gPath(svg,d,color,width,fill,dash){const el=mkEl('path',{d,stroke:color,'stroke-width':width||2,fill:fill||'none','fill-opacity':(fill&&fill!=='none')?1:0,'stroke-linecap':'round','stroke-linejoin':'round'});if(dash)el.setAttribute('stroke-dasharray',dash);svg.appendChild(el)}
function gText(svg,x,y,text,size,color,anchor,weight){const t=mkEl('text',{x,y,fill:color||'#555','font-size':size||11,'font-family':'Inter,sans-serif','font-weight':weight||500,'text-anchor':anchor||'middle','dominant-baseline':'middle'});t.textContent=text;svg.appendChild(t)}
function gCircle(svg,x,y,r,fill,stroke){svg.appendChild(mkEl('circle',{cx:x,cy:y,r,fill,stroke:stroke||'none','stroke-width':stroke&&stroke!=='none'?2:0}))}
function makeAxes(svg,W,H,M,xLabel,yLabel){
  gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);
  gText(svg,W/2+M.l/2,H-6,xLabel,11,'#555');gText(svg,14,(H-M.b-M.t)/2+M.t,yLabel,11,'#555','middle');
  const yt=svg.lastChild;yt.setAttribute('transform',`rotate(-90,14,${(H-M.b-M.t)/2+M.t})`);
}
function makeSVG(parent,W,H,id){
  const s=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',preserveAspectRatio:'xMidYMid meet',id});
  s.style.background='#FEFEFE';s.style.borderRadius='8px';s.style.border='1px solid #ECEAE6';
  parent.appendChild(s);return s;
}
function scBar(scenarios,graphId){
  let h='<div class="g-scenarios"><div class="g-scenarios-title">📋 Exam Scenarios — click to simulate</div><div class="g-sc-row">';

  h+='</div></div>';return h;
}
function curvePath(pts,M,pW,pH,xMin,xMax,yMin,yMax){
  let d='';pts.forEach((p,i)=>{const px=M.l+((p[0]-xMin)/(xMax-xMin))*pW;const py=M.t+(1-(p[1]-yMin)/(yMax-yMin))*pH;d+=(i===0?'M':'L')+px.toFixed(1)+','+py.toFixed(1)});return d;
}
function toXY(M,pW,pH,xMin,xMax,yMin,yMax,x,y){return[M.l+((x-xMin)/(xMax-xMin))*pW,M.t+(1-(y-yMin)/(yMax-yMin))*pH]}

    {type:"concept",q:"What are the 9 OLS assumptions and what is Gauss-Markov Theorem?",ctx:"Review of econometric foundations.",answer:["<b>Step 1:</b> List A1-A9: Linear params, Fixed X, E(u|X)=0, Homosced, No autocorr, Cov(u,X)=0, n>k, No exact collin, No spec bias.","<b>Step 2:</b> If A1-A9 hold → Gauss-Markov Theorem → OLS is BLUE.","<b>Step 3:</b> BLUE = Best (minimum variance) + Linear (function of Y) + Unbiased (E(β̂)=β) + Estimator.","<b>Step 4:</b> This means no other linear unbiased estimator has smaller variance than OLS."],chain:"A1-A9 → Gauss-Markov → OLS is BLUE → min variance among linear unbiased",tip:"Always expand BLUE into its 4 components. State the theorem AND explain its practical meaning."},
    {type:"concept",q:"Distinguish between PRL and SRF. What is the difference between uᵢ and ûᵢ?",ctx:"Population vs sample regression concepts.",answer:["<b>Step 1:</b> PRL: Yᵢ = β₀ + β₁Xᵢ + uᵢ (population truth, unobservable).","<b>Step 2:</b> SRF: Ŷᵢ = β̂₀ + β̂₁Xᵢ (sample estimate from data).","<b>Step 3:</b> uᵢ is the stochastic error (population, never observed). ûᵢ = Yᵢ − Ŷᵢ is the residual (sample, computable).","<b>Step 4:</b> OLS minimizes Σûᵢ² to find the SRF that best approximates the PRL."],chain:"PRL (unknown) → Sample data → OLS → SRF (estimated)",tip:"Never write ûᵢ when you mean uᵢ. The distinction matters for assumptions (stated about u) vs diagnostics (computed from û)."},
