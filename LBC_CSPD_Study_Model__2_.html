const WEEK_STATA={
  week1:[
    {ctx:'We want to understand how income depends on education and work experience. We collected data from 500 workers. Y = monthly income (continuous), X1 = years of education, X2 = years of experience.',title:"Example 1: OLS — Income Regression",desc:"Standard OLS output. Click highlighted values to learn what each part means.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. reg income education experience</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=500 | F(2,497)=85.32 p=0.000 | <span class="stata-clickable">R²=0.2557<span class="stata-tooltip"><b>R-squared = 0.2557</b><br>25.6% of income variation is explained by education + experience. The remaining 74.4% is unexplained (other factors, randomness).</span></span></td></tr><tr><th>Variable</th><th><span class="stata-clickable">Coef.<span class="stata-tooltip"><b>Coefficient</b><br>Estimated slope. Each unit increase in X is associated with this much change in Y, holding other Xs constant.</span></span></th><th><span class="stata-clickable">Std.Err.<span class="stata-tooltip"><b>Standard Error</b><br>Precision of the estimate. Smaller = more precise. Used to compute t-stat = Coef/SE.</span></span></th><th><span class="stata-clickable">t<span class="stata-tooltip"><b>t-statistic</b><br>= Coef / SE. Tests if coefficient ≠ 0. Rule: |t| > 2 → significant at 5%.</span></span></th><th><span class="stata-clickable">P>|t|<span class="stata-tooltip"><b>p-value</b><br>Probability of seeing this t-stat if true β=0. If p < 0.05 → statistically significant.</span></span></th><th>[95% CI]</th></tr><tr><td>education</td><td><span class="stata-clickable">3.245<span class="stata-tooltip"><b>β = 3.245</b><br>1 more year of education → income increases by 3.245 units, holding experience constant. Highly significant (p=0.000).</span></span></td><td>0.412</td><td>7.87</td><td>0.000</td><td>[2.44, 4.06]</td></tr><tr><td>experience</td><td>1.102</td><td>0.283</td><td>3.89</td><td>0.000</td><td>[0.55, 1.66]</td></tr><tr><td><span class="stata-clickable">_cons<span class="stata-tooltip"><b>Intercept</b><br>Predicted Y when all X = 0. Here: predicted income with 0 education and 0 experience = −15.83. Not meaningful on its own.</span></span></td><td>-15.832</td><td>5.201</td><td>-3.04</td><td>0.002</td><td>[-26.1, -5.6]</td></tr></table>'},
    {ctx:'A health economist studies whether smoking and BMI affect medical costs. Y = annual medical expenditure ($), X1 = age, X2 = smoker (1=yes, 0=no), X3 = BMI.',title:"Example 2: OLS with Dummy Variable",desc:"Includes a binary predictor (smoker). The dummy coefficient measures the GROUP DIFFERENCE in Y.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. reg medcost age smoker bmi</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=1338 | F(3,1334)=412.5 p=0.000 | R²=0.7496</td></tr><tr><th>Variable</th><th>Coef.</th><th>Std.Err.</th><th>t</th><th>P>|t|</th><th>[95% CI]</th></tr><tr><td>age</td><td>257.72</td><td>11.90</td><td>21.66</td><td>0.000</td><td>[234.4, 281.1]</td></tr><tr><td><span class="stata-clickable">smoker<span class="stata-tooltip"><b>Dummy: smoker = 23,848</b><br>Smokers have $23,848 HIGHER annual medical costs than non-smokers, holding age and BMI constant. This is the group difference. Very large and highly significant.</span></span></td><td>23848.5</td><td>413.2</td><td>57.72</td><td>0.000</td><td>[23038, 24659]</td></tr><tr><td>bmi</td><td><span class="stata-clickable">339.19<span class="stata-tooltip"><b>β_BMI = 339.19</b><br>Each 1-unit increase in BMI → $339 higher medical costs. BMI is continuous, so this is a per-unit marginal effect.</span></span></td><td>28.60</td><td>11.86</td><td>0.000</td><td>[283.1, 395.3]</td></tr><tr><td>_cons</td><td>-6916.2</td><td>736.8</td><td>-9.39</td><td>0.000</td><td>[-8361, -5471]</td></tr></table>'}
  ],
  week2:[
    {ctx:'We observe 10 students taking an exam. 7 pass (Y=1), 3 fail (Y=0). We want to estimate the pass rate π using MLE.',title:"Example 1: Binomial MLE by Hand",desc:"MLE for a proportion — the simplest MLE problem. Shows the likelihood → log-likelihood → FOC → solution chain.",table:'<table class="stata-table"><tr><th colspan="2" style="text-align:center;color:#ffd700">Binomial MLE: N=10, K=7 passes</th></tr><tr><td>Likelihood</td><td><span class="stata-clickable">L(π) = C(10,7) · π⁷ · (1−π)³<span class="stata-tooltip"><b>Likelihood Function</b><br>Probability of seeing exactly 7 passes out of 10, as a function of π. We want the π that makes this biggest.</span></span></td></tr><tr><td>Log-Likelihood</td><td>ln L = 7·ln(π) + 3·ln(1−π) + const</td></tr><tr><td><span class="stata-clickable">FOC<span class="stata-tooltip"><b>First-Order Condition</b><br>Set ∂ln L/∂π = 0: gives 7/π − 3/(1−π) = 0. Solve: 7(1−π) = 3π → 7 = 10π → π = 0.7</span></span></td><td>∂ln L/∂π = 7/π − 3/(1−π) = 0</td></tr><tr><td style="color:#ffd700"><b>π̂_MLE</b></td><td style="color:#ffd700"><b>= 7/10 = 0.70</b></td></tr><tr><td>2nd derivative</td><td><span class="stata-clickable">∂²ln L/∂π² = −7/π² − 3/(1−π)² < 0 ✓<span class="stata-tooltip"><b>Confirms maximum</b><br>Negative second derivative means the log-likelihood is concave at this point → this is indeed a maximum, not a minimum.</span></span></td></tr></table>'},
    {ctx:'We estimate a linear regression Y = β₀ + β₁X + ε with ε~N(0,σ²) using both OLS and MLE. N=50, k=2.',title:"Example 2: MLE vs OLS Variance",desc:"Shows the key difference: MLE divides by n, OLS divides by n−k.",table:'<table class="stata-table"><tr><th colspan="3" style="text-align:center;color:#ffd700">Comparing σ² estimators (Σû²=200, n=50, k=2)</th></tr><tr><th>Estimator</th><th>Formula</th><th><span class="stata-clickable">Result<span class="stata-tooltip"><b>Key difference</b><br>MLE underestimates σ² because it "forgets" that 2 parameters were estimated, using up 2 degrees of freedom. The bias = (k/n)·σ² = (2/50)·σ². Small when n is large.</span></span></th></tr><tr><td>σ̂²_OLS (unbiased)</td><td>Σû²/(n−k) = 200/48</td><td style="color:#a8d8ea"><b>4.167</b></td></tr><tr><td>σ̂²_MLE (biased)</td><td>Σû²/n = 200/50</td><td>4.000</td></tr><tr><td>Bias</td><td>(k/n)·σ² = (2/50)·σ²</td><td><span class="stata-clickable">≈ 0.167<span class="stata-tooltip"><b>Downward bias</b><br>MLE underestimates by about 4%. As n→∞, the bias (k/n)→0, so MLE becomes unbiased asymptotically.</span></span></td></tr></table>'}
  ],
  week3:[
    {ctx:'We model whether a married woman participates in the labor force (LFP=1) or not (LFP=0). Regressors: number of kids under 6 (KL6), age, wife college dummy (WC), log wage (LWAGE). N=753 from the Mroz dataset.',title:"Example 1: LPM — Labor Force Participation",desc:"OLS applied to binary Y. Coefficients ARE marginal effects (constant). Watch for predictions outside [0,1].",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. reg lfp kl6 age wc lwage</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=753 | R²=0.1287</td></tr><tr><th>Variable</th><th>Coef.</th><th>SE</th><th>t</th><th>P>|t|</th><th>[95% CI]</th></tr><tr><td><span class="stata-clickable">kl6<span class="stata-tooltip"><b>Kids under 6: β = −0.262</b><br>Each additional child under 6 reduces P(LFP=1) by 26.2 percentage points. This is the constant marginal effect in LPM — same whether going from 0→1 kids or 2→3 kids.</span></span></td><td>-0.262</td><td>0.034</td><td>-7.71</td><td>0.000</td><td>[-0.33, -0.20]</td></tr><tr><td>age</td><td><span class="stata-clickable">-0.013<span class="stata-tooltip"><b>Age effect: −0.013</b><br>Each year older → 1.3 pp lower probability of LFP. At age 50 vs 30: difference = 20×(−0.013) = −26 pp. Note: LPM assumes this is constant across all ages (unrealistic).</span></span></td><td>0.002</td><td>-5.42</td><td>0.000</td><td>[-0.018, -0.008]</td></tr><tr><td>wc</td><td>0.198</td><td>0.043</td><td>4.60</td><td>0.000</td><td>[0.114, 0.282]</td></tr><tr><td>lwage</td><td>0.169</td><td>0.023</td><td>7.35</td><td>0.000</td><td>[0.124, 0.214]</td></tr><tr><td>_cons</td><td><span class="stata-clickable">0.891<span class="stata-tooltip"><b>Intercept = 0.891</b><br>Predicted P(LFP) for a 0-year-old non-college woman with 0 kids and log(wage)=0. Not meaningful, but at least within [0,1] here.</span></span></td><td>0.128</td><td>6.96</td><td>0.000</td><td>[0.640, 1.142]</td></tr></table>'},
    {ctx:'Same model as above, but we check whether the LPM gives impossible predictions. We run "predict phat" after the regression and check min/max.',title:"Example 2: LPM Prediction Problems",desc:"Checking for predictions outside [0,1] — the classic LPM diagnostic.",table:'<table class="stata-table"><tr><th colspan="4" style="text-align:center;color:#ffd700">. predict phat, xb<br>. sum phat</th></tr><tr><th>Variable</th><th>Mean</th><th><span class="stata-clickable">Min<span class="stata-tooltip"><b>Minimum predicted P = −0.08</b><br>NEGATIVE probability! This is impossible and illustrates the #1 problem of LPM. For these observations, the model predicts a probability below zero.</span></span></th><th><span class="stata-clickable">Max<span class="stata-tooltip"><b>Maximum predicted P = 1.12</b><br>ABOVE 1! Also impossible. This confirms that LPM cannot be the final model — we need logit/probit to keep predictions in [0,1].</span></span></th></tr><tr><td>phat</td><td>0.568</td><td style="color:#ff6b6b"><b>-0.083</b></td><td style="color:#ff6b6b"><b>1.118</b></td></tr><tr><td colspan="4" style="color:#ffd700;font-size:10px"><span class="stata-clickable">How many observations are outside [0,1]?<span class="stata-tooltip"><b>. count if phat < 0 | phat > 1</b><br>Result: 38 out of 753 (5.0%) have impossible predictions. For WLS correction, these must be dropped because w = 1/√(Ŷ(1−Ŷ)) requires Ŷ ∈ (0,1).</span></span></td></tr></table>'}
  ],
  week4:[
    {ctx:'Same Mroz LFP dataset. Now we estimate logit instead of LPM. Y = labor force participation (0/1). Same regressors: kids under 6, age, wife college, log wage.',title:"Example 1: Logit — Labor Force Participation",desc:"Logit coefficients are in LOG-ODDS. Must convert to odds ratios or marginal effects for interpretation.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. logit lfp kl6 age wc lwage</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px"><span class="stata-clickable">Log likelihood = -401.30<span class="stata-tooltip"><b>Log-Likelihood = −401.30</b><br>This is the maximized value of Σ[Yᵢ ln P̂ᵢ + (1−Yᵢ)ln(1−P̂ᵢ)]. More negative = worse fit. Used for LR tests and Pseudo R².</span></span> | LR chi2(4)=107.2 p=0.000 | <span class="stata-clickable">Pseudo R²=0.118<span class="stata-tooltip"><b>McFadden Pseudo R²</b><br>= 1 − (−401.3)/(−454.9) = 0.118. Modest but acceptable. Remember: 0.2−0.4 is "good" for McFadden. This is NOT comparable to linear R².</span></span></td></tr><tr><th>Variable</th><th><span class="stata-clickable">Coef.<span class="stata-tooltip"><b>Logit coefficient = effect on LOG-ODDS</b><br>NOT the effect on probability! A 1-unit increase in X changes ln(P/(1−P)) by β. To get probability effect, compute ME = β·P(1−P).</span></span></th><th>SE</th><th><span class="stata-clickable">z<span class="stata-tooltip"><b>z-statistic (not t!)</b><br>MLE uses z (normal) not t, because inference is asymptotic. Reject if |z| > 1.96 at 5%.</span></span></th><th>P>|z|</th><th>[95% CI]</th></tr><tr><td><span class="stata-clickable">kl6<span class="stata-tooltip"><b>Kids under 6: β = −1.463</b><br><b>Log-odds:</b> 1 more kid under 6 → log-odds of LFP decrease by 1.463<br><b>Odds ratio:</b> e^(−1.463) = 0.232 → odds DROP by 76.8%<br><b>Max ME:</b> −1.463/4 = −0.366 → at most 36.6 pp decrease<br><b>Compare LPM:</b> LPM gave −0.262 (constant). Logit max is larger, but actual ME varies.</span></span></td><td>-1.463</td><td>0.204</td><td>-7.17</td><td>0.000</td><td>[-1.86, -1.06]</td></tr><tr><td>age</td><td>-0.063</td><td>0.013</td><td>-4.85</td><td>0.000</td><td>[-0.088, -0.038]</td></tr><tr><td><span class="stata-clickable">wc<span class="stata-tooltip"><b>Wife college: β = 0.807</b><br><b>OR:</b> e^0.807 = 2.24 → college women have 124% higher ODDS of LFP<br><b>Discrete change:</b> Must compute P(LFP|WC=1) − P(LFP|WC=0) at specific X values. NOT just β.</span></span></td><td>0.807</td><td>0.190</td><td>4.25</td><td>0.000</td><td>[0.435, 1.179]</td></tr><tr><td>lwage</td><td>0.816</td><td>0.114</td><td>7.16</td><td>0.000</td><td>[0.593, 1.039]</td></tr><tr><td>_cons</td><td>2.667</td><td>0.671</td><td>3.97</td><td>0.000</td><td>[1.352, 3.982]</td></tr></table><div style="margin-top:8px;padding:10px;background:#16213e;border-radius:8px;font-size:11px;color:#a8d8ea"><b>Key Stata commands:</b><br><code>logistic lfp kl6 age wc lwage</code> → shows odds ratios directly<br><code>margins, dydx(*)</code> → average marginal effects<br><code>margins, at(kl6=(0 1 2))</code> → predicted P at specific kid counts</div>'},
    {ctx:'After running logit, we compute marginal effects and odds ratios using Stata post-estimation commands.',title:"Example 2: Logit Marginal Effects & Odds Ratios",desc:"How to read the margins output and the logistic (odds ratio) output.",table:'<table class="stata-table"><tr><th colspan="4" style="text-align:center;color:#ffd700">. margins, dydx(*) (Average Marginal Effects)</th></tr><tr><th>Variable</th><th><span class="stata-clickable">dy/dx<span class="stata-tooltip"><b>Average Marginal Effect (AME)</b><br>= (1/N) Σ β̂ₖ·P̂ᵢ(1−P̂ᵢ). This is the average change in PROBABILITY (in pp) for a 1-unit increase in Xₖ. Much more interpretable than raw logit coefficients.</span></span></th><th>SE</th><th>P>|z|</th></tr><tr><td><span class="stata-clickable">kl6<span class="stata-tooltip"><b>AME of kids under 6 = −0.312</b><br>On average, 1 more kid under 6 reduces P(LFP) by 31.2 pp. Compare: LPM gave −0.262, logit max ME = −0.366. AME is between these — it is the "average" effect across all women in the sample.</span></span></td><td><b>-0.312</b></td><td>0.039</td><td>0.000</td></tr><tr><td>age</td><td>-0.013</td><td>0.003</td><td>0.000</td></tr><tr><td>wc</td><td><span class="stata-clickable">0.172<span class="stata-tooltip"><b>AME of wife college = 0.172</b><br>Having a college degree increases P(LFP) by 17.2 pp on average. Note: for dummies, the discrete change (P|WC=1 minus P|WC=0) is often preferred over the derivative-based AME.</span></span></td><td>0.039</td><td>0.000</td></tr><tr><td>lwage</td><td>0.174</td><td>0.023</td><td>0.000</td></tr></table><div style="margin-top:10px"></div><table class="stata-table"><tr><th colspan="4" style="text-align:center;color:#ffd700">. logistic lfp kl6 age wc lwage (Odds Ratios)</th></tr><tr><th>Variable</th><th><span class="stata-clickable">Odds Ratio<span class="stata-tooltip"><b>Odds Ratio = e^β</b><br>Multiplicative change in odds for 1-unit increase. OR > 1 → odds increase. OR < 1 → odds decrease. % change = (OR−1)×100.</span></span></th><th>SE</th><th>P>|z|</th></tr><tr><td><span class="stata-clickable">kl6<span class="stata-tooltip"><b>OR = 0.232</b><br>= e^(−1.463). Each additional kid under 6 MULTIPLIES the odds by 0.232. In other words, odds DROP by (1−0.232)×100 = 76.8%. Very large negative effect.</span></span></td><td><b>0.232</b></td><td>0.047</td><td>0.000</td></tr><tr><td>age</td><td>0.939</td><td>0.012</td><td>0.000</td></tr><tr><td>wc</td><td><span class="stata-clickable">2.241<span class="stata-tooltip"><b>OR = 2.241</b><br>College women have 2.24× the odds of LFP compared to non-college. That is (2.241−1)×100 = 124.1% higher odds.</span></span></td><td>0.426</td><td>0.000</td></tr><tr><td>lwage</td><td>2.262</td><td>0.258</td><td>0.000</td></tr></table>'}
  ],
  week5:[
    {ctx:'Same LFP model, now estimated with probit. We compare the coefficients to logit to verify the ~1.81 conversion factor.',title:"Example 1: Probit vs Logit Coefficient Comparison",desc:"Probit coefficients are on a different scale. The ratio β_logit/β_probit should be ≈1.81.",table:'<table class="stata-table"><tr><th colspan="5" style="text-align:center;color:#ffd700">Logit vs Probit Coefficients (Same Model)</th></tr><tr><th>Variable</th><th><span class="stata-clickable">β_logit<span class="stata-tooltip"><b>Logit coefficient</b><br>On the logistic latent scale. Var(logistic) = π²/3 ≈ 3.29.</span></span></th><th><span class="stata-clickable">β_probit<span class="stata-tooltip"><b>Probit coefficient</b><br>On the normal latent scale. Var(normal) = 1. So probit β ≈ logit β / 1.81.</span></span></th><th><span class="stata-clickable">Ratio<span class="stata-tooltip"><b>Should be ≈ 1.81</b><br>If both models are correct, β_logit / β_probit ≈ √(π²/3) ≈ 1.81. This confirms both models are giving consistent results on the same data.</span></span></th><th>AME</th></tr><tr><td>kl6</td><td>-1.463</td><td>-0.826</td><td><span class="stata-clickable">1.77<span class="stata-tooltip"><b>Ratio = 1.77 ≈ 1.81 ✓</b><br>Close to theoretical 1.81. Small deviations are normal — the conversion is approximate.</span></span></td><td>-0.312 / -0.308</td></tr><tr><td>age</td><td>-0.063</td><td>-0.035</td><td>1.80</td><td>-0.013 / -0.013</td></tr><tr><td>wc</td><td>0.807</td><td>0.449</td><td>1.80</td><td>0.172 / 0.170</td></tr><tr><td>lwage</td><td>0.816</td><td>0.456</td><td>1.79</td><td>0.174 / 0.173</td></tr><tr><td colspan="5" style="color:#a8d8ea;font-size:10px"><span class="stata-clickable">Key insight<span class="stata-tooltip"><b>AMEs are nearly identical!</b><br>Even though raw coefficients differ by ~1.81×, the marginal effects (what we actually care about) are almost the same. This is why in practice, logit vs probit rarely matters — both give the same substantive conclusions.</span></span></td></tr></table>'},
    {ctx:'We run probit on credit default data. Y = default (0/1), X1 = credit score, X2 = debt-to-income ratio, X3 = loan amount (log). N=5000.',title:"Example 2: Probit — Credit Default",desc:"Probit output with marginal effects computed at the mean.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. probit default credit_score dti ln_loan</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=5000 | Log L = -1847.3 | LR chi2(3) = 892.1 p=0.000 | Pseudo R² = 0.194</td></tr><tr><th>Variable</th><th>Coef.</th><th>SE</th><th>z</th><th>P>|z|</th><th>[95% CI]</th></tr><tr><td><span class="stata-clickable">credit_score<span class="stata-tooltip"><b>β = −0.0048</b><br>Higher credit score → lower default probability. BUT this is on the latent scale! ME at mean: −0.0048 × φ(X̄β) ≈ −0.0048 × 0.30 ≈ −0.0014. So 1 point higher score → 0.14 pp lower default probability. 100 points → ~14 pp lower.</span></span></td><td>-0.0048</td><td>0.0003</td><td>-16.0</td><td>0.000</td><td>[-0.005, -0.004]</td></tr><tr><td>dti</td><td>0.0312</td><td>0.004</td><td>7.80</td><td>0.000</td><td>[0.023, 0.039]</td></tr><tr><td>ln_loan</td><td>0.187</td><td>0.042</td><td>4.45</td><td>0.000</td><td>[0.105, 0.269]</td></tr><tr><td>_cons</td><td>1.892</td><td>0.351</td><td>5.39</td><td>0.000</td><td>[1.204, 2.580]</td></tr></table>'}
  ],
  week6:[
    {ctx:'After fitting the logit LFP model, we run classification and GOF diagnostics to assess model quality.',title:"Example 1: Classification Table",desc:"Confusion matrix showing predicted vs actual outcomes. Threshold = 0.5.",table:'<table class="stata-table"><tr><th colspan="3" style="text-align:center;color:#ffd700">. estat classification</th></tr><tr><th></th><th>Pred +</th><th>Pred −</th></tr><tr><td style="color:#ffd700">Actual +</td><td><span class="stata-clickable">TP=326<span class="stata-tooltip"><b>True Positives = 326</b><br>Model correctly predicted LFP=1. Sensitivity = 326/428 = 76.2% — the model catches 76% of actual participants.</span></span></td><td><span class="stata-clickable">FN=102<span class="stata-tooltip"><b>False Negatives = 102</b><br>Model predicted LFP=0 but woman actually participates. These are "missed" participants.</span></span></td></tr><tr><td style="color:#ffd700">Actual −</td><td><span class="stata-clickable">FP=93<span class="stata-tooltip"><b>False Positives = 93</b><br>Model predicted LFP=1 but woman does NOT participate. "False alarms."</span></span></td><td><span class="stata-clickable">TN=232<span class="stata-tooltip"><b>True Negatives = 232</b><br>Model correctly predicted LFP=0. Specificity = 232/325 = 71.4%.</span></span></td></tr><tr><td colspan="3" style="color:#a8d8ea;font-size:10px"><span class="stata-clickable">Correctly classified: 74.1%<span class="stata-tooltip"><b>Count R² = (326+232)/753 = 74.1%</b><br>The model correctly predicts 74.1% of outcomes. Decent but not spectacular. Note: a naive model predicting the majority class (LFP=1) would get 56.8% — so the model adds 17.3 pp over naive.</span></span> | Sensitivity: 76.2% | Specificity: 71.4%</td></tr></table>'},
    {ctx:'We compare two nested logit models to decide if adding "husband education" and "family income" improves the model. M1 has 4 vars, M2 has 6 vars.',title:"Example 2: LR Test — Model Comparison",desc:"Likelihood Ratio test to decide if extra variables matter.",table:'<table class="stata-table"><tr><th colspan="3" style="text-align:center;color:#ffd700">LR Test: M1 (4 vars) vs M2 (6 vars)</th></tr><tr><th></th><th>M1 (restricted)</th><th>M2 (unrestricted)</th></tr><tr><td><span class="stata-clickable">ln L<span class="stata-tooltip"><b>Log-likelihoods</b><br>M2 has higher (less negative) ln L because it has more variables — it always fits at least as well. The question is: does it fit SIGNIFICANTLY better?</span></span></td><td>-401.30</td><td>-394.18</td></tr><tr><td># params</td><td>5</td><td>7</td></tr><tr><td><span class="stata-clickable">LR stat<span class="stata-tooltip"><b>LR = −2(−401.30 − (−394.18)) = −2(−7.12) = 14.24</b><br>Compare to χ²(2) at 5% = 5.99. Since 14.24 > 5.99 → REJECT H₀. The extra 2 variables DO significantly improve the model.</span></span></td><td colspan="2" style="color:#ffd700;text-align:center"><b>LR = 14.24 ~ χ²(2), p = 0.0008</b></td></tr><tr><td><span class="stata-clickable">Decision<span class="stata-tooltip"><b>Reject H₀: β₅ = β₆ = 0</b><br>Adding husband education and family income significantly improves model fit. Keep M2 (unrestricted model). Note: this is the MLE analog of the F-test in OLS.</span></span></td><td colspan="2" style="color:#a8d8ea;text-align:center">Reject H₀ → Keep M2 with 6 variables</td></tr></table>'}

  week7:[
    {ctx:'Survey on attitudes toward working mothers (N=1200). Y is ordered 1-4: strongly disagree to strongly agree. We run ordered logit with regressors male, age, education.',title:"Example 1: Ordered Logit (ologit) Output",desc:"Key difference from binary logit: output includes CUTPOINTS (_cut) that divide the latent scale. Coefficients affect latent y*, not directly a single category.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. ologit attitude male age educ</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=1200 | LR chi2(3)=89.4 p=0.000 | Pseudo R²=0.027</td></tr><tr><th>Variable</th><th>Coef.</th><th>SE</th><th>z</th><th>P>|z|</th><th>[95% CI]</th></tr><tr><td><span class="stata-clickable">male<span class="stata-tooltip"><b>β_male = −0.733</b><br>Being male LOWERS latent agreement by 0.733. Result: P(strongly disagree) ↑ for men, P(strongly agree) ↓ for men. Effect on middle categories (disagree/agree) is ambiguous.</span></span></td><td>-0.733</td><td>0.122</td><td>-6.01</td><td>0.000</td><td>[-0.97, -0.49]</td></tr><tr><td>age</td><td>-0.022</td><td>0.004</td><td>-5.50</td><td>0.000</td><td>[-0.03, -0.01]</td></tr><tr><td>educ</td><td>0.068</td><td>0.018</td><td>3.78</td><td>0.000</td><td>[0.03, 0.10]</td></tr><tr><td colspan="6" style="color:#ffd700;font-size:10px;border-top:2px solid #a8d8ea"><span class="stata-clickable"><b>Cutpoints:</b><span class="stata-tooltip"><b>What are cutpoints?</b><br>These are the thresholds on the latent scale that divide the 4 ordered categories. They are estimated jointly with β via MLE. They are NOT coefficients — do not interpret them as slopes. _cut1 separates categories 1|2, _cut2 separates 2|3, _cut3 separates 3|4.</span></span> _cut1 = −2.465 | _cut2 = −0.941 | _cut3 = 1.262</td></tr></table>'},
    {ctx:'After running ologit, we compute predicted probabilities for specific profiles to see how category distributions differ by gender.',title:"Example 2: Predicted Probabilities by Group",desc:"The clearest way to interpret ordered models — show how the probability distribution shifts across categories.",table:'<table class="stata-table"><tr><th colspan="5" style="text-align:center;color:#ffd700">. margins, at(male=(0 1)) predict(outcome(#))<br>Predicted probabilities at mean age & education</th></tr><tr><th>Category</th><th><span class="stata-clickable">Female (male=0)<span class="stata-tooltip"><b>Female predicted probabilities</b><br>Distribution of attitudes among women at average age and education. Women are concentrated in categories 3-4 (agree/strongly agree).</span></span></th><th><span class="stata-clickable">Male (male=1)<span class="stata-tooltip"><b>Male predicted probabilities</b><br>Men shift toward lower categories. P(strongly disagree) nearly doubles; P(strongly agree) drops by ~8 pp. This is the β_male = −0.733 effect in action.</span></span></th><th><span class="stata-clickable">Difference<span class="stata-tooltip"><b>Male − Female</b><br>Positive = men more likely in that category. Categories 1-2 gain probability (men more likely to disagree), categories 3-4 lose probability (men less likely to agree).</span></span></th><th>Direction</th></tr><tr><td>1: Str. Disagree</td><td>0.061</td><td>0.116</td><td>+0.055</td><td style="color:#ff6b6b">↑ men</td></tr><tr><td>2: Disagree</td><td>0.182</td><td>0.264</td><td>+0.082</td><td style="color:#ff6b6b">↑ men</td></tr><tr><td>3: Agree</td><td>0.488</td><td>0.437</td><td>−0.051</td><td style="color:#a8d8ea">↓ men</td></tr><tr><td>4: Str. Agree</td><td>0.269</td><td>0.183</td><td>−0.086</td><td style="color:#a8d8ea">↓ men</td></tr><tr><td colspan="5" style="color:#a8d8ea;font-size:10px"><span class="stata-clickable">Key insight<span class="stata-tooltip"><b>The negative male coefficient shifts the ENTIRE distribution leftward.</b><br>All lower categories gain, all upper categories lose. In this case, even the middle categories have clear directions — but that is NOT guaranteed in general. With different cutpoint spacing, category 2 could go either way.</span></span></td></tr></table>'}

  week8:[
    {ctx:'Commuters choose among 3 transport modes: car, bus, train. Regressors are alternative-specific: travel time (minutes) and travel cost ($). N=500 commuters. This is a CONDITIONAL LOGIT because X varies by alternative.',title:"Example 1: Conditional Logit — Transport Mode Choice",desc:"Alternative-specific regressors with common coefficients. Click highlighted values to understand the output.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. clogit choice time cost, group(id)</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=1500 (500 commuters × 3 alts) | Log L = −412.8 | LR chi2(2) = 86.3 p=0.000</td></tr><tr><th>Variable</th><th><span class="stata-clickable">Coef.<span class="stata-tooltip"><b>Conditional Logit Coefficients</b><br>These are COMMON across all alternatives (no subscript j on β). They measure how alternative-specific attributes affect utility. Negative = reduces utility of that alternative → less likely chosen.</span></span></th><th>SE</th><th>z</th><th>P>|z|</th><th>[95% CI]</th></tr><tr><td><span class="stata-clickable">time<span class="stata-tooltip"><b>β_time = −0.0382</b><br>Each additional minute of travel time REDUCES utility by 0.0382. So a mode with 10 more minutes of travel time has exp(−0.382) = 0.68 → 32% lower odds. Marginal effect at P=0.3: ME = −0.0382 × 0.3 × 0.7 = −0.008 (0.8 pp per minute).</span></span></td><td><b>-0.0382</b></td><td>0.0065</td><td>-5.88</td><td>0.000</td><td>[-0.051, -0.025]</td></tr><tr><td><span class="stata-clickable">cost<span class="stata-tooltip"><b>β_cost = −0.0914</b><br>Each additional dollar of travel cost REDUCES utility by 0.0914. This is larger in magnitude than time, suggesting commuters are more sensitive to cost than time in this sample. Value of time: β_time/β_cost = 0.0382/0.0914 = $0.42/min ≈ $25/hr.</span></span></td><td><b>-0.0914</b></td><td>0.0143</td><td>-6.39</td><td>0.000</td><td>[-0.119, -0.063]</td></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px"><span class="stata-clickable">Value of time = β_time/β_cost = $0.42/min<span class="stata-tooltip"><b>Willingness to Pay for Time</b><br>The ratio of coefficients gives the marginal rate of substitution between time and cost. This commuter is willing to pay $0.42 per minute saved, or about $25/hour. This is a key policy-relevant output of conditional logit.</span></span></td></tr></table>'},
    {ctx:'Individuals choose insurance type: (1) JKN/BPJS, (2) private insurance, (3) none. Regressors are individual-specific: income (million Rp), age, education (years). Base category = JKN. This is MULTINOMIAL LOGIT because X varies by person, not by alternative.',title:"Example 2: Multinomial Logit — Insurance Choice (Indonesia)",desc:"Individual-specific regressors with alternative-specific coefficients. Each column of β measures how person characteristics affect the odds of that alternative vs base.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. mlogit insurance income age educ, base(1)</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=2000 | Log L = −1847.3 | LR chi2(6) = 289.4 p=0.000 | Pseudo R²=0.073</td></tr><tr><th colspan="6" style="color:#ffd700;font-size:11px">Alternative 2: Private Insurance (vs base: JKN)</th></tr><tr><th>Variable</th><th><span class="stata-clickable">Coef.<span class="stata-tooltip"><b>β₂ coefficients</b><br>These are alternative-specific: they tell you how each X affects the log-odds of choosing PRIVATE INSURANCE over JKN (the base). A separate set of β₃ exists for "none" vs JKN.</span></span></th><th>SE</th><th>z</th><th>P>|z|</th><th>[95% CI]</th></tr><tr><td><span class="stata-clickable">income<span class="stata-tooltip"><b>β₂_income = 0.142</b><br>Higher income → higher log-odds of choosing private over JKN. OR = e^0.142 = 1.153 → each 1M Rp more income increases odds of private insurance by 15.3%. Makes intuitive sense: wealthier people can afford private insurance.</span></span></td><td><b>0.142</b></td><td>0.023</td><td>6.17</td><td>0.000</td><td>[0.097, 0.187]</td></tr><tr><td>age</td><td>-0.018</td><td>0.005</td><td>-3.60</td><td>0.000</td><td>[-0.028, -0.008]</td></tr><tr><td><span class="stata-clickable">educ<span class="stata-tooltip"><b>β₂_educ = 0.089</b><br>More education → higher odds of private insurance over JKN. OR = e^0.089 = 1.093 → each extra year of education increases odds by 9.3%.</span></span></td><td><b>0.089</b></td><td>0.021</td><td>4.24</td><td>0.000</td><td>[0.048, 0.130]</td></tr><tr><td>_cons</td><td>-2.341</td><td>0.312</td><td>-7.50</td><td>0.000</td><td>[-2.95, -1.73]</td></tr><tr><th colspan="6" style="color:#ffd700;font-size:11px;border-top:2px solid #a8d8ea">Alternative 3: No Insurance (vs base: JKN)</th></tr><tr><td><span class="stata-clickable">income<span class="stata-tooltip"><b>β₃_income = −0.203</b><br>Higher income → LOWER odds of being uninsured vs JKN. OR = e^(−0.203) = 0.816 → each 1M Rp more income reduces odds of no insurance by 18.4%. Wealthier people are less likely to be uninsured.</span></span></td><td><b>-0.203</b></td><td>0.031</td><td>-6.55</td><td>0.000</td><td>[-0.264, -0.142]</td></tr><tr><td>age</td><td>0.024</td><td>0.006</td><td>4.00</td><td>0.000</td><td>[0.012, 0.036]</td></tr><tr><td>educ</td><td>-0.135</td><td>0.025</td><td>-5.40</td><td>0.000</td><td>[-0.184, -0.086]</td></tr><tr><td>_cons</td><td>1.672</td><td>0.398</td><td>4.20</td><td>0.000</td><td>[0.892, 2.452]</td></tr></table>'}

 = 1.026</b><br>Each additional mentor article raises expected student output by 2.6%. A 1-SD increase in mentor productivity (sd≈9.5) → factor = exp(0.026×9.5) = 1.28 → 28% more articles.</span></span></td><td><b>0.026</b></td><td>0.002</td><td>13.00</td><td>0.000</td><td>1.026</td></tr><tr><td>_cons</td><td>0.305</td><td>0.103</td><td>2.96</td><td>0.003</td><td>—</td></tr></table>'},
    {ctx:'Same data, but now testing for overdispersion and estimating Negative Binomial. Key question: is Poisson adequate or does overdispersion require NegBin?',title:"Example 2: Negative Binomial & Overdispersion Test",desc:"NegBin relaxes equidispersion. The LR test of α=0 determines whether Poisson is adequate.",table:'<table class="stata-table"><tr><th colspan="6" style="text-align:center;color:#ffd700">. nbreg art fem mar kid5 phd ment, nolog</th></tr><tr><td colspan="6" style="color:#a8d8ea;font-size:10px">N=915 | Log L = −1560.9 | LR chi2(5) = 97.96 p=0.000</td></tr><tr><th>Variable</th><th>Coef.</th><th>SE</th><th>z</th><th>P>|z|</th><th>Factor</th></tr><tr><td>fem</td><td>-0.216</td><td>0.073</td><td>-2.96</td><td>0.003</td><td>0.806</td></tr><tr><td>mar</td><td>0.150</td><td>0.083</td><td>1.81</td><td>0.071</td><td>1.162</td></tr><tr><td>kid5</td><td>-0.176</td><td>0.053</td><td>-3.32</td><td>0.001</td><td>0.839</td></tr><tr><td>phd</td><td>0.015</td><td>0.036</td><td>0.42</td><td>0.677</td><td>1.015</td></tr><tr><td>ment</td><td>0.029</td><td>0.003</td><td>9.67</td><td>0.000</td><td>1.029</td></tr><tr><td>_cons</td><td>0.256</td><td>0.137</td><td>1.87</td><td>0.062</td><td>—</td></tr><tr><td colspan="6" style="border-top:2px solid #a8d8ea"><span class="stata-clickable">lnalpha = −0.812, alpha = 0.444<span class="stata-tooltip"><b>Overdispersion parameter α</b><br>Stata estimates ln(α) then transforms. α = 0.444 > 0 confirms overdispersion. NegBin II variance: Var = (1 + 0.444·λ)·λ, which is always > λ.</span></span></td></tr><tr><td colspan="6" style="color:#ffd700;font-size:11px"><span class="stata-clickable"><b>LR test of alpha=0: chibar2(01) = 180.20, p = 0.000</b><span class="stata-tooltip"><b>Reject Poisson!</b><br>G² = −2(−1651.1 − (−1560.9)) = 180.2 ≫ 2.71. Extremely strong evidence of overdispersion. Poisson is rejected. NegBin is preferred. Note: NegBin SEs are LARGER (e.g., mar is now p=0.071 vs 0.012 in Poisson), showing Poisson overstated significance.</span></span></td></tr></table>'}

function renderWeekStata(wk){
  var items=WEEK_STATA[wk]||[];
  var el=document.getElementById('wk-stata-panel');
  if(!items.length){el.innerHTML='<div class="wk-coming">No Stata examples for this week yet.</div>';return}
  var h='<div class="qz-intro">💻 <b>How to Read Data Output</b><br>Interactive Stata-style tables. <b>Click any highlighted cell</b> to see what it means and how to interpret it.</div>';
  items.forEach(function(item){
    h+='<div class="wk-card" style="border-left:4px solid #2563EB">';
    if(item.ctx) h+='<div class="wk-highlight" style="margin-top:0;margin-bottom:10px">📋 <b>Context:</b> '+item.ctx+'</div>';
    h+='<h4 style="color:#1E40AF">'+item.title+'</h4>';
    h+='<p style="font-size:12.5px;color:#666;margin-bottom:10px">'+item.desc+'</p>';
    h+='<div class="stata-wrap">'+item.table+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
  renderMathInEl(el);
}

// =====================================================================
// KaTeX AUTO-RENDER HELPER
// =====================================================================
function renderMathInEl(el){
  if(typeof renderMathInElement==='function'){
    renderMathInElement(el,{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false}
      ],
      throwOnError:false
    });
  }
}
// TOOLTIP POSITIONING FIX — clone tooltip to body so table overflow can't clip it
var _activeTip=null;
document.addEventListener('click',function(e){
  var cl=e.target.closest('.stata-clickable');
  // If clicking outside or on the active tooltip itself, close
  if(!cl||e.target.closest('#stata-float-tip')){
    if(_activeTip){_activeTip.remove();_activeTip=null}
    document.querySelectorAll('.stata-clickable.show-tip').forEach(function(el){el.classList.remove('show-tip')});
    return;
  }
  // Close any existing
  if(_activeTip){_activeTip.remove();_activeTip=null}
  document.querySelectorAll('.stata-clickable.show-tip').forEach(function(el){el.classList.remove('show-tip')});
  // Get source tooltip HTML
  var src=cl.querySelector('.stata-tooltip');
  if(!src)return;
  cl.classList.add('show-tip');
  // Create floating tooltip on body
  var tip=document.createElement('div');
  tip.id='stata-float-tip';
  tip.innerHTML=src.innerHTML;
  tip.style.cssText='position:fixed;background:#fff;color:#333;padding:12px 16px;border-radius:8px;font-family:Inter,sans-serif;font-size:12px;line-height:1.6;width:320px;max-width:90vw;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:99999;border:1px solid #ddd;pointer-events:auto';
  document.body.appendChild(tip);
  _activeTip=tip;
  // Position it
  var r=cl.getBoundingClientRect();
  var tH=tip.offsetHeight;
  var left=Math.min(r.left,window.innerWidth-340);
  var top=r.top-tH-10;
  if(top<8) top=r.bottom+10;
  tip.style.left=Math.max(8,left)+'px';
  tip.style.top=top+'px';
  renderMathInEl(tip);
});
