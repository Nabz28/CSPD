    {type:"concept",q:"Explain Maximum Likelihood Estimation. Why do we use log-likelihood?",ctx:"MLE fundamentals.",answer:["<b>Step 1:</b> MLE finds θ that maximizes the probability of observing the data: L(θ) = Π f(xᵢ;θ).","<b>Step 2:</b> Log-likelihood: ln L = Σ ln f(xᵢ;θ). ln is monotonic → same maximum.","<b>Step 3:</b> Log transforms products → sums (easier calculus). Set ∂ln L/∂θ = 0 → solve.","<b>Step 4:</b> Properties: Consistent, Asymptotically Normal, Efficient (BAN estimator)."],chain:"Data → IID → Likelihood → Log → FOC → θ̂_MLE → Asymptotic properties",tip:"Show the full derivation: write L, take log, differentiate, set = 0. Then state the 3 properties."},
    {type:"quant",q:"In a sample of 20 people, 14 are male. Find the MLE of the proportion π.",ctx:"Binomial MLE example.",answer:["<b>Step 1:</b> K=14, N=20. L(π) = C(20,14)·π¹⁴·(1−π)⁶","<b>Step 2:</b> ln L = 14·ln π + 6·ln(1−π) + const","<b>Step 3:</b> ∂ln L/∂π = 14/π − 6/(1−π) = 0","<b>Step 4:</b> 14(1−π) = 6π → 14 = 20π → π̂ = 14/20 = 0.70","<b>Step 5:</b> Verify: ∂²ln L/∂π² = −14/π² − 6/(1−π)² < 0 ✓ (maximum)"],chain:"Binomial → Likelihood → Log → FOC → π̂ = K/N",tip:"Always verify the second derivative is negative (confirming maximum, not minimum)."},
    {type:"scenario",q:"[KKI Q4e] What are the assumptions behind the MLE method? What would you do if the assumptions were violated?",ctx:"MLE foundations and remedies — a very common exam question.",answer:["<b>3 MLE assumptions:</b>","<b>1. Correct Distributional Specification:</b> The chosen PDF (likelihood function) accurately reflects the true Data Generating Process (DGP). E.g., assuming Poisson when the data is truly Poisson.","<b>2. Independence of Observations:</b> Observations are independent → joint probability = product of individual probabilities → enables L = Πf(yᵢ;θ).","<b>3. Large Sample Size:</b> MLE relies on asymptotic theory. Need n large enough for consistency, efficiency, and asymptotic normality (BAN properties).","<b>Remedies if violated:</b>","<b>1. Use QMLE:</b> If the distributional assumption is slightly wrong (e.g., Poisson with overdispersion), QMLE can still give consistent β estimates if the conditional mean is correctly specified.","<b>2. Use Robust Standard Errors:</b> If homoscedasticity or strict independence is violated, use Huber-White sandwich estimators to get valid inference.","<b>3. Change the Distribution:</b> If fundamentally wrong (e.g., normality for count data), switch models entirely: Poisson → NegBin for overdispersed counts, Normal → Tobit for censored data."],chain:"MLE assumptions: correct dist + independence + large n → if violated: QMLE / robust SEs / change distribution",tip:"This is a high-frequency exam question. Memorize the 3 assumptions AND the 3 remedies. The QMLE insight (mean can be right even if distribution is wrong) is especially important for Poisson."},
  ],
  week3:[
    {type:"concept",q:"List and explain the 4 problems of the Linear Probability Model.",ctx:"Why LPM is inadequate for binary Y.",answer:["<b>Step 1:</b> P outside [0,1]: Linear model can predict Ŷ < 0 or Ŷ > 1, violating probability axioms.","<b>Step 2:</b> Heteroscedasticity: Var(εᵢ) = Pᵢ(1−Pᵢ) depends on X → OLS SEs are wrong.","<b>Step 3:</b> Non-normality: ε takes only 2 values → normal-based inference fails in small samples.","<b>Step 4:</b> R² questionable: R² is bounded by the distribution of Y and is unreliable for binary models.","<b>Step 5:</b> Solution: Use Logit or Probit models which constrain P ∈ (0,1) and use MLE."],chain:"LPM problems → Logit/Probit as solutions → MLE estimation",tip:"State ALL 4 problems, then immediately say 'This motivates Logit/Probit.' Show you know the solution."},
    {type:"scenario",q:"Why does LPM always have heteroscedasticity? Derive Var(εᵢ) = Pᵢ(1−Pᵢ).",ctx:"Inherent heteroscedasticity in LPM.",answer:["<b>Step 1:</b> For binary Y: εᵢ = Yᵢ − E(Yᵢ|Xᵢ) = Yᵢ − Pᵢ","<b>Step 2:</b> If Y=1: ε = 1−P (happens with prob P). If Y=0: ε = −P (happens with prob 1−P).","<b>Step 3:</b> E(ε) = P(1−P) + (1−P)(−P) = 0 ✓","<b>Step 4:</b> Var(ε) = E(ε²) = P(1−P)² + (1−P)(P²) = P(1−P)[(1−P)+P] = P(1−P)","<b>Step 5:</b> Since P = β₀+β₁X depends on X → Var(ε) depends on X → heteroscedasticity!"],chain:"Binary Y → ε ∈ {1−P, −P} → Var(ε) = P(1−P) → depends on X → hetero",tip:"This derivation is exam gold. Practice writing it from memory."},
  ],
  week4:[
    {type:"concept",q:"Explain the logit model. How do you interpret the coefficients?",ctx:"Logistic regression interpretation.",answer:["<b>Step 1:</b> Logit: P(Y=1|X) = 1/(1+e^(−Xβ)). Constrains P ∈ (0,1).","<b>Step 2:</b> Log-odds form: ln[P/(1−P)] = Xβ → linear in log-odds.","<b>Step 3:</b> βₖ = change in LOG-ODDS per unit Xₖ. NOT change in probability!","<b>Step 4:</b> Odds ratio: e^βₖ = multiplicative change in odds. (e^βₖ−1)×100 = % change.","<b>Step 5:</b> Marginal effect: ∂P/∂Xₖ = βₖ·P(1−P). Depends on all X values!"],chain:"Xβ → logistic CDF → P → log-odds = Xβ → OR = e^β → ME = β·P(1−P)",tip:"Three layers: (1) direction (sign), (2) odds ratio (e^β), (3) marginal effect (β·P(1−P)). State all three."},
    {type:"quant",q:"A logit model gives β_education = 0.45. Compute: (a) odds ratio, (b) marginal effect at P=0.3, (c) maximum marginal effect.",ctx:"Logit coefficient interpretation.",answer:["<b>(a) OR:</b> e^0.45 = 1.568. A 1-year increase in education is associated with 56.8% higher odds of Y=1.","<b>(b) ME at P=0.3:</b> ME = 0.45 × 0.3 × 0.7 = 0.0945. At P=0.3, one more year of education increases P by ~9.45 pp.","<b>(c) Max ME:</b> at P=0.5 → ME = 0.45/4 = 0.1125. Maximum possible effect is ~11.25 pp."],chain:"β=0.45 → OR=e^0.45=1.568 → ME=β·P(1−P)",tip:"The β/4 rule gives the maximum marginal effect. Use it as a quick upper bound."},
    {type:"scenario",q:"[UTS Kholis 2023] Logit model for credit approval (N=1970). Output: married β=0.356 (p=0.018), male β=−0.027 (p=0.882), self β=−0.364 (p=0.057), lginc β=0.134 (p=0.296). LR chi2(4)=10.93 (p=0.0274), Pseudo R²=0.0074.\n\n(a) Compute & interpret odds ratios for married and lginc.\n(b) Is lginc significant? At what level?\n(c) Is the overall model significant?\n(d) Why use logit instead of LPM here?",ctx:"Full logit interpretation from real UTS — odds ratio, significance, model fit, LPM comparison.",answer:["<b>(a) Odds Ratios:</b>","OR_married = exp(0.356) = 1.428. Being married multiplies the odds of credit approval by 1.428, i.e., married applicants have 42.8% higher odds of approval, ceteris paribus. Significant at 5% (p=0.018).","OR_lginc = exp(0.134) = 1.143. A 1-unit increase in ln(income) — approximately doubling income — multiplies odds by 1.143 (14.3% higher odds). However, this is NOT statistically significant (p=0.296).","<b>(b) lginc significance:</b> z=1.05, p=0.296 > 0.05 and > 0.10. lginc is NOT significant at any conventional level. We fail to reject H₀: β_lginc=0. Income does not significantly affect credit approval probability in this model. Note: self-employed is significant at 10% (p=0.057) but not 5%.","<b>(c) Overall model significance:</b> LR chi2(4)=10.93, p=0.0274 < 0.05. The model is jointly significant at 5% — the variables collectively explain credit approval better than an intercept-only model. However, Pseudo R²=0.0074 is very low, suggesting weak explanatory power despite statistical significance.","<b>(d) Why logit over LPM:</b> (1) LPM can predict P<0 or P>1 — nonsensical for approval probability. (2) LPM has inherent heteroscedasticity: Var(ε)=P(1−P). (3) LPM assumes constant marginal effect — but the effect of income on approval probability should diminish near P=0 or P=1 (S-curve). (4) Logit uses logistic CDF → P always ∈ (0,1) and has diminishing marginal effects."],chain:"Logit output → compute OR=exp(β) → check p-values → check LR test → compare to LPM",tip:"Always compute OR AND check significance separately. An OR can look large but be insignificant (like lginc here). Report: (1) OR value, (2) direction, (3) % change in odds, (4) significance level. For overall model: LR test p-value + Pseudo R²."},
  ],
  week5:[
    {type:"concept",q:"Compare Logit and Probit models. How do you convert coefficients between them?",ctx:"Model comparison.",answer:["<b>Step 1:</b> Logit uses logistic CDF: Λ(z) = e^z/(1+e^z). Probit uses normal CDF: Φ(z).","<b>Step 2:</b> Both S-shaped, both constrain P ∈ (0,1). Logit has heavier tails.","<b>Step 3:</b> Logit has natural odds ratio interpretation; Probit has latent variable interpretation.","<b>Step 4:</b> Conversion: β_logit ≈ 1.81 × β_probit (because logistic variance = π²/3 ≈ 3.29, normal = 1).","<b>Step 5:</b> In practice, both give very similar predicted probabilities and marginal effects."],chain:"Logit (logistic) ↔ Probit (normal) via factor 1.81",tip:"Know the conversion factor 1.81 and be able to explain why it exists (different variance assumptions)."},
  ],
  week6:[
    {type:"concept",q:"Explain the LR test. What are the 4 types of LR tests?",ctx:"Hypothesis testing in MLE framework.",answer:["<b>Step 1:</b> LR = −2[ln L(M_R) − ln L(M_U)] ~ χ²(q) where q = restrictions count.","<b>Step 2:</b> Type 1 — Overall: H₀: all slopes = 0. Type 2 — Single: H₀: βₖ = 0.","<b>Step 3:</b> Type 3 — Subset: H₀: βⱼ = βₖ = 0. Type 4 — Equality: H₀: βⱼ = βₖ.","<b>Step 4:</b> Requires nested models. Reject if LR > χ²_{α,q}."],chain:"Restricted ⊂ Unrestricted → Compute ln L → LR stat → χ²(q) → Decision",tip:"Always state: restricted model, unrestricted model, q, LR value, critical value, decision."},
    {type:"concept",q:"What Pseudo R² measures exist for binary choice models? How do you interpret McFadden R²?",ctx:"Goodness of fit for logit/probit.",answer:["<b>Step 1:</b> McFadden R² = 1 − ln L/ln L₀. Range [0,1). Values 0.2-0.4 indicate good fit.","<b>Step 2:</b> Efron R² = 1 − Σ(Y−P̂)²/Σ(Y−Ȳ)². More intuitive, uses predicted probabilities.","<b>Step 3:</b> Count R² = correct predictions / N. Simple but coarse.","<b>Step 4:</b> AIC = −2lnL + 2p, BIC = −2lnL + p·ln(N). Smaller = better. For model comparison.","<b>Step 5:</b> Never compare McFadden R² to linear R². A McFadden of 0.3 ≈ linear R² of 0.6."],chain:"Model → ln L → Pseudo R² + Count R² + AIC/BIC → Model quality assessment",tip:"Report multiple measures: McFadden R², Count R², and AIC/BIC together. No single measure is sufficient."},
  ],
  week7:[
    {type:"concept",q:"Explain the ordered response model. When should you use it instead of multinomial logit?",ctx:"Ordered vs unordered multicategory models.",answer:["<b>Step 1:</b> Ordered model: y* = x'β + ε, observed y = j if γ_{j-1} < y* ≤ γ_j. One latent variable + cutpoints.","<b>Step 2:</b> Use ordered when categories have a meaningful ranking (e.g., disagree/neutral/agree). Use multinomial when categories are just different labels (e.g., car/bus/train).","<b>Step 3:</b> Ordered is more parsimonious — one β vector vs separate β for each alternative in multinomial.","<b>Step 4:</b> For M=2, ordered model collapses to standard binary logit/probit."],chain:"Ordered Y → latent y* → cutpoints → category probabilities → MLE",tip:"Key decision: does the ordering reflect an underlying continuum? If yes → ordered model. If no → multinomial."},
    {type:"quant",q:"Given ordered probit with x'β = 0.5 and γ = 1.0, compute all three category probabilities.",ctx:"Three-category ordered probit.",answer:["<b>Step 1:</b> P(y=1) = Φ(−0.5) = 0.3085","<b>Step 2:</b> P(y=3) = 1 − Φ(1−0.5) = 1 − Φ(0.5) = 1 − 0.6915 = 0.3085","<b>Step 3:</b> P(y=2) = Φ(0.5) − Φ(−0.5) = 0.6915 − 0.3085 = 0.3830","<b>Step 4:</b> Check: 0.3085 + 0.3830 + 0.3085 = 1.0 ✓"],chain:"x'β → Φ(−x'β) for P(y=1) → Φ(γ−x'β) − Φ(−x'β) for P(y=2) → 1−Φ(γ−x'β) for P(y=3)",tip:"Always check probabilities sum to 1. Know your Φ table: Φ(0.5)=0.6915, Φ(−0.5)=0.3085, Φ(1)=0.8413."},
    {type:"concept",q:"What is the parallel regression assumption? Why does it matter?",ctx:"Key restriction of ordered logit/probit.",answer:["<b>Step 1:</b> Pr(y≤m|x) = F(τ_m − xβ) uses the SAME β for every cumulative split m.","<b>Step 2:</b> This means the effect of x on crossing boundary 1→2 is identical to its effect on crossing boundary 2→3.","<b>Step 3:</b> If violated: the model is misspecified. Effects differ across boundaries.","<b>Step 4:</b> Test: Brant test (ologit), or compare to J−1 separate binary regressions. If rejected → use generalized ordered logit."],chain:"Parallel β assumption → common slopes → parsimonious model → but must test!",tip:"The parallel assumption is frequently violated in practice. Always test it. If rejected, alternatives: gologit2, mlogit, or stereotype model."},
    {type:"scenario",q:"[UAS 2024/2025 Q2] True or False with explanation:\n(1) In an Ordered Logit model, coefficients can be interpreted as the direct change in probability for each category.\n(2) The Ordered Probit assumes a logistic CDF, while Ordered Logit assumes a normal CDF.\n(3) If the odds ratio of income on job satisfaction (very satisfied) is 1.5 in an Ordered Logit, it means a 1-unit increase in income increases the probability of being very satisfied by 50%.\n\nAlso: Ordered Logit output for health status (1=fair, 2=good, 3=excellent): age β=−0.029 (p=0.000), income β=0.284 (p=0.000), numberdiseases β=−0.055 (p=0.000). Cutpoints: /cut1=−1.396, /cut2=0.951. Marginal effect of income on P(excellent)=0.063.\n(4) Interpret the coefficients. (5) What does /cut1 represent? (6) What does ME=0.063 mean? (7) If income increases by $100?",ctx:"Comprehensive ordered logit exam — T/F conceptual + Stata output interpretation.",answer:["<b>TRUE/FALSE:</b>","<b>(1) FALSE.</b> Coefficients in ordered logit affect the LATENT variable y*, not probabilities directly. A positive β guarantees P(lowest)↓ and P(highest)↑, but the effect on MIDDLE categories is ambiguous. You must compute marginal effects or predicted probabilities for probability changes.","<b>(2) FALSE — it is REVERSED.</b> Ordered LOGIT assumes a logistic CDF (Λ). Ordered PROBIT assumes a normal CDF (Φ). The statement swaps them.","<b>(3) FALSE.</b> An odds ratio of 1.5 means the CUMULATIVE ODDS of being in a higher category (y ≥ very satisfied vs y < very satisfied) are multiplied by 1.5. This is NOT the same as a 50% increase in the probability of being very satisfied. The probability change depends on the baseline probability and where you are on the distribution. Must compute marginal effects for probability changes.","<b>STATA INTERPRETATION:</b>","<b>(4) Coefficients:</b> age β=−0.029: each additional year of age decreases the latent health propensity by 0.029, shifting the probability distribution toward lower health categories. Income β=0.284: higher income raises latent health, shifting probability toward excellent. Numberdiseases β=−0.055: each additional chronic disease lowers latent health, shifting probability toward fair. All three are significant at 1% (p=0.000).","<b>(5) /cut1 = −1.396:</b> This is the threshold on the latent scale separating category 1 (fair) from category 2 (good). If the latent y* ≤ −1.396, the person is in 'fair' health. /cut2 = 0.951 separates 'good' from 'excellent'. These are NOT coefficients — they are estimated boundary parameters.","<b>(6) ME of income = 0.063:</b> A one-unit increase in income raises the probability of being in 'excellent' health by 6.3 percentage points, on average, ceteris paribus. This is the AME for outcome(3).","<b>(7) If income ↑ by $100:</b> ME is per-unit. If income is measured in dollars, then $100 increase → 0.063 × 100 = 6.3 pp increase in P(excellent). If income is in thousands, then $100 = 0.1 units → 0.063 × 0.1 = 0.63 pp increase. Always check the unit of measurement!"],chain:"T/F: coefficients ≠ probability change, logit=logistic CDF, OR ≠ probability change | Stata: β affects latent y*, cutpoints divide categories, ME gives actual probability change",tip:"The 3 T/F traps: (1) coefficients affect latent y*, NOT probabilities directly. (2) Don't confuse which CDF goes with which model. (3) Odds ratio ≠ probability change — must compute ME. These are the most common exam mistakes in ordered models."},
    {type:"scenario",q:"[KKI Q2b] If you reverse the number assignment in an ordered model (1=Very Satisfied → 4=Very Dissatisfied instead of 1=Very Dissatisfied → 4=Very Satisfied), would your conclusions differ?",ctx:"Ordered model invariance to category relabeling.",answer:["<b>Step 1:</b> No, the fundamental conclusion would NOT differ.","<b>Step 2:</b> In an ordered response model, β represents the direction of effect on the underlying latent variable (e.g., 'satisfaction level').","<b>Step 3:</b> Reversing the numerical assignment simply FLIPS THE SIGN of the coefficients.","<b>Step 4:</b> But the relative impact and significance of the independent variables are preserved.","<b>Step 5:</b> What changes: signs. What does NOT change: which variables matter, how strongly, and the predicted probability patterns."],chain:"Reverse coding → β signs flip → relative impact & significance unchanged → same substantive conclusions",tip:"This tests whether you understand that ordered models work through a latent variable, and the numeric labels are just conventions for the ordering."},
  ],
  week8:[
    {type:"scenario",q:"[KKI Q2a] Select the appropriate model for each case: (1) Students choose between economics, management, accounting, and Islamic business programs. Data includes GPA, income, and program attributes like salary and waiting time. (2) Job satisfaction measured on Likert scale (very dissatisfied → very satisfied). (3) Number of hospital admissions for asthma.",ctx:"Comprehensive model selection across all discrete-choice types.",answer:["<b>Case 1 (Study Programs):</b> Multinomial Logit (MNLM) or Conditional Logit (CLM). This is an unordered multi-choice scenario with 4 distinct programs. Use MNLM if focusing on individual characteristics (GPA, income). Use CLM if focusing on program attributes (salary, waiting time). A Mixed Multinomial Logit can handle both types simultaneously.","<b>Case 2 (Job Satisfaction):</b> Ordered Logit or Ordered Probit. The Likert scale has a natural, logical ordering (very dissatisfied → very satisfied). This is exactly what ordered models are designed for.","<b>Case 3 (Hospital Admissions):</b> Poisson Regression or Negative Binomial Regression. The dependent variable is 'number of admissions' — count data (non-negative integers). Test for overdispersion; if present, prefer NegBin."],chain:"Unordered categories → MNL/CLM | Ordered categories → ologit/oprobit | Count data → Poisson/NegBin",tip:"This is the #1 exam question type: 'which model for which data?' The decision tree is: Binary → logit/probit. Ordered multi-category → ordered logit/probit. Unordered multi-category → MNL/CLM. Count → Poisson/NegBin. Censored → Tobit."},
    {type:"scenario",q:"[KKI Q2c-d] Can you use OLS instead of discrete choice models for the three cases above? Give 3 key differences between OLS (LPM) and discrete choice models (Logit/Probit).",ctx:"Why OLS fails for categorical and count outcomes.",answer:["<b>OLS fails for all three cases:</b>","<b>Case 1:</b> OLS for multiple categories produces nonsensical predictions (P < 0 or P > 1) and cannot handle more than two outcomes properly.","<b>Case 2:</b> OLS assumes equal distances between Likert categories (cardinal), but they are ordinal. Also cannot capture the S-shaped probability relationship.","<b>Case 3:</b> OLS can predict negative admissions; count data are bounded at zero and have inherent heteroscedasticity (equidispersion issue).","<b>3 differences between OLS and Logit/Probit:</b>","<b>1. Prediction boundaries:</b> OLS → straight line → P can go below 0 or above 1. Logit/Probit → S-curve → P always ∈ (0,1).","<b>2. Error distribution:</b> OLS assumes continuous normal ε. But binary Y forces ε to take only 2 values → non-normal. Logit uses Extreme Value errors; Probit uses normal errors on a latent variable.","<b>3. Marginal effects:</b> OLS → constant effect (βₖ pp regardless of baseline P). Logit/Probit → diminishing returns (strongest effect at P=0.5, vanishes near 0% or 100%)."],chain:"OLS: linear, unbounded, constant ME → Discrete choice: S-shaped, bounded, varying ME",tip:"The three differences (shape/boundaries, error distribution, marginal effects) are a very common exam question. Memorize all three with intuition."},
    {type:"concept",q:"Explain the difference between Conditional Logit and Multinomial Logit. When do you use each?",ctx:"Core distinction in unordered choice models.",answer:["<b>Step 1:</b> CLM: μ_{ij} = x_{ij}'β — regressors vary by alternative (price, time), one common β vector.","<b>Step 2:</b> MNL: μ_{ij} = x_i'β_j — regressors are individual-specific (age, income), β varies by alternative.","<b>Step 3:</b> Use CLM when what matters is HOW alternatives differ (product attributes). Use MNL when what matters is WHO is choosing (demographics).","<b>Step 4:</b> Both rely on extreme value errors → both suffer from IIA. Both estimated by MLE."],chain:"Alternative-specific X → CLM (common β) | Individual-specific X → MNL (alternative-specific β_j)",tip:"Always state which model and why. The subscript tells you: x has j subscript → CLM, x has no j → MNL."},
    {type:"concept",q:"What is IIA? Why is it problematic? Give the red bus / blue bus example.",ctx:"Independence of Irrelevant Alternatives — the famous limitation.",answer:["<b>Step 1:</b> IIA: relative odds P(j)/P(k) are independent of what other alternatives exist.","<b>Step 2:</b> This comes from independent extreme-value errors across alternatives.","<b>Step 3:</b> Red/blue bus: adding red bus (close substitute to blue bus) should mainly steal from blue bus, not proportionally from car. IIA forces proportional substitution → wrong.","<b>Step 4:</b> If IIA violated → MNL is misspecified → coefficients are biased and inconsistent.","<b>Step 5:</b> Test: Hausman-McFadden (1984) — compare estimates using all vs subset of alternatives."],chain:"Independent ε → IIA → proportional substitution → unrealistic for close substitutes → bias if violated",tip:"IIA is not a 'small technical assumption.' It can completely invalidate MNL. Always mention the red/blue bus example to show intuition."},
    {type:"quant",q:"In a MNL with 3 alternatives, if x'β₂ = 0.7 and x'β₃ = 1.2 (base: alt 1), compute all choice probabilities.",ctx:"Computing MNL probabilities from systematic utilities.",answer:["<b>Step 1:</b> β₁ = 0 (base). So exp(x'β₁) = exp(0) = 1.","<b>Step 2:</b> exp(x'β₂) = exp(0.7) = 2.014. exp(x'β₃) = exp(1.2) = 3.320.","<b>Step 3:</b> Denominator = 1 + 2.014 + 3.320 = 6.334.","<b>Step 4:</b> P(y=1) = 1/6.334 = 0.158. P(y=2) = 2.014/6.334 = 0.318. P(y=3) = 3.320/6.334 = 0.524.","<b>Step 5:</b> Check: 0.158 + 0.318 + 0.524 = 1.0 ✓","<b>Step 6:</b> Odds ratio alt 2 vs base: e^0.7 = 2.014 → alt 2 is about twice as likely as base."],chain:"x'β_j → exp() → softmax → probabilities → check sum = 1",tip:"Always verify probabilities sum to 1. The odds ratio relative to base = exp(x'β_j) directly."},
    {type:"scenario",q:"[KKI Q5] MSMEs in Depok choose between Bank 1 (base), Bank 2, Bank 3. MNL output (mlogit bank credit interest ltime labor, base(1)):\n\nBank 2: labor β=0.843 (p=0.003). Bank 3: interest β=0.101 (p=0.000), ltime β=0.032 (p=0.082).\n\nRRR output: Bank 2 labor RRR=2.325. Bank 3 labor RRR=0.866.\n\n(a) Which variables are significant? (b) Interpret the labor coefficient. (c) What does RRR=2.325 mean? (d) Marginal effect of interest on P(Bank 3)=0.022. Interpret.",ctx:"Full MNL interpretation pipeline: significance → log-odds → RRR → marginal effects.",answer:["<b>(a) Significant variables:</b> Labor (Bank 2 vs 1, p=0.003), Interest (Bank 3 vs 1, p=0.000), Ltime (Bank 3 vs 1, p=0.082 at 10%).","<b>(b) Labor coefficient for Bank 2:</b> β=0.843. For each additional worker, the log-odds of choosing Bank 2 over Bank 1 increase by 0.843, ceteris paribus. Raw log-odds are hard to interpret → use RRR.","<b>(c) RRR = exp(β) = exp(0.843) = 2.325.</b> For each additional worker, the relative risk (odds) of choosing Bank 2 over Bank 1 is multiplied by 2.325. Adding a worker makes an MSME about 2.3× more likely to choose Bank 2. For Bank 3: RRR=0.866 < 1 → more workers slightly DECREASES odds of Bank 3 vs Bank 1.","<b>(d) Marginal effect:</b> dy/dx for interest on P(Bank 3) = 0.022. A 1 percentage point increase in interest rate increases the probability of choosing Bank 3 by 2.22 percentage points, ceteris paribus. Note: marginal effects give PROBABILITY changes, not log-odds — much more intuitive.","<b>(e) Conclusions:</b> Model is significant overall (p=0.000). Bank 3 is most popular (P≈49%). Larger MSMEs prefer Bank 2 (labor effect). Bank 3 is driven by interest rates and business age. Credit value is insignificant at 5%."],chain:"mlogit → identify significant vars → interpret β as log-odds → RRR = exp(β) for odds multiplier → marginal effects for probability changes → overall conclusions",tip:"The full interpretation pipeline is: (1) significance (p-values), (2) log-odds (β), (3) RRR (exp(β)), (4) marginal effects (dy/dx). Always report at least RRR + marginal effects for substantive meaning."},
  ],
  week9:[
    {type:"concept",q:"Why can't we use OLS or ordered logit for count data? What model should we use?",ctx:"Motivation for count-data models.",answer:["<b>Step 1:</b> OLS can predict negative counts — nonsensical for y = 0,1,2,...","<b>Step 2:</b> Ordered logit ignores that counts have cardinal meaning (4 is really twice 2) and no upper bound.","<b>Step 3:</b> Count models use E(y|x) = exp(x'β) which guarantees nonnegative expected counts.","<b>Step 4:</b> Poisson is the baseline; Negative Binomial relaxes the variance restriction."],chain:"Count Y → nonneg needed → exp(x'β) mean → Poisson or NegBin → MLE",tip:"Always explain WHY exp() is used: it guarantees E(y) > 0. Then discuss equidispersion vs overdispersion."},
    {type:"quant",q:"A Poisson model gives β_fem = -0.223 and β_ment = 0.026. Interpret both using factor change and percent change.",ctx:"Count model coefficient interpretation.",answer:["<b>fem (dummy):</b> Factor = exp(−0.223) = 0.800. Being female multiplies expected articles by 0.80 → 20% fewer articles.","<b>ment (continuous):</b> Factor = exp(0.026) = 1.026. One more mentor article multiplies expected output by 1.026 → 2.6% more articles.","<b>Percent change formula:</b> 100×[exp(β)−1]. For fem: 100×[0.800−1] = −20.0%. For ment: 100×[1.026−1] = +2.6%.","<b>Marginal effect at mean (μ=1.61):</b> ME_fem = 1.61×(−0.223) = −0.359 articles. ME_ment = 1.61×0.026 = 0.042 articles."],chain:"β → exp(β) = factor → 100[exp(β)−1] = % change → ME = μ·β (absolute)",tip:"Three layers: (1) sign, (2) factor/percent change for relative effects, (3) marginal effect for absolute change. Report at least two."},
    {type:"concept",q:"What is overdispersion? How do you test for it? What model do you use when it exists?",ctx:"The key diagnostic question for count data.",answer:["<b>Step 1:</b> Overdispersion = Var(y|x) > E(y|x). Poisson forces Var = Mean (equidispersion).","<b>Step 2:</b> Test: LR test comparing Poisson vs NegBin. H₀: α = 0 (no overdispersion). Reject if G² > 2.71 (boundary test, use 90th percentile).","<b>Step 3:</b> If overdispersion exists → use Negative Binomial. NegBin II preferred (flexible variance, robust to misspecification).","<b>Step 4:</b> Alternative: keep Poisson as QMLE for mean but use robust standard errors."],chain:"Var > Mean → overdispersion → LR test → reject Poisson → NegBin II preferred",tip:"The boundary test critical value (2.71 not 3.84) is a very exam-worthy technical point."},
    {type:"scenario",q:"[UAS 2024/2025 Q4] Poisson regression for firm entry (N=147). Output: unemprate β=−0.016 (p=0.000), avgwage β=0.223 (p=0.000), taxrate β=−0.026 (p=0.000), creditaccess β=1.711 (p=0.000), popsize β=1.013 (p=0.000). Pseudo R²=0.803.\n\nlistcoef output: unemprate %=−1.6, avgwage %=25.0, taxrate %=−2.6, creditaccess %=453.6.\n\nestat gof: Deviance GOF=24071.07, p=0.000.\n\n(a) Interpret coefficient signs — do they align with theory? Why can't magnitudes be interpreted directly?\n(b) Interpret percent changes for unemprate, avgwage, taxrate.\n(c) What is equidispersion? Why does it matter?\n(d) Does the deviance GOF test reject equidispersion?\n(e) What are the implications and what alternative model would you recommend?",ctx:"Complete Poisson regression analysis pipeline — signs, percent change, equidispersion test, model recommendation.",answer:["<b>(a) Coefficient signs & theory:</b>","unemprate β=−0.016 (✓): Higher unemployment → fewer new firms. Makes sense — weak labor markets discourage entrepreneurship.","avgwage β=0.223 (✓): Higher wages → more firms. Indicates productive/attractive regions where firms want to locate.","taxrate β=−0.026 (✓): Higher taxes → fewer firms. Tax burden discourages new business formation.","creditaccess β=1.711 (✓): Better credit access → dramatically more firms. Access to capital is critical for startups.","popsize β=1.013 (✓): Larger population → more firms. Larger markets attract more businesses.","ALL signs align with economic theory. However, magnitudes CANNOT be interpreted directly because E(y|x) = exp(x'β) is nonlinear. A 1-unit change in x does NOT change y by β units — it changes y multiplicatively by exp(β). Must use factor change, percent change, or marginal effects.","<b>(b) Percent change interpretation (from listcoef):</b>","unemprate: A 1 percentage point increase in unemployment rate DECREASES expected firm entry by 1.6%, ceteris paribus. Formula: 100×[exp(−0.016)−1] = −1.6%.","avgwage: A $1,000 increase in average wage INCREASES expected firm entry by 25.0%. Formula: 100×[exp(0.223)−1] = 25.0%.","taxrate: A 1 percentage point increase in business tax rate DECREASES expected firm entry by 2.6%. Formula: 100×[exp(−0.026)−1] = −2.6%.","<b>(c) Equidispersion:</b> Poisson assumes Var(y|x) = E(y|x) = λ. This means the conditional variance EQUALS the conditional mean. This is critical because if violated (overdispersion: Var > Mean), Poisson standard errors are TOO SMALL → t-statistics inflated → false significance. The model may still estimate the mean correctly (QMLE property), but inference is wrong without robust SEs.","<b>(d) Deviance GOF test:</b> H₀: Poisson model fits (equidispersion holds). Deviance = 24071.07, p = 0.000 ≪ 0.05. REJECT H₀. The Poisson model does NOT satisfy equidispersion. There is severe overdispersion. The deviance statistic is massive relative to df(141), confirming very poor fit of the Poisson distributional assumption.","<b>(e) Implications & alternative:</b> Since equidispersion is rejected: (1) Poisson SEs are unreliable — significance may be overstated. (2) The Poisson distribution is misspecified even though coefficients may still consistently estimate the conditional mean (QMLE). (3) Recommended alternatives: Negative Binomial regression (nbreg in Stata) — specifically NegBin II which allows overdispersion to grow with the mean and is robust to variance misspecification. (4) If keeping Poisson, at minimum use robust standard errors (poisson ..., robust) to get valid inference via the sandwich estimator. (5) Also consider zero-inflated models if excess zeros are a concern."],chain:"Poisson → check signs vs theory → interpret via %change (not raw β) → test equidispersion (deviance GOF) → if rejected → NegBin II or robust Poisson QMLE",tip:"This is a COMPLETE Poisson exam question. The pipeline is: (1) sign interpretation vs theory, (2) explain why raw β ≠ marginal effect (nonlinear!), (3) compute percent change = 100[exp(β)−1], (4) explain equidispersion, (5) deviance GOF test, (6) recommend NegBin if rejected. Master this pipeline and you can handle any count-data exam question."},
  ],

var WEEK_FORMULAS={
  week1:[
    {title:"OLS Estimator",formula:"β̂ = (X'X)⁻¹X'Y",explain:"Matrix form of OLS. X is the n×k data matrix, Y is the n×1 outcome vector. Minimizes Σûᵢ².",example:"For simple regression: β̂₁ = Σ(Xᵢ−X̄)(Yᵢ−Ȳ)/Σ(Xᵢ−X̄)², β̂₀ = Ȳ − β̂₁X̄"},
    {title:"Error Variance Estimator",formula:"σ̂² = Σûᵢ² / (n − k)",explain:"Unbiased estimator of error variance. n = observations, k = number of parameters (including intercept). ûᵢ = Yᵢ − Ŷᵢ.",example:"If Σû² = 200, n = 50, k = 3: σ̂² = 200/47 ≈ 4.26"},
    {title:"Expected Value & Variance",formula:"E(X) = Σ xᵢP(xᵢ)  |  Var(X) = E(X²) − [E(X)]²",explain:"Expected value is the probability-weighted average. Variance measures spread around the mean.",example:"Bernoulli Y: E(Y) = 1·π + 0·(1−π) = π. Var(Y) = π − π² = π(1−π)"},
  ],
  week2:[
    {title:"Likelihood Function",formula:"$$L(\\theta; y_1, \\ldots, y_n) = \\prod_{i=1}^{n} f(y_i; \\theta)$$",explain:"<b>What it means:</b> The probability of observing ALL the data we got, treated as a function of the unknown parameter $\\theta$. <b>Variables:</b> $L$ = likelihood, $\\theta$ = unknown parameter(s), $f(y_i; \\theta)$ = density/probability of observation $i$ under $\\theta$, $\\prod$ = product (because IID: independent observations). <b>Why it works:</b> Under independence, joint probability = product of individual probabilities. We find the $\\theta$ that maximizes this product. <b>When to use:</b> First step of ANY MLE problem.",example:"Bernoulli: $L(\\pi) = \\prod_i \\pi^{Y_i}(1-\\pi)^{1-Y_i}$. If data = {1,0,1,1,0}: $L = \\pi^3(1-\\pi)^2$"},
    {title:"Log-Likelihood",formula:"$$\\ln L(\\theta) = \\sum_{i=1}^{n} \\ln f(y_i; \\theta)$$",explain:"<b>What it means:</b> Natural log of the likelihood. Converts product → sum. <b>Why it works:</b> $\\ln$ is monotonically increasing, so $\\arg\\max L = \\arg\\max \\ln L$. Sums are MUCH easier to differentiate than products. Also prevents numerical underflow (product of many small numbers). <b>When to use:</b> Always. You never maximize $L$ directly — always take log first, then differentiate.",example:"Bernoulli: $\\ln L = K \\ln \\pi + (N-K)\\ln(1-\\pi)$ where $K = \\sum Y_i$"},
    {title:"MLE First-Order Condition (Score)",formula:"$$\\frac{\\partial \\ln L}{\\partial \\theta} = 0 \\quad \\Rightarrow \\quad \\hat{\\theta}_{MLE}$$",explain:"<b>What it means:</b> The score function $S(\\theta)$ = gradient of log-likelihood. Setting it to zero finds the peak. <b>Why it works:</b> At a maximum, the slope is zero. Verify with 2nd derivative: $\\partial^2 \\ln L / \\partial \\theta^2 < 0$ confirms maximum (not minimum). <b>When to use:</b> After writing $\\ln L$. Solve the resulting equation(s) for $\\hat{\\theta}$. If no closed form → use Newton-Raphson iteration.",example:"Binomial: $K/\\pi - (N-K)/(1-\\pi) = 0 \\Rightarrow \\hat{\\pi} = K/N$"},
    {title:"Information Matrix & Standard Errors",formula:"$$I(\\beta) = -E\\left[\\frac{\\partial^2 \\ln L}{\\partial \\beta \\partial \\beta'}\\right] \\qquad \\text{Var}(\\hat{\\beta}) \\approx I^{-1}(\\hat{\\beta})$$",explain:"<b>What it means:</b> $I(\\beta)$ = \"information\" the data carries about $\\beta$. It is the negative expected Hessian (matrix of 2nd derivatives). <b>Variables:</b> $H = \\partial^2 \\ln L / \\partial \\beta \\partial \\beta'$ = Hessian, $I^{-1}$ = variance-covariance matrix. <b>Intuition:</b> Sharp peak in $\\ln L$ → large curvature → large $|H|$ → small $I^{-1}$ → small SE → <b>precise</b>. Flat peak → large SE → <b>imprecise</b>. <b>When to use:</b> After MLE, to compute $SE(\\hat{\\beta}_k) = \\sqrt{[I^{-1}]_{kk}}$ for z-tests and CIs.",example:"$SE(\\hat{\\beta}_1) = \\sqrt{\\text{first diagonal element of } I^{-1}(\\hat{\\beta})}$"},
    {title:"MLE = OLS (under normality)",formula:"$$\\hat{\\beta}_{MLE} = \\hat{\\beta}_{OLS} = (X'X)^{-1}X'Y$$",explain:"<b>What it means:</b> When $\\varepsilon_i \\sim N(0, \\sigma^2)$, maximizing the normal likelihood reduces to minimizing $\\sum(Y_i - X_i'\\beta)^2$. <b>Why it works:</b> The only term in $\\ln L$ involving $\\beta$ is $-\\frac{1}{2\\sigma^2}\\sum(Y_i - X_i'\\beta)^2$. Maximizing this = minimizing the sum of squares = OLS. <b>When to use:</b> Justifying OLS as \"the best\" under normality. Also: MLE of $\\sigma^2$ divides by $n$ (biased), while OLS divides by $n-k$ (unbiased).",example:"Under normality: $\\hat{\\beta}_{MLE} = \\hat{\\beta}_{OLS}$, but $\\hat{\\sigma}^2_{MLE} = \\sum\\hat{u}_i^2/n < \\hat{\\sigma}^2_{OLS} = \\sum\\hat{u}_i^2/(n-k)$"},
    {title:"LR Test",formula:"$$LR = -2[\\ln L_R - \\ln L_U] \\sim \\chi^2(q)$$",explain:"<b>What it means:</b> Compares restricted model (fewer vars) vs unrestricted (more vars). <b>Variables:</b> $L_R$ = restricted log-likelihood, $L_U$ = unrestricted log-likelihood, $q$ = number of restrictions. <b>Why it works:</b> If restrictions are TRUE, restricted model fits almost as well → small LR. If restrictions HURT → large LR → reject $H_0$. <b>When to use:</b> Testing overall model significance, subsets of variables, or coefficient equality. Requires nested models.",example:"$\\ln L_U = -120$, $\\ln L_R = -128$, $q=2$: $LR = -2(-120-(-128)) = 16 > \\chi^2_{0.05}(2) = 5.99$ → reject"},
    {title:"z-Test & Confidence Interval",formula:"$$z = \\frac{\\hat{\\beta}_k}{SE(\\hat{\\beta}_k)} \\qquad CI: \\hat{\\beta}_k \\pm 1.96 \\cdot SE(\\hat{\\beta}_k)$$",explain:"<b>What it means:</b> $z$ = standardized distance of estimate from null (usually 0). <b>Why $z$ not $t$?</b> MLE inference is asymptotic (large-sample), based on normal distribution, not Student's $t$. <b>When to use:</b> Testing individual coefficient significance. Reject $H_0: \\beta_k = 0$ if $|z| > 1.96$ (5%). CI that excludes 0 = significant.",example:"$\\hat{\\beta} = 0.80$, $SE = 0.20$: $z = 4.0 > 1.96$ → significant. CI = $[0.408, 1.192]$"},
  ],
  week3:[
    {title:"LPM",formula:"P(Y=1|X) = β₀ + β₁X₁ + ... + βₘXₘ",explain:"OLS applied to binary Y. βₖ = constant marginal effect on probability.",example:"β₁ = 0.05 → 1 unit increase in X₁ raises P(Y=1) by 5 percentage points"},
    {title:"LPM Heteroscedasticity",formula:"Var(εᵢ) = Pᵢ(1 − Pᵢ)",explain:"Inherent in LPM because P depends on X through the linear model.",example:"If P = 0.3: Var(ε) = 0.3(0.7) = 0.21. If P = 0.5: Var(ε) = 0.25 (maximum)"},
    {title:"WLS Weight",formula:"wᵢ = 1 / √[Ŷᵢ(1 − Ŷᵢ)]",explain:"Used in 2-step WLS to correct LPM heteroscedasticity. Requires Ŷᵢ ∈ (0,1).",example:"If Ŷ = 0.4: w = 1/√(0.4×0.6) = 1/√0.24 ≈ 2.04"},
  ],
  week4:[
    {title:"Logit Probability",formula:"P(Y=1|X) = eˣᵝ/(1+eˣᵝ) = 1/(1+e⁻ˣᵝ)",explain:"Logistic CDF applied to linear index Xβ. Constrains P ∈ (0,1).",example:"If Xβ = 1.5: P = e^1.5/(1+e^1.5) = 4.48/5.48 ≈ 0.818"},
    {title:"Log-Odds",formula:"ln[P/(1−P)] = β₀ + β₁X₁ + ... + βₘXₘ",explain:"The logit transformation linearizes the model. βₖ = change in log-odds per unit Xₖ.",example:"β₁ = 0.7: one unit increase in X₁ raises log-odds by 0.7"},
    {title:"Odds Ratio",formula:"OR = e^(βₖ)  |  % change = (e^βₖ − 1) × 100",explain:"Multiplicative factor on odds for 1-unit increase in Xₖ.",example:"β = 0.7: OR = e^0.7 = 2.014 → odds are 101.4% higher (roughly doubled)"},
    {title:"Logit Marginal Effect",formula:"∂P/∂Xₖ = βₖ · P(1−P)",explain:"Non-constant: depends on current P (which depends on all X values).",example:"β = 0.7, P = 0.4: ME = 0.7 × 0.4 × 0.6 = 0.168 (16.8 pp)"},
    {title:"Maximum Marginal Effect",formula:"ME_max = βₖ / 4  (at P = 0.5)",explain:"P(1−P) is maximized at P = 0.5 where P(1−P) = 0.25.",example:"β = 0.7: ME_max = 0.7/4 = 0.175 (17.5 pp maximum)"},
    {title:"Logit Log-Likelihood",formula:"ln L = Σ[Yᵢ·Xᵢβ − ln(1+e^(Xᵢβ))]",explain:"Globally concave → unique maximum. Solved via Newton-Raphson.",example:"No closed form — iterative numerical methods required"},
  ],
  week5:[
    {title:"Probit Probability",formula:"P(Y=1|X) = Φ(β₁ + β₂Xᵢ)",explain:"Φ = standard normal CDF. Latent variable: Y* = Xβ + ε, ε~N(0,1), Y=1 if Y*>0.",example:"If Xβ = 0.8: P = Φ(0.8) ≈ 0.788"},
    {title:"Probit Marginal Effect",formula:"∂P/∂Xₖ = φ(Xβ) · βₖ",explain:"φ = standard normal PDF = (1/√2π)e^(−z²/2). Evaluated at Xβ.",example:"If Xβ = 0.5, β₂ = 0.3: ME = φ(0.5)×0.3 = 0.3521×0.3 = 0.106"},
    {title:"Logit-Probit Conversion",formula:"β_logit ≈ 1.81 × β_probit",explain:"Logistic variance = π²/3 ≈ 3.29 vs Normal variance = 1. Scale factor = √(π²/3) ≈ 1.81.",example:"If β_probit = 0.4: β_logit ≈ 0.724. Also: β_LPM ≈ 0.25 × β_logit"},
  ],
  week6:[
    {title:"Likelihood Ratio Test",formula:"LR = −2[ln L(Mᵣ) − ln L(Mᵤ)] ~ χ²(q)",explain:"q = number of restrictions. Reject H₀ if LR > χ²_{α,q}.",example:"ln L_R = −120, ln L_U = −110, q = 3: LR = −2(−120−(−110)) = 20. Compare to χ²_{0.05,3} = 7.81 → reject"},
    {title:"McFadden Pseudo R²",formula:"R²_MF = 1 − ln L / ln L₀",explain:"ln L₀ = log-likelihood of null model (intercept only). Range [0,1). 0.2-0.4 = good.",example:"ln L = −80, ln L₀ = −120: R²_MF = 1−(−80)/(−120) = 1−0.667 = 0.333 (good)"},
    {title:"AIC / BIC",formula:"AIC = −2 ln L + 2p  |  BIC = −2 ln L + p·ln(N)",explain:"p = number of parameters. Smaller is better. BIC penalizes complexity more.",example:"ln L = −80, p = 5, N = 200: AIC = 160+10 = 170, BIC = 160+5×5.3 = 186.5"},
    {title:"Pearson Residual",formula:"rᵢ = (Yᵢ − π̂ᵢ) / √[π̂ᵢ(1 − π̂ᵢ)]",explain:"Standardized residual for binary models. Large |r| → model mispredicts that observation.",example:"Y=1, π̂=0.2: r = (1−0.2)/√(0.2×0.8) = 0.8/0.4 = 2.0 (potential outlier)"},
  ],
  week7:[
    {title:"Ordered Response Mapping",formula:"$$y_i = j \\quad \\text{if} \\quad \\gamma_{j-1} < y_i^* \\leq \\gamma_j$$",explain:"<b>What:</b> Maps continuous latent $y^*$ into observed ordered category $j$. <b>Variables:</b> $y^*$ = unobserved latent propensity, $\\gamma_j$ = cutpoints/thresholds (estimated), $j = 1,\\ldots,M$ = ordered categories. <b>When:</b> Any ordered outcome — satisfaction scales, work intensity, WTP intervals.",example:"3 categories: y=1 if y*≤0, y=2 if 0<y*≤γ, y=3 if y*>γ"},
    {title:"Ordered Probit Category Probabilities",formula:"$$P(y=1|x) = \\Phi(-x'\\beta) \\qquad P(y=M|x) = 1-\\Phi(\\gamma_{M-1}-x'\\beta)$$",explain:"<b>What:</b> Probability of lowest and highest categories. <b>Variables:</b> $\\Phi$ = normal CDF, $x'\\beta$ = latent index, $\\gamma$ = cutpoint. <b>Middle categories:</b> $P(y=j|x) = \\Phi(\\gamma_j - x'\\beta) - \\Phi(\\gamma_{j-1} - x'\\beta)$. <b>When:</b> Computing predicted probabilities after ordered probit estimation.",example:"x'β=0.5, γ=1: P(y=1)=Φ(−0.5)=0.309, P(y=2)=Φ(0.5)−Φ(−0.5)=0.383, P(y=3)=1−Φ(0.5)=0.309"},
    {title:"Cumulative Form (Parallel Regression)",formula:"$$Pr(y \\leq m | x) = F(\\tau_m - x\\beta), \\quad m=1,\\ldots,J-1$$",explain:"<b>What:</b> Each cumulative probability uses the SAME β but different threshold $\\tau_m$. This is the parallel regression assumption. <b>Why it matters:</b> Makes the model parsimonious (one β vector instead of J−1). <b>Test:</b> Brant test. If rejected → generalized ordered logit.",example:"J=4 categories → 3 cumulative equations, all sharing same β, different τ₁, τ₂, τ₃"},
    {title:"Normalization Requirements",formula:"$$\\gamma_1 = 0 \\text{ (location)} \\qquad \\sigma^2 = 1 \\text{ (scale, probit)}$$",explain:"<b>What:</b> The latent scale is arbitrary — data only identify ratios like $(\\gamma-\\beta_1)/\\sigma$ and $\\beta/\\sigma$, not individual parameters. <b>Location:</b> Fix one cutpoint = 0 (or drop intercept). <b>Scale:</b> Fix error variance = 1 (probit) or use logistic convention (logit). Without these, infinitely many parameter sets give the same probabilities.",example:"Without normalization: β=2, σ=2 gives same P as β=1, σ=1. Must fix σ=1 to identify β."},
    {title:"Middle-Category Effect Rule",formula:"$$\\beta_k > 0 \\Rightarrow P(y=1) \\downarrow, \\; P(y=M) \\uparrow, \\; P(y=\\text{middle}) = \\text{ambiguous}$$",explain:"<b>What:</b> A positive coefficient guarantees lowest ↓ and highest ↑, but middle categories can go either way. <b>Why:</b> When y* shifts right, some enter middle from below (↑) while others leave middle for above (↓). Net effect depends on density at cutpoints. <b>When:</b> Any interpretation of ordered model coefficients.",example:"If β_educ > 0: P(not working)↓, P(full-time)↑, but P(part-time) could go ↑ or ↓"},
  ],
  week8:[
    {title:"Random Utility Choice Rule",formula:"$$P(y_i = j) = P(U_{ij} = \\max\\{U_{i1}, \\ldots, U_{iM}\\})$$",explain:"<b>What:</b> Person chooses the alternative with highest utility. <b>Variables:</b> $U_{ij} = \\mu_{ij} + \\varepsilon_{ij}$ where $\\mu$ = systematic and $\\varepsilon$ = random component. <b>When:</b> Foundation of ALL unordered choice models — CLM, MNL, MNP, nested logit.",example:"3 alternatives: U₁=3.2, U₂=4.1, U₃=2.8 → person chooses alt 2 (max utility)"},
    {title:"Softmax Probability (Extreme Value Errors)",formula:"$$P(y_i = j) = \\frac{\\exp(\\mu_{ij})}{\\sum_{h=1}^{M} \\exp(\\mu_{ih})}$$",explain:"<b>What:</b> Under Type I Extreme Value (Gumbel) errors, the choice probability takes this closed-form softmax. <b>Properties:</b> $0 \\leq P \\leq 1$, $\\sum P = 1$ automatically. Exponentiate each utility, divide by sum across all. <b>When:</b> Any logit-based multinomial model.",example:"μ₁=0, μ₂=0.7, μ₃=1.2: P₁ = 1/6.33 = 0.158, P₂ = 2.01/6.33 = 0.318, P₃ = 3.32/6.33 = 0.524"},
    {title:"Conditional Logit Probability",formula:"$$P(y_i = j) = \\frac{\\exp(x_{ij}'\\beta)}{\\sum_{h=1}^{M} \\exp(x_{ih}'\\beta)}$$",explain:"<b>What:</b> CLM with alternative-specific regressors $x_{ij}$ and common coefficients $\\beta$. <b>When:</b> Regressors describe the alternatives (price, travel time, quality). $x$ has a $j$ subscript.",example:"Transport: x = [time, cost] for each mode. Negative β on time means longer time → lower utility → less likely chosen."},
    {title:"CLM Marginal Effects",formula:"$$\\frac{\\partial P_j}{\\partial x_{jk}} = P_j(1-P_j)\\beta_k \\qquad \\frac{\\partial P_j}{\\partial x_{hk}} = -P_j P_h \\beta_k$$",explain:"<b>Own effect:</b> Improving alt $j$ raises its probability. <b>Cross effect:</b> Improving alt $h$ steals probability from $j$. <b>Note:</b> Cross effects are proportional to $P_h$ — this is a consequence of IIA.",example:"If β_time = −0.5, P_bus = 0.3: Own ME = 0.3(0.7)(−0.5) = −0.105. If bus time ↑ by 1 min → P(bus) ↓ by 10.5 pp."},
    {title:"Multinomial Logit Probability",formula:"$$P(y_i = j) = \\frac{\\exp(x_i'\\beta_j)}{1 + \\sum_{h=2}^{M} \\exp(x_i'\\beta_h)} \\qquad (\\beta_1 = 0)$$",explain:"<b>What:</b> MNL with individual-specific regressors $x_i$ and alternative-specific coefficients $\\beta_j$. Base alternative normalized to $\\beta_1 = 0$. <b>When:</b> Regressors describe the person (age, income, gender).",example:"If x'β₂ = 0.7: odds of alt 2 vs base = e^0.7 = 2.01 → alt 2 is about twice as likely as base."},
    {title:"MNL Log-Odds",formula:"$$\\ln\\left(\\frac{P(y=j)}{P(y=0)}\\right) = x_i'\\beta_j \\qquad \\Delta\\text{log-odds} = \\beta_{jk} \\cdot \\Delta x_k$$",explain:"<b>What:</b> The cleanest interpretation of MNL — $\\beta_{jk}$ is the change in log-odds of alternative $j$ vs base for a 1-unit increase in $x_k$. <b>When:</b> Interpreting MNL coefficients (much simpler than the direct probability partial effect).",example:"β₂_income = 0.3: 1 unit more income → log-odds of alt 2 vs base ↑ by 0.3. Odds ratio = e^0.3 = 1.35 (35% higher odds)."},
    {title:"Log-Likelihood (CLM & MNL)",formula:"$$\\ln L(\\beta) = \\sum_i \\sum_{j=0}^{J} \\mathbf{1}[y_i = j] \\cdot \\ln P(y_i = j | x_i)$$",explain:"<b>What:</b> Each observation contributes the log-probability of the alternative actually chosen. Indicator $\\mathbf{1}[y_i=j]$ selects only the chosen alternative. <b>When:</b> MLE estimation of any multinomial logit model.",example:"If person 1 chose alt 2: contributes ln P(y₁=2|x₁) to the log-likelihood."},
  ],
  week9:[
    {title:"Poisson PMF",formula:"$$P(y_i = y | x_i) = \\frac{e^{-\\lambda_i} \\lambda_i^y}{y!}, \\quad \\lambda_i = \\exp(x_i'\\beta)$$",explain:"<b>What:</b> Probability of observing count $y$ given Poisson parameter $\\lambda_i$. One parameter determines the entire distribution. <b>When:</b> Baseline count-data model.",example:"λ=2: P(0)=0.135, P(1)=0.271, P(2)=0.271, P(3)=0.180"},

]},
{title:'Probability & Distributions',items:[
{f:'<b>PDF:</b> $f(x) \\geq 0$, $\\int f(x)dx = 1$ · <b>CDF:</b> $F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t)dt$',d:'<div class="cd-what">Density & Cumulative Functions</div><div class="cd-vars"><b>PDF $f(x)$</b> = how "dense" probability is around $x$ (continuous) or $P(X=x)$ (discrete). <b>CDF $F(x)$</b> = total probability up to $x$. CDF is the integral/sum of PDF.</div><div class="cd-use"><b>When to use:</b> PDF to compute likelihoods. CDF for Logit ($\\Lambda$) and Probit ($\\Phi$) — both are CDFs that map $X\\beta$ → probability.</div>'},
{f:'$$E(X) = \\int x \\cdot f(x)\\,dx \\qquad \\text{Var}(X) = E(X^2) - [E(X)]^2$$',d:'<div class="cd-what">Expected Value & Variance</div><div class="cd-vars"><b>$E(X)$</b> = probability-weighted average = "center of mass" of the distribution. <b>$\\text{Var}(X)$</b> = expected squared deviation from mean = spread/dispersion.</div><div class="cd-use"><b>When to use:</b> E(X) for Bernoulli gives $\\pi = P(Y=1)$. Var for Bernoulli gives $\\pi(1-\\pi)$, which explains why LPM is heteroscedastic.</div>'},
{f:'$$f(x) = \\frac{1}{\\sigma\\sqrt{2\\pi}} \\exp\\left(-\\frac{(x-\\mu)^2}{2\\sigma^2}\\right)$$',d:'<div class="cd-what">Normal Density</div><div class="cd-vars"><b>$\\mu$</b> = mean (center) · <b>$\\sigma$</b> = standard deviation (spread) · <b>$\\sigma^2$</b> = variance. Bell-shaped, symmetric around $\\mu$.</div><div class="cd-use"><b>When to use:</b> When assuming $\\varepsilon \\sim N(0,\\sigma^2)$ in regression → makes MLE = OLS for $\\beta$. Also: Probit uses standard normal CDF $\\Phi(z)$ which integrates this density.</div>'},
{f:'<b>Bernoulli:</b> $E(Y) = \\pi$, $\\text{Var}(Y) = \\pi(1-\\pi)$, $f(y) = \\pi^y(1-\\pi)^{1-y}$',d:'<div class="cd-what">Bernoulli Distribution</div><div class="cd-vars"><b>$Y \\in \\{0,1\\}$</b> = binary outcome · <b>$\\pi$</b> = $P(Y=1)$ = success probability. Variance is maximized at $\\pi = 0.5$.</div><div class="cd-use"><b>When to use:</b> Foundation of ALL binary choice models. The $f(y) = \\pi^y(1-\\pi)^{1-y}$ form is the building block of the logit/probit likelihood.</div>'},
]},
{title:'MLE — Maximum Likelihood',items:[
{f:'$$L(\\theta) = \\prod_{i=1}^{n} f(y_i; \\theta) \\qquad \\ln L = \\sum_{i=1}^{n} \\ln f(y_i; \\theta)$$',d:'<div class="cd-what">Likelihood & Log-Likelihood</div><div class="cd-vars"><b>$L(\\theta)$</b> = probability of seeing ALL data, viewed as function of $\\theta$ · <b>$\\ln L$</b> = log-likelihood, turns product → sum. Same maximizer because $\\ln$ is monotonic.</div><div class="cd-use"><b>When to use:</b> Step 1 of any MLE: write the likelihood under IID, take log, differentiate, set = 0, solve. This is the universal recipe for MLE.</div>'},
{f:'$$\\frac{\\partial \\ln L}{\\partial \\theta} = 0 \\quad \\Rightarrow \\quad \\hat{\\theta}_{MLE}$$',d:'<div class="cd-what">MLE First-Order Condition (Score = 0)</div><div class="cd-vars"><b>Score function</b> $S(\\theta) = \\partial \\ln L / \\partial \\theta$ = gradient of log-likelihood. Setting it to zero finds the peak.</div><div class="cd-use"><b>When to use:</b> After writing $\\ln L$. For binomial: gives $\\hat{\\pi} = k/N$. For normal regression: gives OLS $\\hat{\\beta}$. For logit/probit: no closed form → Newton-Raphson.</div>'},
{f:'$$I(\\beta) = -E\\left[\\frac{\\partial^2 \\ln L}{\\partial \\beta \\partial \\beta\'}\\right] \\qquad SE(\\hat{\\beta}_k) = \\sqrt{[I^{-1}(\\hat{\\beta})]_{kk}}$$',d:'<div class="cd-what">Information Matrix & Standard Errors</div><div class="cd-vars"><b>$I(\\beta)$</b> = negative expected Hessian = "information" in the data about $\\beta$. <b>$I^{-1}$</b> = variance-covariance matrix of MLE. Steep curvature → small SE → precise estimate.</div><div class="cd-use"><b>When to use:</b> After obtaining MLE, to compute standard errors for z-tests and confidence intervals. Intuition: if the log-likelihood is sharply peaked, we are very "sure" about the estimate.</div>'},
{f:'<b>Properties:</b> Consistent ($\\hat{\\beta} \\to \\beta$), Asymptotically Normal ($\\sim N$), Efficient (min var) → <b>BAN</b>',d:'<div class="cd-what">Large Sample Properties of MLE</div><div class="cd-vars"><b>Consistent</b> = converges to truth as $n \\to \\infty$ · <b>Asymp. Normal</b> = approximately bell-shaped → justifies z-tests · <b>Efficient</b> = smallest possible asymptotic variance (Cramér-Rao bound) · <b>BAN</b> = Best Asymptotic Normal</div><div class="cd-use"><b>When to use:</b> To justify MLE inference. Caveat: these are LARGE sample properties. MLE may be biased in small samples (e.g., $\\hat{\\sigma}^2_{ML}$ divides by $n$ not $n-k$). Rule of thumb: $N \\geq 100$.</div>'},
{f:'<b>Binary:</b> $\\ln L = \\sum[Y_i \\ln P_i + (1-Y_i)\\ln(1-P_i)]$',d:'<div class="cd-what">Binary Choice Log-Likelihood</div><div class="cd-vars"><b>$Y_i \\in \\{0,1\\}$</b> · <b>$P_i = P(Y_i=1|X_i)$</b> = predicted probability from logit or probit. When $Y_i=1$: contributes $\\ln P_i$. When $Y_i=0$: contributes $\\ln(1-P_i)$.</div><div class="cd-use"><b>When to use:</b> The CORE likelihood for logit and probit. Plug in $P_i = \\Lambda(X_i\\beta)$ for logit, $P_i = \\Phi(X_i\\beta)$ for probit. This is globally concave for logit → unique solution.</div>'},
]},
{title:'LPM',items:[
{f:'$$P(Y=1|X) = \\beta_0 + \\beta_1 X_1 + \\ldots + \\beta_m X_m$$',d:'<div class="cd-what">Linear Probability Model</div><div class="cd-vars"><b>$\\beta_k$</b> = constant marginal effect = $\\partial P(Y=1)/\\partial X_k$ in percentage points.</div><div class="cd-use"><b>When to use:</b> Quick first look at binary data. Easy to interpret. But has 4 problems: P outside [0,1], inherent heteroscedasticity, non-normal errors, poor R². Use logit/probit for final results.</div>'},
{f:'$$\\text{Var}(\\varepsilon_i) = P_i(1-P_i) \\qquad \\text{WLS weight: } w_i = \\frac{1}{\\sqrt{\\hat{Y}_i(1-\\hat{Y}_i)}}$$',d:'<div class="cd-what">LPM Heteroscedasticity & WLS Fix</div><div class="cd-vars">Since $P_i = X_i\\beta$ depends on $X$, variance is NOT constant → A4 violated. WLS corrects by weighting each obs inversely to its variance.</div><div class="cd-use"><b>When to use:</b> 2-step procedure: (1) run OLS → get $\\hat{Y}$, (2) compute weights, (3) re-run OLS on transformed data. Requires $\\hat{Y} \\in (0,1)$.</div>'},
]},
{title:'Logit Model',items:[
{f:'$$P(Y=1|X) = \\frac{e^{X\\beta}}{1+e^{X\\beta}} = \\frac{1}{1+e^{-X\\beta}}$$',d:'<div class="cd-what">Logistic Probability Function</div><div class="cd-vars"><b>$X\\beta$</b> = linear index = $\\beta_0 + \\beta_1 X_1 + \\ldots$ · As $X\\beta \\to +\\infty$: $P \\to 1$ · As $X\\beta \\to -\\infty$: $P \\to 0$ · At $X\\beta = 0$: $P = 0.5$.</div><div class="cd-use"><b>When to use:</b> THE model for binary outcomes. Constrains $P \\in (0,1)$. Coefficients are in log-odds scale — must convert to OR or ME for interpretation.</div>'},
{f:'$$\\ln\\left(\\frac{P}{1-P}\\right) = \\beta_0 + \\beta_1 X_1 + \\ldots + \\beta_m X_m$$',d:'<div class="cd-what">Log-Odds (Logit) Link Function</div><div class="cd-vars"><b>$P/(1-P)$</b> = odds · <b>$\\ln(P/(1-P))$</b> = log-odds = logit. This transformation makes the model LINEAR in $X$.</div><div class="cd-use"><b>When to use:</b> $\\beta_k$ = change in log-odds per unit $X_k$. This is the "natural" scale of logit coefficients, but not intuitive — convert to OR or ME.</div>'},
{f:'$$OR = e^{\\beta_k} \\qquad \\% \\Delta\\text{odds} = (e^{\\beta_k} - 1) \\times 100$$',d:'<div class="cd-what">Odds Ratio Interpretation</div><div class="cd-vars"><b>$OR = e^{\\beta_k}$</b> = multiplicative factor on odds for 1-unit increase in $X_k$. If $OR = 2.5$ → odds are 150% higher. If $OR = 0.7$ → odds are 30% lower.</div><div class="cd-use"><b>When to use:</b> Standard exam phrasing: "A 1-unit increase in $X_k$ is associated with a $(e^{\\beta_k}-1)\\times 100\\%$ change in the odds of $Y=1$, ceteris paribus."</div>'},
{f:'$$\\frac{\\partial P}{\\partial X_k} = \\beta_k \\cdot P(1-P) \\qquad ME_{\\max} = \\frac{\\beta_k}{4}$$',d:'<div class="cd-what">Marginal Effect (Logit)</div><div class="cd-vars"><b>$\\partial P/\\partial X_k$</b> = actual change in probability (in pp) for 1-unit $\\Delta X_k$. Depends on $P$ → biggest at $P=0.5$, zero near $P=0$ or $P=1$. <b>$\\beta_k/4$</b> is the quick upper bound.</div><div class="cd-use"><b>When to use:</b> For substantive interpretation. AME = $(1/N)\\sum \\beta_k \\hat{P}_i(1-\\hat{P}_i)$ averages over all observations. The $\\beta/4$ rule gives a quick maximum.</div>'},
{f:'<b>AME:</b> $(1/N) \\sum \\beta_k \\hat{P}_i(1-\\hat{P}_i)$ · <b>Elasticity:</b> $\\varepsilon = \\beta_k X_k (1-P)$',d:'<div class="cd-what">Average Marginal Effect & Elasticity</div><div class="cd-vars"><b>AME</b> = average of individual MEs across all obs. More robust than ME "at the mean." <b>Elasticity</b> = % change in P per 1% change in $X_k$.</div><div class="cd-use"><b>When to use:</b> AME is the go-to for policy interpretation. In Stata: <code>margins, dydx(*)</code>. Elasticity useful when comparing variables with different scales.</div>'},
]},
{title:'Probit Model',items:[
{f:'$$P(Y=1|X) = \\Phi(X\\beta) \\qquad \\frac{\\partial P}{\\partial X_k} = \\phi(X\\beta) \\cdot \\beta_k$$',d:'<div class="cd-what">Probit Probability & Marginal Effect</div><div class="cd-vars"><b>$\\Phi$</b> = standard normal CDF · <b>$\\phi$</b> = standard normal PDF = $(1/\\sqrt{2\\pi})e^{-z^2/2}$. Latent: $Y^* = X\\beta + \\varepsilon$, $Y=1$ if $Y^* > 0$.</div><div class="cd-use"><b>When to use:</b> Alternative to logit, especially when normal errors are theoretically justified (utility theory). No natural odds ratio — must use marginal effects.</div>'},
{f:'$$\\beta_{\\text{logit}} \\approx 1.81 \\times \\beta_{\\text{probit}} \\qquad \\beta_{\\text{LPM}} \\approx 0.25 \\times \\beta_{\\text{logit}}$$',d:'<div class="cd-what">Cross-Model Coefficient Conversion</div><div class="cd-vars">Logistic variance = $\\pi^2/3 \\approx 3.29$, normal variance = 1. So $\\sqrt{\\pi^2/3} \\approx 1.81$. The 0.25 factor comes from the max ME point ($P=0.5$).</div><div class="cd-use"><b>When to use:</b> To compare logit vs probit estimates or check your results. If $\\beta_{logit}/\\beta_{probit} \\approx 1.81$, both models agree.</div>'},
]},
{title:'LR Test & Inference',items:[
{f:'$$LR = -2[\\ln L_R - \\ln L_U] \\sim \\chi^2(q)$$',d:'<div class="cd-what">Likelihood Ratio Test</div><div class="cd-vars"><b>$L_R$</b> = restricted model log-likelihood · <b>$L_U$</b> = unrestricted model log-likelihood · <b>$q$</b> = number of restrictions. Reject $H_0$ if $LR > \\chi^2_{\\alpha,q}$.</div><div class="cd-use"><b>When to use:</b> To test if adding variables improves fit. 4 types: (1) overall model test, (2) single $\\beta_k = 0$, (3) subset test, (4) equality $\\beta_j = \\beta_k$. Requires NESTED models.</div>'},
{f:'$$z = \\frac{\\hat{\\beta}_k - \\beta_k^0}{SE(\\hat{\\beta}_k)} \\qquad CI: \\hat{\\beta}_k \\pm z_{\\alpha/2} \\cdot SE(\\hat{\\beta}_k)$$',d:'<div class="cd-what">z-Test & Confidence Interval</div><div class="cd-vars"><b>$z$</b> = standardized distance from null. Reject at 5% if $|z| > 1.96$. <b>CI</b> = range of plausible $\\beta_k$ values. If CI excludes 0 → significant.</div><div class="cd-use"><b>When to use:</b> For individual coefficient significance in MLE models. Note: MLE uses $z$ (normal), not $t$ (Student), because inference is asymptotic.</div>'},
]},
{title:'Goodness of Fit',items:[
{f:'<b>McFadden:</b> $R^2 = 1 - \\ln L / \\ln L_0$ · <b>Count:</b> correct/N · <b>Efron:</b> $1 - \\sum(Y-\\hat{P})^2/\\sum(Y-\\bar{Y})^2$',d:'<div class="cd-what">Pseudo R² Measures</div><div class="cd-vars"><b>McFadden</b>: 0.2–0.4 = good (≈ linear $R^2$ of 0.5–0.7). <b>Count $R^2$</b>: % correctly predicted with 0.5 threshold. <b>Efron</b>: most intuitive, based on predicted probabilities.</div><div class="cd-use"><b>When to use:</b> Report multiple measures. Never compare McFadden to linear $R^2$. Combine with classification table + AIC/BIC for full picture.</div>'},
{f:'<b>AIC:</b> $-2\\ln L + 2p$ · <b>BIC:</b> $-2\\ln L + p\\ln N$ · <b>Smaller = better</b>',d:'<div class="cd-what">Information Criteria</div><div class="cd-vars"><b>$p$</b> = number of parameters · <b>$N$</b> = sample size. AIC penalizes complexity lightly; BIC penalizes more (especially for large $N$). $\\Delta$AIC > 10 = strong evidence.</div><div class="cd-use"><b>When to use:</b> Comparing non-nested models (where LR test cannot be used). Pick the model with LOWEST AIC/BIC.</div>'},
{f:'<b>Deviance:</b> $D \\sim \\chi^2(J-m-1)$ · <b>Pearson:</b> $\\chi^2 = \\sum n_j(\\bar{y}_j - \\hat{\\pi}_j)^2/[\\hat{\\pi}_j(1-\\hat{\\pi}_j)]$',d:'<div class="cd-what">Overall GOF Tests</div><div class="cd-vars">Both test $H_0$: model fits. $J$ = distinct covariate patterns, $m$ = regressors. Reject if stat $> \\chi^2_{\\alpha}(J-m-1)$ → poor fit.</div><div class="cd-use"><b>When to use:</b> After fitting logit/probit. Warning: requires grouped data (discrete X patterns). With continuous X, use Hosmer-Lemeshow instead.</div>'},
]},
{title:'Ordered Models',items:[
{f:'$$y_i^* = x_i\'\\beta + \\varepsilon_i, \\qquad y_i = j \\text{ if } \\gamma_{j-1} < y_i^* \\leq \\gamma_j$$',d:'<div class="cd-what">Ordered Response Model</div><div class="cd-vars"><b>$y^*$</b> = unobserved latent variable (propensity/utility) · <b>$\\gamma_j$</b> = cutpoints/thresholds dividing latent scale into $M$ categories · <b>$\\gamma_0 = -\\infty$, $\\gamma_M = +\\infty$</b> · One cutpoint normalized to 0 (location) · $\\sigma^2$ fixed to 1 (scale, probit)</div><div class="cd-use"><b>When to use:</b> Y has 3+ ordered categories (satisfaction scales, work intensity, WTP intervals). NOT for unordered categories (use multinomial logit instead).</div>'},
{f:'$$P(y=1|x) = \\Phi(-x\'\\beta) \\quad P(y=j|x) = \\Phi(\\gamma_j - x\'\\beta) - \\Phi(\\gamma_{j-1} - x\'\\beta) \\quad P(y=M|x) = 1 - \\Phi(\\gamma_{M-1} - x\'\\beta)$$',d:'<div class="cd-what">Category Probabilities (Ordered Probit)</div><div class="cd-vars">Replace $\\Phi$ with $\\Lambda$ for ordered logit. Middle categories = difference of two CDFs. Must compute these for interpretation — raw $\\beta$ only tells direction.</div><div class="cd-use"><b>When to use:</b> Computing predicted probabilities after estimation. Best way to communicate ordered model results. In Stata: <code>margins, predict(outcome(#))</code>.</div>'},
{f:'$$Pr(y \\leq m | x) = F(\\tau_m - x\\beta) \\quad \\text{same } \\beta \\text{ for all } m$$',d:'<div class="cd-what">Parallel Regression / Proportional Odds</div><div class="cd-vars">One $\\beta$ vector across all $J-1$ cumulative splits. Only the threshold $\\tau_m$ changes. This is what makes ordered models parsimonious.</div><div class="cd-use"><b>When to use:</b> This is an ASSUMPTION, not a choice. Test with Brant test. If violated → gologit2 or multinomial logit. Frequently violated in practice!</div>'},
{f:'$\\beta_k > 0 \\Rightarrow$ <b>P(lowest) ↓, P(highest) ↑, P(middle) = ambiguous</b>',d:'<div class="cd-what">Coefficient Interpretation Rule</div><div class="cd-vars">A positive $\\beta$ shifts latent $y^*$ rightward → mass moves from lowest to highest category. But middle categories can gain OR lose mass — two opposing flows (entering from below, leaving to above).</div><div class="cd-use"><b>When to use:</b> Any ordered model interpretation. NEVER say "a positive coefficient makes all higher categories more likely." Only the extremes are guaranteed. Report predicted probabilities for substantive interpretation.</div>'},
]},
{title:'Unordered Models',items:[
{f:'$$U_{ij} = \\mu_{ij} + \\varepsilon_{ij}, \\quad y_i = j \\text{ if } U_{ij} = \\max\\{U_{i1},\\ldots,U_{iM}\\}$$',d:'<div class="cd-what">Random Utility Framework</div><div class="cd-vars"><b>$U_{ij}$</b> = total utility person $i$ gets from alt $j$ · <b>$\\mu_{ij}$</b> = systematic component · <b>$\\varepsilon_{ij}$</b> = random shock. Person chooses the highest-utility option.</div><div class="cd-use"><b>When to use:</b> Foundation of ALL unordered choice models. Start every unordered model answer with this framework.</div>'},
{f:'$$P(y_i = j) = \\frac{\\exp(\\mu_{ij})}{\\sum_{h=1}^{M} \\exp(\\mu_{ih})} \\quad \\text{(softmax, under Gumbel } \\varepsilon \\text{)}$$',d:'<div class="cd-what">Softmax Choice Probability</div><div class="cd-vars">Under Type I Extreme Value (Gumbel) errors: exponentiate each utility, divide by sum. Automatically satisfies $0 \\leq P \\leq 1$ and $\\sum P = 1$.</div><div class="cd-use"><b>When to use:</b> Core formula for CLM and MNL. Plug in $\\mu_{ij} = x_{ij}\'\\beta$ for CLM or $\\mu_{ij} = x_i\'\\beta_j$ for MNL.</div>'},
{f:'<b>CLM:</b> $\\mu_{ij} = x_{ij}\'\\beta$ · <b>MNL:</b> $\\mu_{ij} = x_i\'\\beta_j$ ($\\beta_1 = 0$)',d:'<div class="cd-what">CLM vs MNL — The Central Distinction</div><div class="cd-vars"><b>CLM</b>: $x$ has $j$ subscript (alternative features: price, time), $\\beta$ is common. <b>MNL</b>: $x$ has no $j$ (person features: age, income), $\\beta_j$ varies by alternative, one normalized to 0.</div><div class="cd-use"><b>When to use:</b> CLM when regressors describe OPTIONS. MNL when regressors describe PEOPLE. The subscript on $x$ is the tell.</div>'},
{f:'<b>IIA:</b> $P(j)/P(k) = \\exp(\\mu_j)/\\exp(\\mu_k)$ — independent of other alternatives',d:'<div class="cd-what">Independence of Irrelevant Alternatives</div><div class="cd-vars">Relative odds of any two alternatives unaffected by presence of others. Implies proportional substitution. Violated when alternatives are close substitutes (red bus/blue bus).</div><div class="cd-use"><b>When to use:</b> Critical limitation of CLM/MNL. If violated → biased estimates. Test: Hausman-McFadden. Fix: MNP ($\\Sigma$ correlation) or Nested Logit (branch structure).</div>'},
{f:'<b>MNP:</b> $\\varepsilon \\sim N(0,\\Sigma)$ · <b>Nested:</b> IIA within nests, relaxed across',d:'<div class="cd-what">Alternatives to Logit-Based Models</div><div class="cd-vars"><b>MNP</b>: flexible $\\Sigma$ → correlated errors → breaks IIA. Needs simulation (GHK). <b>Nested Logit</b>: groups alts into branches. IIA within branches only. Must choose tree structure (ad hoc).</div><div class="cd-use"><b>When to use:</b> When IIA fails. MNP = most flexible but expensive. Nested = practical middle ground if natural groupings exist.</div>'},
]},
{title:'Count Data Models',items:[
{f:'$$E(y_i|x_i) = \\exp(x_i\'\\beta) = \\lambda_i \\qquad P(y) = \\frac{e^{-\\lambda}\\lambda^y}{y!}$$',d:'<div class="cd-what">Poisson Regression</div><div class="cd-vars"><b>$\\lambda_i$</b> = expected count = $\\exp(x\'\\beta)$. Exponential guarantees $E(y) > 0$. Poisson: one parameter determines entire distribution.</div><div class="cd-use"><b>When to use:</b> Baseline count model. But check for overdispersion — Poisson forces Var = Mean, which rarely holds.</div>'},
{f:'<b>Poisson:</b> $\\text{Var} = \\lambda$ · <b>NB I:</b> $\\text{Var} = (1+\\delta^2)\\lambda$ · <b>NB II:</b> $\\text{Var} = (1+\\alpha^2\\lambda)\\lambda$',d:'<div class="cd-what">Variance Structures</div><div class="cd-vars"><b>Poisson</b> = equidispersion (mean=var). <b>NB I</b> = constant proportional overdispersion. <b>NB II</b> = overdispersion grows with mean (preferred).</div><div class="cd-use"><b>When to use:</b> Test $\\alpha=0$ via LR. Reject if $G^2 > 2.71$ (boundary test). If rejected → NegBin preferred. NB II is robust to variance misspecification.</div>'},
{f:'$$\\text{Factor} = e^{\\beta_k} \\quad \\%\\Delta = 100[e^{\\beta_k}-1] \\quad ME = \\lambda \\cdot \\beta_k$$',d:'<div class="cd-what">Count Model Interpretation</div><div class="cd-vars"><b>Factor</b> = multiplicative change in expected count. <b>%Δ</b> = percentage change. <b>ME</b> = absolute change (depends on current $\\lambda$). For log regressors: $\\beta$ is an elasticity.</div><div class="cd-use"><b>When to use:</b> Always interpret via factor/percent change, not raw coefficients. For dummies: $E(y|D=1)/E(y|D=0) = e^\\beta$.</div>'},
]},
];
let h='<div class="cs-title">📋 Cheatsheet Map</div>';
h+='<div class="cs-sub">Optimized for 2-page exam cheatsheet. Click any formula to see full explanation, variable definitions, and when to use it. '+S.reduce((a,s)=>a+s.items.length,0)+' formulas across '+S.length+' sections.</div>';
S.forEach((s,si)=>{
h+='<div class="cs-section"><div class="cs-section-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'\':\'\'">';

h+='<div class="cs-section-body">';
s.items.forEach((it,fi)=>{
h+='<div class="cs-formula" onclick="var d=this.nextElementSibling;d.classList.toggle(\'open\');renderMathInEl(d)">'+it.f+'</div>';

});
h+='</div></div>';
});

// GLOSSARY RENDERER — DON'T TOUCH
function renderGlossary(){
const el=document.getElementById('glossary-view');
let totalTerms=GLOSSARY.reduce((a,g)=>a+g.terms.length,0);
let h=`<div class="glo-title">📖 Exam Glossary</div>
<div class="glo-sub">${totalTerms} terms across ${GLOSSARY.length} categories.</div>
<input type="text" class="glo-search" id="glo-q" placeholder="Search any term..." oninput="filterGlossary()">`;
GLOSSARY.forEach((g,gi)=>{
h+=`<div class="glo-market" id="glo-m-${gi}">
<div class="glo-market-head" style="background:${g.color};color:${g.text};border-bottom:1px solid ${g.border}30" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
<span>${g.market}</span><span class="glo-count">${g.terms.length} terms</span></div>
<div class="glo-market-body">`;
g.terms.forEach(([name,def])=>{
h+=`<div class="glo-term"><span class="glo-term-name">${name}</span><span class="glo-term-def">${def}</span></div>`;
});
h+=`</div></div>`;
});
el.innerHTML=h;
}
function filterGlossary(){
const q=document.getElementById('glo-q').value.toLowerCase().trim();
document.querySelectorAll('.glo-term').forEach(t=>{
const name=t.querySelector('.glo-term-name').textContent.toLowerCase();
const def=t.querySelector('.glo-term-def').textContent.toLowerCase();
t.style.display=(name.includes(q)||def.includes(q))?'':'none';
});
if(q){document.querySelectorAll('.glo-market-body').forEach(b=>b.style.display='')}
}
